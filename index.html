            <div style={{ padding:"20px 24px 16px", borderBottom:"1px solid #e2e8f0", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontSize:17, fontWeight:800, color:"#1e293b" }}>📊 גיליון סטטיסטיקה</div>
                <div style={{ fontSize:12, color:"#94a3b8", marginTop:2 }}>חלוקת אחוזים סטנדרטית למקצועות</div>
              </div>
              <button onClick={() => setShowStats(false)}
                style={{ background:"#f1f5f9", border:"none", borderRadius:8, width:32, height:32, fontSize:16, cursor:"pointer", color:"#64748b", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
            </div>

            {/* Table */}
            <div style={{ overflowY:"auto", flex:1 }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:14 }}>
                <thead>
                  <tr style={{ background:"#f8fafc", borderBottom:"2px solid #e2e8f0", position:"sticky", top:0 }}>
                    <th style={{ padding:"10px 20px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:12 }}>מקצוע</th>
                    <th style={{ padding:"10px 20px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:12 }}>אחוז (%)</th>
                    <th style={{ padding:"10px 12px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:12 }}>מחק</th>
                  </tr>
                </thead>
                <tbody>
                  {statsRows.map((row, i) => (
                    <tr key={row.id} style={{ borderBottom:"1px solid #f1f5f9", background:i%2===0?"#fff":"#fafbfd" }}>
                      <td style={{ padding:"8px 12px" }}>
                        <input
                          value={row.field}
                          onChange={e => setStatsRows(statsRows.map(r => r.id===row.id ? {...r, field:e.target.value} : r))}
                          style={{ width:"100%", fontWeight:600, color:"#1e293b", background:"transparent", border:"1.5px solid transparent", borderRadius:7, padding:"5px 8px", fontSize:14, fontFamily:"'Heebo',sans-serif", outline:"none" }}
                          onFocus={e => { e.target.style.background="#fff"; e.target.style.borderColor="#3b82f6"; }}
                          onBlur={e  => { e.target.style.background="transparent"; e.target.style.borderColor="transparent"; }}
                        />
                      </td>
                      <td style={{ padding:"8px 20px", textAlign:"right" }}>
                        <input
                          type="number"
                          value={row.pct}
                          onChange={e => setStatsRows(statsRows.map(r => r.id===row.id ? {...r, pct:e.target.value} : r))}
                          placeholder="—"
                          style={{ width:80, textAlign:"right", background:"#f8fafc", border:"1.5px solid #e2e8f0", borderRadius:7, padding:"5px 8px", fontSize:14, fontFamily:"'Heebo',sans-serif", outline:"none" }}
                          onFocus={e => e.target.style.borderColor="#3b82f6"}
                          onBlur={e  => e.target.style.borderColor="#e2e8f0"}
                        />
                      </td>
                      <td style={{ padding:"8px 12px", textAlign:"right" }}>
                        <button onClick={() => setStatsRows(statsRows.filter(r => r.id !== row.id))}
                          style={{ background:"#fef2f2", color:"#ef4444", border:"none", borderRadius:6, padding:"3px 10px", fontSize:13, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>🗑</button>
                      </td>
                    </tr>
                  ))}
                  {/* Add new profession row */}
                  <tr style={{ borderBottom:"1px solid #f1f5f9", background:"#f8fafc" }}>
                    <td style={{ padding:"8px 12px" }}>
                      <input id="new-stat-field" placeholder="שם מקצוע חדש..."
                        style={{ width:"100%", color:"#1e293b", background:"transparent", border:"1.5px solid transparent", borderRadius:7, padding:"5px 8px", fontSize:14, fontFamily:"'Heebo',sans-serif", outline:"none" }}
                        onFocus={e => { e.target.style.background="#fff"; e.target.style.borderColor="#16a34a"; }}
                        onBlur={e  => { e.target.style.background="transparent"; e.target.style.borderColor="transparent"; }}
                        onKeyDown={e => {
                          if (e.key === "Enter") {
                            const field = e.target.value.trim();
                            if (!field) return;
                            const pctEl = e.target.closest("tr").querySelector("input[type=number]");
                            const pct = pctEl ? pctEl.value : "";
                            setStatsRows([...statsRows, { id: Date.now(), field, pct }]);
                            e.target.value = "";
                            if (pctEl) pctEl.value = "";
                          }
                        }}
                      />
                    </td>
                    <td style={{ padding:"8px 20px", textAlign:"right" }}>
                      <input type="number" placeholder="0"
                        style={{ width:80, textAlign:"right", background:"#f8fafc", border:"1.5px solid #bbf7d0", borderRadius:7, padding:"5px 8px", fontSize:14, fontFamily:"'Heebo',sans-serif", outline:"none" }}
                        onFocus={e => e.target.style.borderColor="#16a34a"}
                        onBlur={e  => e.target.style.borderColor="#bbf7d0"}
                      />
                    </td>
                    <td style={{ padding:"8px 12px", textAlign:"right" }}>
                      <button
                        onClick={e => {
                          const row = e.target.closest("tr");
                          const fieldEl = row.querySelector("input:not([type=number])");
                          const pctEl   = row.querySelector("input[type=number]");
                          const field   = fieldEl?.value.trim();
                          if (!field) return;
                          setStatsRows([...statsRows, { id: Date.now(), field, pct: pctEl?.value || "" }]);
                          if (fieldEl) fieldEl.value = "";
                          if (pctEl)   pctEl.value = "";
                        }}
                        style={{ background:"#dcfce7", color:"#374151", border:"none", borderRadius:6, padding:"3px 10px", fontSize:13, cursor:"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:700 }}>+ הוסף</button>
                    </td>
                  </tr>
                </tbody>
                <tfoot>
                  <tr style={{ background:"#f8fafc", borderTop:"2px solid #bfdbfe" }}>
                    <td style={{ padding:"10px 20px", fontWeight:800, color:"#1e293b" }}>סה״כ אחוזים</td>
                    <td style={{ padding:"10px 20px", textAlign:"right", fontWeight:800, color:"#1e293b", fontSize:15 }}>
                      {statsRows.reduce((s,r) => s + Number(r.pct||0), 0).toFixed(2)}%
                    </td>
                    <td />
                  </tr>
                </tfoot>
              </table>
            </div>

            {/* Footer note */}
            <div style={{ padding:"12px 20px", borderTop:"1px solid #e2e8f0", fontSize:11, color:"#94a3b8", textAlign:"right" }}>
              * אחוזים מבוססים על נתונים סטטיסטיים
            </div>
          </div>
        </div>
      )}

      {/* ── New project modal ── */}
      {showModal && (
        <div style={{ position:"fixed", inset:0, background:"#00000055", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000 }}
          onClick={() => setShowModal(false)}>
          <div className="fade"
            style={{ background:"#fff", borderRadius:16, padding:30, width:420, boxShadow:"0 20px 60px #0003" }}
            onClick={e => e.stopPropagation()}>
            <div style={{ fontSize:17, fontWeight:800, color:"#1e293b", marginBottom:18 }}>➕ פרויקט חדש</div>
            <div style={{ display:"flex", flexDirection:"column", gap:13 }}>
              <TextInput label="שם הפרויקט" value={newPForm.name} onChange={e=>setNewPForm({...newPForm,name:e.target.value})} placeholder="" />
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:11 }}>
                <div>
                  <div style={{ fontSize:12, color:"#64748b", fontWeight:600, marginBottom:5, textAlign:"right" }}>חברה עירונית</div>
                  <select value={newPForm.companyId||""} onChange={e=>setNewPForm({...newPForm,companyId:e.target.value})}
                    style={{ width:"100%", padding:"8px 11px", border:"1.5px solid #e2e8f0", borderRadius:8, fontSize:14, fontFamily:"'Heebo',sans-serif", background:"#f8fafc", color:"#1e293b", outline:"none", direction:"rtl" }}>
                    <option value="">-- לא נבחר --</option>
                    {companies.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
                <TextInput label="שנה" type="number" value={newPForm.year} onChange={e=>setNewPForm({...newPForm,year:e.target.value})} />
              </div>
            </div>
            <div style={{ display:"flex", gap:10, marginTop:18 }}>
              <PrimaryButton onClick={addProject}>צור פרויקט</PrimaryButton>
              <button onClick={() => setShowModal(false)}
                style={{ flex:1, background:"#f1f5f9", border:"none", borderRadius:9, padding:"9px 20px", fontSize:14, color:"#64748b", cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>
                ביטול
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Toast ── */}
      {toast && (
        <div className="fade"
          style={{ position:"fixed", bottom:22, left:"50%", transform:"translateX(-50%)", background:"#1e293b", color:"#fff", borderRadius:11, padding:"11px 22px", fontSize:14, fontWeight:600, zIndex:2000, boxShadow:"0 8px 24px #0003" }}>
          {toast}
        </div>
      )}

      {/* ── Backup Confirm Modal ── */}
      {showBackupConfirm && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:3000 }}
          onClick={() => setShowBackupConfirm(false)}>
          <div className="fade" onClick={e => e.stopPropagation()}
            style={{ background:"#fff", borderRadius:16, padding:"28px 32px", width:400, boxShadow:"0 24px 64px #0004", fontFamily:"'Heebo',sans-serif", direction:"rtl" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
              <div style={{ fontSize:17, fontWeight:800, color:"#1e293b" }}>💾 גיבוי נתונים</div>
              <button onClick={() => setShowBackupConfirm(false)}
                style={{ background:"#f1f5f9", border:"none", borderRadius:8, width:30, height:30, fontSize:15, cursor:"pointer", color:"#64748b" }}>✕</button>
            </div>
            <div style={{ fontSize:12, fontWeight:700, color:"#64748b", marginBottom:6, display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
              <span>מיקום שמירה</span>
              <span style={{ fontSize:11, fontWeight:400, color:"#94a3b8", direction:"ltr" }}>Projects – Documents → ניהול יועצים → AI → backup COSTPILOT</span>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:10, background:"#f8fafc", border:"1.5px solid #e2e8f0", borderRadius:9, padding:"10px 14px", marginBottom:20 }}>
              <span style={{ fontSize:18 }}>📁</span>
              <span style={{ flex:1, fontSize:13, color: backupDirName?"#1e293b":"#94a3b8", fontWeight: backupDirName?600:400, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                {backupDirName || "לא הוגדרה תיקייה"}
              </span>
              <button onClick={chooseBackupDir}
                style={{ fontSize:11, padding:"4px 10px", borderRadius:6, border:"1.5px solid #93c5fd", background:"#eff6ff", color:"#1d4ed8", cursor:"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:600, whiteSpace:"nowrap" }}>
                שנה
              </button>
            </div>
            <button onClick={doBackup}
              style={{ width:"100%", padding:"11px", borderRadius:9, border:"none", background:"linear-gradient(135deg,#2563eb,#1d4ed8)", color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>
              {backupDirName ? "שמור גיבוי לתיקייה" : "שמור גיבוי (ידני)"}
            </button>
          </div>
        </div>
      )}

      {/* ── Backup Modal ── */}
      {showBackupModal && (
        <div style={{ position:"fixed", inset:0, background:"#00000070", display:"flex", alignItems:"center", justifyContent:"center", zIndex:3000 }}
          onClick={() => setShowBackupModal(false)}>
          <div className="fade" onClick={e => e.stopPropagation()}
            style={{ background:"#fff", borderRadius:16, padding:28, width:580, maxHeight:"80vh", display:"flex", flexDirection:"column", gap:16, boxShadow:"0 24px 64px #0004" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontSize:17, fontWeight:800, color:"#1e293b" }}>💾 גיבוי נתונים</div>
                <div style={{ fontSize:12, color:"#64748b", marginTop:3 }}>
                  סמני הכל ← העתיקי ← פתחי פנקס רשימות ← הדביקי ← שמרי כקובץ גיבוי.json
                </div>
              </div>
              <button onClick={() => setShowBackupModal(false)}
                style={{ background:"#f1f5f9", border:"none", borderRadius:8, width:32, height:32, fontSize:16, cursor:"pointer", color:"#64748b" }}>✕</button>
            </div>
            <button
              onClick={() => {
                const el = document.getElementById("backup-textarea");
                el.select();
                document.execCommand("copy");
                notify("✅ הועתק! כעת הדביקי בפנקס רשימות ושמרי");
              }}
              style={{ background:"linear-gradient(135deg,#3b82f6,#2563eb)", color:"#fff", border:"none", borderRadius:9, padding:"9px 20px", fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>
              📋 העתק הכל
            </button>
            <textarea
              id="backup-textarea"
              readOnly
              value={backupText}
              style={{ flex:1, minHeight:300, fontFamily:"monospace", fontSize:11, direction:"ltr", border:"1.5px solid #e2e8f0", borderRadius:8, padding:12, resize:"none", color:"#334155", background:"#f8fafc", outline:"none" }}
            />
          </div>
        </div>
      )}
    </div>
  );
}


    // Add global error handler
    window.addEventListener('error', e => {
      console.error('Global error:', e.message, e.filename, e.lineno);
    });

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      componentDidCatch(error) { this.setState({ error: error.message }); }
      render() {
        if (this.state.error) return (
          <div style={{padding:40, fontFamily:"'Heebo',sans-serif", color:"#ef4444", direction:"rtl"}}>
            <h2>שגיאה באפליקציה</h2>
            <pre style={{fontSize:12, color:"#64748b"}}>{this.state.error}</pre>
          </div>
        );
        return this.props.children;
      }
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      <ErrorBoundary><App /></ErrorBoundary>
    );
  </script>
</body>
</html>
