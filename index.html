                    <td style={{ padding:"10px 10px", color: noBase?"#9A9A9A": r.noClaims ? "#9A9A9A" : remaining2 < 0 ? "#5C2020" : "#0D0D0D", fontWeight:400,
                      textDecoration: r.noClaims ? "line-through" : "none",
                      }}>
                      {noBase ? "—" : fmt(remaining2)}
                    </td>
                    <td style={{ padding:"10px 10px", color:"#0D0D0D", textAlign:"right" }}>
                      {(r.planOnly||0) > 0 ? fmt(r.planOnly) : "—"}
                    </td>
                    <td style={{ padding:"10px 10px", textAlign:"right" }}>
                      {r.noClaims
                        ? <span style={{ fontSize:12, color:"#3A3A3A", fontWeight:700 }}>✓</span>
                        : <span style={{ fontSize:12, color:"#D0D5DD" }}>—</span>}
                    </td>
                    <td style={{ padding:"6px 8px", minWidth:180 }}>
                      <input value={r.notes||""} onChange={e => updateNote(r._consultantRowId, e.target.value)}
                        placeholder="הערות..."
                        style={{ width:"100%", fontSize:12, border:"1px solid #E2E5EA",
                          borderRadius:4, padding:"5px 8px", fontFamily:"'Heebo',sans-serif", color:"#3A3A3A",
                          background:"transparent", outline:"none", direction:"rtl" }}
                        onFocus={e=>e.target.style.borderColor="#444444"} onBlur={e=>e.target.style.borderColor="#E2E5EA"} />
                    </td>
                  </tr>
                );
                })}
              </>)}
              <tr>
                <td colSpan={9} style={{ padding:"5px 14px" }}>
                  <button onClick={addExtraConsultant}
                    style={{ background:"#FAF2E6", color:"#5C3D10", border:"1px solid #F0D4B0", borderRadius:4, padding:"4px 12px", fontSize:11, cursor:"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:600 }}>
                    + הוסף שורה ידנית
                  </button>
                </td>
              </tr>
            </tbody>
            {allRows.length > 0 && (
              <tbody>
                <tr style={{ borderTop:"2px solid #B8CEED" }}>
                  <td style={{ padding:"8px 10px", fontWeight:800, color:"#163356", fontSize:12, textAlign:"right" }}>סה״כ יועצים</td>
                  <td style={{ padding:"8px 10px", color:"#9A9A9A", fontSize:12, textAlign:"right" }}>{allRows.length} יועצים</td>
                  <td style={{ padding:"8px 10px", fontWeight:800, color:"#0D0D0D", textAlign:"right" }}>{fmt(consultantsTotal)}</td>
                  <td style={{ padding:"8px 10px", fontWeight:800, color:"#0D0D0D", textAlign:"right" }}>{fmt(allRows.reduce((s,r)=>s+(r.paid||0),0))}</td>
                  <td style={{ padding:"8px 10px", fontWeight:800, color:"#0D0D0D", textAlign:"right" }}>{fmt(allRows.reduce((s,r)=>{
                    if (r.noClaims) return s;
                    return s+((r.payType==="אחוזים"?r.computedFee:r.value)+r.increases-(r.paid||0));
                  },0))}</td>
                  <td style={{ padding:"8px 10px", fontWeight:800, color:"#0D0D0D", textAlign:"right" }}>{fmt(allRows.reduce((s,r)=>s+(r.planOnly||0),0))}</td>
                  <td colSpan={2} />
                </tr>

                {/* ── אגרות ── */}
                {(() => {
                  const FIXED_FEES = ["פיצויי נופי","תאגיד המים - לא דמי הקמה","כיבוי אש","חח\"י","בזק","הוט","רשות העתיקות","תיק מידע"];
                  const feeRows = bs.feeRows || FIXED_FEES.map(name => ({ id:name, name, contract:"", paid:"", planOnly:"", noClaims:false, notes:"" }));
                  const extraFeeRows = bs.extraFeeRows || [];
                  const allFeeRows = [...feeRows, ...extraFeeRows];
                  const updFeeRow = (id, key, val, isExtra) => {
                    if (isExtra) {
                      upd("extraFeeRows", (bs.extraFeeRows||[]).map(r => r.id===id ? {...r,[key]:val} : r));
                    } else {
                      upd("feeRows", feeRows.map(r => r.id===id ? {...r,[key]:val} : r));
                    }
                  };
                  const feeTotalContract = allFeeRows.reduce((s,r) => s+Number(r.contract||0),0);
                  const feeTotalPaid = allFeeRows.reduce((s,r) => s+Number(r.paid||0),0);
                  const feeTotalRemaining = allFeeRows.reduce((s,r) => r.noClaims ? s : s+Number(r.contract||0)-Number(r.paid||0),0);
                  const feeTotalPlanOnly = allFeeRows.reduce((s,r) => s+Number(r.planOnly||0),0);
                  const inputStyle = { width:"100%", fontSize:12, border:"1px solid #E2E5EA", borderRadius:4, padding:"4px 7px", fontFamily:"'Heebo',sans-serif", background:"transparent", outline:"none", textAlign:"right" };
                  return (<>
                    <tr style={{ background:"#FAF2E6", borderTop:"2px solid #F0D4B0" }}>
                      <td colSpan={9} style={{ padding:"8px 14px", fontWeight:800, color:"#5C3D10", fontSize:13 }}>אגרות</td>
                    </tr>
                    {allFeeRows.map((r, i) => {
                      const isExtra = i >= FIXED_FEES.length;
                      const rem = r.noClaims ? 0 : Number(r.contract||0) - Number(r.paid||0);
                      return (
                        <tr key={r.id} style={{ borderBottom:"1px solid #F0F2F5", background:i%2===0?"#fff":"#F7F8FA" }}>
                          <td style={{ padding:"7px 10px", color:"#767676", fontSize:12 }}>אגרות</td>
                          <td style={{ padding:"7px 10px" }}>
                            {isExtra
                              ? <input value={r.name} onChange={e=>updFeeRow(r.id,"name",e.target.value,true)} style={inputStyle} placeholder="שם האגרה..." />
                              : <span style={{ fontSize:13, color:"#0D0D0D" }}>{r.name}</span>}
                          </td>
                          <td style={{ padding:"7px 10px" }}><BudgetNumInput value={r.contract||""} onChange={v=>updFeeRow(r.id,"contract",v,isExtra)} /></td>
                          <td style={{ padding:"7px 10px" }}><BudgetNumInput value={r.paid||""} onChange={v=>updFeeRow(r.id,"paid",v,isExtra)} /></td>
                          <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color: rem<0?"#5C2020":"#0D0D0D", textDecoration:r.noClaims?"line-through":"none" }}>{fmt(rem)}</td>
                          <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#0D0D0D" }}>{fmt(Number(r.contract||0))}</td>
                          <td />
                          <td style={{ padding:"7px 10px" }}>
                            <input value={r.notes||""} onChange={e=>updFeeRow(r.id,"notes",e.target.value,isExtra)} style={inputStyle} placeholder="הערות..." />
                          </td>
                        </tr>
                      );
                    })}
                    <tr>
                      <td colSpan={9} style={{ padding:"5px 14px" }}>
                        <button onClick={()=>upd("extraFeeRows",[...(bs.extraFeeRows||[]),{id:Date.now(),name:"",contract:"",paid:"",planOnly:"",noClaims:false,notes:""}])}
                          style={{ background:"#FAF2E6", color:"#5C3D10", border:"1px solid #F0D4B0", borderRadius:4, padding:"4px 10px", fontSize:11, cursor:"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:600 }}>+ הוסף אגרה</button>
                      </td>
                    </tr>
                    <tr style={{ borderTop:"2px solid #F0D4B0" }}>
                      <td colSpan={2} style={{ padding:"8px 10px", fontWeight:800, color:"#5C3D10", fontSize:12 }}>סה״כ אגרות</td>
                      <td style={{ padding:"8px 10px", fontWeight:800, color:"#0D0D0D", textAlign:"right" }}>{fmt(feeTotalContract)}</td>
                      <td style={{ padding:"8px 10px", fontWeight:800, color:"#0D0D0D", textAlign:"right" }}>{fmt(feeTotalPaid)}</td>
                      <td style={{ padding:"8px 10px", fontWeight:800, color:"#0D0D0D", textAlign:"right" }}>{fmt(feeTotalRemaining)}</td>
                      <td style={{ padding:"8px 10px", fontWeight:800, color:"#0D0D0D", textAlign:"right" }}>{fmt(feeTotalContract)}</td>
                      <td colSpan={2} />
                    </tr>

                    {/* ── קבלן ── */}
                    {(() => {
                      const extraContractorRows = bs.extraContractorRows || [];
                      const allContractorRows = [
                        { id:"__main__", name:"קבלן ראשי", contract:bs.contractorContract||"", paid:bs.contractorPaid||"", notes:bs.contractorNotes||"", isMain:true }
                      , ...extraContractorRows];
                      const updContractorRow = (id, key, val) => {
                        if (id==="__main__") {
                          const map = {contract:"contractorContract",paid:"contractorPaid",notes:"contractorNotes"};
                          upd(map[key]||key, val);
                        } else {
                          upd("extraContractorRows", extraContractorRows.map(r => r.id===id ? {...r,[key]:val} : r));
                        }
                      };
                      const contractorContract = allContractorRows.reduce((s,r)=>s+Number(r.contract||0),0);
                      const contractorPaid     = allContractorRows.reduce((s,r)=>s+Number(r.paid||0),0);
                      const contractorRem      = contractorContract - contractorPaid;
                      return (<>
                        <tr style={{ background:"#EFF7F3", borderTop:"2px solid #C6E8D4" }}>
                          <td colSpan={9} style={{ padding:"8px 14px", fontWeight:800, color:"#1C4532", fontSize:13 }}>קבלן</td>
                        </tr>
                        {allContractorRows.map((r,i) => {
                          const rem = Number(r.contract||0) - Number(r.paid||0);
                          return (
                            <tr key={r.id} style={{ borderBottom:"1px solid #F0F2F5", background:i%2===0?"#fff":"#F7F8FA" }}>
                              <td style={{ padding:"7px 10px", fontSize:13, color:"#0D0D0D" }}>
                                {r.isMain ? "קבלן ראשי" : "קבלן"}
                              </td>
                              <td style={{ padding:"7px 10px" }}>
                                {r.isMain
                                  ? <input value={bs.contractorName||""} onChange={e=>upd("contractorName",e.target.value)} style={inputStyle} placeholder="שם הקבלן..." />
                                  : <input value={r.name} onChange={e=>updContractorRow(r.id,"name",e.target.value)} style={inputStyle} placeholder="שם הקבלן..." />}
                              </td>
                              <td style={{ padding:"7px 10px" }}><BudgetNumInput value={r.contract} onChange={v=>updContractorRow(r.id,"contract",v)} /></td>
                              <td style={{ padding:"7px 10px" }}><BudgetNumInput value={r.paid} onChange={v=>updContractorRow(r.id,"paid",v)} /></td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:rem<0?"#5C2020":"#0D0D0D" }}>{fmt(rem)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#9A9A9A" }}>—</td>
                              <td style={{ padding:"7px 6px", textAlign:"center" }}>
                                {!r.isMain && (
                                  <button onClick={()=>upd("extraContractorRows", extraContractorRows.filter(x=>x.id!==r.id))}
                                    style={{ background:"none", border:"none", cursor:"pointer", color:"#5C2020", fontSize:14, lineHeight:1, padding:"2px 4px" }}
                                    title="מחק שורה">✕</button>
                                )}
                              </td>
                              <td style={{ padding:"7px 10px" }}><input value={r.notes} onChange={e=>updContractorRow(r.id,"notes",e.target.value)} style={inputStyle} placeholder="הערות..." /></td>
                            </tr>
                          );
                        })}
                        <tr>
                          <td colSpan={9} style={{ padding:"5px 14px" }}>
                            <button onClick={()=>upd("extraContractorRows",[...extraContractorRows,{id:Date.now(),name:"",contract:"",paid:"",notes:""}])}
                              style={{ background:"#EFF7F3", color:"#1C4532", border:"1px solid #C6E8D4", borderRadius:4, padding:"4px 10px", fontSize:11, cursor:"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:600 }}>+ הוסף קבלן</button>
                          </td>
                        </tr>
                        <tr style={{ borderTop:"2px solid #C6E8D4" }}>
                          <td colSpan={2} style={{ padding:"8px 10px", fontWeight:800, color:"#1C4532", fontSize:12 }}>סה״כ קבלן</td>
                          <td style={{ padding:"8px 10px", fontWeight:800, color:"#0D0D0D", textAlign:"right" }}>{fmt(contractorContract)}</td>
                          <td style={{ padding:"8px 10px", fontWeight:800, color:"#0D0D0D", textAlign:"right" }}>{fmt(contractorPaid)}</td>
                          <td style={{ padding:"8px 10px", fontWeight:800, color:"#0D0D0D", textAlign:"right" }}>{fmt(contractorRem)}</td>
                          <td style={{ padding:"8px 10px", color:"#9A9A9A", textAlign:"right" }}>—</td>
                          <td colSpan={2} />
                        </tr>

                        {/* ── תקורות ── */}
                        {(() => {
                          const baseForOverhead = consultantsTotal + feeTotalContract + contractorContract;
                          const overheadMode = bs.overheadMode || "pct";
                          const overheadPct = Number(bs.overheadPct||0);
                          const overheadAmt = overheadMode === "fixed"
                            ? Number(bs.overheadFixed||0)
                            : baseForOverhead * overheadPct / 100;
                          const bcmBase = baseForOverhead + overheadAmt;
                          const bcmPct = Number(bs.bcmPct||0);
                          const bcmAmt = bcmBase * bcmPct / 100;
                          const vatPct = Number(bs.vatPct||18);
                          const vatBase = bcmBase + bcmAmt;
                          const vatAmt = vatBase * vatPct / 100;
                          const basePaid = allRows.reduce((s,r)=>s+(r.paid||0),0) + feeTotalPaid + contractorPaid;
                          const overheadPaid = overheadMode === "fixed" ? Number(bs.overheadPaidFixed||0) : Math.round(basePaid * overheadPct / 100);
                          const overheadRem = overheadAmt - overheadPaid;
                          const bcmPaid = Math.round((basePaid + overheadPaid) * bcmPct / 100);
                          const bcmRem = bcmAmt - bcmPaid;
                          const vatPaid = Math.round((basePaid + overheadPaid + bcmPaid) * vatPct / 100);
                          const vatRem = vatAmt - vatPaid;
                          const consultantsPlanOnly = allRows.reduce((s,r)=>s+(r.planOnly||0),0);
                          const basePlanOnly = consultantsPlanOnly + feeTotalContract;
                          const overheadPlanOnlyCalc = overheadMode === "fixed" ? Number(bs.overheadPlanOnlyFixed||0) : basePlanOnly * overheadPct / 100;
                          const bcmPlanOnlyCalc = (basePlanOnly + overheadPlanOnlyCalc) * bcmPct / 100;
                          const vatPlanOnlyCalc = (basePlanOnly + overheadPlanOnlyCalc + bcmPlanOnlyCalc) * vatPct / 100;
                          const overheadTotalAmt = overheadAmt + bcmAmt + vatAmt;
                          const grandTotalContract = consultantsTotal + feeTotalContract + contractorContract + overheadTotalAmt;
                          const grandTotalPaid = allRows.reduce((s,r)=>s+(r.paid||0),0) + feeTotalPaid + contractorPaid + overheadPaid + bcmPaid + vatPaid;
                          const grandTotalRem = grandTotalContract - grandTotalPaid;
                          return (<>
                            <tr style={{ background:"#F0F2F5", borderTop:"2px solid #D0D5DD" }}>
                              <td colSpan={9} style={{ padding:"8px 14px", fontWeight:800, color:"#444444", fontSize:13 }}>תקורות</td>
                            </tr>
                            {/* תקורות חברה עירונית */}
                            <tr style={{ borderBottom:"1px solid #F0F2F5" }}>
                              <td style={{ padding:"7px 10px", fontSize:13, color:"#0D0D0D" }}>תקורות חברה עירונית</td>
                              <td style={{ padding:"7px 10px" }}>
                                <div style={{ display:"flex", alignItems:"center", gap:4, justifyContent:"flex-start" }}>
                                  <span onClick={()=>upd("overheadMode", overheadMode==="fixed"?"pct":"fixed")}
                                    title="לחץ לשינוי סוג"
                                    style={{ fontSize:11, cursor:"pointer", fontWeight:700, userSelect:"none",
                                      color: overheadMode==="fixed"?"#5C3D10":"#767676",
                                      textDecoration: "underline dotted" }}>
                                    {overheadMode==="fixed"?"":"%"}
                                  </span>
                                  {overheadMode==="fixed"
                                    ? <input type="number" value={bs.overheadFixed||""} onChange={e=>upd("overheadFixed",e.target.value)} style={{...inputStyle, width:75, textAlign:"right"}} placeholder="סכום" />
                                    : <input type="number" value={bs.overheadPct||""} onChange={e=>upd("overheadPct",e.target.value)} style={{...inputStyle, width:50, textAlign:"right"}} />
                                  }
                                </div>
                              </td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#0D0D0D", fontWeight:600 }}>{fmt(overheadAmt)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#0D0D0D" }}>
                                {overheadMode==="fixed"
                                  ? <input type="number" value={bs.overheadPaidFixed||""} onChange={e=>upd("overheadPaidFixed",e.target.value)} style={{...inputStyle, width:"100%", textAlign:"right"}} placeholder="0" />
                                  : fmt(overheadPaid)}
                              </td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:overheadRem<0?"#5C2020":"#0D0D0D" }}>{fmt(overheadRem)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#0D0D0D" }}>
                                {overheadMode==="fixed"
                                  ? <input type="number" value={bs.overheadPlanOnlyFixed||""} onChange={e=>upd("overheadPlanOnlyFixed",e.target.value)} style={{...inputStyle, width:"100%", textAlign:"right"}} placeholder="0" />
                                  : (overheadPlanOnlyCalc > 0 ? fmt(Math.round(overheadPlanOnlyCalc)) : "—")}
                              </td>
                              <td />
                              <td style={{ padding:"7px 10px" }}><input value={bs.overheadNotes||""} onChange={e=>upd("overheadNotes",e.target.value)} style={inputStyle} placeholder="הערות..." /></td>
                            </tr>
                            {/* בצמ */}
                            <tr style={{ borderBottom:"1px solid #F0F2F5", background:"#F7F8FA" }}>
                              <td style={{ padding:"7px 10px", fontSize:13, color:"#0D0D0D" }}>בצ״מ</td>
                              <td style={{ padding:"7px 10px" }}>
                                <div style={{ display:"flex", alignItems:"center", gap:4, justifyContent:"flex-start" }}>
                                  <span style={{ fontSize:11, color:"#767676" }}>%</span>
                                  <input type="number" value={bs.bcmPct||""} onChange={e=>upd("bcmPct",e.target.value)} style={{...inputStyle, width:50, textAlign:"right"}} placeholder="" />
                                </div>
                              </td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#0D0D0D", fontWeight:600 }}>{fmt(bcmAmt)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#0D0D0D" }}>{fmt(bcmPaid)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:bcmRem<0?"#5C2020":"#0D0D0D" }}>{fmt(bcmRem)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#0D0D0D" }}>{bcmPlanOnlyCalc > 0 ? fmt(Math.round(bcmPlanOnlyCalc)) : "—"}</td>
                              <td />
                              <td style={{ padding:"7px 10px" }}><input value={bs.bcmNotes||""} onChange={e=>upd("bcmNotes",e.target.value)} style={inputStyle} placeholder="הערות..." /></td>
                            </tr>
                            {/* מעמ */}
                            <tr style={{ borderBottom:"1px solid #F0F2F5" }}>
                              <td style={{ padding:"7px 10px", fontSize:13, color:"#0D0D0D" }}>מע״מ</td>
                              <td style={{ padding:"7px 10px" }}>
                                <div style={{ display:"flex", alignItems:"center", gap:4, justifyContent:"flex-start" }}>
                                  <span style={{ fontSize:11, color:"#767676" }}>%</span>
                                  <input type="number" value={bs.vatPct||18} onChange={e=>upd("vatPct",e.target.value)} style={{...inputStyle, width:50, textAlign:"right"}} />
                                </div>
                              </td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#0D0D0D", fontWeight:600 }}>{fmt(vatAmt)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#0D0D0D" }}>{fmt(vatPaid)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:vatRem<0?"#5C2020":"#0D0D0D" }}>{fmt(vatRem)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#0D0D0D" }}>{vatPlanOnlyCalc > 0 ? fmt(Math.round(vatPlanOnlyCalc)) : "—"}</td>
                              <td />
                              <td style={{ padding:"7px 10px" }}><input value={bs.vatNotes||""} onChange={e=>upd("vatNotes",e.target.value)} style={inputStyle} placeholder="הערות..." /></td>
                            </tr>
                            {/* סהכ תקורות */}
                            <tr style={{ borderTop:"2px solid #D0D5DD" }}>
                              <td colSpan={2} style={{ padding:"8px 10px", fontWeight:800, color:"#444444", fontSize:12 }}>סה״כ תקורות</td>
                              <td style={{ padding:"8px 10px", fontWeight:800, color:"#0D0D0D", textAlign:"right" }}>{fmt(overheadTotalAmt)}</td>
                              <td style={{ padding:"8px 10px", fontWeight:800, color:"#0D0D0D", textAlign:"right" }}>{fmt(overheadPaid+bcmPaid+vatPaid)}</td>
                              <td style={{ padding:"8px 10px", fontWeight:800, color:"#0D0D0D", textAlign:"right" }}>{fmt(overheadRem+bcmRem+vatRem)}</td>
                              <td style={{ padding:"8px 10px", fontWeight:800, color:"#0D0D0D", textAlign:"right" }}>{fmt(Math.round(overheadPlanOnlyCalc+bcmPlanOnlyCalc+vatPlanOnlyCalc))}</td>
                              <td colSpan={2} />
                            </tr>
                            {/* סה"כ כללי */}
                            <tr style={{ background:"#FAF2E6", borderTop:"3px solid #5C3D10" }}>
                              <td colSpan={2} style={{ padding:"11px 10px", fontWeight:900, color:"#5C3D10", fontSize:14 }}>סה״כ כללי</td>
                              <td style={{ padding:"11px 10px", fontWeight:900, color:"#5C3D10", fontSize:14, textAlign:"right" }}>{fmt(grandTotalContract)}</td>
                              <td style={{ padding:"11px 10px", fontWeight:900, color:"#5C3D10", fontSize:14, textAlign:"right" }}>{fmt(grandTotalPaid)}</td>
                              <td style={{ padding:"11px 10px", fontWeight:900, color:"#5C3D10", fontSize:14, textAlign:"right" }}>{fmt(grandTotalRem)}</td>
                              <td style={{ padding:"11px 10px", fontWeight:900, color:"#5C3D10", fontSize:14, textAlign:"right" }}>{fmt(Math.round(basePlanOnly + overheadPlanOnlyCalc + bcmPlanOnlyCalc + vatPlanOnlyCalc))}</td>
                              <td colSpan={2} />
                            </tr>
                          </>);
                        })()}
                      </>);
                    })()}
                  </>);
                })()}
              </tbody>
            )}
          </table>
        </div>
      </Card>

      {budgetOpenConsultant && (
        <ConsultantModal
          consultant={budgetOpenConsultant}
          onClose={() => setBudgetOpenConsultantId(null)}
          onSave={updated => setConsultantsRows(prev => prev.map(r => r.id === updated.id ? updated : r))}
          budgetState={budgetState}
          statsRows={statsRows}
          suppliers={[]}
          openingData={openingData||{}}

// ── Tab: פתיחת פרויקט ────────────────────────────────────────────────────────
// ── Helper: date picker showing DD/MM/YYYY ────────────────────────────────────
function DatePickerDMY({ value, onChange, style }) {
  const ref = React.useRef();
  const toISO  = v => v ? v.split('/').reverse().join('-') : "";
  const toDMY  = v => { if (!v) return ""; const [y,m,d] = v.split('-'); return `${d}/${m}/${y}`; };
  return (
    <div style={{ position:"relative", width:"100%" }}>
      <input type="text" readOnly value={value||""} placeholder="DD/MM/YYYY"
        onClick={()=>{ try{ ref.current.showPicker(); }catch(e){ ref.current.focus(); } }}
        style={{ ...style, cursor:"pointer", width:"100%", boxSizing:"border-box" }} />
      <input ref={ref} type="date" value={toISO(value)}
        onChange={e=>onChange(toDMY(e.target.value))}
        style={{ position:"absolute", top:0, left:0, width:"100%", height:"100%", opacity:0, pointerEvents:"none" }} />
    </div>
  );
}

// ── מיגרציה: פורמט ישן (שורה לכל איש קשר) → פורמט חדש (contacts:[]) ─────────
function migrateSuppliers(rows) {
  if (!rows || rows.length === 0) return rows || [];
  if (rows[0] && Array.isArray(rows[0].contacts)) return rows;
  const map = {}, order = [];
  rows.forEach(r => {
    const key = (r.name||"") + "\0" + (r.field||"");
    if (!map[key]) { map[key] = { id: r.id, name: r.name||"", field: r.field||"", notes: r.notes||"", contacts: [] }; order.push(key); }
    if (r.contact || r.phone || r.phone2 || r.email)
      map[key].contacts.push({ id: String(r.id)+"_c"+map[key].contacts.length, contact: r.contact||"", phone: r.phone||"", phone2: r.phone2||"", email: r.email||"" });
  });
  return order.map(k => map[k]);
}

// ── RichEditor: contenteditable div שמשמר HTML ────────────────────────────────
const RichEditor = React.memo(function RichEditor({ html, onChange, placeholder, style }) {
  const ref = React.useRef(null);
  const lastHtml = React.useRef(html);
  React.useEffect(() => {
    if (ref.current && ref.current.innerHTML !== html) {
      ref.current.innerHTML = html || "";
      lastHtml.current = html || "";
    }
  }, [html]);
  return (
    <div
      ref={ref}
      contentEditable
      suppressContentEditableWarning
      dir="rtl"
      data-placeholder={placeholder}
      onBlur={() => { if (onChange && ref.current) { onChange(ref.current.innerHTML); lastHtml.current = ref.current.innerHTML; } }}
      style={{ outline:"none", ...style }}
    />
  );
});

function SuppliersPage({ suppliers, setSuppliers, professions }) {
  const [search,   setSearch]   = useState("");

  const [editData,   setEditData]   = useState(null);   // { name, field, notes, contacts:[] }
  const [editError, setEditError] = useState("");

  const allFields = [...new Set([...suppliers.map(s => s.field).filter(Boolean), ...(professions||[])])].sort();

  const emptyContact = () => ({ id:Date.now(), contact:"", phone:"", phone2:"", email:"" });
  const validPhone = v => (v||"").replace(/\D/g,"").length >= 7;
  const validEmail = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((v||"").trim());
  const del = id => { if(window.confirm("למחוק את הספק?")) setSuppliers(prev => prev.filter(s => s.id !== id)); };
  const openEdit = s => { const cts = (s.contacts||[]).map(c=>({...c})); setEditId(s.id); setEditData({ name:s.name||"", field:s.field||"", notes:s.notes||"", contacts: cts.length>0 ? cts : [emptyContact()] }); setEditError(""); };
  const openNew  = ()  => { setEditId("new"); setEditData({ name:"", field:"", notes:"", contacts:[emptyContact()] }); setEditError(""); };
  const closeModal = () => { setEditId(null); setEditData(null); setEditError(""); };
  const saveModal = () => {
    if (!editData.name.trim()) { setEditError("יש להזין שם ספק"); return; }
    const cleanContacts = editData.contacts.filter(c => c.contact||c.phone||c.phone2||c.email);
    if (cleanContacts.length === 0) { setEditError("יש להזין לפחות איש קשר אחד עם פרטי התקשרות (טלפון, נייד או מייל)"); return; }
    for (const c of cleanContacts) {
      const hasPhone = c.phone && validPhone(c.phone);
      const hasPhone2 = c.phone2 && validPhone(c.phone2);
      const hasEmail = c.email && validEmail(c.email);
      if (!hasPhone && !hasPhone2 && !hasEmail) {
        setEditError(`לאיש הקשר "${c.contact||"ללא שם"}" חסרים פרטי התקשרות תקינים — יש למלא לפחות טלפון, נייד או מייל`); return;
      }
      if (c.phone && !validPhone(c.phone)) { setEditError(`מספר טלפון לא תקין עבור "${c.contact||"ללא שם"}"`); return; }
      if (c.phone2 && !validPhone(c.phone2)) { setEditError(`מספר נייד לא תקין עבור "${c.contact||"ללא שם"}"`); return; }
      if (c.email && !validEmail(c.email)) { setEditError(`כתובת מייל לא תקינה עבור "${c.contact||"ללא שם"}"`); return; }
    }
    const dataToSave = { ...editData, contacts: cleanContacts };
    if (editId === "new") setSuppliers(prev => [...prev, { ...dataToSave, id: Date.now() }]);
    else setSuppliers(prev => prev.map(s => s.id === editId ? { ...s, ...dataToSave } : s));
    closeModal();
  };

// ── Global page: תבניות אבני דרך ─────────────────────────────────────────────
function MilestonesPage({ companies, milestones, setMilestones, professions }) {
  const [selCompany,  setSelCompany]  = useState("");
  const [selProf,     setSelProf]     = useState("");
  const [customProf,  setCustomProf]  = useState("");
  const [addingProf,  setAddingProf]  = useState(false);
  const [newName,     setNewName]     = useState("");
  const [newPct,      setNewPct]      = useState("");
  const [newPlanOnly, setNewPlanOnly] = useState(false);
  const [editId,      setEditId]      = useState(null);
  const [editData,    setEditData]    = useState({});
  const [copyFromCompany, setCopyFromCompany] = useState("");
  const [copyFromProf,    setCopyFromProf]    = useState("");
  const [showCopy,        setShowCopy]        = useState(false);
  const [profFocused,     setProfFocused]     = useState(false);
  const [copyProfSearch,  setCopyProfSearch]  = useState("");
  const [copyProfFocused, setCopyProfFocused] = useState(false);

  // All professions = stats professions + any custom ones already used in this company
  const existingCompanyProfs = selCompany
    ? Object.keys(milestones[selCompany] || {})
    : [];
  const allProfs = [...new Set([...professions, ...existingCompanyProfs])];
  const profSearchOpts = allProfs.filter(p => !customProf || p.startsWith(customProf));

  const companyMilestones = selCompany && selProf
    ? (milestones[selCompany]?.[selProf] || [])
    : [];

  const upd = (list) => {
    const companyData = { ...(milestones[selCompany]||{}), [selProf]: list };
    if (list.length === 0) delete companyData[selProf];
    setMilestones({ ...milestones, [selCompany]: companyData });
  };

  const addCustomProf = () => {
    if (!customProf.trim()) return;
    setSelProf(customProf.trim());
    setCustomProf("");
    setAddingProf(false);
  };

  const add = () => {
    if (!newName.trim() || !newPct) return;
    upd([...companyMilestones, { id:Date.now(), name:newName, pct:newPct, planOnly:newPlanOnly }]);
    setNewName(""); setNewPct(""); setNewPlanOnly(false);
  };

  const del = id => upd(companyMilestones.filter(m => m.id !== id));

  const saveEdit = () => {
    upd(companyMilestones.map(m => m.id === editId ? { ...m, ...editData } : m));
    setEditId(null);
  };

  const totalPct = companyMilestones.reduce((s,m) => s + Number(m.pct||0), 0);

  return (
    <div className="fade" style={{ padding:"34px 38px", display:"flex", flexDirection:"column", gap:22 }}>
      <div>
        <div style={{ fontSize:11, color:"#444444", fontWeight:700, letterSpacing:3, marginBottom:4 }}>גיליון גלובלי</div>
        <h1 style={{ fontSize:24, fontWeight:900, color:"#0D0D0D", margin:0 }}>🚩 תבניות אבני דרך</h1>
        <div style={{ fontSize:13, color:"#9A9A9A", marginTop:4 }}>ניהול אבני דרך סטנדרטיות לפי חברה עירונית ומקצוע</div>
      </div>

      {/* Selectors */}
      <Card>
        <div style={{ display:"flex", gap:20, flexWrap:"wrap", alignItems:"flex-end" }}>
          <div style={{ flex:1, minWidth:200 }}>
            <div style={{ fontSize:12, fontWeight:600, color:"#767676", marginBottom:6 }}>בחר חברה עירונית *</div>
            <select value={selCompany} onChange={e=>{ setSelCompany(e.target.value); setSelProf(""); }}
              style={{ width:"100%", padding:"9px 12px", border:"1.5px solid #0B1F3A", borderRadius:4, fontSize:14, fontFamily:"'Heebo',sans-serif", background:"#F7F8FA", outline:"none" }}>
              <option value="">-- בחר --</option>
              {companies.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          {selCompany && (
            <div style={{ flex:1, minWidth:200 }}>
              <div style={{ fontSize:12, fontWeight:600, color:"#767676", marginBottom:6 }}>בחר מקצוע *</div>
              <div style={{ position:"relative" }}>
                <input value={selProf || customProf}
                  onChange={e => { setCustomProf(e.target.value); setSelProf(""); }}
                  onFocus={()=>setProfFocused(true)}
                  onBlur={()=>setTimeout(()=>setProfFocused(false),150)}
                  placeholder="הקלד לחיפוש תחום..."
                  style={{ width:"100%", padding:"9px 12px", border:"1.5px solid #0B1F3A", borderRadius:4, fontSize:14, fontFamily:"'Heebo',sans-serif", outline:"none", boxSizing:"border-box", background:"#F7F8FA" }} />
                {profFocused && profSearchOpts.length > 0 && (
                  <div style={{ position:"absolute", top:"100%", right:0, left:0, background:"#fff", border:"1.5px solid #E2E5EA", borderRadius:4, zIndex:200, boxShadow:"0 8px 24px #0002", maxHeight:220, overflowY:"auto", marginTop:2 }}>
                    {profSearchOpts.map(p => (
                      <div key={p} onMouseDown={() => { setSelProf(p); setCustomProf(""); setProfFocused(false); }}
                        style={{ padding:"9px 14px", cursor:"pointer", fontSize:14, color:"#0D0D0D", direction:"rtl", borderBottom:"1px solid #F0F2F5", background: p===selProf?"#EAF1FA":"#fff" }}
                        onMouseOver={e=>e.currentTarget.style.background="#EAF1FA"}
                        onMouseOut={e=>e.currentTarget.style.background=p===selProf?"#EAF1FA":"#fff"}>{p}</div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      </Card>

      {/* Milestones table */}
      {selCompany && selProf && (

// ── Minimal ZIP builder (stored, no compression) ─────────────────────────────
function buildZip(files) {
  const u32le = (n) => { const b=new Uint8Array(4); new DataView(b.buffer).setUint32(0,n,true); return b; };
  const u16le = (n) => { const b=new Uint8Array(2); new DataView(b.buffer).setUint16(0,n,true); return b; };
  const concat = (...arrays) => { const len=arrays.reduce((s,a)=>s+a.length,0); const r=new Uint8Array(len); let off=0; arrays.forEach(a=>{r.set(a,off);off+=a.length;}); return r; };
  const crc32 = (data) => {
    let c=0xFFFFFFFF;
    const t=new Uint32Array(256);
    for(let i=0;i<256;i++){let x=i;for(let j=0;j<8;j++)x=x&1?(x>>>1)^0xEDB88320:(x>>>1);t[i]=x;}
    for(let i=0;i<data.length;i++)c=t[(c^data[i])&0xFF]^(c>>>8);
    return (c^0xFFFFFFFF)>>>0;
  };
  const enc = new TextEncoder();
  const localHeaders = [];
  const centralDirs = [];
  let offset = 0;
  for (const [name, data] of Object.entries(files)) {
    const nameBytes = enc.encode(name);
    const crc = crc32(data);
    const local = concat(
      new Uint8Array([0x50,0x4B,0x03,0x04]), // sig
      u16le(20), u16le(0), u16le(0),          // version, flags, compression (stored)
      u16le(0), u16le(0),                      // mod time, mod date
      u32le(crc), u32le(data.length), u32le(data.length),
      u16le(nameBytes.length), u16le(0),       // name len, extra len
      nameBytes, data
    );
    const central = concat(
      new Uint8Array([0x50,0x4B,0x01,0x02]), // sig
      u16le(20), u16le(20), u16le(0), u16le(0),
      u16le(0), u16le(0),                      // compression stored
      u32le(crc), u32le(data.length), u32le(data.length),
      u16le(nameBytes.length), u16le(0), u16le(0), u16le(0), u16le(0),
      u32le(0), u32le(offset),
      nameBytes
    );
    localHeaders.push(local);
    centralDirs.push(central);
    offset += local.length;
  }
  const centralStart = offset;
  const centralData = concat(...centralDirs);
  const eocd = concat(
    new Uint8Array([0x50,0x4B,0x05,0x06]),
    u16le(0), u16le(0),
    u16le(centralDirs.length), u16le(centralDirs.length),
    u32le(centralData.length), u32le(centralStart),
    u16le(0)
  );
  return concat(...localHeaders, centralData, eocd);
}

// ── Persistence helpers ──────────────────────────────────────────────────────
const LS_PROJECTS = "proj_mgr_projects";
const LS_DATA     = "proj_mgr_data";

function loadProjects() {
  try {
    const raw = localStorage.getItem(LS_PROJECTS);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return SEED_PROJECTS;
}

function loadAllData(projects) {
  try {
    const raw = localStorage.getItem(LS_DATA);
    if (raw) {
      const saved = JSON.parse(raw);
      // ensure every project has an entry
      const d = {};
      projects.forEach(p => { d[p.id] = saved[p.id] || makeProjectData(); });
      return d;
    }
  } catch(e) {}
  const d = {};
  projects.forEach(p => { d[p.id] = makeProjectData(); });
  return d;
}

function saveProjects(projects) {
  try { localStorage.setItem(LS_PROJECTS, JSON.stringify(projects)); } catch(e) {}
}

function saveAllData(data) {
  try { localStorage.setItem(LS_DATA, JSON.stringify(data)); } catch(e) {}
}

// ── Global page: מידע ראשי ───────────────────────────────────────────────────
const PROJ_STATUSES_MAIN = ["תכנון","ביצוע","נמסר","הוקפא","בוטל"];

function MainInfoPage({ allData, projects, companies, setAllData, setProjects, onNavigate, statsRows }) {
  const upd = (projId, key, val) => {
    if (key === "name" || key === "status") {
      setProjects(projects.map(p => p.id===projId ? {...p,[key]:val} : p));
    } else if (key === "projectNumber" || key === "planningManager" || key === "executionManager") {
      setAllData(prev => ({ ...prev, [projId]: { ...(prev[projId]||makeProjectData()), [key]: val } }));
    } else {
      setAllData(prev => ({ ...prev, [projId]: { ...(prev[projId]||makeProjectData()), openingData: { ...(prev[projId]?.openingData||{}), [key]: val } } }));
    }
  };

  // colFilters: { [fkey]: Set<string> } — undefined/null = no filter (all shown)
  const [colFilters, setColFilters] = React.useState({});
  const [openFilter, setOpenFilter]   = React.useState(null);
  const [filterSearch, setFilterSearch] = React.useState("");
  const [dropPos, setDropPos]         = React.useState({ top:0, left:0 });

  const inp = (projId, key, val) => (
    <input value={val||""} onChange={e=>upd(projId,key,e.target.value)}
      style={{ width:"100%", border:"none", background:"transparent", textAlign:"right", direction:"rtl", fontSize:12, fontFamily:"'Heebo',sans-serif", outline:"none", color:"#0D0D0D", padding:"4px 4px" }}
      onFocus={e=>e.target.style.background="#EAF1FA"} onBlur={e=>e.target.style.background="transparent"} />
  );

  const cols = [
    { label:"מס׳ פרויקט",    w:90,  fkey:"projectNumber" },
    { label:"שם פרויקט",     w:160, fkey:"name" },
    { label:"חברה עירונית",  w:120, fkey:"company" },
    { label:"כתובת",         w:130, fkey:"address" },
    { label:"מהות הפרויקט", w:150, fkey:"workDescription" },
    { label:"מנהל תכנון",   w:100, fkey:"planningManager" },
    { label:"מנהל ביצוע",   w:100, fkey:"executionManager" },
    { label:"ניצול תקציבי", w:90,  fkey:null },
    { label:"% יועצים",     w:80,  fkey:null },
    { label:"סטטוס",         w:90,  fkey:"status" },
    { label:"תאריך התחלה",  w:110, fkey:"startDate" },
    { label:"תאריך סיום",   w:110, fkey:"endDate" },
    { label:"שטח (מ״ר)",    w:80,  fkey:"buildingArea" },
    { label:"עלות קבלנית",  w:110, fkey:"contractorEst" },
    { label:"עלות עירונית", w:110, fkey:"municipalEst" },
  ];

  const getVal = (p, fkey) => {
    const d = allData[p.id] || {};
    const o = d.openingData || {};
    const company = companies.find(c => String(c.id) === String(d.companyId));
    switch(fkey) {
      case "projectNumber":    return d.projectNumber||"";
      case "name":             return p.name||"";
      case "company":          return company?.name||"";
      case "address":          return o.address||"";
      case "workDescription":  return o.workDescription||"";
      case "planningManager":  return d.planningManager||"";
      case "executionManager": return d.executionManager||"";
      case "status":           return p.status||"";
      case "startDate":        return o.startDate ? o.startDate.split("-").reverse().join("/") : "";
      case "endDate":          return o.endDate   ? o.endDate.split("-").reverse().join("/")   : "";
      case "buildingArea":     return String(o.buildingArea||"");
      case "contractorEst":    return String(o.contractorEst||"");
      case "municipalEst":     return String(o.municipalEst||"");
      default: return "";
    }
  };

  // Projects filtered by all columns EXCEPT targetFkey (for dropdown options)
  // undefined = no filter (show all); Set = show only items in set
  const getFilteredExcept = (targetFkey) =>
    projects.filter(p => cols.every(({fkey}) => {
      if (!fkey || fkey === targetFkey) return true;
      const sel = colFilters[fkey];
      if (sel === undefined) return true;
      return sel.has(getVal(p, fkey));
    }));

  const filteredProjects = projects.filter(p =>
    cols.every(({fkey}) => {
      if (!fkey) return true;
      const sel = colFilters[fkey];
      if (sel === undefined) return true;
      return sel.has(getVal(p, fkey));
    })
  );

  const isFiltered = (fkey) => colFilters[fkey] !== undefined;
  const hasAnyFilter = cols.some(({fkey}) => fkey && isFiltered(fkey));

  const openDropdown = (fkey, e) => {
    e.stopPropagation();
    if (openFilter === fkey) { setOpenFilter(null); return; }
    const rect = e.currentTarget.getBoundingClientRect();
    setDropPos({ top: rect.bottom + 2, left: rect.left });
    setOpenFilter(fkey);
    setFilterSearch("");
  };

  const closeDropdown = () => setOpenFilter(null);

  const renderDropdown = () => {
    if (!openFilter) return null;
    const fkey = openFilter;
    const partial = getFilteredExcept(fkey);
    const allVals = [...new Set(partial.map(p => getVal(p, fkey)))].sort((a,b)=>a.localeCompare(b,"he"));
    const sel = colFilters[fkey]; // undefined = no filter; Set = explicit selection
    const isAllSelected = sel === undefined;
    const searchTerm = filterSearch.trim();
    const visibleVals = allVals.filter(v => !searchTerm || v.includes(searchTerm));

    const toggle = (val) => {
      setColFilters(prev => {
        const curSel = prev[fkey];
        if (curSel === undefined) {
          // Was "all" — uncheck this one item
          const newSet = new Set(allVals.filter(v => v !== val));
          return { ...prev, [fkey]: newSet };
        }
        const cur = new Set(curSel);
        if (cur.has(val)) { cur.delete(val); } else { cur.add(val); }
        // If all vals re-selected, remove filter entirely
        if (cur.size >= allVals.length) { const n = {...prev}; delete n[fkey]; return n; }
        return { ...prev, [fkey]: cur };
      });
    };

    const selectAll = () => setColFilters(prev => { const n = {...prev}; delete n[fkey]; return n; });
    const clearAll  = () => setColFilters(prev => ({ ...prev, [fkey]: new Set() }));
    const isChecked = (v) => isAllSelected ? true : sel.has(v);

    return ReactDOM.createPortal(
      <>
        <div onClick={closeDropdown} style={{ position:"fixed", inset:0, zIndex:1999 }} />
        <div onClick={e=>e.stopPropagation()}
          style={{ position:"fixed", top:dropPos.top, left:dropPos.left, zIndex:2000,
            background:"#fff", border:"1px solid #D0D5DD", borderRadius:8,
            boxShadow:"0 6px 24px #0003", minWidth:200, maxWidth:280,
            display:"flex", flexDirection:"column", padding:10, gap:6, direction:"rtl",
            fontFamily:"'Heebo',sans-serif" }}>
          <input autoFocus value={filterSearch} onChange={e=>setFilterSearch(e.target.value)}
            placeholder="חיפוש..."
            style={{ border:"1px solid #E2E5EA", borderRadius:4, padding:"5px 8px", fontSize:12,
              outline:"none", textAlign:"right", direction:"rtl", fontFamily:"'Heebo',sans-serif", background:"#F7F8FA" }} />
          <div style={{ display:"flex", gap:6 }}>
            <button onClick={selectAll} style={{ flex:1, background:"#EAF1FA", color:"#163356", border:"none", borderRadius:4, padding:"4px 0", fontSize:11, cursor:"pointer", fontWeight:600 }}>בחר הכל</button>
            <button onClick={clearAll}  style={{ flex:1, background:"#F0F2F5", color:"#767676", border:"none", borderRadius:4, padding:"4px 0", fontSize:11, cursor:"pointer", fontWeight:600 }}>נקה הכל</button>
          </div>
          <div style={{ maxHeight:220, overflowY:"auto", display:"flex", flexDirection:"column", gap:1 }}>
            {visibleVals.length === 0 && <div style={{ color:"#9A9A9A", fontSize:11, padding:"6px 4px" }}>אין תוצאות</div>}
            {visibleVals.map(val => (
              <div key={val} onClick={()=>toggle(val)} style={{ display:"flex", alignItems:"center", gap:8, padding:"4px 6px", borderRadius:4, cursor:"pointer", fontSize:12 }}>
                <span style={{ width:14, height:14, flexShrink:0, border:"1.5px solid #9A9A9A", borderRadius:2, display:"flex", alignItems:"center", justifyContent:"center", background:"#fff", fontSize:11, color:"#0D0D0D", fontWeight:700 }}>{isChecked(val) ? "✓" : ""}</span>
                <span style={{ flex:1 }}>{val || "(ריק)"}</span>
              </div>
            ))}
          </div>
          <div style={{ borderTop:"1px solid #F0F2F5", paddingTop:6, display:"flex", justifyContent:"flex-end" }}>
            <button onClick={closeDropdown}
              style={{ background:"#0B1F3A", color:"#fff", border:"none", borderRadius:4, padding:"5px 14px", fontSize:12, cursor:"pointer", fontWeight:600 }}>אישור</button>
          </div>
        </div>
      </>,
      document.body
    );
  };

  const exportToExcel = () => {
    const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const headers = ["מס׳ פרויקט","שם פרויקט","חברה עירונית","כתובת","מהות הפרויקט","מנהל תכנון","מנהל ביצוע","ניצול תקציבי","% יועצים","סטטוס","תאריך התחלה","תאריך סיום","שטח (מ״ר)","עלות קבלנית","עלות עירונית"];
    const rows = filteredProjects.map(p => {
      const d = allData[p.id] || {};
      const o = d.openingData || {};
      const company = companies.find(c => String(c.id) === String(d.companyId));
      const cEst = Number(String(o.contractorEst||"").replace(/,/g,"")) || Number(d.budgetState?.contractorEst||0);
      const _allRowsX = buildBudgetAllRows({ quotesRows: d.quotes||[], consultantsRows: d.consultants||[], budgetState: { ...(d.budgetState||{}), contractorEst: cEst }, statsRows, accountsRows: d.accounts||[], planOnlyMap:{}, openingData: o });
      const consultantsTotal = _allRowsX.reduce((s,r) => s + (r.payType==="אחוזים" ? r.computedFee : r.value) + r.increases, 0);
      const _finalMetaX = (d.contractor||[]).find(r=>r.key==="__meta__");
      const _finalBoqX  = Number(String(_finalMetaX?.finalBoq||"").replace(/[,\s]/g,"").replace(/[^\d.]/g,""));
      const _boqMetaX = (d.tender||[]).find(r=>r.key==="__meta__");
      const _boqValX  = Number(String(_boqMetaX?.boq||"").replace(/[,\s]/g,"").replace(/[^\d.]/g,""));
      const _utilBaseX = _finalBoqX > 0 ? _finalBoqX : _boqValX > 0 ? _boqValX : cEst;
      const utilPct = _utilBaseX > 0 ? consultantsTotal / _utilBaseX * 100 : null;
      const _bs = d.budgetState || {};
      const _feePaid  = [...(_bs.feeRows||[]),...(_bs.extraFeeRows||[])].reduce((s,r)=>s+Number(r.paid||0),0);
      const _conPaid  = [{ paid:_bs.contractorPaid||"" },...(_bs.extraContractorRows||[])].reduce((s,r)=>s+Number(r.paid||0),0);
      const _basePaid = _allRowsX.reduce((s,r)=>s+(r.paid||0),0) + _feePaid + _conPaid;
      const _ohPaid   = Math.round(_basePaid * Number(_bs.overheadPct||4) / 100);
      const _bcmPaid  = Math.round((_basePaid+_ohPaid) * Number(_bs.bcmPct||0) / 100);
      const _vatPaid  = Math.round((_basePaid+_ohPaid+_bcmPaid) * Number(_bs.vatPct||18) / 100);
      const _grandPaid = _basePaid + _ohPaid + _bcmPaid + _vatPaid;
      const _received  = (_bs.extraItems||[]).reduce((s,x)=>s+Number(x.amount||0),0);
      const budgetUtilPct = _received > 0 ? _grandPaid / _received * 100 : null;
      const utilBg  = budgetUtilPct===null?"":budgetUtilPct<75?"#EFF7F3":budgetUtilPct<85?"#FAF2E6":budgetUtilPct<95?"#FAF2E6":"#F8EDED";

          d.planningManager||"", d.executionManager||"",
          budgetUtilPct===null?"—":budgetUtilPct.toFixed(1)+"%",
          utilPct===null?"—":utilPct.toFixed(2)+"%",
          p.status||"", o.startDate||"", o.endDate||"",
          String(o.buildingArea||""), String(o.contractorEst||""), String(o.municipalEst||""),
        ],
        utilBg, utilBg2,
      };
    });
    const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="UTF-8"/>
<xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet>
<x:Name>מידע ראשי</x:Name>
<x:WorksheetOptions><x:DisplayRightToLeft/></x:WorksheetOptions>
</x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml>
</head><body>
<table dir="rtl" style="border-collapse:collapse;font-family:Arial;font-size:12px;">
<tr>${headers.map(h=>`<th style="background:#163356;color:#fff;font-weight:bold;padding:7px 10px;border:1px solid #0B1F3A;white-space:nowrap;">${esc(h)}</th>`).join("")}</tr>
${rows.map((row,i)=>`<tr style="background:${i%2===0?"#fff":"#F7F8FA"}">${row.cells.map((v,ci)=>{
  const bg = ci===7 ? row.utilBg : ci===8 ? row.utilBg2 : "";
  const style = `border:1px solid #E2E5EA;padding:6px 10px;${bg?"background:"+bg+";":""}`;
  return `<td style="${style}">${esc(v)}</td>`;
}).join("")}</tr>`).join("")}
</table></body></html>`;
    const b64 = btoa(unescape(encodeURIComponent(html)));
    const a = document.createElement("a");
    a.href = "data:application/vnd.ms-excel;base64," + b64;
    a.download = "מידע_ראשי.xls";
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
  };

  return (
    <div className="fade" style={{ padding:"34px 38px", display:"flex", flexDirection:"column", gap:22 }}>

          <button onClick={exportToExcel}
            style={{ fontSize:12, padding:"6px 14px", borderRadius:4, border:"1.5px solid #C6E8D4", background:"#EFF7F3", color:"#0E7C6A", cursor:"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:600, display:"flex", alignItems:"center", gap:6 }}>
            📥 ייצוא לאקסל
          </button>
          {hasAnyFilter && (
            <button onClick={()=>setColFilters({})}
              style={{ fontSize:12, padding:"6px 14px", borderRadius:4, border:"1.5px solid #F8EDED", background:"#F8EDED", color:"#5C2020", cursor:"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:600 }}>
              ✕ נקה כל הסינון
            </button>

        </div>
      </div>

      {renderDropdown()}

      <Card style={{ padding:0, overflow:"hidden" }}>
        <div style={{ overflowX:"auto" }}>

            <thead>
              <tr style={{ background:"#F7F8FA", borderBottom:"2px solid #E2E5EA" }}>
                {cols.map(({label,w,fkey}) => {
                  const active = fkey && isFiltered(fkey);
                  return (
                    <th key={label} style={{ padding:"8px 8px 8px 4px", textAlign:"right", fontWeight:700, fontSize:11,
                      whiteSpace:"nowrap", width:w, minWidth:w, borderLeft:"1px solid #F0F2F5",

                      background: active ? "#EAF1FA" : "#F7F8FA" }}>

                        <span>{label}</span>
                        {fkey && (
                          <button onClick={e=>openDropdown(fkey,e)}
                            title="סינון"
                            style={{ background:"none", border:"none", cursor:"pointer", padding:"1px 3px", borderRadius:4,
                              color: active ? "#0B1F3A" : "#9A9A9A", fontSize:10, lineHeight:1,
                              background: active ? "#D4E4F4" : "transparent" }}>

                    </th>
                  );

              </tr>
            </thead>
            <tbody>
              {filteredProjects.length === 0 && (
                <tr><td colSpan={15} style={{ padding:32, textAlign:"right", color:"#9A9A9A" }}>{projects.length === 0 ? "אין פרויקטים" : "אין תוצאות לסינון"}</td></tr>
              )}
              {filteredProjects.map((p, i) => {
                const d = allData[p.id] || {};
                const o = d.openingData || {};
                const company = companies.find(c => String(c.id) === String(d.companyId));
                const cEst = Number(String(o.contractorEst||"").replace(/,/g,"")) || Number(d.budgetState?.contractorEst||0);
                const _allRowsG = buildBudgetAllRows({ quotesRows: d.quotes||[], consultantsRows: d.consultants||[], budgetState: { ...(d.budgetState||{}), contractorEst: cEst }, statsRows, accountsRows: d.accounts||[], planOnlyMap:{}, openingData: o });
                const consultantsTotal = _allRowsG.reduce((s,r) => s + (r.payType==="אחוזים" ? r.computedFee : r.value) + r.increases, 0);
                const _finalMetaG = (d.contractor||[]).find(r=>r.key==="__meta__");
                const _finalBoqG  = Number(String(_finalMetaG?.finalBoq||"").replace(/[,\s]/g,"").replace(/[^\d.]/g,""));
                const _boqMetaG = (d.tender||[]).find(r=>r.key==="__meta__");
                const _boqValG  = Number(String(_boqMetaG?.boq||"").replace(/[,\s]/g,"").replace(/[^\d.]/g,""));
                const _utilBaseG = _finalBoqG > 0 ? _finalBoqG : _boqValG > 0 ? _boqValG : cEst;
                const utilPct = _utilBaseG > 0 ? consultantsTotal / _utilBaseG * 100 : null;
                const _bs = d.budgetState || {};
                const _feePaid  = [...(_bs.feeRows||[]),...(_bs.extraFeeRows||[])].reduce((s,r)=>s+Number(r.paid||0),0);
                const _conPaid  = [{ paid:_bs.contractorPaid||"" },...(_bs.extraContractorRows||[])].reduce((s,r)=>s+Number(r.paid||0),0);
                const _basePaid = _allRowsG.reduce((s,r)=>s+(r.paid||0),0) + _feePaid + _conPaid;
                const _ohPaid   = Math.round(_basePaid * Number(_bs.overheadPct||4) / 100);
                const _bcmPaid  = Math.round((_basePaid+_ohPaid) * Number(_bs.bcmPct||0) / 100);
                const _vatPaid  = Math.round((_basePaid+_ohPaid+_bcmPaid) * Number(_bs.vatPct||18) / 100);
                const _grandPaid = _basePaid + _ohPaid + _bcmPaid + _vatPaid;
                const _received  = (_bs.extraItems||[]).reduce((s,x)=>s+Number(x.amount||0),0);
                const budgetUtilPct = _received > 0 ? _grandPaid / _received * 100 : null;
                return (
                  <tr key={p.id} style={{ borderBottom:"1px solid #F0F2F5", background:i%2===0?"#fff":"#FAFBFC" }}>
                    <td style={{ padding:"6px 8px", borderLeft:"1px solid #F0F2F5" }}>{inp(p.id,"projectNumber",d.projectNumber)}</td>
                    <td style={{ padding:"6px 8px", borderLeft:"1px solid #F0F2F5", fontWeight:600 }}>
                      <span onClick={() => onNavigate && onNavigate(p)}
                        style={{ fontWeight:600, fontSize:13, color:"#0B1F3A", cursor:"pointer" }}
                        onMouseOver={e=>e.target.style.color="#112D52"} onMouseOut={e=>e.target.style.color="#0B1F3A"}>
                        {p.name}
                      </span>
                    </td>
                    <td style={{ padding:"6px 8px", borderLeft:"1px solid #F0F2F5", color:"#3A3A3A" }}>{company?.name||"—"}</td>
                    <td style={{ padding:"6px 8px", borderLeft:"1px solid #F0F2F5" }}>{inp(p.id,"address",o.address)}</td>
                    <td style={{ padding:"6px 8px", borderLeft:"1px solid #F0F2F5" }}>{inp(p.id,"workDescription",o.workDescription)}</td>
                    <td style={{ padding:"6px 8px", borderLeft:"1px solid #F0F2F5" }}>{inp(p.id,"planningManager",d.planningManager)}</td>
                    <td style={{ padding:"6px 8px", borderLeft:"1px solid #F0F2F5" }}>{inp(p.id,"executionManager",d.executionManager)}</td>
                    <td style={{ padding:"6px 8px", borderLeft:"1px solid #F0F2F5", textAlign:"right", fontWeight:600, color: budgetUtilPct===null?"#767676":budgetUtilPct<75?"#1C4532":budgetUtilPct<85?"#5C3D10":"#5C2020",
                      background: budgetUtilPct===null?"transparent":budgetUtilPct<75?"#D2EDDD":budgetUtilPct<85?"#F3DFC6":budgetUtilPct<95?"#F3DFC6":"#F2C8C8" }}>
                      {budgetUtilPct===null ? "—" : budgetUtilPct.toFixed(1)+"%"}
                    </td>

                    </td>

                      <select value={p.status||""} onChange={e=>upd(p.id,"status",e.target.value)}
