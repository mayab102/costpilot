    // ── Login Screen ─────────────────────────────────────────────────────────
    function LoginScreen({ onLogin }) {
      const [email, setEmail]       = useState("");
      const [password, setPassword] = useState("");
      const [error, setError]       = useState("");
      const [loading, setLoading]   = useState(false);
      const [resetSent, setResetSent] = useState(false);
      const [showReset, setShowReset] = useState(false);
      const [resetEmail, setResetEmail] = useState("");

      const handleLogin = async () => {
        if (!email || !password) { setError("יש למלא מייל וסיסמה"); return; }
        setLoading(true); setError("");
        try {
          const { auth, signInWithEmailAndPassword } = getFirebase();
          const cred = await signInWithEmailAndPassword(auth, email, password);
          onLogin(cred.user);
        } catch(e) {
          setError("מייל או סיסמה שגויים");
        }
        setLoading(false);
      };

      const handleReset = async () => {
        if (!resetEmail) { setError("יש להזין מייל"); return; }
        setLoading(true); setError("");
        try {
          const { auth } = getFirebase();
          const { sendPasswordResetEmail } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
          await sendPasswordResetEmail(auth, resetEmail);
          setResetSent(true);
        } catch(e) {
          setError("מייל לא נמצא במערכת");
        }
        setLoading(false);
      };

      return (
        <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#f1f5f9", fontFamily:"'Heebo',sans-serif" }}>

              <div style={{ display:"flex", flexDirection:"column", gap:14 }}>

                </div>
                <div>
                  <label style={{ fontSize:12, fontWeight:600, color:"#64748b", display:"block", marginBottom:5 }}>סיסמה</label>
                  <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&handleLogin()}
                    placeholder="••••••••" dir="ltr"
                    style={{ width:"100%", padding:"10px 13px", border:"1.5px solid #e2e8f0", borderRadius:9, fontSize:14, fontFamily:"'Heebo',sans-serif", outline:"none", boxSizing:"border-box" }}
                    onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="#e2e8f0"} />
                </div>

      );
    }

    // ── User Management Page (admin only) ───────────────────────────────────
    function UserManagementPage({ currentUser, projects }) {
      const [users, setUsers]   = useState([]);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving]   = useState(null);

      // Load all users from Firestore
      useEffect(() => {
        const loadUsers = async () => {
          try {
            const { db } = getFirebase();
            const { collection, getDocs } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
            const snap = await getDocs(collection(db, "userRoles"));
            const list = [];
            snap.forEach(d => list.push({ uid: d.id, ...d.data() }));
            setUsers(list);
          } catch(e) { console.error(e); }
          setLoading(false);
        };
        loadUsers();
      }, []);

      const updateUser = async (uid, patch) => {
        setSaving(uid);
        const updated = users.map(u => u.uid === uid ? { ...u, ...patch } : u);
        setUsers(updated);
        const u = updated.find(x => x.uid === uid);
        await saveUserRole(uid, { role: u.role || "user", projects: u.projects || [], email: u.email || "" });
        setSaving(null);
      };

      const toggleProject = (uid, projId) => {
        const u = users.find(x => x.uid === uid);
        if (!u) return;
        const pid = String(projId);
        const current = u.projects || [];
        const updated = current.includes(pid) ? current.filter(p => p !== pid) : [...current, pid];
        updateUser(uid, { projects: updated });
      };

      if (loading) return <div style={{ padding:40, textAlign:"right", fontFamily:"'Heebo',sans-serif" }}>טוען משתמשים...</div>;

      return (
        <div style={{ padding:"30px 36px", fontFamily:"'Heebo',sans-serif", direction:"rtl" }}>
          <div style={{ fontSize:24, fontWeight:900, color:"#1e293b", marginBottom:6 }}>👥 ניהול משתמשים</div>
          <div style={{ fontSize:13, color:"#64748b", marginBottom:24 }}>הגדר הרשאות לכל משתמש</div>

          {users.length === 0 && (
            <div style={{ color:"#94a3b8", fontSize:14 }}>
              אין משתמשים רשומים עדיין. משתמשים יופיעו כאן לאחר הכניסה הראשונה שלהם.
            </div>
          )}

          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            {users.map(u => (
              <div key={u.uid} style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:12, padding:"18px 20px" }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
                  <div>
                    <div style={{ fontWeight:700, color:"#1e293b", fontSize:15 }}>{u.email || u.uid}</div>
                    {u.uid === currentUser.uid && <span style={{ fontSize:11, color:"#3b82f6", fontWeight:600 }}>את/ה</span>}
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ fontSize:12, color:"#64748b" }}>תפקיד:</span>
                    <select value={u.role || "user"} onChange={e => updateUser(u.uid, { role: e.target.value })}
                      disabled={u.uid === currentUser.uid}
                      style={{ padding:"5px 10px", border:"1.5px solid #e2e8f0", borderRadius:7, fontSize:13, fontFamily:"'Heebo',sans-serif", background:"#f8fafc", outline:"none", cursor:"pointer" }}>
                      <option value="admin">מנהל</option>
                      <option value="user">משתמש</option>
                    </select>
                    {saving === u.uid && <span style={{ fontSize:11, color:"#3b82f6" }}>שומר...</span>}
                  </div>
                </div>

                {(u.role || "user") === "user" && (
                  <div>
                    <div style={{ fontSize:12, color:"#64748b", fontWeight:600, marginBottom:8 }}>פרויקטים מורשים:</div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                      {projects.length === 0 && <span style={{ fontSize:12, color:"#94a3b8" }}>אין פרויקטים עדיין</span>}
                      {projects.map(p => {
                        const active = (u.projects || []).includes(String(p.id));
                        return (
                          <button key={p.id} onClick={() => toggleProject(u.uid, p.id)}
                            style={{ padding:"5px 12px", borderRadius:20, fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"'Heebo',sans-serif", border:"none",
                              background: active ? "#dbeafe" : "#f1f5f9",
                              color: active ? "#2563eb" : "#64748b" }}>
                            {active ? "✓ " : ""}{p.name}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

function App() {
      const [user, setUser]         = useState(undefined);
      const [userRole, setUserRole] = useState(null);  // { role: "admin"|"user", projects: [...] }
      const [checking, setChecking] = useState(true);

      useEffect(() => {
        let unsubscribe = null;
        const wait = setInterval(() => {
          if (window._firebase) {
            clearInterval(wait);
            const { auth, onAuthStateChanged } = window._firebase;
            unsubscribe = onAuthStateChanged(auth, async u => {
              if (u) {
                setUser(u);
                // טעינת הרשאות
                const roleData = await loadUserRole(u.uid);
                if (roleData) {
                  // קיים — אל תדרוס, רק עדכן מייל אם חסר
                  if (!roleData.email && u.email) {
                    const updated = { ...roleData, email: u.email };
                    await saveUserRole(u.uid, updated);
                    setUserRole(updated);
                  } else {
                    setUserRole(roleData);
                  }
                } else {
                  // משתמש חדש — ברירת מחדל user
                  const newRole = { role: "user", projects: [], email: u.email || "" };
                  await saveUserRole(u.uid, newRole);
                  setUserRole(newRole);
                }
              } else {
                setUser(null);
                setUserRole(null);
              }
              setChecking(false);
            });
          }
        }, 100);
        const timeout = setTimeout(() => { clearInterval(wait); setChecking(false); }, 10000);
        return () => { clearInterval(wait); clearTimeout(timeout); if (unsubscribe) unsubscribe(); };
      }, []);

      if (checking) return (
        <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Heebo',sans-serif", color:"#94a3b8", flexDirection:"column", gap:12 }}>
          <div style={{ fontSize:32 }}>⏳</div>
          <div>טוען CostPilot...</div>
        </div>
      );

      if (!user) return <LoginScreen onLogin={u => { setUser(u); }} />;
      if (!userRole) return (
        <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Heebo',sans-serif", color:"#94a3b8" }}>
          טוען הרשאות...
        </div>
      );
      return <AppInner currentUser={user} userRole={userRole} setUserRole={setUserRole} />;
    }

const PROJ_STATUSES = ["תכנון", "פעיל", "הושלם", "מושהה"];
const fmt = n => {
  const v = Number(n||0);
  const hasDecimal = v !== Math.floor(v);
  return "₪" + v.toLocaleString("he-IL", {
    minimumFractionDigits: hasDecimal ? 2 : 0,
    maximumFractionDigits: 2
  });
};
const fmtDate = s => { if (!s) return ""; const [y,m,d] = s.split("-"); return d && m && y ? `${d}/${m}/${y}` : s; };
const toInputDate = s => { if (!s) return ""; if (s.includes("-")) return s; const [d,m,y] = s.split("/"); return y && m && d ? `${y}-${m}-${d}` : s; };
const statusColor = s => ({ "פעיל": "#16a34a", "הושלם": "#2563eb", "מושהה": "#94a3b8" }[s] || "#d97706");

const Card = React.forwardRef(function Card({ children, style, onClick, onMouseOver, onMouseOut, className }, ref) {
  return <div ref={ref} className={className} onClick={onClick} onMouseOver={onMouseOver} onMouseOut={onMouseOut} style={{ background:"#fff", border:"1px solid #e2e8f0", borderRadius:14, boxShadow:"0 1px 4px #0001", padding:22, ...style }}>{children}</div>;
});

function Badge({ children, color="#2563eb" }) {
  return <span style={{ background:color+"1a", color, border:`1px solid ${color}30`, borderRadius:20, padding:"2px 10px", fontSize:11, fontWeight:700, whiteSpace:"nowrap" }}>{children}</span>;
}

function Field({ label, children }) {
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
      {label && <label style={{ fontSize:12, color:"#64748b", fontWeight:600 }}>{label}</label>}
      {children}
    </div>
  );
}

function TextInput({ label, value, onChange, type="text", placeholder }) {
  const [focus, setFocus] = useState(false);
  return (
    <Field label={label}>
      <input
        type={type} value={value} onChange={onChange} placeholder={placeholder}
        onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
        style={{ background:"#f8fafc", border:`1.5px solid ${focus?"#3b82f6":"#e2e8f0"}`, borderRadius:8, padding:"8px 11px", fontSize:14, color:"#1e293b", fontFamily:"'Heebo',sans-serif", outline:"none", width:"100%", boxShadow:focus?"0 0 0 3px #dbeafe":"none", transition:"all .15s" }}
      />
    </Field>
  );
}

function SelectInput({ label, value, onChange, options }) {
  return (
    <Field label={label}>
      <select value={value} onChange={onChange}
        style={{ background:"#f8fafc", border:"1.5px solid #e2e8f0", borderRadius:8, padding:"8px 11px", fontSize:14, color:"#1e293b", fontFamily:"'Heebo',sans-serif", outline:"none", cursor:"pointer" }}>
        {options.map(o => <option key={o}>{o}</option>)}
      </select>
    </Field>
  );
}

function PrimaryButton({ children, onClick, small=false }) {
  return (
    <button onClick={onClick}
      style={{ background:"linear-gradient(135deg,#3b82f6,#2563eb)", color:"#fff", border:"none", borderRadius:9, padding:small?"6px 14px":"9px 20px", fontSize:small?12:14, fontWeight:700, cursor:"pointer", fontFamily:"'Heebo',sans-serif", whiteSpace:"nowrap", transition:"transform .1s, box-shadow .1s" }}
      onMouseDown={e => e.currentTarget.style.transform="scale(.97)"}
      onMouseUp={e => e.currentTarget.style.transform="scale(1)"}
    >{children}</button>
  );
}

function DeleteButton({ onClick }) {
  return (
    <button onClick={onClick}
      style={{ background:"#fef2f2", color:"#ef4444", border:"1px solid #fecaca", borderRadius:6, padding:"4px 10px", fontSize:12, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>
      מחק
    </button>
  );
}

function Grid({ children, cols="repeat(auto-fill,minmax(155px,1fr))" }) {
  return <div style={{ display:"grid", gridTemplateColumns:cols, gap:12 }}>{children}</div>;
}

function SummaryCards({ items }) {
  return (
    <div style={{ display:"grid", gridTemplateColumns:`repeat(${items.length},1fr)`, gap:14 }}>
      {items.map(({ label, value, color }) => (
        <Card key={label} style={{ textAlign:"right", padding:"16px 12px" }}>
          <div style={{ fontSize:11, color:"#64748b", fontWeight:600, marginBottom:6 }}>{label}</div>
          <div style={{ fontSize:22, fontWeight:800, color }}>{value}</div>

      ))}

function DataTable({ headers, children, empty, count }) {
  const isEmpty = count === 0;
  return (
    <div style={{ overflowX:"auto" }}>
      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:14 }}>
        <thead>
          <tr style={{ borderBottom:"2px solid #e8edf4" }}>
            {headers.map(h => (
              <th key={h} style={{ padding:"10px 14px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:12, whiteSpace:"nowrap" }}>{h}</th>

          </tr>

        <tbody>
          {isEmpty

            : children}
        </tbody>
      </table>

}

function Tr({ children, i }) {
  return <tr className="hov-row" style={{ borderBottom:"1px solid #f1f5f9", background:i%2===0?"#fff":"#fafbfd" }}>{children}</tr>;
}

function Td({ children, bold, blue, green, red, muted }) {
  const color = blue?"#2563eb":green?"#16a34a":red?"#ef4444":muted?"#94a3b8":"#1e293b";
  return <td style={{ padding:"11px 14px", fontWeight:bold||blue||green||red?700:400, color }}>{children}</td>;
}

// ── Tab: הצעות מחיר יועצים ────────────────────────────────────────────────────
// Data shape: rows = [ { id, fieldName, consultants: [ { id, name, payType, value, notes, approved, sentToMunicipality } ] } ]

const PAYMENT_TYPES = ["אחוזים", "סכום קבוע", "שעתי"];

function FieldSearchInput({ availableFields, onSelect, onCancel }) {
  const [fieldSearch, setFieldSearch] = useState("");
  const filtered = availableFields.filter(f => f.toLowerCase().includes(fieldSearch.toLowerCase()));
  const showList = fieldSearch.length > 0 && filtered.length > 0 && !filtered.some(f => f === fieldSearch);
  return (
    <Card style={{ border:"2px solid #3b82f6", padding:16, display:"flex", gap:10, alignItems:"flex-start" }}>
      <div style={{ flex:1, position:"relative" }}>
        <label style={{ fontSize:12, fontWeight:600, color:"#64748b", display:"block", marginBottom:5 }}>בחר תחום מרשימת הספקים</label>
        <input value={fieldSearch} onChange={e => setFieldSearch(e.target.value)}
          placeholder="הקלד לחיפוש תחום..." autoFocus
          style={{ width:"100%", padding:"9px 12px", border:"1.5px solid #3b82f6", borderRadius:9, fontSize:13,
            fontFamily:"'Heebo',sans-serif", outline:"none", background:"#fff", direction:"rtl", boxSizing:"border-box" }} />
        {showList && (
          <div style={{ position:"absolute", top:"100%", right:0, left:0, background:"#fff", border:"1.5px solid #e2e8f0",
            borderRadius:9, zIndex:200, boxShadow:"0 8px 24px #0002", maxHeight:220, overflowY:"auto", marginTop:2 }}>
            {filtered.map(f => (
              <div key={f} onClick={() => onSelect(f)}
                style={{ padding:"9px 14px", cursor:"pointer", fontSize:13, color:"#1e293b", direction:"rtl", borderBottom:"1px solid #f1f5f9" }}
                onMouseOver={e => e.currentTarget.style.background="#eff6ff"}
                onMouseOut={e  => e.currentTarget.style.background="#fff"}>{f}</div>
            ))}
          </div>
        )}
        {availableFields.length === 0 && (
          <div style={{ fontSize:11, color:"#f59e0b", marginTop:4 }}>כל התחומים כבר נוספו, או שאין ספקים ברשימה</div>
        )}
      </div>
      <div style={{ display:"flex", gap:8, marginTop:22 }}>
        <PrimaryButton onClick={() => { if(fieldSearch.trim()) onSelect(fieldSearch.trim()); }}>הוסף</PrimaryButton>
        <button onClick={onCancel}
          style={{ background:"#f1f5f9", border:"none", borderRadius:9, padding:"9px 16px", fontSize:14, color:"#64748b", cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>
          ביטול
        </button>
      </div>
    </Card>
  );
}

function NameSearchInput({ value, suppliers, isBold, onSelect }) {
  const [nameSearch, setNameSearch] = useState(value || "");
  const [focused, setFocused] = useState(false);
  const [dropStyle, setDropStyle] = useState({});
  const inputRef = React.useRef(null);
  const filtered = suppliers.filter(s => !nameSearch || s.name?.toLowerCase().includes(nameSearch.toLowerCase()));
  const showList = focused && filtered.length > 0;

  const [error, setError] = useState(false);

  const handleFocus = (e) => {
    e.target.style.borderColor="#3b82f6";
    if (inputRef.current) {
      const rect = inputRef.current.getBoundingClientRect();
      const spaceBelow = window.innerHeight - rect.bottom;
      const dropH = Math.min(filtered.length * 37, 200);
      if (spaceBelow < dropH + 8) {
        setDropStyle({ position:"fixed", bottom: window.innerHeight - rect.top + 2, left: rect.left, right: window.innerWidth - rect.right, maxHeight:200 });
      } else {
        setDropStyle({ position:"fixed", top: rect.bottom + 2, left: rect.left, right: window.innerWidth - rect.right, maxHeight:200 });
      }
    }
    setFocused(true);
  };

  return (
    <div ref={inputRef} style={{ position:"relative" }}>
      <input value={nameSearch}
        onChange={e => { setNameSearch(e.target.value); if(!e.target.value) onSelect(""); }}
        placeholder="הקלד או בחר יועץ..."
        style={{ width:"100%", background:"transparent", border:`1px solid ${error?"#ef4444":"#e2e8f0"}`, borderRadius:6,
          padding:"5px 9px", fontSize:13, color:"#1e293b", fontFamily:"'Heebo',sans-serif",
          outline:"none", fontWeight: isBold ? 700 : 400, direction:"rtl", boxSizing:"border-box" }}
        onFocus={handleFocus}
        onBlur={e => {
          e.target.style.borderColor="#e2e8f0";
          setTimeout(() => {
            setFocused(false);
            const valid = !nameSearch || suppliers.some(s => s.name === nameSearch);
            setError(!valid);
          }, 150);
        }} />
      {error && <div style={{ fontSize:11, color:"#ef4444", marginTop:2, direction:"rtl" }}>יש לבחור יועץ מהרשימה בלבד</div>}
      {showList && (
        <div style={{ ...dropStyle, background:"#fff", border:"1.5px solid #e2e8f0", borderRadius:8,
          zIndex:9999, boxShadow:"0 8px 24px #0003", overflowY:"auto" }}>
          {filtered.map(s => (
            <div key={s.name} onMouseDown={() => { onSelect(s.name); setNameSearch(s.name); setFocused(false); }}
              style={{ padding:"8px 12px", cursor:"pointer", fontSize:13, color:"#1e293b",
                borderBottom:"1px solid #f1f5f9", direction:"rtl",
                background: s.name === value ? "#eff6ff" : "#fff" }}
              onMouseOver={e => e.currentTarget.style.background="#f0f9ff"}
              onMouseOut={e  => e.currentTarget.style.background= s.name === value ? "#eff6ff" : "#fff"}>
              {s.name}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}


function QuotesTab({ rows, setRows, suppliers, highlightFieldId, budgetState, openingData, statsRows }) {
  const [newFieldName, setNewFieldName] = useState("");
  const [showNewField, setShowNewField] = useState(false);

  const existingFieldNames = rows.map(r => r.fieldName);
  const availableFields = [...new Set((suppliers||[]).map(s => s.field).filter(Boolean))]
    .filter(f => !existingFieldNames.includes(f)).sort();

  const addField = () => {
    if (!newFieldName.trim()) return;
    setRows([...rows, { id: Date.now(), fieldName: newFieldName.trim(), consultants: [] }]);
    setNewFieldName("");
    setShowNewField(false);
  };

  const delField = fieldId => setRows(rows.filter(r => r.id !== fieldId));

  const updateField = (fieldId, newConsultants) => {
    setRows(rows.map(r => r.id === fieldId ? { ...r, consultants: newConsultants } : r));
  };

  const updateFieldName = (fieldId, name) => {
    setRows(rows.map(r => r.id === fieldId ? { ...r, fieldName: name } : r));
  };

  const updateFieldProp = (fieldId, key, val) => {
    setRows(rows.map(r => r.id === fieldId ? { ...r, [key]: val } : r));
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <h2 style={{ fontSize:18, fontWeight:800, color:"#1e293b" }}>הצעות מחיר יועצים</h2>
        <PrimaryButton onClick={() => setShowNewField(true)}>+ הוסף תחום חדש</PrimaryButton>
      </div>

      {showNewField && (
        <FieldSearchInput
          availableFields={availableFields}
          onSelect={f => { setNewFieldName(f); setRows([...rows, { id: Date.now(), fieldName: f, consultants: [] }]); setShowNewField(false); setNewFieldName(""); }}
          onCancel={() => { setShowNewField(false); setNewFieldName(""); }}
        />
      )}

      {rows.length === 0 && (
        <Card style={{ textAlign:"right", padding:40, color:"#94a3b8" }}>
          <div style={{ fontSize:32, marginBottom:10 }}>📋</div>
          <div style={{ fontSize:15, fontWeight:600 }}>אין תחומים עדיין</div>
          <div style={{ fontSize:13, marginTop:4 }}>לחץ "הוסף תחום חדש" כדי להתחיל</div>
        </Card>
      )}

      {rows.map(field => (
        <FieldGroup
          key={field.id}
          field={field}
          suppliers={suppliers}
          onDelete={() => delField(field.id)}
          onUpdateConsultants={c => updateField(field.id, c)}
          onRename={name => updateFieldName(field.id, name)}
          onToggleReady={val => updateFieldProp(field.id, "readyToRecommend", val)}
          isHighlighted={highlightFieldId === field.id}
          budgetState={budgetState}
          openingData={openingData}
          statsRows={statsRows}
        />
      ))}
    </div>
  );
}

function FieldGroup({ field, onDelete, onUpdateConsultants, onRename, suppliers, onToggleReady, isHighlighted, budgetState, openingData, statsRows }) {
  const emptyC = { id:0, name:"", payType:"אחוזים", value:"", notes:"", recommended:false, approved:false, sentToMunicipality:false,
                   contact:"", phone:"", phone2:"", email:"" };
  const [editingName, setEditingName] = useState(false);
  const [tempName, setTempName] = useState(field.fieldName);
  const cardRef = React.useRef(null);

  React.useEffect(() => {
    if (isHighlighted && cardRef.current) {
      setTimeout(() => {
        cardRef.current?.scrollIntoView({ behavior:"smooth", block:"center" });
      }, 120);
    }
  }, [isHighlighted]);

  const addConsultant = () => {
    onUpdateConsultants([...field.consultants, { ...emptyC, id: Date.now(), createdAt: Date.now() }]);
  };

  const delConsultant = id => onUpdateConsultants(field.consultants.filter(c => c.id !== id));

  const updateC = (id, key, val) => {
    onUpdateConsultants(field.consultants.map(c => c.id === id ? { ...c, [key]: val } : c));
  };


  const fieldSuppliers = (suppliers||[]).filter(s => s.field === field.fieldName);

  const saveName = () => {
    if (tempName.trim()) onRename(tempName.trim());
    setEditingName(false);
  };

  const approvedCount = field.consultants.filter(c => c.approved).length;

  return (
    <Card ref={cardRef} className={isHighlighted ? "field-highlight" : ""} style={{ padding:0, overflow:"hidden", transition:"box-shadow .3s, border-color .3s",
      border: isHighlighted ? "2px solid #3b82f6" : "1px solid #e2e8f0",
      boxShadow: isHighlighted ? "0 0 0 4px #bfdbfe" : "none" }}>
      {/* Field header */}
      <div style={{ padding:"12px 18px", background:"#f8fafc", borderBottom:"1px solid #e2e8f0", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          {editingName ? (
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <input value={tempName} onChange={e => setTempName(e.target.value)}
                onKeyDown={e => e.key==="Enter" && saveName()}
                style={{ fontSize:15, fontWeight:700, color:"#1e293b", border:"1.5px solid #3b82f6", borderRadius:7, padding:"4px 10px", fontFamily:"'Heebo',sans-serif", outline:"none" }} autoFocus />
              <button onClick={saveName} style={{ background:"#3b82f6", color:"#fff", border:"none", borderRadius:6, padding:"4px 10px", fontSize:12, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>שמור</button>
            </div>
          ) : (
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:16, fontWeight:800, color:"#1e293b" }}>{field.fieldName}</span>
              <button onClick={() => setEditingName(true)} style={{ background:"none", border:"none", cursor:"pointer", color:"#94a3b8", fontSize:14, padding:"2px 6px" }}>✏️</button>
            </div>
          )}
          {approvedCount > 0 && <Badge color="#16a34a">{approvedCount} אושר</Badge>}
          <Badge color="#64748b">{field.consultants.length} יועצים</Badge>
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center", flexShrink:0 }}>
          <label style={{ display:"flex", alignItems:"center", gap:5, fontSize:12, fontWeight:600, color: field.readyToRecommend ? "#374151" : "#64748b", cursor:"pointer", background:"#f1f5f9", border:"1px solid #e2e8f0", borderRadius:7, padding:"5px 10px", whiteSpace:"nowrap" }}>
            <input type="checkbox" checked={!!field.readyToRecommend} onChange={e => onToggleReady(e.target.checked)}
              style={{ width:13, height:13, accentColor:"#475569", cursor:"pointer" }} />
            הועבר להמלצה
          </label>
          <button onClick={addConsultant}
            style={{ background:"#f1f5f9", color:"#374151", border:"1px solid #e2e8f0", borderRadius:7, padding:"5px 10px", fontSize:12, cursor:"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:600, whiteSpace:"nowrap" }}>
            + הוסף יועץ
          </button>
          <DeleteButton onClick={onDelete} />
        </div>
      </div>

      {/* Table */}
      <div style={{ overflowX:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
          <thead>
            <tr style={{ borderBottom:"2px solid #e8edf4", background:"#fafbfd" }}>
              {[
                { h:"המלצה", w:undefined },
                { h:"שם היועץ", w:undefined },
                { h:"סוג תשלום", w:undefined },
                { h:"ערך", w:undefined },
                { h:"סכום (ש״ח)", w:undefined },
                { h:"הערות בחירה", w:undefined },
                { h:"הועבר לחברה עירונית", w:80 },
                { h:"היועץ אושר", w:70 },
                { h:"", w:undefined },
              ].map(({h,w},hi) => (
                <th key={hi} style={{ padding:"9px 8px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11, whiteSpace:"normal", lineHeight:1.3, maxWidth:w, width:w, verticalAlign:"bottom" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {field.consultants.length === 0 && (
              <tr>
                <td colSpan={9} style={{ padding:24, textAlign:"right", color:"#94a3b8", fontSize:13 }}>
                  אין יועצים — לחץ "הוסף יועץ"
                </td>
              </tr>
            )}
            {field.consultants.map((c, i) => (
              <tr key={c.id}
                style={{ borderBottom:"1px solid #f1f5f9", background:c.approved ? "#f0fdf4" : c.recommended ? "#f0f9ff" : i%2===0?"#fff":"#fafbfd", transition:"background .15s" }}>
                {/* המלצה */}
                <td style={{ padding:"10px 12px", textAlign:"right" }}>
                  <input type="checkbox" checked={!!c.recommended} onChange={e => updateC(c.id,"recommended",e.target.checked)}
                    style={{ width:16, height:16, cursor:"pointer", accentColor:"#475569" }} />
                </td>
                {/* שם */}
                <td style={{ padding:"10px 12px", minWidth:180, position:"relative" }}>
                  <NameSearchInput
                    value={c.name}
                    suppliers={fieldSuppliers}
                    isBold={c.recommended || c.approved}
                    onSelect={name => updateC(c.id, "name", name)}
                  />
                </td>
                {/* סוג תשלום */}
                <td style={{ padding:"10px 12px", minWidth:110 }}>
                  <select value={c.payType} onChange={e => updateC(c.id,"payType",e.target.value)}
                    style={{ background:"transparent", border:"1px solid #e2e8f0", borderRadius:6, padding:"5px 9px", fontSize:13, color:"#1e293b", fontFamily:"'Heebo',sans-serif", outline:"none", cursor:"pointer" }}>
                    {PAYMENT_TYPES.map(p => <option key={p}>{p}</option>)}
                  </select>
                </td>
                {/* ערך */}
                <td style={{ padding:"10px 8px", minWidth:100 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:3, direction:"rtl" }}>
                    <span style={{ color:"#64748b", fontSize:12, fontWeight:600, flexShrink:0 }}>{c.payType==="אחוזים"?"%":"₪"}</span>
                    <input
                      type="text" inputMode="numeric"
                      value={c.value !== "" && c.value !== undefined ? Number(c.value).toLocaleString("en-US") : ""}
                      onChange={e => updateC(c.id,"value", e.target.value.replace(/,/g,""))}
                      placeholder="0"
                      style={{ background:"transparent", border:"1px solid #e2e8f0", borderRadius:6, padding:"5px 7px", fontSize:13, color:"#1e293b", fontFamily:"'Heebo',sans-serif", outline:"none", width:65, textAlign:"right" }}
                      onFocus={e => { e.target.style.borderColor="#475569"; e.target.value = c.value||""; }}
                      onBlur={e  => { e.target.style.borderColor="#e2e8f0"; e.target.value = c.value !== "" && c.value !== undefined ? Number(c.value).toLocaleString("en-US") : ""; }} />
                  </div>
                </td>
                {/* סכום בש"ח (רק לאחוזים) */}
                <td style={{ padding:"10px 8px", minWidth:90, textAlign:"right" }}>
                  {c.payType === "אחוזים" && (() => {
                    const cEst = Number(String((openingData||{}).contractorEst||"").replace(/,/g,"")) || Number((budgetState||{}).contractorEst||0);
                    const devPct = Number((statsRows||[]).find(r=>r.field==="פיתוח")?.pct||0);
                    const archBase = cEst - cEst * devPct / 100;
                    const pct = Number(c.value||0) / 100;
                    const fieldName = field.fieldName || "";
                    let fee = 0;
                    if (fieldName.includes("אדריכל") && cEst) fee = archBase * pct;
                    else if (fieldName.includes("מנהל פרויקט") && cEst) fee = cEst * pct;
                    else if (cEst) { const pp = Number((statsRows||[]).find(r=>r.field===fieldName)?.pct||0)/100; fee = cEst * pp * pct; }
                    return fee ? <span style={{ fontSize:12, color:"#475569" }}>{fmt(fee)}</span> : <span style={{ fontSize:11, color:"#94a3b8" }}>—</span>;
                  })()}
                </td>
                {/* הערות */}
                <td style={{ padding:"10px 12px", minWidth:160 }}>
                  <input value={c.notes} onChange={e => updateC(c.id,"notes",e.target.value)}
                    placeholder="הערות על הבחירה..."
                    style={{ background:"transparent", border:"1px solid #e2e8f0", borderRadius:6, padding:"5px 9px", fontSize:13, color:"#64748b", fontFamily:"'Heebo',sans-serif", outline:"none", width:"100%" }}
                    onFocus={e => e.target.style.borderColor="#3b82f6"}
                    onBlur={e  => e.target.style.borderColor="#e2e8f0"} />
                </td>
                {/* הועבר לחברה עירונית */}
                <td style={{ padding:"10px 8px", textAlign:"center", width:60 }}>
                  <input type="checkbox" checked={!!c.sentToMunicipality} onChange={e => updateC(c.id,"sentToMunicipality",e.target.checked)}
                    style={{ width:16, height:16, cursor:"pointer", accentColor:"#475569" }} />
                </td>
                {/* אושר היועץ */}
                <td style={{ padding:"10px 8px", textAlign:"center", width:60 }}>
                  <input type="checkbox" checked={!!c.approved} onChange={e => updateC(c.id,"approved",e.target.checked)}
                    style={{ width:16, height:16, cursor:"pointer", accentColor:"#475569" }} />
                </td>
                {/* מחק */}
                <td style={{ padding:"10px 12px" }}>
                  <button onClick={() => delConsultant(c.id)}
                    style={{ background:"none", border:"none", cursor:"pointer", color:"#ef4444", fontSize:16, padding:"2px 4px" }}>🗑️</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

    </Card>
  );
}

// ── Tab: רשימת יועצים ─────────────────────────────────────────────────────────
function ConsultantModal({ consultant, onClose, onSave, budgetState, statsRows, scrollToIncreaseId, suppliers }) {
  const [inc, setInc] = useState({ reason:"", amount:"", date:"", planOnly:false });
  const [increases, setIncreases] = useState(consultant?.increases || []);

  const initContacts = () => {
    if (consultant?.contacts?.length > 0) return consultant.contacts;
    const sm = (suppliers||[]).find(s => s.name === consultant?.name);
    if (sm) return [{ id:Date.now(), name:sm.contact||"", phone:sm.phone||"", phone2:sm.phone2||"", email:sm.email||"", isFromSupplier:true }];
    return [{ id:Date.now(), name:"", phone:"", phone2:"", email:"", isFromSupplier:false }];
  };
  const [contacts, setContacts] = useState(initContacts);
  const [exportNotes, setExportNotes] = useState(consultant?.exportNotes || "");
  const supplierMatch = (suppliers||[]).find(s => s.name === consultant?.name);

  React.useEffect(() => { setIncreases(consultant?.increases || []); }, [consultant?.id]);

  if (!consultant) return null;

  const saveContacts = (newContacts, patch={}) => {
    setContacts(newContacts);
    onSave({ ...consultant, increases, contacts: newContacts, exportNotes, ...patch });
  };
  const addContact = () => saveContacts([...contacts, { id:Date.now(), name:"", phone:"", phone2:"", email:"", isFromSupplier:false }]);
  const delContact = id => saveContacts(contacts.filter(c => c.id !== id));
  const updContact = (id, key, val) => saveContacts(contacts.map(c => c.id===id ? {...c,[key]:val} : c));

  const saveIncreases = (newInc) => {
    setIncreases(newInc);
    onSave({ ...consultant, increases: newInc, contacts, exportNotes });
  };

  const baseVal   = Number(consultant.value || 0);
  // Only approved increases count toward totals
  const totalInc  = increases.filter(x => x.approvedIncrease).reduce((s,x) => s + Number(x.amount||0), 0);

  React.useEffect(() => {
    if (scrollToIncreaseId) {
      setTimeout(() => {
        const el = document.getElementById("inc-" + scrollToIncreaseId);
        if (el) { el.scrollIntoView({ behavior:"smooth", block:"center" }); el.style.outline="2px solid #3b82f6"; setTimeout(()=>el.style.outline="",1500); }
      }, 350);
    }
  }, [scrollToIncreaseId]);

  // ── Architect calculation ───────────────────────────────────────────────────
  const isArchitect = (consultant.role||"").includes("אדריכל") && consultant.payType === "אחוזים";
  const archCalc = (() => {
    if (!isArchitect) return null;
    const contractorEst = Number((budgetState||{}).contractorEst || 0);
    if (!contractorEst) return null;
    const devPct    = Number((statsRows||[]).find(r => r.field === "פיתוח")?.pct || 0);
    const devAmount = contractorEst * devPct / 100;
    const archBase  = contractorEst - devAmount;
    const archPct   = Number(consultant.value || 0);
    const archFee   = archBase * archPct / 100;
    return { contractorEst, devPct, devAmount, archBase, archPct, archFee };
  })();

  // ── Project Manager calculation ──────────────────────────────────────────────
  const isPM = (consultant.role||"").includes("מנהל פרויקט") && consultant.payType === "אחוזים";
  const pmCalc = (() => {
    if (!isPM) return null;
    const contractorEst = Number((budgetState||{}).contractorEst || 0);
    if (!contractorEst) return null;
    const pmPct = Number(consultant.value || 0);
    const pmFee = contractorEst * pmPct / 100;
    return { contractorEst, pmPct, pmFee };
  })();

  // ── Other consultants (pct, not arch/PM) calculation ────────────────────────
  const isOtherPct = consultant.payType === "אחוזים" && !isArchitect && !isPM;
  const otherCalc = (() => {
    if (!isOtherPct) return null;
    const contractorEst = Number((budgetState||{}).contractorEst || 0);
    if (!contractorEst) return null;
    const profPct    = Number((statsRows||[]).find(r => r.field === consultant.role)?.pct || 0);
    if (!profPct) return { contractorEst, profPct: 0, profBase: 0, conPct: Number(consultant.value||0), conFee: 0, noProfPct: true };
    const profBase   = contractorEst * profPct / 100;
    const conPct     = Number(consultant.value || 0);
    const conFee     = profBase * conPct / 100;
    return { contractorEst, profPct, profBase, conPct, conFee, noProfPct: false };
  })();

  const addIncrease = () => {
    if (!inc.reason.trim() || !inc.amount) return;
    saveIncreases([...increases, { ...inc, id: Date.now(), createdAt: Date.now(), sentToManager: false, sentToMunicipality: false, approvedIncrease: false }]);
    setInc({ reason:"", amount:"", date:"", planOnly:false });
  };
  const delIncrease    = id  => saveIncreases(increases.filter(x => x.id !== id));
  const updateIncrease = (id, key, val) =>
    saveIncreases(increases.map(x => x.id === id ? { ...x, [key]: val } : x));

  return (
    <div style={{ position:"fixed", inset:0, background:"#00000060", display:"flex", alignItems:"center", justifyContent:"center", zIndex:2000, padding:20 }}
      onClick={onClose}>
      <div style={{ background:"#fff", borderRadius:18, width:"100%", maxWidth:700, maxHeight:"90vh", overflowY:"auto", boxShadow:"0 24px 64px #0004" }}
        onClick={e => e.stopPropagation()} className="fade" dir="rtl">

        {/* Header */}
        <div style={{ padding:"22px 26px 18px", borderBottom:"1px solid #e2e8f0", display:"flex", alignItems:"center", justifyContent:"space-between", direction:"rtl" }}>
          <div style={{ display:"flex", alignItems:"center", gap:14 }}>
            <div style={{ width:52, height:52, borderRadius:"50%", background:"linear-gradient(135deg,#3b82f6,#60a5fa)", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontSize:22, fontWeight:800 }}>
              {(consultant.name||"?")[0].toUpperCase()}
            </div>
            <div>
              <div style={{ fontSize:19, fontWeight:800, color:"#1e293b" }}>{consultant.name}</div>
              <div style={{ fontSize:13, color:"#64748b", marginTop:2 }}>{consultant.role}</div>
            </div>
          </div>
          <button onClick={onClose} style={{ background:"#f1f5f9", border:"none", borderRadius:8, width:34, height:34, fontSize:18, cursor:"pointer", color:"#64748b", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
        </div>

        <div style={{ padding:"22px 26px", display:"flex", flexDirection:"column", gap:20, direction:"rtl" }}>

          {/* Contact details — editable */}
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#94a3b8", letterSpacing:1, marginBottom:10, display:"flex", alignItems:"center", justifyContent:"space-between", direction:"rtl" }}>
              <span>אנשי קשר</span>
              <button onClick={addContact}
                style={{ fontSize:12, fontWeight:700, color:"#fff", background:"#475569", border:"none",
                  borderRadius:7, padding:"4px 12px", cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>
                + הוסף איש קשר
              </button>
            </div>

            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {contacts.map((ct, idx) => (
                <div key={ct.id} style={{ background:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:10, padding:"12px 14px" }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8, direction:"rtl" }}>
                    <span style={{ fontSize:11, fontWeight:700, color:"#64748b" }}>
                      {ct.isFromSupplier ? "🏢 ספק ראשי" : `👤 איש קשר ${idx+1}`}
                    </span>
                    {contacts.length > 1 && (
                      <button onClick={() => delContact(ct.id)}
                        style={{ background:"none", border:"none", cursor:"pointer", color:"#ef4444", fontSize:14, padding:"0 4px" }}>✕</button>
                    )}
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, direction:"rtl" }}>
                    {[
                      { label:"שם",    key:"name" },
                      { label:"טלפון", key:"phone" },
                      { label:"נייד",  key:"phone2" },
                      { label:"מייל",  key:"email" },
                    ].map(f => (
                      <div key={f.key} style={{ display:"flex", flexDirection:"column", gap:3 }}>
                        <div style={{ fontSize:11, color:"#94a3b8", fontWeight:600, textAlign:"right" }}>{f.label}</div>
                        <input value={ct[f.key]||""} onChange={e => updContact(ct.id, f.key, e.target.value)}
                          style={{ width:"100%", border:"1px solid #e2e8f0", borderRadius:7, padding:"7px 9px",
                            fontSize:13, fontFamily:"'Heebo',sans-serif", color:"#1e293b", outline:"none",
                            background:"#fff", boxSizing:"border-box", textAlign:"right", direction:"rtl" }}
                          onFocus={e => e.target.style.borderColor="#475569"}
                          onBlur={e  => e.target.style.borderColor="#e2e8f0"} />
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            <div style={{ marginTop:10 }}>
              <div style={{ fontSize:11, color:"#94a3b8", fontWeight:600, marginBottom:4 }}>הערות (לייצוא)</div>
              <input value={exportNotes} onChange={e => { setExportNotes(e.target.value); saveContacts(contacts, {exportNotes:e.target.value}); }}
                placeholder="הערות שיופיעו ברשימת היועצים..."
                style={{ width:"100%", border:"1px solid #e2e8f0", borderRadius:8, padding:"8px 10px",
                  fontSize:13, fontFamily:"'Heebo',sans-serif", color:"#1e293b", outline:"none",
                  background:"#f8fafc", boxSizing:"border-box" }}
                onFocus={e => e.target.style.borderColor="#3b82f6"}
                onBlur={e  => e.target.style.borderColor="#e2e8f0"} />
            </div>
          </div>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#94a3b8", letterSpacing:1, marginBottom:10 }}>סכום התקשרות</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10 }}>
              {[
                { label:"סכום מאושר ("+(consultant.payType||"אחוזים")+")", val: !consultant.value ? "לא הוזן" : consultant.payType==="אחוזים" ? (consultant.value+"%") : fmt(consultant.value), color:"#334155" },
                { label:"סה״כ הגדלות", val: totalInc !== 0 ? fmt(totalInc) : "—", color: totalInc < 0 ? "#dc2626" : "#d97706" },
                { label:"סה״כ כולל",   val: !consultant.value ? "לא הוזן" : consultant.payType==="אחוזים" ? (consultant.value+"% + "+fmt(totalInc)) : fmt(baseVal+totalInc), color:"#374151" },
              ].map(x => (
                <div key={x.label} style={{ background:"#f8fafc", borderRadius:10, padding:"12px 14px", textAlign:"right" }}>
                  <div style={{ fontSize:11, color:"#94a3b8", fontWeight:600, marginBottom:4 }}>{x.label}</div>
                  <div style={{ fontSize:17, fontWeight:800, color:x.color }}>{x.val}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Architect fee breakdown */}
          {isArchitect && archCalc && (
            <div>
              <div style={{ fontSize:12, fontWeight:700, color:"#94a3b8", letterSpacing:1, marginBottom:10 }}>פירוט חישוב שכר טרחה — אדריכל</div>
              <div style={{ background:"#f8fafc", borderRadius:12, border:"1px solid #e2e8f0", overflow:"hidden" }}>
                {[
                  { label:"אומדן קבלני (בסיס חישוב)", val: fmt(archCalc.contractorEst) },
                  { label:`אחוז עלות פיתוח (${archCalc.devPct}%)`, val: fmt(archCalc.devAmount), sign:"−", red:true },
                  { label:"בסיס לחישוב אדריכלות", val: fmt(archCalc.archBase), bold:true },
                  { label:`אחוז שכר טרחה אדריכל (${archCalc.archPct}%)`, val: `${archCalc.archPct}%`, sign:"×" },
                  { label:"שכר טרחה בסיסי לאדריכל", val: fmt(archCalc.archFee), bold:true, separator:true },
                ].map((row,i) => (
                  <div key={i} style={{ display:"grid", gridTemplateColumns:"230px 1fr", alignItems:"center", padding:"9px 16px", borderTop: row.separator?"2px solid #e2e8f0":"none", borderBottom:i<4&&!row.separator?"1px solid #f1f5f9":"none" }}>
                    <span style={{ fontSize:13, color:"#374151", fontWeight:row.bold?700:400, textAlign:"right" }}>{row.label}</span>
                    <span style={{ fontSize:14, fontWeight:row.bold?800:600, color:row.red?"#dc2626":"#1e293b", textAlign:"right" }}>
                      {row.val}{row.sign && <span style={{ marginLeft:6, color: row.red ? "#dc2626" : "#64748b" }}> {row.sign}</span>}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {isArchitect && !archCalc && (
            <div style={{ background:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:10, padding:"10px 16px", fontSize:13, color:"#374151" }}>
              ⚠️ יש להזין <strong>אומדן קבלני</strong> בלשונית תקציב הפרויקט כדי לחשב שכר טרחה
            </div>
          )}

          {/* PM fee breakdown */}
          {isPM && pmCalc && (
            <div>
              <div style={{ fontSize:12, fontWeight:700, color:"#94a3b8", letterSpacing:1, marginBottom:10 }}>פירוט חישוב שכר טרחה — מנהל פרויקט</div>
              <div style={{ background:"#f8fafc", borderRadius:12, border:"1px solid #e2e8f0", overflow:"hidden" }}>
                {[
                  { label:"אומדן קבלני (בסיס חישוב)", val: fmt(pmCalc.contractorEst) },
                  { label:`אחוז שכר טרחה מנהל פרויקט (${pmCalc.pmPct}%)`, val: `${pmCalc.pmPct}%`, sign:"×" },
                  { label:"שכר טרחה בסיסי למנהל פרויקט", val: fmt(pmCalc.pmFee), bold:true, separator:true },
                ].map((row,i) => (
                  <div key={i} style={{ display:"grid", gridTemplateColumns:"230px 1fr", alignItems:"center", padding:"9px 16px", borderTop:row.separator?"2px solid #e2e8f0":"none", borderBottom:i<2&&!row.separator?"1px solid #f1f5f9":"none" }}>
                    <span style={{ fontSize:13, color:"#374151", fontWeight:row.bold?700:400, textAlign:"right" }}>{row.label}</span>
                    <span style={{ fontSize:14, fontWeight:row.bold?800:600, color:"#1e293b", textAlign:"right" }}>
                      {row.val}{row.sign && <span style={{ marginLeft:6, color:"#64748b" }}> {row.sign}</span>}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {isPM && !pmCalc && (
            <div style={{ background:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:10, padding:"10px 16px", fontSize:13, color:"#374151" }}>
              ⚠️ יש להזין <strong>אומדן קבלני</strong> בלשונית תקציב הפרויקט כדי לחשב שכר טרחה
            </div>
          )}

          {/* Other consultant fee breakdown */}
          {isOtherPct && otherCalc && !otherCalc.noProfPct && (
            <div>
              <div style={{ fontSize:12, fontWeight:700, color:"#94a3b8", letterSpacing:1, marginBottom:10 }}>פירוט חישוב שכר טרחה — {consultant.role}</div>
              <div style={{ background:"#f8fafc", borderRadius:12, border:"1px solid #e2e8f0", overflow:"hidden" }}>
                {[
                  { label:"אומדן קבלני (בסיס)", val: fmt(otherCalc.contractorEst) },
                  { label:`אחוז פרק ${consultant.role} (${otherCalc.profPct}%)`, val: fmt(otherCalc.profBase) },
                  { label:`אחוז שכר טרחה יועץ (${otherCalc.conPct}%)`, val: `${otherCalc.conPct}%`, sign:"×" },
                  { label:"שכר טרחה בסיסי", val: fmt(otherCalc.conFee), bold:true, separator:true },
                ].map((row,i) => (
                  <div key={i} style={{ display:"grid", gridTemplateColumns:"230px 1fr", alignItems:"center", padding:"9px 16px", borderTop:row.separator?"2px solid #e2e8f0":"none", borderBottom:i<3&&!row.separator?"1px solid #f1f5f9":"none" }}>
                    <span style={{ fontSize:13, color:"#374151", fontWeight:row.bold?700:400, textAlign:"right" }}>{row.label}</span>
                    <span style={{ fontSize:14, fontWeight:row.bold?800:600, color:"#1e293b", textAlign:"right" }}>
                      {row.val}{row.sign && <span style={{ marginLeft:6, color:"#64748b" }}> {row.sign}</span>}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {isOtherPct && otherCalc && otherCalc.noProfPct && (
            <div style={{ background:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:10, padding:"10px 16px", fontSize:13, color:"#374151" }}>
              ⚠️ אחוז פרק <strong>{consultant.role}</strong> לא הוגדר בגיליון הסטטיסטיקה
            </div>
          )}
          {isOtherPct && !otherCalc && (
            <div style={{ background:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:10, padding:"10px 16px", fontSize:13, color:"#374151" }}>
              ⚠️ יש להזין <strong>אומדן קבלני</strong> בלשונית תקציב הפרויקט כדי לחשב שכר טרחה
            </div>
          )}

          {/* Increases list */}
          {increases.length > 0 && (
            <div>
              <div style={{ fontSize:12, fontWeight:700, color:"#94a3b8", letterSpacing:1, marginBottom:8 }}>פירוט הגדלות</div>
              <div style={{ border:"1px solid #e2e8f0", borderRadius:10, overflow:"hidden", direction:"rtl" }}>
                {/* כותרות */}
                <div style={{ display:"grid", gridTemplateColumns:"1fr 160px 160px 80px", borderBottom:"2px solid #e2e8f0", background:"#f8fafc" }}>
                  {["סיבת ההגדלה","סכום","תאריך","תכנון בלבד"].map((h,i) => (
                    <div key={i} style={{ padding:"8px 12px", fontSize:11, fontWeight:700, color:"#64748b", textAlign:"right" }}>{h}</div>
                  ))}
                </div>
                {increases.map((x, ri) => (
                  <div key={x.id} id={"inc-" + x.id} style={{ display:"grid", gridTemplateColumns:"1fr 160px 160px 80px", borderBottom:ri<increases.length-1?"1px solid #e2e8f0":"none", background:"#fff" }}>
                    {/* עמודה 1: סיבה + הועבר לאישור מנהל */}
                    <div style={{ padding:"10px 12px", borderLeft:"1px solid #f1f5f9" }}>
                      <div style={{ display:"flex", alignItems:"center", direction:"rtl", gap:8, marginBottom:6 }}>
                        {!x.approvedIncrease && <DeleteButton onClick={() => delIncrease(x.id)} />}
                        <span style={{ fontWeight:600, fontSize:13, color:"#1e293b" }}>{x.reason}</span>

// ── DatePickerCell: DD/MM/YYYY date input independent of browser locale ────────
function DatePickerCell({ value, onChange, style }) {
  // value stored as YYYY-MM-DD internally
  const toISO  = (d,m,y) => y && m && d ? `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}` : "";
  const fromISO = iso => { if (!iso) return {d:"",m:"",y:""}; const [y,m,d]=iso.split("-"); return {d:String(Number(d)),m:String(Number(m)),y}; };

  const parts = fromISO(value);
  const [d, setD] = React.useState(parts.d);
  const [m, setM] = React.useState(parts.m);
  const [y, setY] = React.useState(parts.y);

  React.useEffect(() => {
    const p = fromISO(value);
    setD(p.d); setM(p.m); setY(p.y);
  }, [value]);

  const commit = (nd,nm,ny) => {
    const iso = toISO(nd,nm,ny);
    if (iso) onChange(iso);
  };

  const inp = (val, setter, max, next) => ({
    value: val,
    onChange: e => {
      const v = e.target.value.replace(/\D/g,"").slice(0,next==="y"?2:2);
      setter(v);
      if (v.length === 2 && next) document.getElementById(next)?.focus();
    },
    onBlur: e => {
      const v = e.target.value;
      commit(setter===setD?v:d, setter===setM?v:m, setter===setY?v:y);
    }
  });

  const base = { width:28, border:"none", borderBottom:"1.5px solid #cbd5e1", padding:"2px 2px",
    fontSize:11, fontFamily:"'Heebo',sans-serif", outline:"none", textAlign:"right",
    background:"transparent", ...style };

  return (
    <div style={{ display:"flex", alignItems:"center", gap:1, background:"#f8fafc",
      border:"1px solid #e2e8f0", borderRadius:5, padding:"3px 6px", width:"fit-content" }}>
      <input id={"dp-d"} placeholder="DD" maxLength={2} {...inp(d,setD,31,"dp-m")} style={{...base}} />
      <span style={{ color:"#94a3b8", fontSize:11 }}>/</span>
      <input id={"dp-m"} placeholder="MM" maxLength={2} {...inp(m,setM,12,"dp-y")} style={{...base}} />
      <span style={{ color:"#94a3b8", fontSize:11 }}>/</span>
      <input id={"dp-y"} placeholder="YYYY" maxLength={4} value={y}
        onChange={e=>{ const v=e.target.value.replace(/\D/g,"").slice(0,4); setY(v); }}
        onBlur={e=>commit(d,m,e.target.value)}
        style={{...base, width:38, borderBottom:"1.5px solid #cbd5e1"}} />
    </div>
  );
}

// ── FlatpickrDate: date picker with DD/MM/YYYY format ──────────────────────
function FlatpickrDate({ value, onChange, style }) {
  const ref = useRef(null);
  const fpRef = useRef(null);

  useEffect(() => {
    // Load flatpickr CSS + JS dynamically
    const loadFlatpickr = () => {
      if (window.flatpickr) { initFp(); return; }
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = "https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css";
      document.head.appendChild(link);
      const script = document.createElement("script");
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js";
      script.onload = initFp;
      document.head.appendChild(script);
    };
    const initFp = () => {
      if (fpRef.current) fpRef.current.destroy();
      fpRef.current = window.flatpickr(ref.current, {
        dateFormat: "d/m/Y",
        allowInput: true,
        locale: { firstDayOfWeek: 0 },
        onChange: ([date]) => {
          if (!date) return;
          // store as YYYY-MM-DD internally
          const y = date.getFullYear();
          const m = String(date.getMonth()+1).padStart(2,"0");
          const d = String(date.getDate()).padStart(2,"0");
          onChange(`${y}-${m}-${d}`);
        }
      });
      // set initial value
      if (value) {
        const [y,m,d] = value.split("-");
        if (y&&m&&d) fpRef.current.setDate(`${d}/${m}/${y}`, false);
      }
    };
    loadFlatpickr();
    return () => { if (fpRef.current) fpRef.current.destroy(); };
  }, []);

  // sync external value changes
  useEffect(() => {
    if (fpRef.current && value) {
      const [y,m,d] = value.split("-");
      if (y&&m&&d) fpRef.current.setDate(`${d}/${m}/${y}`, false);
    } else if (fpRef.current && !value) {
      fpRef.current.clear();
    }
  }, [value]);

  return (
    <input ref={ref} type="text" placeholder="DD/MM/YYYY" readOnly
      style={{ padding:"3px 5px", border:"1px solid #e2e8f0", borderRadius:5,
        fontSize:11, fontFamily:"'Heebo',sans-serif", outline:"none",
        background:"#fff", cursor:"pointer", width:105, ...style }} />
  );
}

// ── NumericCell: uncontrolled input that allows free typing ─────────────────
function NumericCell({ value, baseAmt, mode, onCommit, style, placeholder }) {
  const [focused, setFocused] = React.useState(false);
  // raw = plain number string for editing; displayed = formatted with commas
  const rawRef = React.useRef(String(value||""));
  const [display, setDisplay] = React.useState(String(value||""));

  // format a number string with commas
  const fmtNum = v => {
    const n = parseFloat(v);
    if (isNaN(n)) return v;
    const hasDecimal = n !== Math.floor(n);
    return n.toLocaleString("he-IL", { minimumFractionDigits: hasDecimal ? 2 : 0, maximumFractionDigits: 2 });
  };

  // sync external value changes
  React.useEffect(() => {
    if (!focused) {
      rawRef.current = String(value||"");
      setDisplay(value ? fmtNum(String(value)) : "");
    }
  }, [value, focused]);

  const handleFocus = () => {
    setFocused(true);
    // show raw number without commas for editing
    setDisplay(rawRef.current);
  };

  const handleChange = e => {
    setDisplay(e.target.value);
    rawRef.current = e.target.value;
  };

  const handleBlur = () => {
    setFocused(false);
    const num = parseFloat(rawRef.current);
    if (isNaN(num)) { setDisplay(""); onCommit("", ""); return; }
    const fixed = num.toFixed(2);
    rawRef.current = fixed;
    setDisplay(fmtNum(fixed));
    if (mode === "amount") {
      const pct = baseAmt ? (num / baseAmt * 100).toFixed(2) : "";
      onCommit(fixed, pct);
    } else {
      const amt = baseAmt ? (num / 100 * baseAmt).toFixed(2) : "";
      onCommit(fixed, amt);
    }
  };

  return (
    <input
      type="text"
      inputMode="decimal"
      value={display}
      onChange={handleChange}
      onFocus={handleFocus}
      onBlur={handleBlur}
      placeholder={placeholder||""}
      style={{ padding:"3px 5px", border:"1px solid #e2e8f0", borderRadius:5, fontSize:11,
        fontFamily:"'Heebo',sans-serif", outline:"none", textAlign:"right", ...style }}
    />
  );
}
