  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    // ── Firebase helpers ─────────────────────────────────────────────────────
    const getFirebase = () => window._firebase;

    // נתונים משותפים - נשמרים ב-shared/appdata
    const saveShared = async (key, data) => {
      try {
        const { db, doc, setDoc } = getFirebase();
        await setDoc(doc(db, "shared", key), { value: JSON.stringify(data) }, { merge: false });
      } catch(e) { console.error("save error", e); }
    };

    const loadShared = async (key) => {
      try {
        const { db, doc, getDoc } = getFirebase();
        const snap = await getDoc(doc(db, "shared", key));
        if (snap.exists()) return JSON.parse(snap.data().value);
      } catch(e) { console.error("load error", e); }
      return null;
    };

    // הרשאות משתמש
    const loadUserRole = async (uid) => {
      try {
        const { db, doc, getDoc } = getFirebase();
        const snap = await getDoc(doc(db, "userRoles", uid));
        if (snap.exists()) return snap.data();
      } catch(e) { console.error("role error", e); }
      return null;
    };

    const saveUserRole = async (uid, data) => {
      try {
        const { db, doc, setDoc } = getFirebase();
        await setDoc(doc(db, "userRoles", uid), data);
      } catch(e) { console.error("save role error", e); }
    };

    // כל הנתונים משותפים לכולם
    const SHARED_KEYS = ["projects", "allData", "suppliers", "companies", "milestones", "statsRows", "workScopes", "managers"];
    const saveToFirestore = (uid, key, data) => {
      const storageKey = SHARED_KEYS.includes(key) ? key : `${uid}_${key}`;
      return saveShared(storageKey, data);
    };
    const loadFromFirestore = async (uid, key) => {
      const storageKey = SHARED_KEYS.includes(key) ? key : `${uid}_${key}`;
      const data = await loadShared(storageKey);
      if (data !== null) return data;
      if (SHARED_KEYS.includes(key) && key !== "projects" && key !== "allData") {
        return loadShared(`${uid}_${key}`);
      }
      return null;
    };
    // מנוי real-time לעדכונים מ-Firestore
    const subscribeShared = (key, callback) => {
      const { db, doc, onSnapshot } = getFirebase();
      return onSnapshot(doc(db, "shared", key), snap => {
        try { callback(snap.exists() ? JSON.parse(snap.data().value) : null); } catch(e) {}
      }, err => console.error("subscribe error", key, err));
    };



    // ── Login Screen ─────────────────────────────────────────────────────────
    function LoginScreen({ onLogin }) {
      const [email, setEmail]       = useState("");
      const [password, setPassword] = useState("");
      const [error, setError]       = useState("");
      const [loading, setLoading]   = useState(false);
      const [resetSent, setResetSent] = useState(false);
      const [showReset, setShowReset] = useState(false);
      const [resetEmail, setResetEmail] = useState("");

      const handleLogin = async () => {
        if (!email || !password) { setError("יש למלא מייל וסיסמה"); return; }
        setLoading(true); setError("");
        try {
          const { auth, signInWithEmailAndPassword } = getFirebase();
          const cred = await signInWithEmailAndPassword(auth, email, password);
          onLogin(cred.user);
        } catch(e) {
          setError("מייל או סיסמה שגויים");
        }
        setLoading(false);
      };

      const handleReset = async () => {
        if (!resetEmail) { setError("יש להזין מייל"); return; }
        setLoading(true); setError("");
        try {
          const { auth } = getFirebase();
          const { sendPasswordResetEmail } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
          await sendPasswordResetEmail(auth, resetEmail);
          setResetSent(true);
        } catch(e) {
          setError("מייל לא נמצא במערכת");
        }
        setLoading(false);
      };

      return (

            {!showReset ? (
              <form method="post" onSubmit={e=>{e.preventDefault();handleLogin();}} style={{ display:"flex", flexDirection:"column", gap:14 }}>
                <div>
                  <label htmlFor="username" style={{ fontSize:12, fontWeight:600, color:"#64748b", display:"block", marginBottom:5 }}>כתובת מייל</label>
                  <input id="username" name="username" type="email" autoComplete="username" required
                    value={email} onChange={e=>setEmail(e.target.value)}
                    placeholder="name@company.com" dir="ltr"
                    style={{ width:"100%", padding:"10px 13px", border:"1.5px solid #e2e8f0", borderRadius:9, fontSize:14, fontFamily:"'Heebo',sans-serif", outline:"none", boxSizing:"border-box" }}
                    onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="#e2e8f0"} />
                </div>
                <div>
                  <label htmlFor="password" style={{ fontSize:12, fontWeight:600, color:"#64748b", display:"block", marginBottom:5 }}>סיסמה</label>
                  <input id="password" name="password" type="password" autoComplete="current-password" required
                    value={password} onChange={e=>setPassword(e.target.value)}
                    placeholder="••••••••" dir="ltr"
                    style={{ width:"100%", padding:"10px 13px", border:"1.5px solid #e2e8f0", borderRadius:9, fontSize:14, fontFamily:"'Heebo',sans-serif", outline:"none", boxSizing:"border-box" }}
                    onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="#e2e8f0"} />
                </div>
                {error && <div style={{ color:"#ef4444", fontSize:13, textAlign:"center" }}>{error}</div>}
                <button type="submit" disabled={loading}
                  style={{ background:"linear-gradient(135deg,#3b82f6,#2563eb)", color:"#fff", border:"none", borderRadius:9, padding:"11px", fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:"'Heebo',sans-serif", marginTop:4, opacity:loading?0.7:1 }}>
                  {loading ? "מתחבר..." : "כניסה"}
                </button>
                <div style={{ textAlign:"center" }}>
                  <button type="button" onClick={() => { setShowReset(true); setResetEmail(email); setError(""); }}
                    style={{ background:"none", border:"none", color:"#3b82f6", fontSize:12, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>
                    שכחתי סיסמה
                  </button>
                </div>
              </form>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:14 }}>

      const [users, setUsers]   = useState([]);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving]   = useState(null);

      // Load all users from Firestore
      useEffect(() => {
        const loadUsers = async () => {
          try {
            const { db } = getFirebase();
            const { collection, getDocs } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
            const snap = await getDocs(collection(db, "userRoles"));
            const list = [];
            snap.forEach(d => list.push({ uid: d.id, ...d.data() }));
            setUsers(list);
          } catch(e) { console.error(e); }
          setLoading(false);
        };
        loadUsers();
      }, []);

      const updateUser = async (uid, patch) => {
        setSaving(uid);
        const updated = users.map(u => u.uid === uid ? { ...u, ...patch } : u);
        setUsers(updated);
        const u = updated.find(x => x.uid === uid);
        await saveUserRole(uid, { role: u.role || "user", projects: u.projects || [], email: u.email || "" });

      const toggleProject = (uid, projId) => {

// ── File System Access API helpers (backup dir) ───────────────────────────
const _bkpDB = (() => {
  let _db = null;
  const open = () => new Promise((res, rej) => {
    if (_db) return res(_db);
    const req = indexedDB.open("costpilot_fs", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("handles");
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror = () => rej(req.error);
  });
  return {
    save: async (handle) => {
      const d = await open();
      return new Promise((res, rej) => {
        const tx = d.transaction("handles", "readwrite");
        tx.objectStore("handles").put(handle, "backupDir");
        tx.oncomplete = res; tx.onerror = () => rej(tx.error);
      });
    },
    load: async () => {
      const d = await open();
      return new Promise(res => {
        const tx = d.transaction("handles", "readonly");
        const req = tx.objectStore("handles").get("backupDir");
        req.onsuccess = () => res(req.result || null);
        req.onerror = () => res(null);
      });
    },
    clear: async () => {
      const d = await open();
      return new Promise(res => {
        const tx = d.transaction("handles", "readwrite");
        tx.objectStore("handles").delete("backupDir");
        tx.oncomplete = res; tx.onerror = res;
      });
    },
  };
})();

function LogoBlock({ size }) {
  const big = size === "login";
  const titleRef = React.useRef(null);
  const subRef   = React.useRef(null);

  React.useEffect(() => {
    const baseFontSize = big ? 28 : 17;
    const fit = () => {
      const title = titleRef.current;
      const sub   = subRef.current;
      if (!title || !sub) return;
      // reset to base size for accurate measurement
      title.style.fontSize = baseFontSize + "px";
      title.style.transform = "";
      sub.style.transform   = "";
      const titleW = title.getBoundingClientRect().width;
      const subW   = sub.getBoundingClientRect().width;
      if (titleW > 0 && subW > 0) {
        // grow font-size so CostPilot naturally fills subtitle width
        title.style.fontSize = (baseFontSize * subW / titleW) + "px";
      }
    };
    const raf = requestAnimationFrame(() => requestAnimationFrame(fit));
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => requestAnimationFrame(fit));
    }
    const t = setTimeout(fit, 1500);
    window.addEventListener("resize", fit);
    return () => { cancelAnimationFrame(raf); clearTimeout(t); window.removeEventListener("resize", fit); };
  }, [big]);

  return (
    <div style={{ display:"flex", alignItems:"center", gap: big?10:6, fontFamily:"'Heebo',sans-serif", direction:"rtl" }}>
      <div style={{
        width:  big?115:66,
        height: big?70:40,
        backgroundImage:    "url('../logo.png')",
        backgroundSize:     "300% auto",
        backgroundPosition: "100% center",
        backgroundRepeat:   "no-repeat",
        flexShrink: 0
      }} />
      <div style={{ display:"flex", flexDirection:"column", gap: big?4:2, alignItems:"flex-end" }}>
        <span ref={titleRef} style={{ display:"inline-block", fontWeight:900, color:"#1e293b", lineHeight:1, whiteSpace:"nowrap", fontSize: big?28:17 }}>CostPilot</span>
        <span ref={subRef}   style={{ display:"inline-block", fontSize: big?16:10, fontWeight:700, color:"#64748b", whiteSpace:"nowrap", lineHeight:1 }}>ניהול תקציבי פרויקט</span>
      </div>
    </div>
  );
}

function App() {
      const [user, setUser]         = useState(undefined);
      const [userRole, setUserRole] = useState(null);  // { role: "admin"|"user", projects: [...] }
      const [checking, setChecking] = useState(true);

      useEffect(() => {
        let unsubscribe = null;
        const wait = setInterval(() => {
          if (window._firebase) {
            clearInterval(wait);
            const { auth, onAuthStateChanged } = window._firebase;
            unsubscribe = onAuthStateChanged(auth, async u => {
              if (u) {
                setUser(u);
                // טעינת הרשאות
                const roleData = await loadUserRole(u.uid);
                if (roleData) {
                  // קיים - אל תדרוס, רק עדכן מייל אם חסר
                  if (!roleData.email && u.email) {
                    const updated = { ...roleData, email: u.email };
                    await saveUserRole(u.uid, updated);
                    setUserRole(updated);
                  } else {
                    setUserRole(roleData);
                  }
                } else {
                  // משתמש חדש - ברירת מחדל user
                  const newRole = { role: "user", projects: [], email: u.email || "" };
                  await saveUserRole(u.uid, newRole);
                  setUserRole(newRole);
                }
              } else {
                setUser(null);
                setUserRole(null);
              }
              setChecking(false);
            });
          }
        }, 100);
        const timeout = setTimeout(() => { clearInterval(wait); setChecking(false); }, 10000);
        return () => { clearInterval(wait); clearTimeout(timeout); if (unsubscribe) unsubscribe(); };
      }, []);

      if (checking) return (
        <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Heebo',sans-serif", color:"#94a3b8", flexDirection:"column", gap:12 }}>
          <div style={{ fontSize:32 }}>⏳</div>
          <div>טוען CostPilot...</div>
        </div>
      );

      if (!user) return <LoginScreen onLogin={u => { setUser(u); }} />;
      if (!userRole) return (
        <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Heebo',sans-serif", color:"#94a3b8" }}>
          טוען הרשאות...
        </div>
      );
      return <AppInner currentUser={user} userRole={userRole} setUserRole={setUserRole} />;
    }

function NameSearchInput({ value, suppliers, isBold, onSelect, autoFocus }) {
  const [nameSearch, setNameSearch] = useState(value || "");
  const [focused, setFocused] = useState(false);
  const [dropStyle, setDropStyle] = useState({});
  const inputRef = React.useRef(null);
  const nameInputRef = React.useRef(null);
  React.useEffect(() => { if (autoFocus && nameInputRef.current) nameInputRef.current.focus(); }, [autoFocus]);
  const filtered = suppliers.filter(s => !nameSearch || s.name?.toLowerCase().includes(nameSearch.toLowerCase()));
  const showList = focused && filtered.length > 0;

  const [error, setError] = useState(false);

  const handleFocus = (e) => {
    e.target.style.borderColor="#3b82f6";
    if (inputRef.current) {
      const rect = inputRef.current.getBoundingClientRect();
      const spaceBelow = window.innerHeight - rect.bottom;
      const dropH = Math.min(filtered.length * 37, 200);
      if (spaceBelow < dropH + 8) {
        setDropStyle({ position:"fixed", bottom: window.innerHeight - rect.top + 2, left: rect.left, right: window.innerWidth - rect.right, maxHeight:200 });
      } else {
        setDropStyle({ position:"fixed", top: rect.bottom + 2, left: rect.left, right: window.innerWidth - rect.right, maxHeight:200 });
      }
    }
    setFocused(true);
  };

  return (
    <div ref={inputRef} style={{ position:"relative" }}>
      <input ref={nameInputRef} value={nameSearch}
        onChange={e => { setNameSearch(e.target.value); if(!e.target.value) onSelect(""); }}
        placeholder="הקלד או בחר יועץ..."
        style={{ width:"100%", background:"transparent", border:`1px solid ${error?"#ef4444":"#e2e8f0"}`, borderRadius:6,
          padding:"5px 9px", fontSize:13, color:"#1e293b", fontFamily:"'Heebo',sans-serif",
          outline:"none", fontWeight: isBold ? 700 : 400, direction:"rtl", boxSizing:"border-box" }}
        onFocus={handleFocus}
        onBlur={e => {
          e.target.style.borderColor="#e2e8f0";
          setTimeout(() => {
            setFocused(false);
            const valid = !nameSearch || suppliers.some(s => s.name === nameSearch);
            setError(!valid);
          }, 150);
        }} />
      {error && <div style={{ fontSize:11, color:"#ef4444", marginTop:2, direction:"rtl" }}>יש לבחור יועץ מהרשימה בלבד</div>}
      {showList && (
        <div style={{ ...dropStyle, background:"#fff", border:"1.5px solid #e2e8f0", borderRadius:8,
          zIndex:9999, boxShadow:"0 8px 24px #0003", overflowY:"auto" }}>
          {filtered.map(s => (
            <div key={s.name} onMouseDown={() => { onSelect(s.name); setNameSearch(s.name); setFocused(false); }}
              style={{ padding:"8px 12px", cursor:"pointer", fontSize:13, color:"#1e293b",
                borderBottom:"1px solid #f1f5f9", direction:"rtl",
                background: s.name === value ? "#eff6ff" : "#fff" }}
              onMouseOver={e => e.currentTarget.style.background="#f0f9ff"}
              onMouseOut={e  => e.currentTarget.style.background= s.name === value ? "#eff6ff" : "#fff"}>
              {s.name}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}


// ── Helper: פתיחת Outlook עם גוף RTL בקליפבורד ──────────────────────────────
const openOutlookEmail = (toEmail, subject, bodyText, bodyHtmlOverride) => {
  const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const html = bodyHtmlOverride || `<div dir="rtl" style="font-family:Arial,sans-serif;font-size:13px;direction:rtl;text-align:right">${
    bodyText.split("\n").map(l => l.trim() ? `<p style="margin:2px 0">${esc(l)}</p>` : `<p style="margin:5px 0"> </p>`).join("")
  }</div>`;
  const onCopy = e => { e.clipboardData.setData("text/html", html); e.clipboardData.setData("text/plain", bodyText); e.preventDefault(); };
  document.addEventListener("copy", onCopy);
  document.execCommand("copy");
  document.removeEventListener("copy", onCopy);
  window.location.href = `mailto:${encodeURIComponent(toEmail)}?subject=${encodeURIComponent(subject)}`;
};

// ── HTML email table builder ──────────────────────────────────────────────────
const buildEmailHtml = (intro, tableHeaders, tableRows, outro, rowHighlights) => {
  const thStyle = `style="padding:7px 12px;background:#f1f5f9;border:1px solid #cbd5e1;font-weight:700;font-size:12px;text-align:right"`;
  const tdStyle = `style="padding:7px 12px;border:1px solid #e2e8f0;font-size:12px;text-align:right"`;
  const rows = tableRows.map((r, i) => {
    const trStyle = rowHighlights?.[i] ? ` style="background:#dcfce7"` : "";
    return `<tr${trStyle}>${r.map(c=>`<td ${tdStyle}>${c}</td>`).join("")}</tr>`;
  }).join("");
  const headers = tableHeaders.map(h=>`<th ${thStyle}>${h}</th>`).join("");
  const table = `<table style="border-collapse:collapse;width:100%;direction:rtl;margin:12px 0">\n<thead><tr>${headers}</tr></thead>\n<tbody>${rows}</tbody></table>`;
  const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const p = t => t.split("\n").map(l => l.trim() ? `<p style="margin:3px 0">${esc(l)}</p>` : `<p style="margin:6px 0"> </p>`).join("");
  return `<div dir="rtl" style="font-family:Arial,sans-serif;font-size:13px;direction:rtl;text-align:right;max-width:700px">${p(intro)}${table}${outro ? p(outro) : ""}</div>`;
};

function QuotesTab({ rows, setRows, suppliers, highlightFieldId, budgetState, openingData, statsRows, projectName, projectNumber, companyName, companyId, workScopes, projectMeta }) {
  const [newFieldName, setNewFieldName] = useState("");
  const [showNewField, setShowNewField] = useState(false);
  const [search, setSearch] = useState("");
  const [approvalModal, setApprovalModal] = useState(null);

  useEffect(() => {
    if (rows.length > 1) {
      const sorted = [...rows].sort((a,b) => (a.fieldName||"").localeCompare(b.fieldName||"", "he"));
      if (sorted.some((r,i) => r.id !== rows[i].id)) setRows(sorted);
    }
  }, []); // מיון פעם אחת בטעינה

  const existingFieldNames = rows.map(r => r.fieldName);
  const availableFields = [...new Set((suppliers||[]).map(s => s.field).filter(Boolean))]
    .filter(f => !existingFieldNames.includes(f)).sort();

  const addField = () => {
    if (!newFieldName.trim()) return;
    setRows([...rows, { id: Date.now(), fieldName: newFieldName.trim(), consultants: [], workScope: ((workScopes||{})[companyId]||{})[newFieldName.trim()] || "" }]);
    setNewFieldName("");
    setShowNewField(false);
  };

  const delField = fieldId => setRows(rows.filter(r => r.id !== fieldId));

  const updateField = (fieldId, newConsultants) => {
    setRows(rows.map(r => r.id === fieldId ? { ...r, consultants: newConsultants } : r));
  };

  const prevRowsRef = React.useRef(rows);
  useEffect(() => {
    const prevRows = prevRowsRef.current;
    prevRowsRef.current = rows;
    if (!projectMeta) return;
    for (const field of rows) {
      const prevField = prevRows.find(f => f.id === field.id);
      if (!prevField) continue;
      const newlyRec = (field.consultants||[]).find(c =>
        c.name && c.recommended && !(prevField.consultants||[]).find(oc => oc.id === c.id)?.recommended
      );
      if (!newlyRec) continue;
      const subject = `המלצה על יועץ — ${field.fieldName} — ${projectMeta.name}`;
      const body = `שלום ${projectMeta.tendersManager || ""},\n\nיועץ "${newlyRec.name}" נבחר כמומלץ עבור תחום "${field.fieldName}" בפרויקט "${projectMeta.name}".\n\nיש להעביר את ההמלצה למזמין לאישור.\n\nבברכה`;
      const cEst = Number(String((openingData||{}).contractorEst||"").replace(/,/g,"")) || Number((budgetState||{}).contractorEst||0);
      const devPct = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);
      const archBase = cEst - cEst * devPct / 100;
      const calcFee = c => {
        const pct = Number(c.value||0) / 100;
        const fn = field.fieldName || "";
        if (!cEst || !pct) return 0;
        if (["אדריכל","אדריכלות","אדריכלים"].includes((fn||"").trim())) return archBase * pct;
        if (fn.includes("מנהל פרויקט")) return cEst * pct;
        const pp = Number((statsRows||[]).find(r=>r.field===fn)?.pct||0)/100;
        return cEst * pp * pct;
      };
      const allC = (field.consultants||[]).filter(c => c.name);
      const tableRows = allC.map(c => {
        const fee = c.payType === "אחוזים" ? calcFee(c) : null;
        return [c.name, c.payType||"—", c.payType==="אחוזים"?`${c.value||0}%`:fmt(c.value), fee?fmt(fee):(c.payType!=="אחוזים"?fmt(c.value):"—"), c.notes||""];
      });
      const rowHighlights = allC.map(c => c.id === newlyRec.id);
      const htmlBody = buildEmailHtml(
        `שלום ${projectMeta.tendersManager || ""},\n\nיועץ "${newlyRec.name}" נבחר כמומלץ עבור תחום "${field.fieldName}" בפרויקט "${projectMeta.name}".\n\nלהלן כל הצעות המחיר:`,
        ["יועץ", "סוג תשלום", "ערך", "סכום (₪)", "הערות"],
        tableRows.length > 0 ? tableRows : [["—","","","",""]],
        "יש להעביר את ההמלצה למזמין לאישור.\n\nבברכה,\nמערכת CostPilot",
        rowHighlights
      );
      setApprovalModal({ toEmail: projectMeta.tendersManagerEmail||"", toName: projectMeta.tendersManager, subject, body, htmlBody });
      break;
    }
  }, [rows]);

  const updateFieldName = (fieldId, name) => {
    setRows(rows.map(r => r.id === fieldId ? { ...r, fieldName: name } : r));
  };

  const updateFieldProp = (fieldId, key, val) => {
    const ts = key === "readyToRecommend" && val ? { recommendPendingSince: Date.now() } : {};
    setRows(rows.map(r => r.id === fieldId ? { ...r, [key]: val, ...ts } : r));
    if (key === "readyToRecommend" && val && projectMeta) {
      const field = rows.find(r => r.id === fieldId);
      if (field) {
        const subject = `בחירת יועץ מומלץ — ${field.fieldName} — ${projectMeta.name}`;
        const cEst = Number(String((openingData||{}).contractorEst||"").replace(/,/g,"")) || Number((budgetState||{}).contractorEst||0);
        const devPct = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);
        const archBase = cEst - cEst * devPct / 100;
        const calcFee = c => {
          const pct = Number(c.value||0) / 100;
          const fn = field.fieldName || "";
          if (!cEst || !pct) return 0;
          if (["אדריכל","אדריכלות","אדריכלים"].includes((fn||"").trim())) return archBase * pct;
          if (fn.includes("מנהל פרויקט")) return cEst * pct;
          const pp = Number((statsRows||[]).find(r=>r.field===fn)?.pct||0)/100;
          return cEst * pp * pct;
        };
        const consultants = (field.consultants||[]).filter(c => c.name);
        const tableRows = consultants.map(c => {
          const fee = c.payType === "אחוזים" ? calcFee(c) : null;
          return [
            c.name || "—",
            c.payType || "—",
            c.payType === "אחוזים" ? `${c.value || 0}%` : fmt(c.value),
            fee ? fmt(fee) : (c.payType !== "אחוזים" ? fmt(c.value) : "—"),
            c.notes || ""
          ];
        });
        const body = `שלום ${projectMeta.domainManager || ""},\n\nתחום "${field.fieldName}" בפרויקט "${projectMeta.name}" מוכן לבחירת יועץ מומלץ.\n\nיועצים: ${consultants.map(c=>c.name).join(", ")}\n\nאנא היכנסו למערכת ובחרו יועץ מומלץ.\n\nבברכה`;
        const htmlBody = buildEmailHtml(
          `שלום ${projectMeta.domainManager || ""},\n\nתחום "${field.fieldName}" בפרויקט "${projectMeta.name}" מוכן לבחירת יועץ מומלץ.\n\nלהלן הצעות היועצים:`,
          ["יועץ", "סוג תשלום", "ערך", "סכום (₪)", "הערות"],
          tableRows.length > 0 ? tableRows : [["אין יועצים","","","",""]],
          "אנא היכנסו למערכת ובחרו יועץ מומלץ.\n\nבברכה,\nמערכת CostPilot"
        );
        setApprovalModal({ toEmail: projectMeta.domainManagerEmail || "", toName: projectMeta.domainManager, subject, body, htmlBody });
      }
    }
  };

  const updateFieldWorkScope = (fieldId, val) => {
    setRows(rows.map(r => r.id === fieldId ? { ...r, workScope: val } : r));
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      {approvalModal && (
        <ApprovalEmailModal {...approvalModal}
          onSent={() => setApprovalModal(null)}
          onCancel={() => setApprovalModal(null)} />
      )}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <h2 style={{ fontSize:18, fontWeight:800, color:"#1e293b" }}>הצעות מחיר יועצים</h2>
        <PrimaryButton onClick={() => setShowNewField(true)}>+ הוסף תחום חדש</PrimaryButton>
      </div>

      {rows.length > 0 && (
        <input
          type="text" value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="חיפוש חופשי — שם יועץ, תחום..."
          style={{ width:"100%", padding:"8px 14px", border:"1.5px solid #e2e8f0", borderRadius:10, fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none", background:"#f8fafc", color:"#1e293b", direction:"rtl", boxSizing:"border-box" }}
        />
      )}

      {showNewField && (
        <FieldSearchInput
          availableFields={availableFields}
          onSelect={f => { const firstId = Date.now(); setRows([{ id: firstId - 1, fieldName: f, workScope: ((workScopes||{})[companyId]||{})[f] || "", consultants: [{ ...{ id:0, name:"", payType:"אחוזים", value:"", notes:"", recommended:false, approved:false, sentToMunicipality:false, contact:"", phone:"", phone2:"", email:"" }, id: firstId, createdAt: firstId }] }, ...rows]); setShowNewField(false); setNewFieldName(""); }}
          onCancel={() => { setShowNewField(false); setNewFieldName(""); }}
        />
      )}

      {rows.length === 0 && (
        <Card style={{ textAlign:"right", padding:40, color:"#94a3b8" }}>
          <div style={{ fontSize:32, marginBottom:10 }}>📋</div>
          <div style={{ fontSize:15, fontWeight:600 }}>אין תחומים עדיין</div>
          <div style={{ fontSize:13, marginTop:4 }}>לחץ "הוסף תחום חדש" כדי להתחיל</div>
        </Card>

      {rows.filter(field => {
        if (!search.trim()) return true;
        const q = search.trim().toLowerCase();
        if ((field.fieldName||'').toLowerCase().includes(q)) return true;
        return (field.consultants||[]).some(c => (c.name||'').toLowerCase().includes(q));
      }).map(field => (
        <FieldGroup
          key={field.id}
          field={field}
          suppliers={suppliers}
          onDelete={() => delField(field.id)}

          onRename={name => updateFieldName(field.id, name)}
          onToggleReady={val => updateFieldProp(field.id, "readyToRecommend", val)}

          statsRows={statsRows}
          projectName={projectName}
          projectNumber={projectNumber}
          companyName={companyName}
          companyId={companyId}
          workScopes={workScopes}
        />
      ))}
    </div>
  );
}

function FieldGroup({ field, onDelete, onUpdateConsultants, onRename, suppliers, onToggleReady, isHighlighted, budgetState, openingData, statsRows, projectName, projectNumber, companyName, companyId, workScopes, onUpdateWorkScope }) {
  const emptyC = { id:0, name:"", payType:"אחוזים", value:"", notes:"", recommended:false, approved:false, sentToMunicipality:false,

  const [mailToast, setMailToast] = useState(false);
  const [pdfGenerating, setPdfGenerating] = useState(false);
  const [newestId, setNewestId] = useState(() => {
    const last = field.consultants[field.consultants.length - 1];
    return last && !last.name ? last.id : null;

  const updateSubItem = (cId, itemId, key, val) => updateC(cId, "subItems", (field.consultants.find(x=>x.id===cId)?.subItems||[]).map(it => it.id===itemId ? {...it,[key]:val} : it));
  const delSubItem = (cId, itemId) => updateC(cId, "subItems", (field.consultants.find(x=>x.id===cId)?.subItems||[]).filter(it=>it.id!==itemId));
  const cardRef = React.useRef(null);

  React.useEffect(() => {
    if (isHighlighted && cardRef.current) {
      setTimeout(() => {
        cardRef.current?.scrollIntoView({ behavior:"smooth", block:"center" });
      }, 120);
    }
  }, [isHighlighted]);

  const addConsultant = () => {
    const newId = Date.now();
    onUpdateConsultants([...field.consultants, { ...emptyC, id: newId, createdAt: newId }]);
    setNewestId(newId);
  };

  const delConsultant = id => onUpdateConsultants(field.consultants.filter(c => c.id !== id));

  const updateC = (id, key, val) => {
    onUpdateConsultants(field.consultants.map(c => c.id === id ? { ...c, [key]: val } : c));
  };


  const buildFieldMailData = () => {
    const bccEmails = [];
    (field.consultants||[]).forEach(c => {
      if (!c.recommended) {
        const sup = (suppliers||[]).find(s => s.name === c.name || (s.contacts||[]).some(ct => ct.email && ct.email === c.email));
        let email = c.email || "";
        if (!email && sup) { const ct = (sup.contacts||[]).find(ct => ct.email); if (ct) email = ct.email; }
        if (email && !bccEmails.includes(email)) bccEmails.push(email);
      }
    });
    const fmtNum = v => { const n = Number(String(v||"").replace(/,/g,"")); return n ? n.toLocaleString("en-US") : null; };
    const fmtDate = v => { if (!v) return null; const p = String(v).match(/^(\d{4})-(\d{2})-(\d{2})$/); return p ? `${p[3]}/${p[2]}/${p[1]}` : v; };
    const d = openingData || {};
    const val = v => (v && String(v).trim()) ? String(v).trim() : "—";
    const lines = [
      "שלום רב,",
      "",
      "אנו מזמינים אתכם להגיש הצעת מחיר עבור הפרויקט הבא:",
      "",
      `שם הפרויקט: ${val(projectName)}`,
      `כתובת: ${val(d.address)}`,
      `מהות העבודה: ${val(d.workDescription)}`,
      `תאריך התחלה: ${fmtDate(d.startDate) || "—"}`,
      `תאריך סיום: ${fmtDate(d.endDate) || "—"}`,
      `שטח החלקה: ${d.plotArea ? d.plotArea + ' מ"ר' : "—"}`,
      `שטח המבנה: ${d.buildingArea ? d.buildingArea + ' מ"ר' : "—"}`,
      `אומדן קבלני: ${fmtNum(d.contractorEst) ? fmtNum(d.contractorEst) + " ₪" : "—"}`,
      `כמות מעליות: ${val(d.elevators)}`,
      `כמות עצים: ${val(d.trees)}`,
      `שימוש ב-BIM: ${d.bim === false ? "לא" : "כן"}`,
    ];
    const body = lines.join("\n");
    const subject = `הזמנה להגשת הצעת מחיר - ${projectName || "פרויקט"} - ${field.fieldName}`;
    const bcc = bccEmails.join(";");
    const mailtoLink = `mailto:?bcc=${encodeURIComponent(bcc)}&subject=${encodeURIComponent(subject)}`;
    return { bcc, bccEmails, subject, body, mailtoLink };
  };

  const getScopeText = () =>
    (((workScopes||{})[String(companyId||"")]||{})[field.fieldName] || field.workScope || "");

  const buildPdfBase64 = async (scopeText, consultants) => {
    if (!scopeText) return null;
    if (!window.html2canvas || !window.jspdf) { alert("ספריות PDF לא נטענו. רענן את הדף ונסה שנית."); return null; }
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation:"p", unit:"pt", format:"a4" });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const pages = (consultants && consultants.length > 0) ? consultants : [null];
    for (let pi = 0; pi < pages.length; pi++) {
      const consultant = pages[pi];
      const consultantName = consultant ? (consultant.name || "") : "";
      const escaped = scopeText.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const escapedConsultant = consultantName.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const div = document.createElement("div");
      div.style.cssText = "position:absolute;top:0;left:-9999px;width:794px;padding:56px 60px;background:#fff;direction:rtl;font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.9;color:#1e293b;box-sizing:border-box";
      div.innerHTML = `
        <h2 style="font-size:19px;font-weight:700;margin:0 0 6px">${field.fieldName} — תכולת עבודה</h2>
        ${companyName ? `<div style="font-size:13px;color:#64748b;margin-bottom:4px">חברה עירונית: ${companyName}</div>` : ''}
        ${projectName ? `<div style="font-size:13px;color:#64748b;margin-bottom:24px">פרויקט: ${projectName}</div>` : '<div style="margin-bottom:24px"></div>'}
        <div style="white-space:pre-wrap;margin-bottom:36px;font-size:13.5px">${escaped}</div>
        <div style="border-top:2px solid #1e293b;padding-top:20px">
          <div style="font-weight:700;font-size:15px;margin-bottom:14px">בקשה להגשת הצעת מחיר</div>
          <div style="margin-bottom:10px">שם החברה / היועץ: <span style="display:inline-block;border-bottom:1px solid #000;min-width:220px;padding:0 6px">${escapedConsultant || "&nbsp;"}</span></div>
          <div style="margin-bottom:10px">סכום הצעת המחיר: <span style="display:inline-block;border-bottom:1px solid #000;min-width:180px">&nbsp;</span> ₪ (כולל מע&quot;מ)</div>
          <div style="margin-bottom:10px">תאריך הגשה: <span style="display:inline-block;border-bottom:1px solid #000;min-width:160px">&nbsp;</span></div>
          <div style="margin-bottom:10px">חתימה: <span style="display:inline-block;border-bottom:1px solid #000;min-width:200px">&nbsp;</span></div>
        </div>`;
      document.body.appendChild(div);
      try {
        const canvas = await window.html2canvas(div, { scale:2, useCORS:true, backgroundColor:"#ffffff", logging:false });
        document.body.removeChild(div);
        if (pi > 0) pdf.addPage();
        const imgData = canvas.toDataURL("image/png");
        const imgH = canvas.height * pageW / canvas.width;
        if (imgH <= pageH) {
          pdf.addImage(imgData, "PNG", 0, 0, pageW, imgH);
        } else {
          let yOffset = 0;
          while (yOffset < imgH) {
            if (yOffset > 0) pdf.addPage();
            pdf.addImage(imgData, "PNG", 0, -yOffset, pageW, imgH);
            yOffset += pageH;
          }
        }
      } catch(e) {
        if (document.body.contains(div)) document.body.removeChild(div);
        console.error("שגיאה ביצירת PDF:", e);
        return null;
      }
    }
    return pdf.output("datauristring").split(",")[1]; // raw base64
  };

  const toUtf8Base64 = str => {
    const bytes = new TextEncoder().encode(str);
    let binary = ""; bytes.forEach(b => binary += String.fromCharCode(b));
    return btoa(binary);
  };

  const downloadScopeEml = () => {
    const { bccEmails, subject, body } = buildFieldMailData();
    const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const html = `<div dir="rtl" style="font-family:Arial,sans-serif;font-size:13px;direction:rtl;text-align:right">${
      body.split("\n").map(l => l.trim() ? `<p style="margin:2px 0">${esc(l)}</p>` : `<p style="margin:5px 0"> </p>`).join("")
    }</div>`;
    const onCopy = e => { e.clipboardData.setData("text/html", html); e.clipboardData.setData("text/plain", body); e.preventDefault(); };
    document.addEventListener("copy", onCopy);
    document.execCommand("copy");
    document.removeEventListener("copy", onCopy);
    window.location.href = `mailto:?bcc=${encodeURIComponent(bccEmails.join(";"))}&subject=${encodeURIComponent(subject)}`;
  };

  const fieldSuppliers = (suppliers||[]).filter(s => s.field === field.fieldName);

          <button onClick={() => { setEmailCopied(false); setShowEmailModal(true); }}

          <DeleteButton onClick={onDelete} />

        {(() => {

          return (

          <thead>
            <tr style={{ borderBottom:"2px solid #e8edf4", background:"#fafbfd" }}>
              {[

                { h:"סוג תשלום", w:undefined },

                <th key={hi} style={{ padding:"9px 8px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11, whiteSpace:"normal", lineHeight:1.3, maxWidth:w, width:w, verticalAlign:"bottom" }}>{h}</th>

            {field.consultants.length === 0 && (

            {field.consultants.map((c, i) => (
              <React.Fragment key={c.id}>

                <td style={{ padding:"10px 12px", textAlign:"right" }}>

                <td style={{ padding:"10px 12px", minWidth:110 }}>
                  <select value={c.payType} onChange={e => updateC(c.id,"payType",e.target.value)}

                    {(c.subItems&&c.subItems.length>0) ? (

                        style={{ background:"transparent", border:"1px solid #e2e8f0", borderRadius:6, padding:"5px 7px", fontSize:13, color:"#1e293b", fontFamily:"'Heebo',sans-serif", outline:"none", width:65, textAlign:"right" }}

                    {c.payType!=="אחוזים" && (
                      <button onClick={()=>toggleSubs(c.id)} title="פירוט סעיפים"
                        style={{ background: expandedSubs[c.id]?"#e0f2fe": (c.subItems&&c.subItems.length>0)?"#fff7ed":"none",
                          border: `1px solid ${(c.subItems&&c.subItems.length>0)?"#f97316":"#cbd5e1"}`,

                  </div>
                </td>
                {/* סכום בש"ח (רק כשיש שורות אחוזים) */}
                {showAmtCol && (

                    const devPct = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);

                    return fee ? <span style={{ fontSize:12, color:"#475569" }}>{fmt(fee)}</span> : <span style={{ fontSize:11, color:"#94a3b8" }}>—</span>;

                {/* הערות */}

                        <input type="checkbox" checked={!!it.planOnly} onChange={e=>updateSubItem(c.id,it.id,"planOnly",e.target.checked)} style={{ cursor:"pointer" }} />

                      <button onClick={()=>delSubItem(c.id,it.id)} style={{ background:"none", border:"none", cursor:"pointer", color:"#ef4444", fontSize:14, padding:"2px 4px" }}>🗑️</button>
                    </td>

                      style={{ background:"none", border:"1px dashed #cbd5e1", borderRadius:6, padding:"2px 10px", fontSize:11, color:"#64748b", cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>

        return (
          <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.45)", zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center" }}
               onClick={() => setShowEmailModal(false)}>
            <div style={{ background:"#fff", borderRadius:14, padding:28, maxWidth:620, width:"95%", maxHeight:"90vh", overflowY:"auto", boxShadow:"0 8px 40px rgba(0,0,0,0.18)", direction:"rtl", fontFamily:"'Heebo',sans-serif" }}
                 onClick={e => e.stopPropagation()}>
              <div style={{ fontWeight:800, fontSize:17, marginBottom:14, color:"#1e293b" }}>הזמנה להגשת הצ"מ — {field.fieldName}</div>

              <div style={{ marginBottom:8, fontSize:13 }}>
                <span style={{ fontWeight:700, color:"#475569" }}>BCC ({bccEmails.length} יועצים): </span>

                     : <span style={{ color:"#ef4444", fontWeight:600 }}>לא נמצאו יועצים ללא המלצה עם כתובת מייל בתחום זה</span>}

              </div>

              <div style={{ marginBottom:4, fontSize:12, fontWeight:700, color:"#475569" }}>גוף המייל:</div>
              <div style={{ background:"#f8fafc", border:"1.5px solid #e2e8f0", borderRadius:8, padding:"12px 14px", fontSize:13, whiteSpace:"pre-wrap", direction:"rtl", textAlign:"right", maxHeight:180, overflowY:"auto", color:"#1e293b", lineHeight:1.7, marginBottom:12 }}>
                {body}
              </div>

              <div style={{ display:"flex", gap:10, justifyContent:"flex-end", flexWrap:"wrap" }}>
                <button onClick={() => setShowEmailModal(false)}
                  style={{ padding:"8px 18px", borderRadius:8, border:"1.5px solid #e2e8f0", background:"#f8fafc", fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:"'Heebo',sans-serif", color:"#475569" }}>
                  סגור
                </button>
                <button onClick={downloadScopeEml}
                  style={{ padding:"8px 22px", borderRadius:8, border:"none", background:"#2563eb", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"'Heebo',sans-serif", color:"#fff" }}>
                  📧 פתח ב-Outlook
                </button>
              </div>
              <div style={{ marginTop:8, padding:"8px 12px", background:"#fffbeb", border:"1px solid #fde68a", borderRadius:7, fontSize:12, color:"#92400e", textAlign:"right" }}>
                לאחר פתיחת Outlook — הדבק את הגוף בשדה הטקסט (Ctrl+V)
              </div>
            </div>
          </div>
        );
      })()}
    </Card>
  );
}

// ── Tab: רשימת יועצים ─────────────────────────────────────────────────────────
function ConsultantModal({ consultant, onClose, onSave, budgetState, statsRows, scrollToIncreaseId, suppliers, openingData, setOpeningData, projectMeta }) {
  const [inc, setInc] = useState({ reason:"", amount:"", date:"", planOnly:false });
  const [increases, setIncreases] = useState(consultant?.increases || []);
  const [approvalModal, setApprovalModal] = useState(null);
  const [showEstForm, setShowEstForm] = useState(false);
  const [newEstAmount, setNewEstAmount] = useState("");
  const [newSectAmount, setNewSectAmount] = useState("");
  const [estDate, setEstDate] = useState(new Date().toISOString().split("T")[0]);

  const initContacts = () => {
    if (consultant?.contacts?.length > 0) return consultant.contacts;
    const sm = (suppliers||[]).find(s => s.name === consultant?.name);
    if (sm && sm.contacts?.length > 0) return sm.contacts.map(c => ({ ...c, name: c.contact||c.name||"", isFromSupplier:true }));
    return [{ id:Date.now(), name:"", phone:"", phone2:"", email:"", isFromSupplier:false }];
  };
  const [contacts, setContacts] = useState(initContacts);
  const [exportNotes, setExportNotes] = useState(consultant?.exportNotes || "");
  const supplierMatch = (suppliers||[]).find(s => s.name === consultant?.name);

  React.useEffect(() => { setIncreases(consultant?.increases || []); }, [consultant?.id]);

  if (!consultant) return null;

  const saveContacts = (newContacts, patch={}) => {
    setContacts(newContacts);
    onSave({ ...consultant, increases, contacts: newContacts, exportNotes, ...patch });
  };
  const addContact = () => saveContacts([...contacts, { id:Date.now(), name:"", phone:"", phone2:"", email:"", isFromSupplier:false }]);
  const delContact = id => saveContacts(contacts.filter(c => c.id !== id));
  const updContact = (id, key, val) => saveContacts(contacts.map(c => c.id===id ? {...c,[key]:val} : c));

  const saveIncreases = (newInc) => {
    setIncreases(newInc);
    onSave({ ...consultant, increases: newInc, contacts, exportNotes });
  };

  const baseVal   = Number(consultant.value || 0);
  // Only approved increases count toward totals
  const totalInc  = increases.filter(x => x.approvedIncrease).reduce((s,x) => s + Number(x.amount||0), 0);

  React.useEffect(() => {
    if (scrollToIncreaseId) {
      setTimeout(() => {
        const el = document.getElementById("inc-" + scrollToIncreaseId);
        if (el) { el.scrollIntoView({ behavior:"smooth", block:"center" }); el.style.outline="2px solid #3b82f6"; setTimeout(()=>el.style.outline="",1500); }
      }, 350);
    }
  }, [scrollToIncreaseId]);

  // ── Architect calculation ───────────────────────────────────────────────────
  const isArchitect = ["אדריכל","אדריכלות","אדריכלים"].includes((consultant.role||"").trim()) && consultant.payType === "אחוזים";
  const archCalc = (() => {
    if (!isArchitect) return null;
    const contractorEst = Number(String((openingData||{}).contractorEst||"").replace(/,/g,"")) || Number((budgetState||{}).contractorEst || 0);
    if (!contractorEst) return null;
    const devPct    = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);
    const devAmount = contractorEst * devPct / 100;
    const archBaseAuto = contractorEst - contractorEst * devPct / 100;
    // השתמש בערך ידני מפתיחת פרויקט אם קיים
    const manualArchBaseRaw = String(openingData?.archBase||"").replace(/[,\s]/g,"").replace(/[^\d.]/g,"");
    const manualArchBase = manualArchBaseRaw ? Number(manualArchBaseRaw) : 0;
    const archBase = manualArchBase > 0 ? manualArchBase : archBaseAuto;
    const archPct   = Number(consultant.value || 0);
    const archFee   = archBase * archPct / 100;
    return { contractorEst, devPct, devAmount, archBase, archBaseAuto, archPct, archFee, manualBase: manualArchBase > 0 };
  })();

  // ── Project Manager calculation ──────────────────────────────────────────────
  const isPM = (consultant.role||"").includes("מנהל פרויקט") && consultant.payType === "אחוזים";
  const pmCalc = (() => {
    if (!isPM) return null;
    const contractorEst = Number((budgetState||{}).contractorEst || 0);
    if (!contractorEst) return null;
    const pmPct = Number(consultant.value || 0);
    const pmFee = contractorEst * pmPct / 100;
    return { contractorEst, pmPct, pmFee };
  })();

  // ── Other consultants (pct, not arch/PM) calculation ────────────────────────
  const isOtherPct = consultant.payType === "אחוזים" && !isArchitect && !isPM;
  const otherCalc = (() => {
    if (!isOtherPct) return null;
    const contractorEst = Number((budgetState||{}).contractorEst || 0);
    if (!contractorEst) return null;
    const profPct    = Number((statsRows||[]).find(r => r.field === consultant.role)?.pct || 0);
    if (!profPct) return { contractorEst, profPct: 0, profBase: 0, conPct: Number(consultant.value||0), conFee: 0, noProfPct: true };
    const profBase   = contractorEst * profPct / 100;
    const conPct     = Number(consultant.value || 0);
    const conFee     = profBase * conPct / 100;
    return { contractorEst, profPct, profBase, conPct, conFee, noProfPct: false };
  })();

  const calcSupplement = (newEst) => {
    // הערך הישן = הערך האחרון בהיסטוריה, או הבסיס המקורי מפתיחת הפרויקט
    const getOldBase = (histKey, fallback) => {
      const hist = (consultant[histKey]||[]).length > 0 ? consultant[histKey] : (openingData?.[histKey] || []);
      return hist.length > 0 ? Number(hist[hist.length-1].amount) : fallback;
    };
    if (isArchitect && archCalc) {
      if (!newEst) return 0;
      const oldBase = getOldBase("archBaseHistory", archCalc.archBase);
      if (!oldBase) return 0;
      return (newEst - oldBase) * archCalc.archPct / 100;
    }
    if (isOtherPct && otherCalc && !otherCalc.noProfPct) {
      const newSect = Number(String(newSectAmount).replace(/[,\s]/g,"").replace(/[^\d.]/g,""));
      if (!newSect) return 0;
      const oldSect = getOldBase("sectionEstHistory", Math.round(otherCalc.profBase));
      if (!oldSect) return 0;
      return (newSect - oldSect) * otherCalc.conPct / 100;
    }
    if (!newEst) return 0;
    const oldEst = getOldBase("contractorEstHistory", Number(String(openingData?.contractorEst||"").replace(/,/g,"")));
    if (!oldEst) return 0;
    const diff = newEst - oldEst;
    if (!diff) return 0;
    if (isPM && pmCalc) return diff * pmCalc.pmPct / 100;
    return 0;
  };

  const saveNewEst = () => {
    const newEst = Number(String(newEstAmount).replace(/[,\s]/g,"").replace(/[^\d.]/g,""));

    // ─── isOtherPct: שמור אומדן פרק ישיר ב-sectionEstHistory ───
    if (isOtherPct && otherCalc && !otherCalc.noProfPct) {
      const newSect = Number(String(newSectAmount).replace(/[,\s]/g,"").replace(/[^\d.]/g,""));
      if (!newSect || !estDate) return;
      const histKey = "sectionEstHistory";
      const existingHist = (consultant[histKey]||[]).length > 0 ? consultant[histKey] : (openingData?.[histKey] || []);
      const origBase = Math.round(otherCalc.profBase);
      const oldBase = existingHist.length > 0 ? Number(existingHist[existingHist.length-1].amount) : origBase;
      const history = [...existingHist];
      if (history.length === 0 && origBase) history.push({ amount: origBase, effectiveDate: openingData?.contractorEstDate || "—", note:"ראשוני" });
      history.push({ amount: newSect, effectiveDate: estDate, note:"" });
      const currentFee = otherCalc.conFee || 0;
      const contractFee = consultant.contractFee || (currentFee > 0 ? currentFee : undefined);
      const supplement = calcSupplement(newEst);
      const reasonLabel = `${oldBase.toLocaleString("he-IL")} ← ${newSect.toLocaleString("he-IL")} ₪`;
      const newIncrease = supplement !== 0 ? {
        reason: `עדכון אומדן פרק: ${reasonLabel}`,
        amount: supplement.toFixed(2), date: estDate, planOnly: false,
        id: Date.now(), createdAt: Date.now(),
        sentToManager:false, sentToMunicipality:false, approvedIncrease:false,
      } : null;
      const newIncreases = newIncrease ? [...increases, newIncrease] : increases;
      if (newIncrease) setIncreases(newIncreases);
      onSave({ ...consultant, increases: newIncreases, contacts, exportNotes, [histKey]: history, ...(contractFee ? { contractFee } : {}) });
      setShowEstForm(false); setNewEstAmount(""); setNewSectAmount("");
      return;
    }

    if (!newEst || !estDate) return;

    // ─── ערכי הבסיס בפתיחת פרויקט לא משתנים לעולם ───
    // ההיסטוריה נשמרת ברמת היועץ (לא ב-openingData)
    const histKey = isArchitect ? "archBaseHistory" : "contractorEstHistory";
    const existingHist = (consultant[histKey]||[]).length > 0 ? consultant[histKey] : (openingData?.[histKey] || []);

    // ערך ראשוני להיסטוריה (מפתיחת הפרויקט — לא משתנה)
    const origBase = isArchitect
      ? archCalc.archBase
      : Number(String(openingData?.contractorEst||"").replace(/,/g,""));

    // הערך הישן לתיאור ההגדלה = האחרון בהיסטוריה, או הבסיס המקורי
    const oldBase = existingHist.length > 0
      ? Number(existingHist[existingHist.length-1].amount)
      : origBase;

    const history = [...existingHist];
    if (history.length === 0 && origBase) history.push({ amount: origBase, effectiveDate: openingData?.contractorEstDate || "—", note:"ראשוני" });
    history.push({ amount: newEst, effectiveDate: estDate, note:"" });

    // ההיסטוריה נשמרת ביועץ עצמו — openingData לא משתנה

    // קפא את סכום החוזה פעם אחת בלבד (בהגדרה הראשונה)
    const currentFee = (isArchitect && archCalc?.archFee) || (isPM && pmCalc?.pmFee) || (isOtherPct && otherCalc?.conFee) || 0;
    const contractFee = consultant.contractFee || (currentFee > 0 ? currentFee : undefined);

    const supplement = calcSupplement(newEst);
    const reasonLabel = isOtherPct && otherCalc?.profPct
      ? `${Math.round(oldBase * otherCalc.profPct / 100).toLocaleString("he-IL")} ← ${Math.round(newEst * otherCalc.profPct / 100).toLocaleString("he-IL")} ₪`
      : `${oldBase.toLocaleString("he-IL")} ← ${newEst.toLocaleString("he-IL")} ₪`;

    const newIncrease = supplement !== 0 ? {
      reason: `עדכון אומדן ${isOtherPct ? "פרק" : "קבלני"}: ${reasonLabel}`,
      amount: supplement.toFixed(2), date: estDate, planOnly: false,
      id: Date.now(), createdAt: Date.now(),
      sentToManager:false, sentToMunicipality:false, approvedIncrease:false,
    } : null;
    const newIncreases = newIncrease ? [...increases, newIncrease] : increases;
    if (newIncrease) setIncreases(newIncreases);
    onSave({ ...consultant, increases: newIncreases, contacts, exportNotes, [histKey]: history, ...(contractFee ? { contractFee } : {}) });

    setShowEstForm(false);
    setNewEstAmount("");
    setNewSectAmount("");
  };

  const addIncrease = () => {
    if (!inc.reason.trim() || !inc.amount) return;
    saveIncreases([...increases, { ...inc, id: Date.now(), createdAt: Date.now(), sentToManager: false, sentToMunicipality: false, approvedIncrease: false }]);
    setInc({ reason:"", amount:"", date:"", planOnly:false });
  };
  const delIncrease    = id  => saveIncreases(increases.filter(x => x.id !== id));
  const updateIncrease = (id, key, val) => {
    saveIncreases(increases.map(x => x.id === id ? { ...x, [key]: val } : x));
    if (key === "sentToManager" && val && projectMeta?.unitManagerEmail) {
      const increase = increases.find(x => x.id === id);
      if (increase) {
        const approvedInc = increases.filter(x => x.approvedIncrease).reduce((s,x) => s + Number(x.amount||0), 0);
        const newTotal = Number(consultant.contractFee||0) + approvedInc + Number(increase.amount||0);
        const subject = `CostPilot — בקשת הגדלה ממתינה לאישורך — ${projectMeta.name || ""}`;
        const details = `פרויקט: ${projectMeta.name || ""}\nיועץ: ${consultant.name || ""}\nסכום התקשרות קיים: ${fmt(consultant.contractFee||0)}\nסיבת ההגדלה: ${increase.reason || "—"}\nסכום ההגדלה: ${fmt(increase.amount)}\nסכום כולל חדש: ${fmt(newTotal)}`;
        const body = `שלום ${projectMeta.unitManager || ""},\n\nבקשת הגדלה ממתינה לאישורך כמנהל יחידה.\n\n${details}\n\nאנא היכנסו למערכת ואשרו.\n\nבברכה`;
        const htmlBody = buildEmailHtml(
          `שלום ${projectMeta.unitManager || ""},\n\nבקשת הגדלה עבור יועץ "${consultant.name || ""}" בפרויקט "${projectMeta.name || ""}" ממתינה לאישורך כמנהל יחידה.`,
          ["פרט", "סכום"],
          [
            ["סכום התקשרות קיים", fmt(consultant.contractFee||0)],
            ["סיבת ההגדלה", increase.reason || "—"],
            ["סכום ההגדלה", fmt(increase.amount)],
            ["סכום כולל חדש", fmt(newTotal)]
          ],
          "אנא היכנסו למערכת ואשרו את ההגדלה.\n\nבברכה,\nמערכת CostPilot"
        );
        setApprovalModal({ toEmail: projectMeta.unitManagerEmail, toName: projectMeta.unitManager, subject, body, htmlBody });
      }
    }
  };

  return (
    <>
    {approvalModal && (
      <ApprovalEmailModal {...approvalModal}
        onSent={() => setApprovalModal(null)}
        onCancel={() => setApprovalModal(null)} />
    )}
    <div style={{ position:"fixed", inset:0, background:"#00000060", display:"flex", alignItems:"center", justifyContent:"center", zIndex:2000, padding:20 }}
      onClick={onClose}>
      <div style={{ background:"#fff", borderRadius:18, width:"100%", maxWidth:700, maxHeight:"90vh", overflowY:"auto", boxShadow:"0 24px 64px #0004" }}
        onClick={e => e.stopPropagation()} className="fade" dir="rtl">

        {/* Header */}
        <div style={{ padding:"22px 26px 18px", borderBottom:"1px solid #e2e8f0", display:"flex", alignItems:"center", justifyContent:"space-between", direction:"rtl" }}>
          <div style={{ display:"flex", alignItems:"center", gap:14 }}>
            <div style={{ width:52, height:52, borderRadius:"50%", background:"linear-gradient(135deg,#3b82f6,#60a5fa)", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontSize:22, fontWeight:800 }}>
              {(consultant.name||"?")[0].toUpperCase()}
            </div>
            <div>
              <div style={{ fontSize:19, fontWeight:800, color:"#1e293b" }}>{consultant.name}</div>
              <div style={{ fontSize:13, color:"#64748b", marginTop:2 }}>{consultant.role}</div>
            </div>
          </div>
          <button onClick={onClose} style={{ background:"#f1f5f9", border:"none", borderRadius:8, width:34, height:34, fontSize:18, cursor:"pointer", color:"#64748b", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
        </div>

        <div style={{ padding:"22px 26px", display:"flex", flexDirection:"column", gap:20, direction:"rtl" }}>

          {/* Contact details — editable */}
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#94a3b8", letterSpacing:1, marginBottom:10, display:"flex", alignItems:"center", justifyContent:"space-between", direction:"rtl" }}>
              <span>אנשי קשר</span>
              <button onClick={addContact}
                style={{ fontSize:12, fontWeight:700, color:"#fff", background:"#475569", border:"none",
                  borderRadius:7, padding:"4px 12px", cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>
                + הוסף איש קשר
              </button>
            </div>

            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {contacts.map((ct, idx) => (
                <div key={ct.id} style={{ background:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:10, padding:"12px 14px" }}>
                  <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8, direction:"rtl" }}>
                    <span style={{ fontSize:11, fontWeight:700, color:"#64748b" }}>
                      {ct.isFromSupplier ? "🏢 ספק ראשי" : `👤 איש קשר ${idx+1}`}
                    </span>
                    {contacts.length > 1 && (
                      <button onClick={() => delContact(ct.id)}
                        style={{ background:"none", border:"none", cursor:"pointer", color:"#ef4444", fontSize:14, padding:"0 4px" }}>✕</button>
                    )}
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, direction:"rtl" }}>
                    {[
                      { label:"שם",    key:"name" },
                      { label:"טלפון", key:"phone" },
                      { label:"נייד",  key:"phone2" },
                      { label:"מייל",  key:"email" },
                    ].map(f => (
                      <div key={f.key} style={{ display:"flex", flexDirection:"column", gap:3 }}>
                        <div style={{ fontSize:11, color:"#94a3b8", fontWeight:600, textAlign:"right" }}>{f.label}</div>
                        <input value={ct[f.key]||""} onChange={e => updContact(ct.id, f.key, e.target.value)}
                          style={{ width:"100%", border:"1px solid #e2e8f0", borderRadius:7, padding:"7px 9px",
                            fontSize:13, fontFamily:"'Heebo',sans-serif", color:"#1e293b", outline:"none",
                            background:"#fff", boxSizing:"border-box", textAlign:"right", direction:"rtl" }}
                          onFocus={e => e.target.style.borderColor="#475569"}
                          onBlur={e  => e.target.style.borderColor="#e2e8f0"} />
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            <div style={{ marginTop:10 }}>
              <div style={{ fontSize:11, color:"#94a3b8", fontWeight:600, marginBottom:4 }}>הערות (לייצוא)</div>
              <input value={exportNotes} onChange={e => { setExportNotes(e.target.value); saveContacts(contacts, {exportNotes:e.target.value}); }}
                placeholder="הערות שיופיעו ברשימת היועצים..."
                style={{ width:"100%", border:"1px solid #e2e8f0", borderRadius:8, padding:"8px 10px",
                  fontSize:13, fontFamily:"'Heebo',sans-serif", color:"#1e293b", outline:"none",
                  background:"#f8fafc", boxSizing:"border-box" }}
                onFocus={e => e.target.style.borderColor="#3b82f6"}
                onBlur={e  => e.target.style.borderColor="#e2e8f0"} />
            </div>
          </div>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#94a3b8", letterSpacing:1, marginBottom:10 }}>סכום התקשרות</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10 }}>
              {[
                { label:"סכום מאושר ("+(consultant.payType||"אחוזים")+")", val: !consultant.value ? "לא הוזן" : consultant.payType==="אחוזים" ? (consultant.value+"%") : fmt(consultant.value), color:"#334155" },
                { label:"סה״כ הגדלות", val: totalInc !== 0 ? fmt(totalInc) : "—", color: totalInc < 0 ? "#dc2626" : "#d97706" },
                { label:"סה״כ כולל",   val: !consultant.value ? "לא הוזן" : consultant.payType==="אחוזים" ? (consultant.value+"% + "+fmt(totalInc)) : fmt(baseVal+totalInc), color:"#374151" },
              ].map(x => (
                <div key={x.label} style={{ background:"#f8fafc", borderRadius:10, padding:"12px 14px", textAlign:"right" }}>
                  <div style={{ fontSize:11, color:"#94a3b8", fontWeight:600, marginBottom:4 }}>{x.label}</div>
                  <div style={{ fontSize:17, fontWeight:800, color:x.color }}>{x.val}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Architect fee breakdown */}
          {isArchitect && archCalc && (
            <div>
              <div style={{ fontSize:12, fontWeight:700, color:"#94a3b8", letterSpacing:1, marginBottom:10 }}>פירוט חישוב שכר טרחה — אדריכל</div>
              <div style={{ background:"#f8fafc", borderRadius:12, border:"1px solid #e2e8f0", overflow:"hidden" }}>
                {(archCalc.manualBase ? [
                  { label:"בסיס לחישוב אדריכלות (ידני)", val: fmt(archCalc.archBase), bold:true },
                  { label:`אחוז שכר טרחה אדריכל (${archCalc.archPct}%)`, val: `${archCalc.archPct}%`, sign:"×" },
                  { label:"שכר טרחה בסיסי לאדריכל", val: fmt(archCalc.archFee), bold:true, separator:true },
                ] : [
                  { label:"אומדן קבלני (בסיס חישוב)", val: fmt(archCalc.contractorEst) },
                  { label:`אחוז עלות פיתוח (${archCalc.devPct}%)`, val: fmt(archCalc.devAmount), sign:"−", red:true },
                  { label:"בסיס לחישוב אדריכלות", val: fmt(archCalc.archBase), bold:true },
                  { label:`אחוז שכר טרחה אדריכל (${archCalc.archPct}%)`, val: `${archCalc.archPct}%`, sign:"×" },
                  { label:"שכר טרחה בסיסי לאדריכל", val: fmt(archCalc.archFee), bold:true, separator:true },
                ]).map((row,i,arr) => (

          {isArchitect && !archCalc && (

              <div style={{ background:"#f8fafc", borderRadius:12, border:"1px solid #e2e8f0", overflow:"hidden" }}>

                  <div key={i} style={{ display:"grid", gridTemplateColumns:"230px 1fr", alignItems:"center", padding:"9px 16px", borderTop:row.separator?"2px solid #e2e8f0":"none", borderBottom:i<2&&!row.separator?"1px solid #f1f5f9":"none" }}>
                    <span style={{ fontSize:13, color:"#374151", fontWeight:row.bold?700:400, textAlign:"right" }}>{row.label}</span>
                    <span style={{ fontSize:14, fontWeight:row.bold?800:600, color:"#1e293b", textAlign:"right" }}>
                      {row.val}{row.sign && <span style={{ marginLeft:6, color:"#64748b" }}> {row.sign}</span>}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {isPM && !pmCalc && (
            <div style={{ background:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:10, padding:"10px 16px", fontSize:13, color:"#374151" }}>
              ⚠️ יש להזין <strong>אומדן קבלני</strong> בלשונית תקציב הפרויקט כדי לחשב שכר טרחה
            </div>
          )}

          {/* Other consultant fee breakdown */}
          {isOtherPct && otherCalc && !otherCalc.noProfPct && (
            <div>
              <div style={{ fontSize:12, fontWeight:700, color:"#94a3b8", letterSpacing:1, marginBottom:10 }}>פירוט חישוב שכר טרחה — {consultant.role}</div>
              <div style={{ background:"#f8fafc", borderRadius:12, border:"1px solid #e2e8f0", overflow:"hidden" }}>
                {[
                  { label:"אומדן קבלני (בסיס)", val: fmt(otherCalc.contractorEst) },
                  { label:`אחוז פרק ${consultant.role} (${otherCalc.profPct}%)`, val: fmt(otherCalc.profBase) },
                  { label:`אחוז שכר טרחה יועץ (${otherCalc.conPct}%)`, val: `${otherCalc.conPct}%`, sign:"×" },
                  { label:"שכר טרחה בסיסי", val: fmt(otherCalc.conFee), bold:true, separator:true },
                ].map((row,i) => (
                  <div key={i} style={{ display:"grid", gridTemplateColumns:"230px 1fr", alignItems:"center", padding:"9px 16px", borderTop:row.separator?"2px solid #e2e8f0":"none", borderBottom:i<3&&!row.separator?"1px solid #f1f5f9":"none" }}>
                    <span style={{ fontSize:13, color:"#374151", fontWeight:row.bold?700:400, textAlign:"right" }}>{row.label}</span>
                    <span style={{ fontSize:14, fontWeight:row.bold?800:600, color:"#1e293b", textAlign:"right" }}>
                      {row.val}{row.sign && <span style={{ marginLeft:6, color:"#64748b" }}> {row.sign}</span>}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {isOtherPct && otherCalc && otherCalc.noProfPct && (
            <div style={{ background:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:10, padding:"10px 16px", fontSize:13, color:"#374151" }}>
              ⚠️ אחוז פרק <strong>{consultant.role}</strong> לא הוגדר בגיליון הסטטיסטיקה
            </div>
          )}
          {isOtherPct && !otherCalc && (
            <div style={{ background:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:10, padding:"10px 16px", fontSize:13, color:"#374151" }}>
              ⚠️ יש להזין <strong>אומדן קבלני</strong> בלשונית תקציב הפרויקט כדי לחשב שכר טרחה
            </div>
          )}

          {/* Contractor Estimate History */}
          {(isArchitect || isPM || isOtherPct) && (
            <div style={{ border:"1px solid #e2e8f0", borderRadius:10, padding:"12px 16px", background:"#f8fafc" }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
                <span style={{ fontSize:12, fontWeight:700, color:"#94a3b8", letterSpacing:1 }}>{isOtherPct && otherCalc && !otherCalc.noProfPct ? "היסטוריית אומדן פרק" : "היסטוריית אומדן קבלני"}</span>
                {setOpeningData && !showEstForm && (
                  <button onClick={() => { setNewEstAmount(""); setNewSectAmount(""); setEstDate(new Date().toISOString().split("T")[0]); setShowEstForm(true); }}
                    style={{ fontSize:11, fontWeight:700, color:"#fff", background:"#475569", border:"none", borderRadius:6, padding:"3px 10px", cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>
                    + עדכן אומדן / עלות פרק
                  </button>
                )}
              </div>
              {(() => {
                const useSection = isOtherPct && otherCalc && !otherCalc.noProfPct;
                const histKey = isArchitect ? "archBaseHistory" : useSection ? "sectionEstHistory" : "contractorEstHistory";
                const curVal = isArchitect
                  ? archCalc.archBase
                  : useSection
                    ? Math.round(otherCalc.profBase)
                    : Number(String(openingData?.contractorEst||"0").replace(/,/g,""));
                const hist = (consultant[histKey]||[]).length > 0 ? consultant[histKey] : (openingData?.[histKey] || []);
                const fmtDate = d => {
                  if (!d || d === "—") return openingData?.contractorEstDate
                    ? openingData.contractorEstDate.split("-").reverse().join("/")
                    : "—";
                  return d.split("-").reverse().join("/");
                };
                const delHistEntry = idx => {
                  const newHist = hist.filter((_,i) => i !== idx);
                  onSave({ ...consultant, [histKey]: newHist, increases, contacts, exportNotes });
                };
                return hist.length > 0 ? (
                  <div style={{ display:"flex", flexDirection:"column", gap:3, marginBottom: showEstForm?10:0 }}>
                    {hist.map((h,i) => (
                      <div key={i} style={{ display:"flex", gap:12, fontSize:12, color: i===(hist.length-1)?"#1e293b":"#94a3b8", alignItems:"center" }}>
                        <button onClick={() => delHistEntry(i)} title="מחק שורה"
                          style={{ background:"none", border:"none", color:"#ef4444", cursor:"pointer", fontSize:12, padding:"0 2px", lineHeight:1, flexShrink:0 }}>✕</button>
                        <span>{fmtDate(h.effectiveDate)}</span>
                        <span style={{ fontWeight:700 }}>{Number(h.amount).toLocaleString("he-IL")} ₪</span>
