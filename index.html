      <div style={{ overflowX:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13, direction:"rtl", tableLayout:"fixed" }}>
          <colgroup>
            <col style={{ width:"4%" }} />
            <col style={{ width:"24%" }} />
            <col style={{ width:"12%" }} />
            <col style={{ width:"16%" }} />
            <col style={{ width:"12%" }} />
            <col style={{ width:"20%" }} />
            <col style={{ width:"12%" }} />
          </colgroup>
          <thead>
            <tr style={{ background:"#f8fafc", borderBottom:"2px solid #e2e8f0" }}>
              <th style={{ padding:"8px 10px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}></th>
              <th style={{ padding:"8px 14px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>אבן דרך</th>
              <th style={{ padding:"8px 10px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>אחוז</th>
              <th style={{ padding:"8px 14px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>סכום בחוזה</th>
              <th style={{ padding:"8px 10px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>חשבון %</th>
              <th style={{ padding:"8px 14px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>חשבון מאושר (ש״ח)</th>
              <th style={{ padding:"8px 10px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>תכנון בלבד</th>
            </tr>
          </thead>
          <tbody>
            {items.map((m,i) => {
              const key     = (isIncrease?"i-":"m-")+m.id;
              const rawAmt  = isIncrease ? Number(m.amount||0) : sel.fee * Number(m.pct||0) / 100;
              const deduct  = (!isIncrease && negativeDeductions[key]) || 0;
              const baseAmt = rawAmt - deduct;
              const paid    = rowTotal(key);
              const paidPct = baseAmt ? (paid/baseAmt*100).toFixed(1) : "0";
              const isOpen  = expanded[key];
              const invs    = getInvoices(key);
              return (
                <React.Fragment key={m.id}>
                  {/* Milestone row */}
                  <tr style={{ borderBottom: isOpen?"none":"1px solid #f1f5f9", background: isOpen?"#f0f9ff": i%2===0?"#fff":"#fafbfd", cursor:"pointer" }}
                    onClick={()=>setExpanded(e=>({...e,[key]:!e[key]}))}>
                    <td style={{ padding:"10px 10px", textAlign:"right", color:"#334155", fontWeight:700, fontSize:16 }}>{isOpen?"∧":"+"}</td>
                    <td style={{ padding:"10px 14px", fontWeight:600, color:"#1e293b" }}>
                      {m.name||m.reason}
                    </td>
                    <td style={{ padding:"10px 14px", textAlign:"right", fontWeight:700, color:"#334155" }}>{isIncrease?100:m.pct}%</td>
                    <td style={{ padding:"10px 14px", textAlign:"right",   fontWeight:700 }}>{fmt(baseAmt)}</td>
                    <td style={{ padding:"10px 14px", textAlign:"right", fontWeight:600, color: Number(paidPct)>0?"#1e293b":"#94a3b8" }}>{paidPct}%</td>
                    <td style={{ padding:"10px 14px", textAlign:"right",   fontWeight:700, color: paid>0?"#1e293b":"#94a3b8" }}>{fmt(paid)}</td>
                    <td style={{ padding:"10px 14px", textAlign:"right" }}>
                      {m.planOnly ? <Badge color="#3b82f6">✓</Badge> : <span style={{color:"#e2e8f0"}}>—</span>}
                    </td>
                  </tr>

                  {/* Expanded invoices */}
                  {isOpen && (
                    <tr>
                      <td colSpan={7} style={{ padding:0, background:"#f8fafc", borderBottom:"2px solid #bfdbfe" }}>
                        <div style={{ padding:"10px 20px" }}>
                          <div style={{ fontSize:12, fontWeight:700, color:"#64748b", marginBottom:8 }}>
                            חשבונות עבור {m.name||m.reason}:
                          </div>
                          {invs.length > 0 && (
                            <div style={{ overflowX:"auto", marginBottom:10 }}>
                              <table style={{ borderCollapse:"collapse", fontSize:12, width:"100%" }}>
                                <thead>
                                  <tr style={{ background:"#e0f2fe", borderBottom:"1px solid #bae6fd" }}>
                                    {["מס׳ חשבון","ת. קבלה","סכום (ש״ח)","אחוז (%)","מנהל פרויקט","מנהל יחידה","אישור מזמין","הוחזר ליועץ","נדחה","סיבה","מחק"].map(h=>(
                                      <th key={h} style={{ padding:"5px 8px", textAlign:"right", color:"#0369a1", fontWeight:700, fontSize:10, whiteSpace:"nowrap" }}>{h}</th>
                                    ))}
                                  </tr>
                                </thead>
                                <tbody>
                                  {invs.map((inv,j)=>(
                                    <tr key={inv.id} id={"inv-row-"+inv.id} style={{ borderBottom:"1px solid #f1f5f9", background:j%2===0?"#fff":"#f0f9ff" }}>

                                        <input value={inv.invoiceNum||""} onChange={e=>updateInvoice(inv.id,{invoiceNum:e.target.value})}

                                      </td>

                            </div>

                          {noClaimsError && (

  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:18 }}>

      {/* ── Consultant selector ── */}
      <Card>
        <div style={{ fontWeight:700, color:"#1e293b", marginBottom:10, fontSize:15 }}>בחר יועץ לריכוז חשבונות</div>
        {consultantFees.length === 0
          ? <span style={{ color:"#94a3b8", fontSize:13 }}>אין יועצים מאושרים בפרויקט</span>
          : (() => {
              const [cSearch, setCSearch] = React.useState("");
              const filtered = consultantFees.filter(c =>
                c.field.toLowerCase().includes(cSearch.toLowerCase()) ||

              return (
                <div>

                      <input value={cSearch} onChange={e=>setCSearch(e.target.value)}

                      <div style={{ display:"flex", flexDirection:"column", gap:4, maxHeight:260, overflowY:"auto" }}>

                            <div style={{ width:36, height:36, borderRadius:9, background:"#f1f5f9", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>👤</div>
                            <div>
                              <div style={{ fontSize:11, color:"#94a3b8", fontWeight:700, marginBottom:1 }}>{c.field}</div>
                              <div style={{ fontSize:13, fontWeight:600, color:"#1e293b" }}>{c.name}</div>
                            </div>

                        ))}
                        {filtered.length === 0 && <div style={{ color:"#94a3b8", fontSize:13, padding:"8px 0" }}>לא נמצאו תוצאות</div>}
                      </div>
                    </>
                  ) : (
                    <div style={{ display:"flex", alignItems:"flex-start", gap:12 }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"9px 14px", borderRadius:9, border:"1.5px solid #3b82f6", background:"#f8fafc", flex:"0 0 50%", maxWidth:"50%" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                          <div style={{ width:36, height:36, borderRadius:9, background:"#f1f5f9", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>👤</div>
                          <div>
                            <div style={{ fontSize:11, color:"#334155", fontWeight:700, marginBottom:1 }}>{sel?.field}</div>
                            <div style={{ fontSize:13, fontWeight:600, color:"#1e293b" }}>{sel?.name}</div>
                          </div>
                        </div>
                        <button onClick={()=>{ setSelConsultant(null); setCSearch(""); }}
                          style={{ fontSize:12, color:"#64748b", background:"#f1f5f9", border:"none", borderRadius:6, padding:"4px 10px", cursor:"pointer" }}>
                          החלף
                        </button>
                      </div>
                      {/* עמודה ריקה באמצע */}
                      <div style={{ flex:1 }} />
                      {/* סיכום מספרי חשבונות */}
                      {(() => {
                        const byNum = {};
                        rows.filter(r => r.consultantName === sel?.name).forEach(inv => {
                          const num = inv.invoiceNum?.trim();
                          if (!num) return;
                          byNum[num] = (byNum[num]||0) + Number(inv.amount||0);
                        });
                        const entries = Object.entries(byNum).sort((a,b) => {
                          const na=Number(a[0]),nb=Number(b[0]);
                          return isNaN(na)||isNaN(nb)?a[0].localeCompare(b[0],'he'):na-nb;

                        if (!entries.length) return null;
                        return (
                          <div style={{ display:"flex", flexDirection:"column", gap:3, padding:"6px 0" }}>

                                חש׳ {num} — {fmt(total)}
                              </div>
                            ))}
                          </div>
                        );
                      })()}
                    </div>
                  )}
                </div>
              );
            })()
        }
      </Card>

      {sel && (
        <>
          {/* ── Consultant info ── */}
          <Card style={{ transition:"box-shadow .15s" }}>
            <div style={{ fontSize:11, color:"#94a3b8", fontWeight:600, marginBottom:6, textAlign:"right" }}>
              {sel?._consultantRowId && <span style={{ fontSize:11, color:"#475569", cursor:"pointer", textDecoration:"underline", textDecorationStyle:"dotted" }}
                onClick={() => onNavigate && onNavigate("consultants", sel._consultantRowId)}>← לחץ לפתיחת כרטיס יועץ</span>}
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:16, direction:"rtl" }}>
              <div style={{ display:"flex", flexDirection:"column", gap:3, textAlign:"right" }}>
                <div style={{ fontSize:11, color:"#94a3b8", fontWeight:700, marginBottom:2 }}>חשבונות בפרויקט</div>
                <div style={{ fontSize:13, color:"#374151" }}>מקצוע: <strong>{sel.field}</strong></div>
                {sel.contact && <div style={{ fontSize:13 }}>איש קשר: <a href={"mailto:"+sel.email} style={{color:"#334155"}}>{sel.contact}</a></div>}
                {sel.email   && <div style={{ fontSize:13, color:"#374151" }}>אימייל: {sel.email}</div>}

                {sel.totalInc !== 0 && <div style={{ fontSize:13, color: sel.totalInc < 0 ? "#dc2626" : "#d97706" }}>סה״כ הגדלות מאושרות: <strong>{fmt(sel.totalInc)}</strong></div>}
                <div style={{ fontSize:14, color:"#334155", fontWeight:700 }}>סה״כ שכר טרחה ליועץ: {fmt(sel.totalFee)}</div>

                <input type="checkbox" checked={!!sel.noClaims} onChange={e => setNoClaims(e.target.checked)}
                  style={{ width:14, height:14, accentColor:"#475569", cursor:"pointer" }} />
                העדר תביעות

          </Card>

          {/* ── Milestones ── */}
          <Card style={{ padding:0, overflow:"hidden" }}>
            <div style={{ padding:"12px 18px", borderBottom:"1px solid #e8edf4", fontWeight:700, color:"#1e293b" }}>אבני דרך</div>

// ── Tab: תקציב הפרויקט ────────────────────────────────────────────────────────
function NumInput({ value, onChange }) {
  const [focus, setFocus] = useState(false);
  const [raw, setRaw] = useState(String(value||""));
  React.useEffect(() => { if (!focus) setRaw(String(value||"")); }, [value, focus]);
  const display = focus ? raw : (Number(raw) ? Number(raw).toLocaleString("he-IL") : raw);
  return (
    <input
      type="text" value={display}
      onChange={e => { const v = e.target.value.replace(/,/g,""); setRaw(v); onChange(v); }}
      onFocus={() => { setFocus(true); setRaw(String(value||"")); }}
      onBlur={() => setFocus(false)}
      style={{ width:160, textAlign:"right", background: focus?"#fff":"#f8fafc", border:`1.5px solid ${focus?"#3b82f6":"#e2e8f0"}`, borderRadius:8, padding:"6px 10px", fontSize:14, fontFamily:"'Heebo',sans-serif", outline:"none", color:"#1e293b" }}
    />
  );
}

// ── Shared helper: build the exact rows shown in BudgetTab ───────────────────
// Used by BOTH BudgetTab (display) and exportProjectToExcel (export).
// Export reads these rows directly — NO re-computation.
function buildBudgetAllRows({ quotesRows, consultantsRows, budgetState, statsRows, accountsRows, planOnlyMap }) {
  const contractorEst = Number((budgetState||{}).contractorEst || 0);
  const devPct        = Number((statsRows||[]).find(r => r.field === "פיתוח")?.pct || 0);
  const archBase      = contractorEst - contractorEst * devPct / 100;
  const computeFee = (field, payType, value) => {
    if (payType !== "אחוזים") return Number(value || 0);
    const pct = Number(value || 0) / 100;
    if ((field||"").includes("אדריכל"))      return archBase      * pct;
    if ((field||"").includes("מנהל פרויקט")) return contractorEst * pct;
    if (contractorEst) {
      const profPct = Number((statsRows||[]).find(r => r.field === field)?.pct || 0) / 100;
      return contractorEst * profPct * pct;
    }
    return 0;
  };
  const paidByConsultant = (name) =>
    (accountsRows || []).filter(r => r.consultantName === name && r.unitManagerApproved && !r.rejected).reduce((s,r) => s + Number(r.amount||0), 0);
  const rows = [];
  (quotesRows || []).forEach(fg => {
    (fg.consultants || []).forEach(c => {
      if (!c.approved || !c.name?.trim()) return;
      const consultantEntry = (consultantsRows || []).find(r => r.id === "q-"+c.id);
      const totalInc    = (consultantEntry?.increases || []).filter(x => x.approvedIncrease).reduce((s,x) => s + Number(x.amount||0), 0);
      const computedFee = computeFee(fg.fieldName, c.payType || "אחוזים", c.value);
      const paid        = paidByConsultant(c.name.trim());
      const planOnly    = (planOnlyMap||{})[c.name.trim()] || 0;
      const noClaims    = !!(consultantEntry?.noClaims);
      const notes       = consultantEntry?.notes || "";
      rows.push({
        field: fg.fieldName || "", name: c.name.trim(),
        payType: c.payType || "אחוזים", value: Number(c.value||0),
        increases: totalInc, computedFee, paid, planOnly, noClaims, notes,
        _consultantRowId: "q-"+c.id,
      });
    });
  });
  rows.sort((a,b) => (a.field||"").localeCompare(b.field||"", 'he'));
  return rows;
}

                    <tr style={{ background:"#f1f5f9" }}>

                      </td>
                      <td style={{ padding:"7px 14px", fontWeight:800, color:"#1e293b", textAlign:"right" }}>{fmt(feeTotalContract)}</td>
                      <td style={{ padding:"7px 14px", fontWeight:800, color:"#1e293b", textAlign:"right" }}>{fmt(feeTotalPaid)}</td>
                      <td style={{ padding:"7px 14px", fontWeight:800, color:"#1e293b", textAlign:"right" }}>{fmt(feeTotalRemaining)}</td>
                      <td style={{ padding:"7px 14px", fontWeight:800, color:"#1e293b", textAlign:"right" }}>{fmt(feeTotalPlanOnly)}</td>
                      <td />
                      <td style={{ padding:"7px 14px", fontWeight:800, color:"#1d4ed8", fontSize:12 }}>סה״כ אגרות</td>

                    {/* ── קבלן ── */}
                    {(() => {
                      const contractorContract = Number(bs.contractorContract||0);
                      const contractorPaid = Number(bs.contractorPaid||0);
                      const contractorPlanOnly = Number(bs.contractorPlanOnly||0);
                      const contractorNoClaims = !!bs.contractorNoClaims;
                      const contractorRem = contractorNoClaims ? 0 : contractorContract - contractorPaid;

                        <tr style={{ background:"#f0fdf4", borderTop:"2px solid #bbf7d0" }}>

                        <tr style={{ background:"#f1f5f9" }}>

                          <td style={{ padding:"7px 14px", fontWeight:800, color:"#1e293b", textAlign:"right" }}>{fmt(contractorContract)}</td>
                          <td style={{ padding:"7px 14px", fontWeight:800, color:"#1e293b", textAlign:"right" }}>{fmt(contractorPaid)}</td>
                          <td style={{ padding:"7px 14px", fontWeight:800, color:"#1e293b", textAlign:"right" }}>{fmt(contractorRem)}</td>
                          <td style={{ padding:"7px 14px", fontWeight:800, color:"#1e293b", textAlign:"right" }}>{fmt(contractorContract)}</td>
                          <td colSpan={2} />
                        </tr>

                        {/* ── תקורות ── */}
                        {(() => {
                          const baseForOverhead = consultantsTotal + feeTotalContract + contractorContract;
                          const overheadPct = Number(bs.overheadPct||4);
                          const overheadAmt = baseForOverhead * overheadPct / 100;
                          const overheadPaid = Number(bs.overheadPaid||0);
                          const overheadRem = overheadAmt - overheadPaid;
                          const bcmBase = baseForOverhead + overheadAmt;
                          const bcmPct = Number(bs.bcmPct||0);
                          const bcmAmt = bcmBase * bcmPct / 100;
                          const bcmPaid = Number(bs.bcmPaid||0);
                          const bcmRem = bcmAmt - bcmPaid;
                          const vatPct = Number(bs.vatPct||18);
                          const vatBase = bcmBase + bcmAmt;
                          const vatAmt = vatBase * vatPct / 100;
                          const vatPaid = Number(bs.vatPaid||0);
                          const vatRem = vatAmt - vatPaid;
                          const overheadTotalAmt = overheadAmt + bcmAmt + vatAmt;
                          const grandTotalContract = consultantsTotal + feeTotalContract + contractorContract + overheadTotalAmt;
                          const grandTotalPaid = allRows.reduce((s,r)=>s+(r.paid||0),0) + feeTotalPaid + contractorPaid + overheadPaid + bcmPaid + vatPaid;
                          const grandTotalRem = grandTotalContract - grandTotalPaid;
                          return (<>
                            <tr style={{ background:"#fdf4ff", borderTop:"2px solid #e9d5ff" }}>
                              <td colSpan={9} style={{ padding:"8px 14px", fontWeight:800, color:"#7e22ce", fontSize:13 }}>תקורות</td>
                            </tr>
                            {/* תקורות חברה עירונית */}

                              <td style={{ padding:"7px 10px", fontSize:13, color:"#1e293b" }}>תקורות חברה עירונית</td>
                              <td style={{ padding:"7px 10px" }}>
                                <div style={{ display:"flex", alignItems:"center", gap:4, justifyContent:"flex-end" }}>
                                  <input type="number" value={bs.overheadPct||""} onChange={e=>upd("overheadPct",e.target.value)} style={{...inputStyle, width:50, textAlign:"right"}} />
                                  <span style={{ fontSize:11, color:"#64748b" }}>%</span>
                                </div>
                              </td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#1e293b", fontWeight:600 }}>{fmt(overheadAmt)}</td>
                              <td style={{ padding:"7px 10px" }}><NumInput value={bs.overheadPaid||""} onChange={v=>upd("overheadPaid",v)} /></td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:overheadRem<0?"#dc2626":"#1e293b" }}>{fmt(overheadRem)}</td>
                              <td style={{ padding:"7px 10px" }}><NumInput value={bs.overheadPlanOnly||""} onChange={v=>upd("overheadPlanOnly",v)} /></td>
                              <td />
                              <td style={{ padding:"7px 10px" }}><input value={bs.overheadNotes||""} onChange={e=>upd("overheadNotes",e.target.value)} style={inputStyle} placeholder="הערות..." /></td>
                            </tr>
                            {/* בצמ */}
                            <tr style={{ borderBottom:"1px solid #f1f5f9", background:"#fafbfd" }}>
                              <td style={{ padding:"7px 10px", fontSize:13, color:"#1e293b" }}>בצ״מ</td>
                              <td style={{ padding:"7px 10px" }}>
                                <div style={{ display:"flex", alignItems:"center", gap:4, justifyContent:"flex-end" }}>
                                  <input type="number" value={bs.bcmPct||""} onChange={e=>upd("bcmPct",e.target.value)} style={{...inputStyle, width:50, textAlign:"right"}} placeholder="" />
                                  <span style={{ fontSize:11, color:"#64748b" }}>%</span>
                                </div>
                              </td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#1e293b", fontWeight:600 }}>{fmt(bcmAmt)}</td>
                              <td style={{ padding:"7px 10px" }}><NumInput value={bs.bcmPaid||""} onChange={v=>upd("bcmPaid",v)} /></td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:bcmRem<0?"#dc2626":"#1e293b" }}>{fmt(bcmRem)}</td>
                              <td style={{ padding:"7px 10px" }}><NumInput value={bs.bcmPlanOnly||""} onChange={v=>upd("bcmPlanOnly",v)} /></td>
                              <td />
                              <td style={{ padding:"7px 10px" }}><input value={bs.bcmNotes||""} onChange={e=>upd("bcmNotes",e.target.value)} style={inputStyle} placeholder="הערות..." /></td>
                            </tr>
                            {/* מעמ */}
                            <tr style={{ borderBottom:"1px solid #f1f5f9" }}>
                              <td style={{ padding:"7px 10px", fontSize:13, color:"#1e293b" }}>מע״מ</td>
                              <td style={{ padding:"7px 10px" }}>
                                <div style={{ display:"flex", alignItems:"center", gap:4, justifyContent:"flex-end" }}>
                                  <input type="number" value={bs.vatPct||18} onChange={e=>upd("vatPct",e.target.value)} style={{...inputStyle, width:50, textAlign:"right"}} />
                                  <span style={{ fontSize:11, color:"#64748b" }}>%</span>
                                </div>
                              </td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#1e293b", fontWeight:600 }}>{fmt(vatAmt)}</td>
                              <td style={{ padding:"7px 10px" }}><NumInput value={bs.vatPaid||""} onChange={v=>upd("vatPaid",v)} /></td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:vatRem<0?"#dc2626":"#1e293b" }}>{fmt(vatRem)}</td>
                              <td style={{ padding:"7px 10px" }}><NumInput value={bs.vatPlanOnly||""} onChange={v=>upd("vatPlanOnly",v)} /></td>
                              <td />
                              <td style={{ padding:"7px 10px" }}><input value={bs.vatNotes||""} onChange={e=>upd("vatNotes",e.target.value)} style={inputStyle} placeholder="הערות..." /></td>
                            </tr>
                            {/* סהכ תקורות */}
                            <tr style={{ background:"#f1f5f9", borderTop:"1px solid #e9d5ff" }}>
                              <td colSpan={2} style={{ padding:"7px 14px", fontWeight:800, color:"#7e22ce", fontSize:12 }}>סה״כ תקורות</td>
                              <td style={{ padding:"7px 14px", fontWeight:800, color:"#1e293b", textAlign:"right" }}>{fmt(overheadTotalAmt)}</td>
                              <td style={{ padding:"7px 14px", fontWeight:800, color:"#1e293b", textAlign:"right" }}>{fmt(overheadPaid+bcmPaid+vatPaid)}</td>
                              <td style={{ padding:"7px 14px", fontWeight:800, color:"#1e293b", textAlign:"right" }}>{fmt(overheadRem+bcmRem+vatRem)}</td>
                              <td colSpan={3} />
                            </tr>
                            {/* סה"כ כללי */}
                            <tr style={{ background:"#fefce8", borderTop:"3px solid #fbbf24" }}>
                              <td colSpan={2} style={{ padding:"11px 14px", fontWeight:900, color:"#92400e", fontSize:14 }}>סה״כ כללי</td>
                              <td style={{ padding:"11px 14px", fontWeight:900, color:"#92400e", fontSize:14, textAlign:"right" }}>{fmt(grandTotalContract)}</td>
                              <td style={{ padding:"11px 14px", fontWeight:900, color:"#92400e", fontSize:14, textAlign:"right" }}>{fmt(grandTotalPaid)}</td>
                              <td style={{ padding:"11px 14px", fontWeight:900, color:"#92400e", fontSize:14, textAlign:"right" }}>{fmt(grandTotalRem)}</td>
                              <td colSpan={3} />
                            </tr>
                          </>);
                        })()}
                      </>);
                    })()}
                  </>);
                })()}
              </tfoot>
            )}
          </table>
        </div>
      </Card>
    </div>
  );
}

// ── Tab: פתיחת פרויקט ────────────────────────────────────────────────────────
// ── Tab: תוצאות מכרז ─────────────────────────────────────────────────────────
function TenderTab({ rows, setRows }) {
  const del = id => setRows(rows.filter(r => r.id !== id));
  const upd = (id, key, val) => setRows(rows.map(r => r.id===id ? {...r,[key]:val} : r));
  const add = () => setRows([...rows, { id:Date.now(), contractor:"", bid:"", rank:"", notes:"", selected:false }]);

  const bids   = rows.map(r => Number(r.bid)).filter(Boolean);
  const lowest = bids.length ? Math.min(...bids) : null;

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:18 }}>
      <Card style={{ padding:0, overflow:"hidden" }}>
        <div style={{ padding:"14px 20px", borderBottom:"1px solid #e8edf4", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <span style={{ fontWeight:700 }}>תוצאות מכרז ({rows.length} מציעים)</span>
          <PrimaryButton small onClick={add}>+ הוסף מציע</PrimaryButton>
        </div>
        <DataTable count={rows.length} headers={["קבלן","הצעת מחיר","דירוג","הפרש מהנמוך","הערות","נבחר",""]}>
          {rows.map((r,i) => {
            const bid  = Number(r.bid || 0);
            const diff = lowest !== null ? bid - lowest : 0;
            return (
              <Tr key={r.id} i={i}>
                <td style={{ padding:"8px 10px" }}>
                  <input value={r.contractor} onChange={e=>upd(r.id,"contractor",e.target.value)} placeholder="שם קבלן..."
                    style={{ width:"100%", background:"transparent", border:"1px solid #e2e8f0", borderRadius:6, padding:"4px 8px", fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none" }}
                    onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="#e2e8f0"} />
                </td>
                <td style={{ padding:"8px 10px" }}>
                  <input type="number" value={r.bid} onChange={e=>upd(r.id,"bid",e.target.value)} placeholder="0"
                    style={{ width:110, background:"transparent", border:"1px solid #e2e8f0", borderRadius:6, padding:"4px 8px", fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none", textAlign:"right", fontWeight:700, color:bid===lowest&&bid?"#16a34a":"#1e293b" }}
                    onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="#e2e8f0"} />
                </td>
                <td style={{ padding:"8px 10px" }}>
                  <input value={r.rank} onChange={e=>upd(r.id,"rank",e.target.value)} placeholder="—"
                    style={{ width:60, background:"transparent", border:"1px solid #e2e8f0", borderRadius:6, padding:"4px 8px", fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none" }}
                    onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="#e2e8f0"} />
                </td>
                <td style={{ padding:"8px 10px", fontWeight:600, color:diff===0?"#16a34a":"#64748b" }}>
                  {bid ? (diff===0 ? "הנמוך ביותר" : "+"+fmt(diff)) : "—"}
                </td>
                <td style={{ padding:"8px 10px" }}>
                  <input value={r.notes} onChange={e=>upd(r.id,"notes",e.target.value)} placeholder="הערות..."
                    style={{ width:"100%", background:"transparent", border:"1px solid #e2e8f0", borderRadius:6, padding:"4px 8px", fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none" }}
                    onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="#e2e8f0"} />
                </td>
                <td style={{ padding:"8px 10px" }}>
                  <label style={{ display:"flex", alignItems:"center", gap:5, cursor:"pointer", fontSize:12, fontWeight:600, color:r.selected?"#16a34a":"#94a3b8" }}>
                    <input type="checkbox" checked={!!r.selected} onChange={e=>upd(r.id,"selected",e.target.checked)} style={{ accentColor:"#475569" }} />
                    {r.selected ? "נבחר" : ""}
                  </label>
                </td>
                <Td><DeleteButton onClick={()=>del(r.id)} /></Td>
              </Tr>
            );
          })}
        </DataTable>
      </Card>
    </div>
  );
}

// ── Tab: חשבון קבלן סופי ─────────────────────────────────────────────────────
function ContractorTab({ rows, setRows }) {
  const empty = { item:"", planned:"", actual:"", invoice:"", date:"", status:"ממתין" };
  const [f, sf] = useState(empty);
  const add = () => {
    if (!f.item.trim()) return;
    setRows([...rows, { ...f, id: Date.now() }]);
    sf(empty);
  };
  const del = id => setRows(rows.filter(r => r.id !== id));

  const totP = rows.reduce((s,r) => s+Number(r.planned||0), 0);
  const totA = rows.reduce((s,r) => s+Number(r.actual||0), 0);

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:18 }}>
      <SummaryCards items={[
        { label:"סכום חוזי",  value:fmt(totP),      color:"#334155" },
        { label:"סכום סופי",  value:fmt(totA),      color:"#374151" },
        { label:"הפרש",       value:fmt(totA-totP), color:totA>totP?"#ef4444":"#16a34a" },
      ]} />
      <Card>
        <div style={{ fontWeight:700, color:"#1e293b", marginBottom:14, fontSize:15 }}>הוסף סעיף</div>
        <Grid cols="repeat(auto-fill,minmax(140px,1fr))">
          <TextInput label="סעיף עבודה"   value={f.item}    onChange={e=>sf({...f,item:e.target.value})} />
          <TextInput label="תכנון (₪)"    type="number" value={f.planned} onChange={e=>sf({...f,planned:e.target.value})} />
          <TextInput label="סופי (₪)"     type="number" value={f.actual}  onChange={e=>sf({...f,actual:e.target.value})} />
          <TextInput label="מס׳ חשבונית"  value={f.invoice} onChange={e=>sf({...f,invoice:e.target.value})} />
          <TextInput label="תאריך"         type="date"   value={f.date}    onChange={e=>sf({...f,date:e.target.value})} />
          <SelectInput label="סטטוס" value={f.status} onChange={e=>sf({...f,status:e.target.value})} options={["ממתין","בביצוע","הושלם","שנוי במחלוקת"]} />
        </Grid>
        <div style={{ marginTop:14 }}><PrimaryButton onClick={add}>+ הוסף סעיף</PrimaryButton></div>
      </Card>
      <Card style={{ padding:0, overflow:"hidden" }}>
        <div style={{ padding:"14px 20px", borderBottom:"1px solid #e8edf4", fontWeight:700 }}>חשבון קבלן סופי ({rows.length})</div>
        <DataTable count={rows.length} headers={["סעיף","תכנון","סופי","הפרש","חשבונית","תאריך","סטטוס",""]}>
          {rows.map((r,i) => {
            const diff = Number(r.actual||0) - Number(r.planned||0);
            return (
              <Tr key={r.id} i={i}>
                <Td bold>{r.item}</Td>
                <Td blue>{fmt(r.planned)}</Td>
                <Td green>{fmt(r.actual)}</Td>
                <td style={{ padding:"11px 14px", fontWeight:600, color:diff>0?"#ef4444":"#16a34a" }}>{diff>0?"+":""}{fmt(diff)}</td>
                <Td muted>{r.invoice}</Td>
                <Td muted>{r.date}</Td>
                <Td>
                  <Badge color={
                    r.status==="הושלם"?"#16a34a":
                    r.status==="שנוי במחלוקת"?"#ef4444":
                    r.status==="בביצוע"?"#3b82f6":"#d97706"
                  }>{r.status}</Badge>
                </Td>
                <Td><DeleteButton onClick={()=>del(r.id)} /></Td>
              </Tr>
            );
          })}
        </DataTable>
      </Card>
    </div>
  );
}

    setForm(EMPTY);

    <div className="fade" style={{ padding:"30px 36px", display:"flex", flexDirection:"column", gap:20 }}>

          <div style={{ fontSize:11, color:"#475569", fontWeight:700, letterSpacing:3, marginBottom:4 }}>גיליון גלובלי</div>

        </div>
        <div style={{ display:"flex", gap:10 }}>
          <label style={{ display:"flex", alignItems:"center", gap:7, padding:"9px 16px", background:"#f8fafc", color:"#374151", border:"1.5px solid #bbf7d0", borderRadius:9, fontSize:13, fontWeight:700, fontFamily:"'Heebo',sans-serif", cursor:"pointer" }}>
            ייבוא מאקסל ↑
            <input type="file" accept=".csv,.xlsx,.xls" style={{ display:"none" }} onChange={e => {
              const file = e.target.files?.[0]; if (!file) return;
              const reader = new FileReader();
              reader.onload = ev => {
                try {
                  const XLSX = window.XLSX;
                  if (!XLSX) { alert("ספריית Excel לא נטענה, נסה שוב"); return; }
                  const wb = XLSX.read(ev.target.result, { type:"array" });
                  const ws = wb.Sheets[wb.SheetNames[0]];
                  const data = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });
                  if (data.length < 2) return;
                  const newSuppliers = data.slice(1).map(cols => ({
                    id: Date.now() + Math.random(),
                    field:   String(cols[0]||"").trim(),
                    name:    String(cols[1]||"").trim(),
                    contact: String(cols[2]||"").trim(),
                    phone:   String(cols[3]||"").trim(),
                    phone2:  String(cols[4]||"").trim(),
                    email:   String(cols[5]||"").trim(),
                    notes:   String(cols[6]||"").trim(),
                  })).filter(s => s.name);
                  setSuppliers(prev => [...prev, ...newSuppliers]);
                } catch(err) { alert("שגיאה בייבוא הקובץ: " + err.message); }
              };
              reader.readAsArrayBuffer(file);
              e.target.value = "";
            }} />
          </label>
          <button onClick={() => setEditId("new")}
            style={{ display:"flex", alignItems:"center", gap:7, padding:"9px 18px", background:"#2563eb", color:"#fff", border:"none", borderRadius:9, fontSize:13, fontWeight:700, fontFamily:"'Heebo',sans-serif", cursor:"pointer" }}>
            + הוסף ספק חדש
          </button>
        </div>

      {/* Filters */}
      <Card style={{ padding:"14px 18px" }}>

          <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", color:"#94a3b8", fontSize:16 }}>🔍</span>

            value={search}
            onChange={e => setSearch(e.target.value)}

        </div>
      </Card>

      {/* Table */}
      <Card style={{ padding:0, overflow:"hidden" }}>
        <table key={"t-"+search} style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
          <thead>
            <tr style={{ background:"#f8fafc", borderBottom:"2px solid #e2e8f0" }}>
              {["מקצוע / תחום","שם ספק / חברה","איש קשר","טלפון","נייד","מייל","הערות","פעולות"].map(h => (

            {filtered.length === 0 && (

            )}
            {filtered.map((s, i) => (
              <React.Fragment key={s.id}>
              <tr className="hov-row" style={{ borderBottom: editId===s.id ? "none" : "1px solid #f1f5f9", background: editId===s.id ? "#eff6ff" : i%2===0?"#fff":"#fafbfd" }}>
                {editId === s.id ? (
                  <>
                    {["field","name","contact","phone","phone2","email","notes"].map(k => (
                      <td key={k} style={{ padding:"6px 8px" }}>
                        {k === "field"
                          ? <select value={editForm[k]||""} onChange={e=>setEditForm({...editForm,[k]:e.target.value})}
                              style={{ width:"100%", padding:"5px 8px", border:"1.5px solid #3b82f6", borderRadius:7, fontSize:12, fontFamily:"'Heebo',sans-serif", outline:"none", background:"#fff" }}>
                              <option value="">בחר...</option>
                              {[...new Set([...allFields,...(professions||[])])].map(f=><option key={f} value={f}>{f}</option>)}
                            </select>
                          : <input value={editForm[k]||""} onChange={e=>setEditForm({...editForm,[k]:e.target.value})}
                              onKeyDown={e=>{ if(e.key==="Enter") saveEdit(); if(e.key==="Escape") setEditId(null); }}
                              style={{ width:"100%", padding:"5px 8px", border:"1.5px solid #3b82f6", borderRadius:7, fontSize:12, fontFamily:"'Heebo',sans-serif", outline:"none" }} />
                        }
                      </td>
                    ))}
                    <td />

                ) : (
                  <>
                    <td style={{ padding:"11px 16px", color:"#374151", cursor:"pointer" }} onDoubleClick={()=>{ setEditId(s.id); setEditForm({...s}); }}>{s.field||"—"}</td>
                    <td style={{ padding:"11px 16px", fontWeight:700, color:"#1e293b", cursor:"pointer" }} onDoubleClick={()=>{ setEditId(s.id); setEditForm({...s}); }}>{s.name}</td>
                    <td style={{ padding:"11px 16px", color:"#374151", cursor:"pointer" }} onDoubleClick={()=>{ setEditId(s.id); setEditForm({...s}); }}>{s.contact||"—"}</td>
                    <td style={{ padding:"11px 16px", color:"#374151", direction:"ltr", cursor:"pointer" }} onDoubleClick={()=>{ setEditId(s.id); setEditForm({...s}); }}>{s.phone||"—"}</td>
                    <td style={{ padding:"11px 16px", color:"#374151", direction:"ltr", cursor:"pointer" }} onDoubleClick={()=>{ setEditId(s.id); setEditForm({...s}); }}>{s.phone2||"—"}</td>
                    <td style={{ padding:"11px 16px", color:"#334155", cursor:"pointer" }} onDoubleClick={()=>{ setEditId(s.id); setEditForm({...s}); }}>{s.email ? <a href={"mailto:"+s.email} style={{color:"#334155"}}>{s.email}</a> : "—"}</td>
                    <td style={{ padding:"11px 16px", color:"#374151", maxWidth:180, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", cursor:"pointer" }} onDoubleClick={()=>{ setEditId(s.id); setEditForm({...s}); }}>{s.notes||"—"}</td>
                    <td style={{ padding:"11px 16px", whiteSpace:"nowrap" }}>
                      <button onClick={()=>{ setEditId(s.id); setEditForm({...s}); }} style={{ background:"#f8fafc", color:"#334155", border:"none", borderRadius:6, padding:"4px 10px", fontSize:12, cursor:"pointer", fontFamily:"'Heebo',sans-serif", marginLeft:4 }}>✏️</button>
                      <button onClick={()=>del(s.id)} style={{ background:"#fef2f2", color:"#ef4444", border:"none", borderRadius:6, padding:"4px 10px", fontSize:12, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>🗑</button>
                    </td>
                  </>
                )}
              </tr>
              {editId === s.id && (
                <tr style={{ background:"#f1f5f9", borderBottom:"2px solid #93c5fd" }}>
                  <td colSpan={8} style={{ padding:"6px 16px", textAlign:"right" }}>
                    <button onClick={saveEdit} style={{ background:"#2563eb", color:"#fff", border:"none", borderRadius:7, padding:"6px 20px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"'Heebo',sans-serif", marginLeft:8 }}>✓ שמור</button>
                    <button onClick={()=>setEditId(null)} style={{ background:"#f1f5f9", color:"#64748b", border:"none", borderRadius:7, padding:"6px 16px", fontSize:13, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>✕ ביטול</button>
                  </td>
                </tr>
              )}
              </React.Fragment>
            ))}
          </tbody>
          <tfoot>
            <tr style={{ background:"#f8fafc", borderTop:"2px solid #e2e8f0" }}>
              <td colSpan={8} style={{ padding:"8px 16px", color:"#94a3b8", fontSize:12 }}>סה״כ {filtered.length} ספקים{search ? " (מסונן)" : ""}</td>
            </tr>
          </tfoot>
        </table>
      </Card>

      {/* Add / Edit modal */}
      {editId === "new" && (
        <div style={{ position:"fixed", inset:0, background:"#00000060", display:"flex", alignItems:"center", justifyContent:"center", zIndex:2000 }}
          onClick={()=>setEditId(null)}>
          <div className="fade" onClick={e=>e.stopPropagation()}
            style={{ background:"#fff", borderRadius:18, padding:28, width:480, boxShadow:"0 24px 64px #0004", display:"flex", flexDirection:"column", gap:14 }}>
            <div style={{ fontSize:17, fontWeight:800, color:"#1e293b", marginBottom:4 }}>➕ ספק חדש</div>
            {inp("שם ספק / חברה","name",form,setForm,"לדוגמה: משרד עמית נמליך")}
            <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
              <label style={{ fontSize:11, fontWeight:700, color:"#64748b" }}>מקצוע / תחום</label>
              <div style={{ display:"flex", gap:6 }}>
                <select value={allFields.concat(professions||[]).includes(form.field) ? form.field : (form.field ? "__custom__" : "")}
                  onChange={e => setForm({...form, field: e.target.value === "__custom__" ? "" : e.target.value})}
                  style={{ flex:1, padding:"7px 10px", border:"1.5px solid #e2e8f0", borderRadius:8, fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none", background:"#fff" }}
                  onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="#e2e8f0"}>
                  <option value="">בחר מקצוע...</option>
                  {[...new Set([...allFields,...(professions||[])])].map(f=><option key={f} value={f}>{f}</option>)}
                  <option value="__custom__">➕ מקצוע חדש...</option>
                </select>
              </div>
              {(!allFields.concat(professions||[]).includes(form.field) || form.field === "") && (
                <input value={form.field} onChange={e=>setForm({...form,field:e.target.value})}
                  placeholder="הקלד שם מקצוע חדש..."
                  style={{ padding:"7px 10px", border:"1.5px solid #3b82f6", borderRadius:8, fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none" }} />
              )}
            </div>
            {inp("איש קשר","contact",form,setForm,"שם מלא")}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              {inp("טלפון","phone",form,setForm,"03-xxxxxxx")}
              {inp("טלפון סלולרי","phone2",form,setForm,"05x-xxxxxxx")}
            </div>
            {inp("מייל","email",form,setForm,"example@mail.com")}
            {inp("הערות","notes",form,setForm,"הערות נוספות...")}
            <div style={{ display:"flex", gap:10, justifyContent:"flex-start", marginTop:4 }}>
              <button onClick={add}
                style={{ padding:"9px 24px", background:"#2563eb", color:"#fff", border:"none", borderRadius:9, fontSize:14, fontWeight:700, fontFamily:"'Heebo',sans-serif", cursor:"pointer" }}>הוסף</button>
              <button onClick={()=>setEditId(null)}
                style={{ padding:"9px 18px", background:"#f1f5f9", color:"#64748b", border:"none", borderRadius:9, fontSize:14, fontFamily:"'Heebo',sans-serif", cursor:"pointer" }}>ביטול</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Global page: חברות עירוניות ─────────────────────────────────────────────
function CompaniesPage({ companies, setCompanies }) {
  const [form, setForm] = useState({ name:"", contact:"", phone:"", email:"" });
  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState({});
  const [showAdd, setShowAdd] = useState(false);

  const add = () => {
    if (!form.name.trim()) return;
    setCompanies([...companies, { ...form, id: Date.now() }]);
    setForm({ name:"", contact:"", phone:"", email:"" });
    setShowAdd(false);
  };
  const del = id => setCompanies(companies.filter(c => c.id !== id));
  const saveEdit = () => {
    setCompanies(companies.map(c => c.id === editId ? { ...c, ...editForm } : c));
    setEditId(null);
  };

  return (
    <div className="fade" style={{ padding:"34px 38px", display:"flex", flexDirection:"column", gap:22 }}>
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>
        <div>
          <div style={{ fontSize:11, color:"#64748b", fontWeight:700, letterSpacing:3, marginBottom:4 }}>גיליון גלובלי</div>
          <h1 style={{ fontSize:24, fontWeight:900, color:"#1e293b", margin:0 }}>🏛️ חברות עירוניות</h1>
          <div style={{ fontSize:13, color:"#94a3b8", marginTop:4 }}>ניהול רשימת הלקוחות — חברות עירוניות לפרויקטים</div>
        </div>
        <PrimaryButton onClick={() => setShowAdd(v => !v)}>{showAdd ? "✕ סגור" : "+ הוסף חברה עירונית"}</PrimaryButton>
      </div>

      {/* Add form - collapsible */}
      {showAdd && (
        <Card className="fade">
          <div style={{ fontWeight:700, color:"#1e293b", marginBottom:14, fontSize:15 }}>הוסף חברה עירונית</div>
          <Grid>
            <TextInput label="שם החברה" value={form.name}    onChange={e=>setForm({...form,name:e.target.value})} />
            <TextInput label="איש קשר"  value={form.contact} onChange={e=>setForm({...form,contact:e.target.value})} />
            <TextInput label="טלפון"    value={form.phone}   onChange={e=>setForm({...form,phone:e.target.value})} />
            <TextInput label="אימייל"   value={form.email}   onChange={e=>setForm({...form,email:e.target.value})} />

          </Grid>
          <div style={{ marginTop:14, display:"flex", gap:10 }}>
            <PrimaryButton onClick={add}>+ הוסף חברה</PrimaryButton>
            <button onClick={() => setShowAdd(false)} style={{ background:"#f1f5f9", border:"none", borderRadius:9, padding:"9px 16px", fontSize:13, color:"#64748b", cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>ביטול</button>
          </div>
        </Card>
      )}

      {/* List */}
      <Card style={{ padding:0, overflow:"hidden" }}>
        <div style={{ padding:"14px 20px", borderBottom:"1px solid #e8edf4", fontWeight:700, color:"#1e293b" }}>
          רשימת חברות ({companies.length})
        </div>
        {companies.length === 0 && (
          <div style={{ padding:32, textAlign:"right", color:"#94a3b8" }}>אין חברות עירוניות עדיין</div>
        )}
        {companies.map((c, i) => (
          <div key={c.id} style={{ borderBottom: i<companies.length-1?"1px solid #f1f5f9":"none" }}>
            {editId === c.id ? (
              <div style={{ padding:"14px 20px", background:"#f8fafc", display:"flex", gap:10, alignItems:"flex-end", flexWrap:"wrap" }}>
                <TextInput label="שם החברה" value={editForm.name||""}    onChange={e=>setEditForm({...editForm,name:e.target.value})} />
                <TextInput label="איש קשר"  value={editForm.contact||""} onChange={e=>setEditForm({...editForm,contact:e.target.value})} />
                <TextInput label="טלפון"    value={editForm.phone||""}   onChange={e=>setEditForm({...editForm,phone:e.target.value})} />
                <TextInput label="אימייל"   value={editForm.email||""}   onChange={e=>setEditForm({...editForm,email:e.target.value})} />

                <div style={{ display:"flex", gap:8 }}>
                  <PrimaryButton onClick={saveEdit}>שמור</PrimaryButton>
                  <button onClick={()=>setEditId(null)} style={{ background:"#f1f5f9", border:"none", borderRadius:8, padding:"8px 14px", cursor:"pointer", fontFamily:"'Heebo',sans-serif", fontSize:13 }}>ביטול</button>
                </div>
              </div>
            ) : (
              <div className="hov-row" style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"13px 20px" }}>
                <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                  <div style={{ width:40, height:40, borderRadius:10, background:"linear-gradient(135deg,#dbeafe,#bfdbfe)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>🏛️</div>
                  <div>
                    <div style={{ fontWeight:700, fontSize:14, color:"#1e293b" }}>{c.name}</div>
                    <div style={{ fontSize:12, color:"#94a3b8", marginTop:2 }}>
                      {[c.contact, c.phone, c.email].filter(Boolean).join(" · ")}

                    </div>

                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={()=>{ setEditId(c.id); setEditForm({...c}); }}

                  <DeleteButton onClick={()=>del(c.id)} />
                </div>
              </div>
            )}
          </div>
        ))}
      </Card>
    </div>
  );
}

// ── Global page: תבניות אבני דרך ─────────────────────────────────────────────
function MilestonesPage({ companies, milestones, setMilestones, professions }) {
  const [selCompany,  setSelCompany]  = useState("");
  const [selProf,     setSelProf]     = useState("");
  const [customProf,  setCustomProf]  = useState("");
  const [addingProf,  setAddingProf]  = useState(false);
  const [newName,     setNewName]     = useState("");
  const [newPct,      setNewPct]      = useState("");
  const [newPlanOnly, setNewPlanOnly] = useState(false);
  const [editId,      setEditId]      = useState(null);
  const [editData,    setEditData]    = useState({});
  const [copyFromCompany, setCopyFromCompany] = useState("");
  const [copyFromProf,    setCopyFromProf]    = useState("");
  const [showCopy,        setShowCopy]        = useState(false);

  // All professions = stats professions + any custom ones already used in this company
  const existingCompanyProfs = selCompany
    ? Object.keys(milestones[selCompany] || {})
    : [];
  const allProfs = [...new Set([...professions, ...existingCompanyProfs])];

  const companyMilestones = selCompany && selProf
    ? (milestones[selCompany]?.[selProf] || [])
    : [];

  const upd = (list) => {
    setMilestones({
      ...milestones,
      [selCompany]: { ...(milestones[selCompany]||{}), [selProf]: list }
    });
  };

  const addCustomProf = () => {
    if (!customProf.trim()) return;
    setSelProf(customProf.trim());
    setCustomProf("");
    setAddingProf(false);
  };

  const add = () => {
    if (!newName.trim() || !newPct) return;
    upd([...companyMilestones, { id:Date.now(), name:newName, pct:newPct, planOnly:newPlanOnly }]);
    setNewName(""); setNewPct(""); setNewPlanOnly(false);
  };

  const del = id => upd(companyMilestones.filter(m => m.id !== id));

  const saveEdit = () => {
    upd(companyMilestones.map(m => m.id === editId ? { ...m, ...editData } : m));
    setEditId(null);
  };

  const totalPct = companyMilestones.reduce((s,m) => s + Number(m.pct||0), 0);

  return (
    <div className="fade" style={{ padding:"34px 38px", display:"flex", flexDirection:"column", gap:22 }}>
      <div>
        <div style={{ fontSize:11, color:"#475569", fontWeight:700, letterSpacing:3, marginBottom:4 }}>גיליון גלובלי</div>
        <h1 style={{ fontSize:24, fontWeight:900, color:"#1e293b", margin:0 }}>🚩 תבניות אבני דרך</h1>
        <div style={{ fontSize:13, color:"#94a3b8", marginTop:4 }}>ניהול אבני דרך סטנדרטיות לפי חברה עירונית ומקצוע</div>
      </div>

      {/* Selectors */}
      <Card>
        <div style={{ display:"flex", gap:20, flexWrap:"wrap", alignItems:"flex-end" }}>
          <div style={{ flex:1, minWidth:200 }}>
            <div style={{ fontSize:12, fontWeight:600, color:"#64748b", marginBottom:6 }}>בחר חברה עירונית *</div>
            <select value={selCompany} onChange={e=>{ setSelCompany(e.target.value); setSelProf(""); }}
              style={{ width:"100%", padding:"9px 12px", border:"1.5px solid #e2e8f0", borderRadius:9, fontSize:14, fontFamily:"'Heebo',sans-serif", background:"#f8fafc", outline:"none" }}>
              <option value="">-- בחר --</option>
              {companies.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          {selCompany && (
            <div style={{ flex:1, minWidth:200 }}>
              <div style={{ fontSize:12, fontWeight:600, color:"#64748b", marginBottom:6 }}>בחר מקצוע *</div>
              {addingProf ? (
                <div style={{ display:"flex", gap:8 }}>
                  <input autoFocus value={customProf} onChange={e=>setCustomProf(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&addCustomProf()}
                    placeholder="שם התחום החדש..."
                    style={{ flex:1, padding:"9px 12px", border:"1.5px solid #3b82f6", borderRadius:9, fontSize:14, fontFamily:"'Heebo',sans-serif", outline:"none" }} />
                  <button onClick={addCustomProf}
                    style={{ background:"#2563eb", color:"#fff", border:"none", borderRadius:8, padding:"0 14px", fontSize:13, cursor:"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:600 }}>הוסף</button>
                  <button onClick={()=>{ setAddingProf(false); setCustomProf(""); }}
                    style={{ background:"#f1f5f9", color:"#64748b", border:"none", borderRadius:8, padding:"0 10px", fontSize:13, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>ביטול</button>
                </div>
              ) : (
                <div style={{ display:"flex", gap:8 }}>
                  <select value={selProf} onChange={e=>setSelProf(e.target.value)}
                    style={{ flex:1, padding:"9px 12px", border:"1.5px solid #e2e8f0", borderRadius:9, fontSize:14, fontFamily:"'Heebo',sans-serif", background:"#f8fafc", outline:"none" }}>
                    <option value="">-- בחר --</option>
                    {allProfs.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                  <button onClick={()=>setAddingProf(true)}
                    style={{ background:"#f8fafc", color:"#334155", border:"1px solid #e2e8f0", borderRadius:8, padding:"0 12px", fontSize:12, cursor:"pointer", fontFamily:"'Heebo',sans-serif", whiteSpace:"nowrap", fontWeight:600 }}>+ תחום חדש</button>
                </div>
              )}
            </div>
          )}
        </div>
      </Card>

      {/* Milestones table */}
      {selCompany && selProf && (

// ── Minimal ZIP builder (stored, no compression) ─────────────────────────────
function buildZip(files) {
  const u32le = (n) => { const b=new Uint8Array(4); new DataView(b.buffer).setUint32(0,n,true); return b; };
  const u16le = (n) => { const b=new Uint8Array(2); new DataView(b.buffer).setUint16(0,n,true); return b; };
  const concat = (...arrays) => { const len=arrays.reduce((s,a)=>s+a.length,0); const r=new Uint8Array(len); let off=0; arrays.forEach(a=>{r.set(a,off);off+=a.length;}); return r; };
  const crc32 = (data) => {
    let c=0xFFFFFFFF;
    const t=new Uint32Array(256);
    for(let i=0;i<256;i++){let x=i;for(let j=0;j<8;j++)x=x&1?(x>>>1)^0xEDB88320:(x>>>1);t[i]=x;}
    for(let i=0;i<data.length;i++)c=t[(c^data[i])&0xFF]^(c>>>8);
    return (c^0xFFFFFFFF)>>>0;
  };
  const enc = new TextEncoder();
  const localHeaders = [];
  const centralDirs = [];
  let offset = 0;
  for (const [name, data] of Object.entries(files)) {
    const nameBytes = enc.encode(name);
    const crc = crc32(data);
    const local = concat(
      new Uint8Array([0x50,0x4B,0x03,0x04]), // sig
      u16le(20), u16le(0), u16le(0),          // version, flags, compression (stored)
      u16le(0), u16le(0),                      // mod time, mod date
      u32le(crc), u32le(data.length), u32le(data.length),
      u16le(nameBytes.length), u16le(0),       // name len, extra len
      nameBytes, data
    );
    const central = concat(
      new Uint8Array([0x50,0x4B,0x01,0x02]), // sig
      u16le(20), u16le(20), u16le(0), u16le(0),
      u16le(0), u16le(0),                      // compression stored
      u32le(crc), u32le(data.length), u32le(data.length),
      u16le(nameBytes.length), u16le(0), u16le(0), u16le(0), u16le(0),
      u32le(0), u32le(offset),
      nameBytes
    );
    localHeaders.push(local);
    centralDirs.push(central);
    offset += local.length;
  }
  const centralStart = offset;
  const centralData = concat(...centralDirs);
  const eocd = concat(
    new Uint8Array([0x50,0x4B,0x05,0x06]),
    u16le(0), u16le(0),
    u16le(centralDirs.length), u16le(centralDirs.length),
    u32le(centralData.length), u32le(centralStart),
    u16le(0)
  );
  return concat(...localHeaders, centralData, eocd);
}

// ── Persistence helpers ──────────────────────────────────────────────────────
const LS_PROJECTS = "proj_mgr_projects";
const LS_DATA     = "proj_mgr_data";

function loadProjects() {
  try {
    const raw = localStorage.getItem(LS_PROJECTS);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return SEED_PROJECTS;
}

function loadAllData(projects) {
  try {
    const raw = localStorage.getItem(LS_DATA);
    if (raw) {
      const saved = JSON.parse(raw);
      // ensure every project has an entry
      const d = {};
      projects.forEach(p => { d[p.id] = saved[p.id] || makeProjectData(); });
      return d;
    }
  } catch(e) {}
  const d = {};
  projects.forEach(p => { d[p.id] = makeProjectData(); });
  return d;
}

function saveProjects(projects) {
  try { localStorage.setItem(LS_PROJECTS, JSON.stringify(projects)); } catch(e) {}
}

function saveAllData(data) {
  try { localStorage.setItem(LS_DATA, JSON.stringify(data)); } catch(e) {}
}
