// ── Global page: השוואת עלויות ───────────────────────────────────────────────
function CostsPage({ allData, projects, statsRows }) {
  const [filterField, setFilterField] = React.useState("");
  const [myArea, setMyArea] = React.useState("");

  // Collect all approved consultants from all projects
  const rows = [];
  projects.forEach(proj => {
    const openingData = allData[proj.id]?.openingData || {};
    const area = Number(String(openingData.buildingArea||"").replace(/,/g,"")) || 0;
    const quotes = allData[proj.id]?.quotes || [];
    const budgetState = allData[proj.id]?.budgetState || {};
    const devPct = Number((statsRows||[]).find(r=>r.field==="פיתוח")?.pct||0);
    const cEst = Number(String(openingData.contractorEst||"").replace(/,/g,"")) || Number(budgetState.contractorEst||0);
    const archBase = cEst - cEst * devPct / 100;

    quotes.forEach(field => {
      field.consultants.filter(c => c.approved && c.name?.trim()).forEach(c => {
        const isPct = (c.payType||"אחוזים") === "אחוזים";
        const pct = Number(c.value||0) / 100;
        let fee = 0;
        if (!isPct) fee = Number(c.value||0);
        else if ((field.fieldName||"").includes("אדריכל") && cEst) fee = archBase * pct;
        else if ((field.fieldName||"").includes("מנהל פרויקט") && cEst) fee = cEst * pct;
        else if (cEst) { const pp = Number((statsRows||[]).find(r=>r.field===field.fieldName)?.pct||0)/100; fee = cEst * pp * pct; }
        rows.push({
          projName: proj.name,
          field: field.fieldName || "",
          consultant: c.name,
          payType: c.payType || "אחוזים",
          value: c.value || "",
          fee,
          area,
        });
      });
    });
  });

  // All unique fields
  const allFields = [...new Set(rows.map(r => r.field))].filter(Boolean).sort((a,b) => a.localeCompare(b,"he"));

  // Filter
  const myAreaNum = Number(String(myArea).replace(/,/g,"")) || 0;
  const filtered = rows.filter(r => {
    if (filterField && r.field !== filterField) return false;
    if (myAreaNum && r.area) {
      if (Math.abs(r.area - myAreaNum) > 4000) return false;
    }
    return true;
  }).sort((a,b) => (b.area||0) - (a.area||0));

  const fmt = n => n ? "₪" + Number(n).toLocaleString("en-US", {maximumFractionDigits:0}) : "—";

  return (
    <div className="fade" style={{ padding:"34px 38px", display:"flex", flexDirection:"column", gap:22 }}>
      <div>
        <div style={{ fontSize:11, color:"#64748b", fontWeight:700, letterSpacing:3, marginBottom:4 }}>גיליון גלובלי</div>
        <h1 style={{ fontSize:24, fontWeight:900, color:"#1e293b", margin:0 }}>📊 השוואת עלויות</h1>
        <div style={{ fontSize:13, color:"#94a3b8", marginTop:4 }}>השוואת עלויות יועצים בין פרויקטים</div>
      </div>

      {/* Filters */}
      <Card>
        <div style={{ display:"flex", gap:20, alignItems:"flex-end", direction:"rtl", flexWrap:"wrap" }}>
          <div>
            <div style={{ fontSize:12, fontWeight:600, color:"#64748b", marginBottom:5 }}>סינון לפי תחום</div>
            <select value={filterField} onChange={e=>setFilterField(e.target.value)}
              style={{ padding:"7px 12px", border:"1.5px solid #e2e8f0", borderRadius:8, fontSize:13, fontFamily:"'Heebo',sans-serif", background:"#f8fafc", color:"#1e293b", outline:"none", minWidth:180, direction:"rtl" }}>
              <option value="">כל התחומים</option>
              {allFields.map(f => <option key={f} value={f}>{f}</option>)}
            </select>
          </div>
          <div>
            <div style={{ fontSize:12, fontWeight:600, color:"#64748b", marginBottom:5 }}>שטח הפרויקט שלי (מ״ר)</div>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <input type="text" inputMode="numeric" value={myArea} onChange={e=>setMyArea(e.target.value)}
                placeholder="לדוגמה: 2500"
                style={{ padding:"7px 12px", border:"1.5px solid #e2e8f0", borderRadius:8, fontSize:13, fontFamily:"'Heebo',sans-serif", background:"#f8fafc", outline:"none", width:140, textAlign:"right" }} />
              {myArea && <span style={{ fontSize:12, color:"#64748b" }}>מציג ±4000 מ״ר</span>}
            </div>
          </div>
          {(filterField || myArea) && (
            <button onClick={()=>{setFilterField("");setMyArea("");}}
              style={{ padding:"7px 14px", border:"1px solid #e2e8f0", borderRadius:8, fontSize:12, color:"#64748b", background:"#f8fafc", cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>
              נקה סינון
            </button>
          )}
        </div>
      </Card>

      {/* Table */}
      <Card style={{ padding:0, overflow:"hidden" }}>
        <div style={{ padding:"12px 20px", borderBottom:"1px solid #e8edf4", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <span style={{ fontWeight:700, color:"#1e293b" }}>{filtered.length} רשומות</span>
        </div>
        {filtered.length === 0 ? (
          <div style={{ padding:32, textAlign:"right", color:"#94a3b8", fontSize:13 }}>
            {rows.length === 0 ? "אין יועצים מאושרים במערכת עדיין" : "אין תוצאות לסינון הנבחר"}
          </div>
        ) : (
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13, direction:"rtl" }}>
            <thead>
              <tr style={{ background:"#f8fafc", borderBottom:"2px solid #e2e8f0" }}>
                {["פרויקט","שטח (מ״ר)","תחום","שם יועץ","אחוז","סכום (ש״ח)"].map(h => (
                  <th key={h} style={{ padding:"9px 14px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((r, i) => (
                <tr key={i} style={{ borderBottom:"1px solid #f1f5f9", background:i%2===0?"#fff":"#fafbfd" }}>
                  <td style={{ padding:"10px 14px", fontWeight:600, color:"#1e293b" }}>{r.projName}</td>
                  <td style={{ padding:"10px 14px", color:"#374151" }}>{r.area ? r.area.toLocaleString("en-US") : "—"}</td>
                  <td style={{ padding:"10px 14px", color:"#374151" }}>{r.field}</td>
                  <td style={{ padding:"10px 14px", color:"#374151" }}>{r.consultant}</td>
                  <td style={{ padding:"10px 14px", color:"#374151" }}>
                    {r.payType === "אחוזים" ? `${r.value}%` : "—"}
                  </td>
                  <td style={{ padding:"10px 14px", color:"#1e293b" }}>{fmt(r.fee)}</td>
                </tr>
              ))}
            </tbody>
            {filtered.filter(r => r.fee > 0).length > 0 && (
              <tfoot>
                <tr style={{ background:"#f8fafc", borderTop:"2px solid #e2e8f0" }}>
                  <td colSpan={5} style={{ padding:"10px 14px", textAlign:"right", fontWeight:700, color:"#374151", fontSize:13 }}>
                    ממוצע ({filtered.filter(r=>r.fee>0).length} יועצים)
                  </td>
                  <td style={{ padding:"10px 14px", fontWeight:700, color:"#1e293b", fontSize:13 }}>
                    {fmt(filtered.filter(r=>r.fee>0).reduce((s,r)=>s+r.fee,0) / filtered.filter(r=>r.fee>0).length)}
                  </td>
                </tr>
              </tfoot>
            )}
          </table>
        )}
      </Card>
    </div>
  );
}

// ── Global page: לוח בקרה ──────────────────────────────────────────────────
function DashboardPage({ allData, projects, onNavigate, milestones }) {
  const fmt = n => n ? Number(n).toLocaleString("he-IL",{style:"currency",currency:"ILS",maximumFractionDigits:0}) : "—";
  const [highlightKey, setHighlightKey] = React.useState(null);

  // Zone A: ממתין להמלצה על יועצים (מנהל מחלקה)
  // Zone B: ממתין לאישור מנהל פרויקט (חשבונות)
  // Zone C: הוחזר ליועץ לתיקון
  // Zone 2: ממתין להעברה לחברה העירונית
  // Zone 3: ממתין לאישור החברה העירונית
  const zoneA = [], zoneB = [], zoneC = [], zone2 = [], zone3 = [];

  projects.forEach(proj => {
    // ── Consultant quotes ──
    const quotes = (allData[proj.id]?.quotes) || [];
    quotes.forEach(field => {
      if (field.readyToRecommend) {
        const alreadyApproved = field.consultants.some(c => c.name?.trim() && c.approved);
        const namedConsultants = field.consultants.filter(c => c.name?.trim());
        const anyRecommended = namedConsultants.some(c => c.recommended);
        if (!anyRecommended && !alreadyApproved && namedConsultants.length > 0)
          zoneA.push({ projId: proj.id, projName: proj.name, fieldId: field.id, fieldName: field.fieldName,
            label: "—", value: null, type:"consultant", key: `z1-${proj.id}-${field.id}`, tab:"quotes",
            createdAt: Math.min(...pending.map(c => c.createdAt || c.id)) });
      }
      field.consultants.filter(c => c.name?.trim() && c.recommended && !c.sentToMunicipality && !c.approved).forEach(c =>
        zone2.push({ projId: proj.id, projName: proj.name, fieldId: field.id, fieldName: field.fieldName,
          label: c.name, value: c.value, payType: c.payType, type:"consultant", key: `z2-${proj.id}-${field.id}-${c.id}`, tab:"quotes",
          createdAt: c.createdAt || c.id })
      );
      field.consultants.filter(c => c.name?.trim() && c.sentToMunicipality && !c.approved).forEach(c =>
        zone3.push({ projId: proj.id, projName: proj.name, fieldId: field.id, fieldName: field.fieldName,
          label: c.name, value: c.value, payType: c.payType, type:"consultant", key: `z3-${proj.id}-${field.id}-${c.id}`, tab:"quotes",
          createdAt: c.createdAt || c.id })
      );
    });

    // ── Increases ──
    const consultants = (allData[proj.id]?.consultants) || [];
    consultants.forEach(con => {
      (con.increases || []).forEach(x => {
        const base = { projId: proj.id, projName: proj.name, fieldName: con.role || con.name,
          label: con.name, value: x.amount, payType:"סכום קבוע", type:"increase", tab:"consultants",
          consultantId: con.id, increaseId: x.id, fieldId: null, tooltip: x.reason,
          createdAt: x.createdAt || x.id };
        if (!x.sentToManager && !x.approvedIncrease)
          zoneA.push({ ...base, key:`iz1-${proj.id}-${con.id}-${x.id}` });
        else if (x.sentToManager && !x.sentToMunicipality && !x.approvedIncrease)
          zone2.push({ ...base, key:`iz2-${proj.id}-${con.id}-${x.id}` });
        else if (x.sentToMunicipality && !x.approvedIncrease)
          zone3.push({ ...base, key:`iz3-${proj.id}-${con.id}-${x.id}` });
      });
    });

    // ── Invoices ──
    const accounts = (allData[proj.id]?.accounts) || [];
    // Build consultant→field map from quotes
    const consultantFieldMap = {};
    (allData[proj.id]?.quotes || []).forEach(field => {
      (field.consultants || []).forEach(c => {
        if (c.name?.trim()) consultantFieldMap[c.name.trim()] = field.fieldName || "";
      });
    });
    // Build rowKey→milestone name map
    const milestoneNameMap = {};
    const companyId = allData[proj.id]?.companyId || "";
    if (companyId && milestones?.[companyId]) {
      Object.values(milestones[companyId]).forEach(mList => {
        (mList || []).forEach(m => { milestoneNameMap["m-"+m.id] = m.name || ""; });
      });
    }
    // Increases as milestone-like rows
    (allData[proj.id]?.consultants || []).forEach(con => {
      (con.increases || []).forEach(x => { milestoneNameMap["i-"+x.id] = x.reason || "הגדלה"; });
    });
    accounts.forEach(inv => {
      // Skip if no meaningful amount (must be positive number)
      if (!inv.amount || Number(inv.amount) <= 0) return;
      // Skip if no invoice number
      if (!inv.invoiceNum) return;
      // Off dashboard if approved by municipality or rejected
      if (inv.toMunicipality || inv.rejected) return;
      const base = { projId: proj.id, projName: proj.name,
        fieldName: consultantFieldMap[inv.consultantName?.trim()] || "",
        label: inv.consultantName || "",
        detail: inv.invoiceNum ? `חשבון ${inv.invoiceNum}` : "חשבון ללא מספר",
        milestoneName: milestoneNameMap[inv.rowKey] || "",
        value: inv.amount, payType:"סכום קבוע", type:"invoice", tab:"accounts",
        fieldId: null, tooltip: inv.reason || "", invoiceId: inv.id,
        createdAt: inv.createdAt || inv.id };
      if (inv.toConsultant)
        zoneC.push({ ...base, key:`invc-${proj.id}-${inv.id}` });
      else if (!inv.pmApproved)
        zoneB.push({ ...base, key:`inv1-${proj.id}-${inv.id}` });
      else if (inv.pmApproved && !inv.unitManagerApproved)
        zone2.push({ ...base, key:`inv2-${proj.id}-${inv.id}` });
      else if (inv.unitManagerApproved && !inv.toMunicipality)
        zone3.push({ ...base, key:`inv3-${proj.id}-${inv.id}` });
    });
  });

  const handleClick = (item) => {
    setHighlightKey(item.key);
    setTimeout(() => setHighlightKey(null), 1200);
    onNavigate(item.projId, item.tab, item.fieldId, item.consultantId || null, item.increaseId || null, item.invoiceId || null);
  };

  const fmtVal = (item) => {
    if (!item.value) return "—";
    return item.payType === "אחוזים" ? item.value + "%" : fmt(item.value);
  };

  const TypeBadge = ({ type }) => (
    <span style={{ fontSize:11, fontWeight:700, padding:"2px 8px", borderRadius:10,
      background: type==="increase" ? "#fff7ed" : type==="invoice" ? "#f0fdf4" : "#eff6ff",
      color: type==="increase" ? "#d97706" : type==="invoice" ? "#16a34a" : "#2563eb" }}>
      {type==="increase" ? "הגדלה" : type==="invoice" ? "חשבון" : "יועץ"}
    </span>
  );

  const ZoneTable = ({ title, items, color, bg, border, icon, emptyText }) => (
    <Card style={{ padding:0, overflow:"hidden" }}>
      <div style={{ padding:"14px 20px", background:bg, borderBottom:"2px solid "+border, display:"flex", alignItems:"center", gap:10 }}>
        <span style={{ fontSize:20 }}>{icon}</span>
        <div>
          <div style={{ fontWeight:800, fontSize:15, color }}>{title}</div>
          <div style={{ fontSize:12, color:"#64748b", marginTop:1 }}>{items.length} פריטים ממתינים</div>
        </div>
      </div>
      {items.length === 0 ? (
        <div style={{ padding:"22px 20px", color:"#94a3b8", fontSize:13, textAlign:"right" }}>✓ {emptyText}</div>
      ) : (
        <table style={{ width:"100%", borderCollapse:"collapse", direction:"rtl" }}>
          <thead>
            <tr style={{ background:"#f8fafc" }}>
              {[["סוג",70],["פרויקט",160],["תחום",110],["יועץ",120],["פרט",110],["סכום",90],["תאריך",85]].map(([h,w]) => (
                <th key={h} style={{ padding:"9px 10px", textAlign:"right", fontSize:11, fontWeight:700, color:"#94a3b8", borderBottom:"1px solid #e2e8f0", width:w }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {items.map((item, i) => {
              const isHighlighted = highlightKey === item.key;
              return (
                <tr key={item.key} onClick={() => handleClick(item)}
                  style={{ cursor:"pointer", borderBottom: i<items.length-1?"1px solid #f1f5f9":"none",
                    background: isHighlighted ? "#dbeafe" : i%2===0?"#fff":"#fafbfd", transition:"background .15s" }}
                  onMouseOver={e => { if(!isHighlighted) e.currentTarget.style.background="#f0f9ff"; }}
                  onMouseOut={e  => { if(!isHighlighted) e.currentTarget.style.background=i%2===0?"#fff":"#fafbfd"; }}>
                  <td style={{ padding:"11px 10px" }}><TypeBadge type={item.type} /></td>
                  <td style={{ padding:"11px 10px", fontSize:13, fontWeight:600, color:"#1e293b", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.projName}</td>
                  <td style={{ padding:"11px 10px", fontSize:13, color:"#374151", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.fieldName}</td>
                  <td style={{ padding:"11px 10px", fontSize:13, color:"#374151", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.label !== "—" ? item.label : "—"}</td>
                  <td style={{ padding:"11px 10px", fontSize:13, color:"#374151", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.detail || item.tooltip || "—"}</td>
                  <td style={{ padding:"11px 10px", fontSize:13, fontWeight:700, color, whiteSpace:"nowrap" }}>{fmtVal(item)}</td>
                  <td style={{ padding:"11px 10px", fontSize:12, color:"#94a3b8", whiteSpace:"nowrap" }}>
                    {new Date(item.createdAt || Date.now()).toLocaleDateString("en-GB")}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      )}
    </Card>
  );

  const COLS = [["סוג",80],["פרויקט",200],["תחום",130],["יועץ",140],["פרט",130],["סכום",110],["תאריך",100]];

  const zones = [
    { title:"ממתין להמלצה על יועצים / אישור מנהל הגדלות", items:zoneA, color:"#374151", bg:"#fffbeb", border:"#fde68a", icon:"⏳", emptyText:"אין פריטים ממתינים" },
    { title:"ממתין לאישור מנהל פרויקט",                    items:zoneB, color:"#0891b2", bg:"#ecfeff", border:"#a5f3fc", icon:"👤", emptyText:"אין חשבונות הממתינים לאישור מנהל פרויקט" },
    { title:"הוחזר ליועץ לתיקון",                           items:zoneC, color:"#dc2626", bg:"#fef2f2", border:"#fecaca", icon:"↩️", emptyText:"אין חשבונות שהוחזרו ליועץ" },
    { title:"ממתין להעברה לחברה העירונית",                  items:zone2, color:"#334155", bg:"#eff6ff", border:"#bfdbfe", icon:"📤", emptyText:"אין פריטים הממתינים להעברה" },
    { title:"ממתינים לאישור החברה העירונית",                items:zone3, color:"#374151", bg:"#f5f3ff", border:"#ddd6fe", icon:"🏛️", emptyText:"אין פריטים הממתינים לאישור" },
  ];

  return (
    <div className="fade" style={{ padding:"34px 38px", display:"flex", flexDirection:"column", gap:0 }}>
      <div style={{ marginBottom:24 }}>
        <div style={{ fontSize:11, color:"#475569", fontWeight:700, letterSpacing:3, marginBottom:4 }}>גיליון גלובלי</div>
        <h1 style={{ fontSize:26, fontWeight:900, color:"#1e293b" }}>לוח בקרה</h1>
        <div style={{ fontSize:13, color:"#64748b", marginTop:2 }}>מעקב סטטוס יועצים, הגדלות וחשבונות בכל הפרויקטים</div>
      </div>

      <Card style={{ padding:0, overflow:"hidden" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", direction:"rtl", tableLayout:"fixed" }}>
          <colgroup>
            {COLS.map(([,w]) => <col key={w} style={{ width:w }} />)}
          </colgroup>
          <tbody>
            {zones.map(zone => (
              <React.Fragment key={zone.title}>
                {/* Zone header row */}
                <tr style={{ background: zone.bg, borderTop:"3px solid "+zone.border }}>
                  <td colSpan={COLS.length} style={{ padding:"14px 20px" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                      <span style={{ fontSize:20 }}>{zone.icon}</span>
                      <div>
                        <div style={{ fontWeight:800, fontSize:15, color:zone.color }}>{zone.title}</div>
                        <div style={{ fontSize:12, color:"#64748b", marginTop:1 }}>{zone.items.length} פריטים ממתינים</div>
                      </div>
                    </div>
                  </td>
                </tr>
                {/* Column headers */}
                <tr style={{ background:"#f8fafc", borderBottom:"1px solid #e2e8f0" }}>
                  {COLS.map(([h]) => (
                    <th key={h} style={{ padding:"8px 18px", textAlign:"right", fontSize:11, fontWeight:700, color:"#94a3b8" }}>{h}</th>
                  ))}
                </tr>
                {/* Items or empty */}
                {zone.items.length === 0 ? (
                  <tr>
                    <td colSpan={COLS.length} style={{ padding:"18px 20px", color:"#94a3b8", fontSize:13, textAlign:"right", borderBottom:"2px solid #f1f5f9" }}>✓ {zone.emptyText}</td>
                  </tr>
                ) : zone.items.map((item, i) => {
                  const isHighlighted = highlightKey === item.key;
                  const isLast = i === zone.items.length - 1;
                  return (
                    <tr key={item.key} onClick={() => handleClick(item)}
                      style={{ cursor:"pointer",
                        borderBottom: isLast ? "2px solid #f1f5f9" : "1px solid #f1f5f9",
                        background: isHighlighted ? "#dbeafe" : i%2===0?"#fff":"#fafbfd",
                        transition:"background .15s" }}
                      onMouseOver={e => { if(!isHighlighted) e.currentTarget.style.background="#f0f9ff"; }}
                      onMouseOut={e  => { if(!isHighlighted) e.currentTarget.style.background=i%2===0?"#fff":"#fafbfd"; }}>
                      <td style={{ padding:"11px 18px" }}><TypeBadge type={item.type} /></td>
                      <td style={{ padding:"11px 18px", fontSize:13, fontWeight:600, color:"#1e293b", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.projName}</td>
                      <td style={{ padding:"11px 18px", fontSize:13, color:"#374151", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.fieldName}</td>
                      <td style={{ padding:"11px 18px", fontSize:13, color:"#374151", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.label !== "—" ? item.label : "—"}</td>
                      <td style={{ padding:"11px 18px", fontSize:13, color:"#374151", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.detail || item.tooltip || "—"}</td>
                      <td style={{ padding:"11px 18px", fontSize:13, fontWeight:700, color:zone.color, whiteSpace:"nowrap" }}>{fmtVal(item)}</td>
                      <td style={{ padding:"11px 18px", fontSize:12, color:"#94a3b8", whiteSpace:"nowrap" }}>
                        {new Date(item.createdAt || Date.now()).toLocaleDateString("en-GB")}
                      </td>
                    </tr>
                  );
                })}
              </React.Fragment>
            ))}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

function ProjectNumber({ value, onChange }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value);
  React.useEffect(() => { setVal(value); }, [value]);
  const save = () => { onChange(val); setEditing(false); };
  if (editing) return (
    <input autoFocus value={val} onChange={e=>setVal(e.target.value)}
      onBlur={save} onKeyDown={e=>{if(e.key==="Enter")save();if(e.key==="Escape")setEditing(false);}}
      placeholder="מס׳ פרויקט"
      style={{ fontSize:14, color:"#475569", background:"#f8fafc", border:"1.5px solid #3b82f6", borderRadius:6, padding:"3px 8px", fontFamily:"'Heebo',sans-serif", outline:"none", width:120, textAlign:"right" }} />
  );
  return (
    <span onClick={()=>{setVal(value);setEditing(true);}}
      style={{ fontSize:14, color: value?"#475569":"#cbd5e1", cursor:"pointer", paddingBottom:1 }}>
      {value || "מס׳ פרויקט"}
    </span>
  );
}

function EditableYear({ year, onChange }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(year);
  if (editing) return (
    <input autoFocus type="number" value={val}
      onChange={e => setVal(e.target.value)}
      onBlur={() => { if(val && String(val).length===4) onChange(Number(val)); setEditing(false); }}
      onKeyDown={e => { if(e.key==="Enter"){ if(val && String(val).length===4) onChange(Number(val)); setEditing(false); } if(e.key==="Escape") setEditing(false); }}
      style={{ width:70, fontSize:13, color:"#64748b", background:"#f1f5f9", border:"1px solid #cbd5e1", borderRadius:6, padding:"2px 7px", fontFamily:"'Heebo',sans-serif", outline:"none", textAlign:"center" }} />
  );
  return (
    <span onClick={() => { setVal(year); setEditing(true); }}
      style={{ fontSize:13, color:"#94a3b8", cursor:"pointer" }}
      title="לחץ לעריכת שנה">
      {year} ✎
    </span>
  );
}

// ── Tab: פתיחת פרויקט ────────────────────────────────────────────────────────
function OpeningTab({ data, setData, budgetState, setBudgetState, statsRows }) {
  const upd = (k, v) => setData({ ...(data||{}), [k]: v });
  const updBudget = (k, v) => setBudgetState({ ...(budgetState||{}), [k]: v });

  const contractorEst = Number(String(data?.contractorEst||"").replace(/,/g,""));
  const devPct = Number((statsRows||[]).find(r=>r.field==="פיתוח")?.pct || 0);
  const archBase = contractorEst ? contractorEst - contractorEst * devPct / 100 : 0;

  const rows = [
    { key:"address",         label:"כתובת",                              type:"text" },
    { key:"workDescription", label:"מהות העבודה",                        type:"text" },
    { key:"startDate",       label:"תאריך התחלה מתוכנן",                 type:"date" },
    { key:"endDate",         label:"תאריך סיום מתוכנן",                  type:"date" },
    { key:"buildingArea",    label:"שטח מבנה",                            type:"text" },
    { key:"municipalEst",    label:"אומדן עירוני לפרויקט (הערכה ראשונית)", type:"text" },
    { key:"contractorEst",   label:"עלות קבלנית (הערכה ראשונית)",         type:"text", linked:true },
    { key:"archBase",        label:"ערך מבנה לאדריכל",                   type:"calc" },
    { key:"elevators",       label:"כמות מעליות (הערכה)",                 type:"text" },
    { key:"trees",           label:"כמות עצים",                           type:"text" },
  ];

  return (
    <div style={{ maxWidth:700 }}>
      <table style={{ width:"100%", borderCollapse:"collapse", border:"1px solid #e2e8f0", borderRadius:8, overflow:"hidden" }}>
        <tbody>
          {rows.map((r, i) => (
            <tr key={r.key} style={{ background: i%2===0?"#fff":"#f8fafc" }}>
              <td style={{ padding:"10px 16px", textAlign:"right", color:"#374151", fontSize:13, width:"50%", borderBottom:"1px solid #e2e8f0", borderLeft:"1px solid #e2e8f0", verticalAlign:"middle", fontWeight: r.key==="archBase"?400:400 }}>
                {r.label}
              </td>
              <td style={{ padding:"10px 16px", textAlign:"right", fontSize:13, width:"50%", borderBottom:"1px solid #e2e8f0", verticalAlign:"middle" }}>
                  {r.type === "date" ? (
                    <FlatpickrDate value={data?.[r.key]||""} onChange={v => upd(r.key, v)}
                      style={{ width:"100%", border:"1px solid #e2e8f0", background:"#fff", textAlign:"right", fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none", color:"#1e293b", borderRadius:6, padding:"5px 8px", boxSizing:"border-box" }} />
                  ) : r.type === "calc" ? (
                    <input type="text" value={data?.[r.key]||""}
                      onChange={e => upd(r.key, e.target.value)}
                      placeholder={archBase ? archBase.toLocaleString("he-IL", {minimumFractionDigits:0, maximumFractionDigits:0}) : ""}
                      style={{ width:"100%", border:"1px solid #e2e8f0", background:"#fff", textAlign:"right", direction:"rtl", fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none", color:"#1e293b", borderRadius:6, padding:"5px 8px", boxSizing:"border-box" }}
                      onFocus={e=>e.target.style.borderColor="#475569"} onBlur={e=>e.target.style.borderColor="#e2e8f0"} />
                  ) : (
                    <input type="text" value={data?.[r.key]||""}
                      onChange={e => { upd(r.key, e.target.value); if(r.linked) updBudget("contractorEst", e.target.value.replace(/,/g,"")); }}
                      onBlur={e => {
                        const raw = e.target.value.replace(/,/g,"");
                        const num = Number(raw);
                        if (!isNaN(num) && raw !== "") upd(r.key, num.toLocaleString("en-US"));
                      }}
                      onFocus={e => {
                        const raw = (data?.[r.key]||"").replace(/,/g,"");
                        upd(r.key, raw);
                      }}
                      placeholder=""
                      style={{ width:"100%", border:"1px solid #e2e8f0", background:"#fff", textAlign:"right", direction:"rtl", fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none", color:"#1e293b", borderRadius:6, padding:"5px 8px", boxSizing:"border-box" }}
                      onFocus2={e=>e.target.style.borderColor="#475569"} onBlur2={e=>e.target.style.borderColor="#e2e8f0"} />
                  )}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function AppInner({ currentUser, userRole, setUserRole }) {
  const uid = currentUser.uid;
  const isAdmin = (userRole?.role === "admin") || false;

  const [projects, setProjects] = useState([]);

  // Load SheetJS
  useEffect(() => {
    if (window.XLSX) return;
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    document.head.appendChild(script);
  }, []);

  const [allData, setAllData] = useState({});
  const [dataLoaded, setDataLoaded] = useState(false);

  // סינון פרויקטים לפי הרשאה — אחרי שה-state מוגדר
  const visibleProjects = isAdmin
    ? projects
    : projects.filter(p => ((userRole?.projects) || []).includes(String(p.id)));

  // Load from Firestore on mount
  useEffect(() => {
    const loadData = async () => {
      try {
        const [savedProjects, savedAllData, savedSuppliers, savedCompanies, savedMilestones, savedStats] = await Promise.all([
          loadFromFirestore(uid, "projects"),
          loadFromFirestore(uid, "allData"),
          loadFromFirestore(uid, "suppliers"),
          loadFromFirestore(uid, "companies"),
          loadFromFirestore(uid, "milestones"),
          loadFromFirestore(uid, "statsRows"),
        ]);
        // אם אין נתונים ב-Firestore — טען מנתוני migration
        const m = window._MIGRATION_DATA;
        if (savedProjects)   setProjects(savedProjects);
        else if (m?.projects?.length) { setProjects(m.projects); saveToFirestore(uid,"projects",m.projects); }
        if (savedAllData && Object.keys(savedAllData).length)    setAllData(savedAllData);
        else if (m?.allData) { setAllData(m.allData); saveToFirestore(uid,"allData",m.allData); }
        if (savedSuppliers)  setSuppliers(savedSuppliers);
        else if (m?.suppliers?.length) { setSuppliers(m.suppliers); saveToFirestore(uid,"suppliers",m.suppliers); }
        if (savedCompanies)  setCompanies(savedCompanies);
        else if (m?.companies?.length) { setCompanies(m.companies); saveToFirestore(uid,"companies",m.companies); }
        if (savedMilestones) setMilestones(savedMilestones);
        else if (m?.milestones) { setMilestones(m.milestones); saveToFirestore(uid,"milestones",m.milestones); }
        if (savedStats)      setStatsRows(savedStats);
        else if (m?.statsRows?.length) { setStatsRows(m.statsRows); saveToFirestore(uid,"statsRows",m.statsRows); }
      } catch(e) {
        console.error("שגיאת טעינה:", e);
        alert("שגיאה בטעינת נתונים: " + e.message);
      }
      setDataLoaded(true);
    };
    loadData();
  }, [uid]);

  const [selectedProj, setSelectedProj] = useState(null);
  const [activeTab,    setActiveTab]    = useState("budget");
  const [highlightFieldId, setHighlightFieldId] = useState(null);
  const [openConsultantId, setOpenConsultantId] = useState(null);
  const [scrollToIncreaseId, setScrollToIncreaseId] = useState(null);
  const [openInvoiceId, setOpenInvoiceId] = useState(null);
  const [showModal,    setShowModal]    = useState(false);
  const [projSearch,   setProjSearch]   = useState("");
  const [newPForm,     setNewPForm]     = useState({ name:"", companyId:"", year:new Date().getFullYear() });
  const [toast,        setToast]        = useState(null);
  const [showStats,    setShowStats]    = useState(false);
  const [globalPage,   setGlobalPage]   = useState("dashboard");


  // ── Suppliers (global) ──────────────────────────────────────────────────────
  const [suppliers, setSuppliers] = useState([]);
  useEffect(() => { if (dataLoaded) saveToFirestore(uid, "suppliers", suppliers); }, [suppliers, dataLoaded]);

  // ── Municipal companies (global) ────────────────────────────────────────────
  const [companies, setCompanies] = useState([]);
  useEffect(() => { if (dataLoaded) saveToFirestore(uid, "companies", companies); }, [companies, dataLoaded]);

  // ── Milestones per company per profession (global) ──────────────────────────
  // structure: { [companyId]: { [profession]: [ {id,name,pct,planOnly} ] } }
  const [milestones, setMilestones] = useState({});
  useEffect(() => { if (dataLoaded) saveToFirestore(uid, "milestones", milestones); }, [milestones, dataLoaded]);

  // ── Statistics (global, persisted separately) ───────────────────────────
  const DEFAULT_STATS = [
    { id:1,  field:"אדריכלות" },
    { id:2,  field:"קונסטרוקציה" },
    { id:3,  field:"איטום" },
    { id:4,  field:"חשמל ותקשורת" },
    { id:5,  field:"מיזוג אוויר" },
    { id:6,  field:"מעליות" },
    { id:7,  field:"אינסטלציה" },
    { id:8,  field:"פיתוח" },
  ];
  const [statsRows, setStatsRows] = useState(DEFAULT_STATS.map(s => ({ ...s, pct:"" })));
  useEffect(() => { if (dataLoaded) saveToFirestore(uid, "statsRows", statsRows); }, [statsRows, dataLoaded]);

  const notify = msg => { setToast(msg); setTimeout(() => setToast(null), 2500); };

  const [showBackupModal, setShowBackupModal] = useState(false);
  const [backupText, setBackupText] = useState("");

  // Auto-save to Firestore — must be before any early return
  useEffect(() => { if (dataLoaded) saveToFirestore(uid, "projects", projects); }, [projects, dataLoaded]);
  useEffect(() => { if (dataLoaded) saveToFirestore(uid, "allData", allData); }, [allData, dataLoaded]);

  if (!dataLoaded) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Heebo',sans-serif", color:"#94a3b8", fontSize:16 }}>
      ⏳ טוען נתונים...
    </div>
  );

  // ── project CRUD ─────────────────────────────────────────────────────────
  const addProject = () => {
    if (!newPForm.name.trim()) return;
    const p = { ...newPForm, id: Date.now(), status:"", createdAt: Date.now() };
    setProjects(prev => {
      const updated = [...prev, p];
      saveProjects(updated);
      return updated;
    });
    setAllData(prev => {
      const updated = { ...prev, [p.id]: { ...makeProjectData(), companyId: newPForm.companyId||"" } };
      saveAllData(updated);
      return updated;
    });
    setNewPForm({ name:"", companyId:"", year:new Date().getFullYear() });
    setShowModal(false);
    notify("פרויקט נוסף בהצלחה!");
  };

  const deleteProject = id => {
    setProjects(prev => { const u = prev.filter(p => p.id !== id); saveProjects(u); return u; });
    setAllData(prev => { const u = {...prev}; delete u[id]; saveAllData(u); return u; });
    if (selectedProj?.id === id) setSelectedProj(null);
  };

  // ── Export project to Excel ──────────────────────────────────────────────
  const exportProjectToExcel = (proj) => {
    const XLSX = window.XLSX;
    if (!XLSX) { alert("ספריית Excel לא נטענה, נסה שוב"); return; }
    const d = allData[proj.id] || {};
    const o = d.openingData || {};
    const bs = d.budgetState || {};
    const company = companies.find(c => String(c.id) === String(d.companyId));
    const wb = XLSX.utils.book_new();

    // 1. פתיחת פרויקט
    const openingRows = [
      ["שדה","ערך"],
      ["שם פרויקט", proj.name],
      ["מספר פרויקט", d.projectNumber||""],
      ["כתובת", o.address||""],
      ["מהות העבודה", o.workDescription||""],
      ["תאריך התחלה", o.startDate||""],
      ["תאריך סיום", o.endDate||""],
      ["שטח מבנה (מ״ר)", o.buildingArea||""],
      ["אומדן עירוני", o.municipalEst||""],
      ["אומדן קבלני", o.contractorEst||""],
      ["ערך מבנה לאדריכל", o.archBase||""],
      ["כמות מעליות", o.elevators||""],
      ["כמות עצים", o.trees||""],
      ["חברה עירונית", company?.name||""],
      ["מנהל תכנון", d.planningManager||""],
      ["מנהל ביצוע", d.executionManager||""],
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(openingRows), "פתיחת פרויקט");

    // 2. הצעות מחיר יועצים
    const quotesRows = [["תחום","שם יועץ","סוג תשלום","ערך","המלצה","הועבר לחברה העירונית","היועץ אושר","הערות"]];
    (d.quotes||[]).forEach(field => {
      (field.consultants||[]).forEach(c => {
        quotesRows.push([field.fieldName||"", c.name||"", c.payType||"", c.value||"",
          c.recommended?"כן":"לא", c.sentToMunicipality?"כן":"לא", c.approved?"כן":"לא", c.notes||""]);
      });
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(quotesRows), "הצעות מחיר יועצים");

    // 3. רשימת יועצים
    const consRows = [["תחום","שם יועץ","טלפון","אימייל","איש קשר"]];
    (d.consultants||[]).forEach(c => {
      consRows.push([c.role||"", c.name||"", c.phone||"", c.email||"", c.contact||""]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(consRows), "רשימת יועצים");

    // 4. ריכוז חשבונות — build milestone name map
    const milestoneNameMap = {};
    const cId = d.companyId || "";
    if (cId && milestones?.[cId]) {
      Object.values(milestones[cId]).forEach(mList => {
        (mList||[]).forEach(m => { milestoneNameMap["m-"+m.id] = { name: m.name||"", pct: m.pct||0, planOnly: !!m.planOnly }; });
      });
    }
    (d.consultants||[]).forEach(con => {
      (con.increases||[]).forEach(x => { milestoneNameMap["i-"+x.id] = { name: x.reason||"הגדלה", pct: 100 }; });
    });

    const accRows = [["יועץ","שם אבן הדרך","אחוז אבן הדרך","מס׳ חשבון","תאריך קבלה","סכום",
      "אישור מנהל פרויקט","אישור מנהל יחידה","אישור מזמין","הוחזר ליועץ","נדחה","תכנון בלבד","הערות"]];
    (d.accounts||[]).forEach(r => {
      const ms = milestoneNameMap[r.rowKey] || { name:"", pct:"" };
      const isPlanOnly = ms.planOnly ? "כן" : "לא";
      accRows.push([
        r.consultantName||"", ms.name, ms.pct,
        r.invoiceNum||"", r.receiptDate||"", r.amount||"",
        r.pmApproved?"כן":"לא", r.unitManagerApproved?"כן":"לא",
        r.toMunicipality?"כן":"לא", r.toConsultant?"כן":"לא",
        r.rejected?"כן":"לא", isPlanOnly, r.reason||""
      ]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(accRows), "ריכוז חשבונות");

    // 5. תקציב הפרויקט
    // budgetState בדיוק כמו שה-App מעביר ל-BudgetTab
    const exportBState = {
      ...bs,
      contractorEst: String(o.contractorEst||"").replace(/,/g,"") || bs.contractorEst || "",
      municipalEst:  String(o.municipalEst||"").replace(/,/g,"")  || bs.municipalEst  || "",
    };

    // planOnlyMap בדיוק כמו שה-App מחשב לפני BudgetTab
    const exportPlanOnlyMap = {};
    (() => {
      const _cEst  = Number(exportBState.contractorEst||0);
      const _dPct  = Number((statsRows||[]).find(r=>r.field==="פיתוח")?.pct||0);
      const _aBase = _cEst - _cEst*_dPct/100;
      (d.quotes||[]).forEach(fg => {
        (fg.consultants||[]).forEach(c => {
          if (!c.approved||!c.name?.trim()) return;
          const isPct = (c.payType||"אחוזים")==="אחוזים";
          const pct   = Number(c.value||0)/100;
          let fee = 0;
          if (!isPct)                                                          fee = Number(c.value||0);
          else if ((fg.fieldName||"").includes("אדריכל")      && _cEst)       fee = _aBase * pct;
          else if ((fg.fieldName||"").includes("מנהל פרויקט") && _cEst)       fee = _cEst * pct;
          else if (_cEst) { const pp = Number((statsRows||[]).find(r=>r.field===fg.fieldName)?.pct||0)/100; fee = _cEst*pp*pct; }
          const ms = (cId && milestones?.[cId]) ? (milestones[cId]?.[fg.fieldName||""]||[]) : [];
          exportPlanOnlyMap[c.name.trim()] = (exportPlanOnlyMap[c.name.trim()]||0) +
            ms.filter(m=>m.planOnly).reduce((s,m)=>s+fee*Number(m.pct||0)/100, 0);
        });
      });
      (d.consultants||[]).forEach(con => {
        (con.increases||[]).filter(x=>x.approvedIncrease&&x.planOnly).forEach(x=>{
          exportPlanOnlyMap[con.name?.trim()||""] = (exportPlanOnlyMap[con.name?.trim()||""]||0)+Number(x.amount||0);
        });
      });
    })();

    // קורא לאותה פונקציה שמשמשת את BudgetTab — מובטח זהה למסך
    const exportAllRows = buildBudgetAllRows({
      quotesRows:      d.quotes      || [],
      consultantsRows: d.consultants || [],
      budgetState:     exportBState,
      statsRows,
      accountsRows:    d.accounts    || [],
      planOnlyMap:     exportPlanOnlyMap,
    });

    const toNum = (v) => { const n = Number(String(v||"").replace(/,/g,"").replace(/[^\d.\-]/g,"")); return isNaN(n) ? "" : n; };
    const budgetRows = [
      ["סעיף","ערך"],
      ["אומדן עירוני",       toNum(o.municipalEst  || bs.municipalEst)],
      ["אומדן קבלני",        toNum(o.contractorEst || bs.contractorEst)],
      ["כתב כמויות / מכרז", toNum(bs.tenderDocs)],
      ["חשבון קבלן סופי",   toNum(bs.finalAccount)],
      ["אישור בפועל",        toNum(bs.approvalActual)],
      ["קיזוז דמי הקמה",    toNum(bs.setupOffset)],
    ];
    (bs.extraItems||[]).forEach(x => budgetRows.push([x.desc||"תקציב שהתקבל", toNum(x.amount)]));
    budgetRows.push([]);
    budgetRows.push(["פירוט תקציב הפרויקט",""]);
    budgetRows.push(["שם המקצוע","שם היועץ","סכום התקשרות","סכום מצטבר ששולם","יתרה לתשלום","סכום התקשרות לשלב התכנון","העדר תביעות","הערות"]);

    // כותבים ישירות את השדות שכבר נמצאים ב-exportAllRows — בלי שום חישוב נוסף
    // budgetRows.length כאן = מספר השורות כולל כותרת הפירוט = index הראשון של נתוני יועצים (0-based)
    const detailDataStartRow = budgetRows.length; // זה ה-row index (0-based) של שורת יועצים ראשונה

    exportAllRows.forEach(r => {
      const baseFee   = r.payType === "אחוזים" ? r.computedFee : r.value;
      const totalFee  = baseFee + r.increases;
      const remaining = totalFee - r.paid;
      const hasBase   = !!Number(exportBState.contractorEst||0) || r.payType !== "אחוזים";
      budgetRows.push([
        r.field,
        r.name,
        !hasBase ? (r.value + "%") : totalFee,
        r.paid,
        !hasBase ? "" : remaining,
        r.planOnly > 0 ? r.planOnly : "",
        r.noClaims ? "כן" : "לא",
        r.notes,
      ]);
    });

    const budgetWsFinal = XLSX.utils.aoa_to_sheet(budgetRows);
    XLSX.utils.book_append_sheet(wb, budgetWsFinal, "תקציב הפרויקט");

    // 6. תוצאות מכרז
    const tenderRows = [["קבלן","הצעת מחיר","דירוג","הערות","נבחר"]];
    (d.tender||[]).forEach(r => {
      tenderRows.push([r.contractor||"", r.bid||"", r.rank||"", r.notes||"", r.selected?"כן":"לא"]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(tenderRows), "תוצאות מכרז");

    // 7. חשבון קבלן סופי
    const contractorRows = [["סעיף","תכנון","סופי","חשבונית","תאריך","סטטוס"]];
    (d.contractor||[]).forEach(r => {
      contractorRows.push([r.item||"", r.planned||"", r.actual||"", r.invoice||"",
        r.date||"", r.status||""]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(contractorRows), "חשבון קבלן סופי");

    const wbout = XLSX.write(wb, { bookType:"xlsx", type:"base64" });
    const a = document.createElement("a");
    a.href = "data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64," + wbout;
    a.download = `${proj.name}.xlsx`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  // ── Backup all data to JSON ──────────────────────────────────────────────
  const exportBackup = () => {
    const backup = { projects, allData, suppliers, companies, milestones, statsRows, exportedAt: new Date().toISOString() };
    const json = JSON.stringify(backup, null, 2);
    try { localStorage.setItem("proj_backup_latest", json); } catch(e) {}
    // פתיחת חלון עם הטקסט לצורך העתקה ושמירה ידנית
    setBackupText(json);
    setShowBackupModal(true);
  };

  const restoreFromStorage = () => {
    try {
      const json = localStorage.getItem("proj_backup_latest");
      if (!json) { notify("לא נמצא גיבוי שמור"); return; }
      const b = JSON.parse(json);
      if (b.projects)  { setProjects(b.projects);   saveProjects(b.projects); }
      if (b.allData)   { setAllData(b.allData);      saveAllData(b.allData); }
      if (b.suppliers) { setSuppliers(b.suppliers); }
      if (b.companies) { setCompanies(b.companies); }
      if (b.milestones){ setMilestones(b.milestones); }
      if (b.statsRows) { setStatsRows(b.statsRows); }
      notify("✅ הנתונים שוחזרו בהצלחה!");
    } catch(e) { notify("שגיאה בשחזור: " + e.message); }
  };

  const importBackup = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const b = JSON.parse(ev.target.result);
        if (b.projects) { setProjects(b.projects); saveProjects(b.projects); }
        if (b.allData)  { setAllData(b.allData);   saveAllData(b.allData); }
        if (b.suppliers){ setSuppliers(b.suppliers); }
        if (b.companies){ setCompanies(b.companies); }
        if (b.milestones){ setMilestones(b.milestones); }
        if (b.statsRows){ setStatsRows(b.statsRows); }
        notify("✅ הנתונים יובאו בהצלחה!");
      } catch { notify("קובץ לא תקין"); }
    };
    reader.readAsText(file);
  };

  // ── tab data updater ─────────────────────────────────────────────────────
  // Each tab receives its own rows array and a setter for that array only.
  const makeTabSetter = (projId, tabKey) => newRowsOrFn => {
    setAllData(prev => {
      const projData = prev[projId] || makeProjectData();
      const currentRows = projData[tabKey] || [];
      let newRows = typeof newRowsOrFn === "function" ? newRowsOrFn(currentRows) : newRowsOrFn;
      // Clean invalid invoices — remove rows with non-positive amount AND no invoiceNum AND not brand new
      if (tabKey === "accounts") {
        const now = Date.now();
        newRows = newRows.filter(r => Number(r.amount) > 0 || r.invoiceNum || (now - (r.createdAt||0)) < 60000);
      }
      // Clean increases with no amount
      if (tabKey === "consultants") {
        newRows = newRows.map(con => ({
          ...con,
          increases: (con.increases || []).filter(x => x.reason?.trim() && x.amount !== "" && x.amount !== undefined)
        }));
      }
      const updated  = { ...projData, [tabKey]: newRows };

      // When quotes change, sync approved consultants to the consultants tab
      if (tabKey === "quotes") {
        const approvedFromQuotes = [];
        newRows.forEach(fieldGroup => {
          (fieldGroup.consultants || []).forEach(c => {
            if (c.approved && c.name && c.name.trim()) {
              approvedFromQuotes.push({
                id:         "q-" + c.id,
                name:       c.name.trim(),
                role:       fieldGroup.fieldName || "",
                phone:      c.phone    || "",
                email:      c.email    || "",
                contract:   c.contract || "",
                payType:    c.payType  || "אחוזים",
                value:      c.value    || "",
                increases:  (projData.consultants || []).find(ex => ex.id === "q-"+c.id)?.increases || [],
                _fromQuote: true,
              });
            }
          });
        });
        const manualConsultants = (projData.consultants || []).filter(c => !c._fromQuote);
        updated.consultants = [...approvedFromQuotes, ...manualConsultants];
      }

      return { ...prev, [projId]: updated };
    });
  };

  // Safe accessor
  const getData = (projId, tabKey) => {
    const pd = allData[projId];
    if (!pd) return [];
    return pd[tabKey] || [];
  };

  const sc = s => statusColor(s);

  return (
    <div dir="rtl" lang="he-IL" style={{ minHeight:"100vh", background:"#f1f5f9", fontFamily:"'Heebo',sans-serif", color:"#1e293b", display:"flex" }}>
      <style>{css}</style>

      {/* ── Sidebar ── */}
      <aside style={{ width:255, background:"#fff", borderLeft:"1px solid #e2e8f0", display:"flex", flexDirection:"column", position:"sticky", top:0, height:"100vh", overflow:"hidden", flexShrink:0 }}>
        {/* Logo */}
        <div style={{ padding:"20px 18px 16px", borderBottom:"1px solid #e2e8f0" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:38, height:38, borderRadius:10, background:"linear-gradient(135deg,#3b82f6,#2563eb)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20 }}>🏗️</div>
            <div>
              <div style={{ fontSize:15, fontWeight:800, color:"#1e293b" }}>מנהל פרויקטים</div>
              <div style={{ fontSize:11, color:"#94a3b8" }}>ניהול תקציב ופיננסים</div>
            </div>
          </div>
        </div>

        {/* "פרויקטים" nav item */}
        <div style={{ padding:"12px 10px 4px" }}>
          <div className="hov-side"
            onClick={() => { setSelectedProj(null); setGlobalPage(null); }}
            style={{ display:"flex", alignItems:"center", gap:9, padding:"9px 11px", borderRadius:9, cursor:"pointer", fontSize:14, fontWeight:selectedProj?500:700, color:selectedProj?"#64748b":"#2563eb", background:selectedProj?"transparent":"#eff6ff", border:selectedProj?"1.5px solid transparent":"1.5px solid #bfdbfe", transition:"all .15s" }}>
            <span style={{ fontSize:17 }}>📁</span> פרויקטים
          </div>
        </div>

        {/* גיליון סטטיסטיקה nav item */}
        <div style={{ padding:"0 10px 2px" }}>
          <div className="hov-side"
            onClick={() => { setShowStats(true); setSelectedProj(null); setGlobalPage(null); }}
            style={{ display:"flex", alignItems:"center", gap:9, padding:"8px 11px", borderRadius:9, cursor:"pointer", fontSize:13, fontWeight:500, color:"#64748b", transition:"all .15s" }}>
            <span style={{ fontSize:16 }}>📊</span> גיליון סטטיסטיקה
          </div>
        </div>

        {/* רשימת ספקים nav item */}
        <div style={{ padding:"0 10px 2px" }}>
          <div className="hov-side"
            onClick={() => { setGlobalPage("dashboard"); setSelectedProj(null); setShowStats(false); }}
            style={{ display:"flex", alignItems:"center", gap:9, padding:"8px 11px", borderRadius:9, cursor:"pointer", fontSize:13, fontWeight:globalPage==="dashboard"?700:500, color:globalPage==="dashboard"?"#2563eb":"#64748b", background:globalPage==="dashboard"?"#eff6ff":"transparent", border:globalPage==="dashboard"?"1.5px solid #bfdbfe":"1.5px solid transparent", transition:"all .15s" }}>
            <span style={{ fontSize:16 }}>📊</span> לוח בקרה
          </div>
        </div>
        <div style={{ padding:"0 10px 2px" }}>
          <div className="hov-side"
            onClick={() => { setGlobalPage("suppliers"); setSelectedProj(null); setShowStats(false); }}
            style={{ display:"flex", alignItems:"center", gap:9, padding:"8px 11px", borderRadius:9, cursor:"pointer", fontSize:13, fontWeight:globalPage==="suppliers"?700:500, color:globalPage==="suppliers"?"#2563eb":"#64748b", background:globalPage==="suppliers"?"#eff6ff":"transparent", border:globalPage==="suppliers"?"1.5px solid #bfdbfe":"1.5px solid transparent", transition:"all .15s" }}>
            <span style={{ fontSize:16 }}>📋</span> רשימת ספקים
          </div>
        </div>

        {/* חברות עירוניות nav item */}
        <div style={{ padding:"0 10px 2px" }}>
          <div className="hov-side"
            onClick={() => { setGlobalPage("companies"); setSelectedProj(null); setShowStats(false); }}
            style={{ display:"flex", alignItems:"center", gap:9, padding:"8px 11px", borderRadius:9, cursor:"pointer", fontSize:13, fontWeight:globalPage==="companies"?700:500, color:globalPage==="companies"?"#2563eb":"#64748b", background:globalPage==="companies"?"#eff6ff":"transparent", border:globalPage==="companies"?"1.5px solid #bfdbfe":"1.5px solid transparent", transition:"all .15s" }}>
            <span style={{ fontSize:16 }}>🏛️</span> חברות עירוניות
          </div>
        </div>

        {/* אבני דרך nav item */}
        <div style={{ padding:"0 10px 4px" }}>
          <div className="hov-side"
            onClick={() => { setGlobalPage("milestones"); setSelectedProj(null); setShowStats(false); }}
            style={{ display:"flex", alignItems:"center", gap:9, padding:"8px 11px", borderRadius:9, cursor:"pointer", fontSize:13, fontWeight:globalPage==="milestones"?700:500, color:globalPage==="milestones"?"#2563eb":"#64748b", background:globalPage==="milestones"?"#eff6ff":"transparent", border:globalPage==="milestones"?"1.5px solid #bfdbfe":"1.5px solid transparent", transition:"all .15s" }}>
            <span style={{ fontSize:16 }}>🚩</span> תבניות אבני דרך
          </div>
          <div onClick={() => { setGlobalPage("maininfo"); setSelectedProj(null); setShowStats(false); }}
            style={{ display:"flex", alignItems:"center", gap:9, padding:"8px 11px", borderRadius:9, cursor:"pointer", fontSize:13, fontWeight:globalPage==="maininfo"?700:500, color:globalPage==="maininfo"?"#2563eb":"#64748b", background:globalPage==="maininfo"?"#eff6ff":"transparent", border:globalPage==="maininfo"?"1.5px solid #bfdbfe":"1.5px solid transparent", transition:"all .15s" }}>
            <span style={{ fontSize:16 }}>📋</span> מידע ראשי
          </div>
          <div onClick={() => { setGlobalPage("costs"); setSelectedProj(null); }}
            style={{ display:"flex", alignItems:"center", gap:9, padding:"8px 11px", borderRadius:9, cursor:"pointer", fontSize:13, fontWeight:globalPage==="costs"?700:500, color:globalPage==="costs"?"#2563eb":"#64748b", background:globalPage==="costs"?"#eff6ff":"transparent", border:globalPage==="costs"?"1.5px solid #bfdbfe":"1.5px solid transparent", transition:"all .15s" }}>
            <span style={{ fontSize:16 }}>📊</span> השוואת עלויות
          </div>
        </div>

        {/* User info + logout */}
        <div style={{ padding:"8px 12px", borderBottom:"1px solid #e2e8f0", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", flexDirection:"column", gap:1, overflow:"hidden" }}>
            <span style={{ fontSize:11, color:"#64748b", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:130 }}>{currentUser.email}</span>
            <span style={{ fontSize:10, color: isAdmin ? "#2563eb" : "#94a3b8", fontWeight:600 }}>{isAdmin ? "מנהל" : "משתמש"}</span>
          </div>
          <button onClick={() => { const { auth, signOut } = window._firebase; signOut(auth); }}
            style={{ background:"none", border:"1px solid #e2e8f0", borderRadius:6, padding:"3px 8px", fontSize:11, color:"#94a3b8", cursor:"pointer", fontFamily:"'Heebo',sans-serif", whiteSpace:"nowrap" }}>
            יציאה
          </button>
        </div>
        {/* ניהול משתמשים — מנהל בלבד */}
        {isAdmin && (
          <div onClick={() => { setGlobalPage("users"); setSelectedProj(null); }}
            style={{ display:"flex", alignItems:"center", gap:9, padding:"8px 11px", borderRadius:9, cursor:"pointer", fontSize:13,
              fontWeight:globalPage==="users"?700:500,
              color:globalPage==="users"?"#2563eb":"#64748b",
              background:globalPage==="users"?"#eff6ff":"transparent",
              border:globalPage==="users"?"1.5px solid #bfdbfe":"1.5px solid transparent",
              margin:"4px 8px 0" }}>
            <span style={{ fontSize:16 }}>👥</span> ניהול משתמשים
          </div>
        )}

        {/* Project list */}
        <div style={{ flex:1, overflowY:"auto", padding:"4px 10px 10px" }}>
          <div style={{ fontSize:10, color:"#94a3b8", fontWeight:700, letterSpacing:2, padding:"10px 3px 6px" }}>רשימת פרויקטים</div>
          {visibleProjects.map(p => (
            <div key={p.id} className="hov-side"
              onClick={() => { setSelectedProj(p); setActiveTab("budget"); setGlobalPage(null); }}
              style={{ display:"flex", alignItems:"center", gap:8, padding:"9px 11px", borderRadius:9, cursor:"pointer", marginBottom:2,
                background:selectedProj?.id===p.id?"#eff6ff":"transparent",
                border:selectedProj?.id===p.id?"1.5px solid #bfdbfe":"1.5px solid transparent",
                transition:"all .15s" }}>
              <div style={{ width:8, height:8, borderRadius:"50%", background:sc(p.status), flexShrink:0 }} />
              <span style={{ fontSize:13, fontWeight:selectedProj?.id===p.id?700:500, color:selectedProj?.id===p.id?"#2563eb":"#374151", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", flex:1 }}>
                {p.name}
              </span>
            </div>
          ))}

          <button onClick={() => setShowModal(true)}
            style={{ width:"100%", marginTop:8, padding:"9px 11px", borderRadius:9, border:"1.5px dashed #cbd5e1", background:"transparent", color:"#64748b", fontSize:13, fontFamily:"'Heebo',sans-serif", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:6, fontWeight:500 }}
            onMouseOver={e => { e.currentTarget.style.borderColor="#3b82f6"; e.currentTarget.style.color="#3b82f6"; }}
            onMouseOut={e  => { e.currentTarget.style.borderColor="#cbd5e1"; e.currentTarget.style.color="#64748b"; }}>
            + פרויקט חדש
          </button>
        </div>

        <div style={{ padding:"10px 16px", borderTop:"1px solid #e2e8f0", fontSize:11, color:"#94a3b8", textAlign:"right" }}>
          {projects.length} פרויקטים
        </div>
        <div style={{ padding:"10px 12px", borderTop:"1px solid #e2e8f0", display:"flex", gap:6 }}>
          <button onClick={exportBackup}
            style={{ flex:1, padding:"6px 8px", background:"#eff6ff", border:"1px solid #bfdbfe", borderRadius:7, fontSize:11, color:"#1d4ed8", cursor:"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:600 }}>
            💾 גיבוי
          </button>
          <label style={{ flex:1, padding:"6px 8px", background:"#f8fafc", border:"1px solid #e2e8f0", borderRadius:7, fontSize:11, color:"#64748b", cursor:"pointer", fontFamily:"'Heebo',sans-serif", textAlign:"center", fontWeight:600 }}>
            📂 שחזור
            <input type="file" accept=".json" style={{ display:"none" }} onChange={importBackup} />
          </label>
        </div>
      </aside>

      {/* ── Main ── */}
      <main style={{ flex:1, display:"flex", flexDirection:"column", overflowY:"auto" }}>

        {/* Global pages: dashboard / suppliers / companies / milestones */}
        {!selectedProj && globalPage === "users" && isAdmin && (
          <UserManagementPage currentUser={currentUser} projects={projects} />
        )}
        {!selectedProj && globalPage === "dashboard" && (
          <DashboardPage
            allData={allData}
            projects={projects}
            milestones={milestones}
            onNavigate={(projId, tab, fieldId, consultantId, increaseId, invoiceId) => {
              const proj = projects.find(p => p.id === projId);
              if (proj) {

            </div>

            {/* Footer note */}
            <div style={{ padding:"12px 20px", borderTop:"1px solid #e2e8f0", fontSize:11, color:"#94a3b8", textAlign:"right" }}>
              * אחוזים מבוססים על נתונים סטטיסטיים
            </div>
          </div>
        </div>
      )}

      {/* ── New project modal ── */}
      {showModal && (
        <div style={{ position:"fixed", inset:0, background:"#00000055", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000 }}
          onClick={() => setShowModal(false)}>
          <div className="fade"
            style={{ background:"#fff", borderRadius:16, padding:30, width:420, boxShadow:"0 20px 60px #0003" }}
            onClick={e => e.stopPropagation()}>
            <div style={{ fontSize:17, fontWeight:800, color:"#1e293b", marginBottom:18 }}>➕ פרויקט חדש</div>
            <div style={{ display:"flex", flexDirection:"column", gap:13 }}>
              <TextInput label="שם הפרויקט" value={newPForm.name} onChange={e=>setNewPForm({...newPForm,name:e.target.value})} placeholder="לדוגמה: בניית גן ילדים" />
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:11 }}>
                <div>
                  <div style={{ fontSize:12, color:"#64748b", fontWeight:600, marginBottom:5, textAlign:"right" }}>חברה עירונית</div>
                  <select value={newPForm.companyId||""} onChange={e=>setNewPForm({...newPForm,companyId:e.target.value})}
                    style={{ width:"100%", padding:"8px 11px", border:"1.5px solid #e2e8f0", borderRadius:8, fontSize:14, fontFamily:"'Heebo',sans-serif", background:"#f8fafc", color:"#1e293b", outline:"none", direction:"rtl" }}>
                    <option value="">-- לא נבחר --</option>
                    {companies.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
                <TextInput label="שנה" type="number" value={newPForm.year} onChange={e=>setNewPForm({...newPForm,year:e.target.value})} />
              </div>
            </div>
            <div style={{ display:"flex", gap:10, marginTop:18 }}>
              <PrimaryButton onClick={addProject}>צור פרויקט</PrimaryButton>
              <button onClick={() => setShowModal(false)}
                style={{ flex:1, background:"#f1f5f9", border:"none", borderRadius:9, padding:"9px 20px", fontSize:14, color:"#64748b", cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>
                ביטול
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Toast ── */}
      {toast && (
        <div className="fade"
          style={{ position:"fixed", bottom:22, left:"50%", transform:"translateX(-50%)", background:"#1e293b", color:"#fff", borderRadius:11, padding:"11px 22px", fontSize:14, fontWeight:600, zIndex:2000, boxShadow:"0 8px 24px #0003" }}>
          {toast}
        </div>
      )}

      {/* ── Backup Modal ── */}
      {showBackupModal && (
        <div style={{ position:"fixed", inset:0, background:"#00000070", display:"flex", alignItems:"center", justifyContent:"center", zIndex:3000 }}
          onClick={() => setShowBackupModal(false)}>
          <div className="fade" onClick={e => e.stopPropagation()}
            style={{ background:"#fff", borderRadius:16, padding:28, width:580, maxHeight:"80vh", display:"flex", flexDirection:"column", gap:16, boxShadow:"0 24px 64px #0004" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontSize:17, fontWeight:800, color:"#1e293b" }}>💾 גיבוי נתונים</div>
                <div style={{ fontSize:12, color:"#64748b", marginTop:3 }}>
                  סמני הכל ← העתיקי ← פתחי פנקס רשימות ← הדביקי ← שמרי כקובץ גיבוי.json
                </div>
              </div>
              <button onClick={() => setShowBackupModal(false)}
                style={{ background:"#f1f5f9", border:"none", borderRadius:8, width:32, height:32, fontSize:16, cursor:"pointer", color:"#64748b" }}>✕</button>
            </div>
            <button
              onClick={() => {
                const el = document.getElementById("backup-textarea");
                el.select();
                document.execCommand("copy");
                notify("✅ הועתק! כעת הדביקי בפנקס רשימות ושמרי");
              }}
              style={{ background:"linear-gradient(135deg,#3b82f6,#2563eb)", color:"#fff", border:"none", borderRadius:9, padding:"9px 20px", fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>
              📋 העתק הכל
            </button>
            <textarea
              id="backup-textarea"
              readOnly
              value={backupText}
              style={{ flex:1, minHeight:300, fontFamily:"monospace", fontSize:11, direction:"ltr", border:"1.5px solid #e2e8f0", borderRadius:8, padding:12, resize:"none", color:"#334155", background:"#f8fafc", outline:"none" }}
            />
          </div>
        </div>
      )}
    </div>
  );
}


    // Add global error handler
    window.addEventListener('error', e => {
      console.error('Global error:', e.message, e.filename, e.lineno);
    });

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      componentDidCatch(error) { this.setState({ error: error.message }); }
      render() {
        if (this.state.error) return (
          <div style={{padding:40, fontFamily:"'Heebo',sans-serif", color:"#ef4444", direction:"rtl"}}>
            <h2>שגיאה באפליקציה</h2>
            <pre style={{fontSize:12, color:"#64748b"}}>{this.state.error}</pre>
          </div>
        );
        return this.props.children;
      }
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      <ErrorBoundary><App /></ErrorBoundary>
    );
  </script>
</body>
</html>
