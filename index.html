                  <div style={{ fontSize:12, color:"#94a3b8", marginBottom: showEstForm?10:0 }}>
                    אומדן נוכחי: <strong style={{color:"#1e293b"}}>{curVal.toLocaleString("he-IL")} ₪</strong>
                  </div>
                );
              })()}
              {showEstForm && (() => {
                const newEst = Number(String(newEstAmount).replace(/[,\s]/g,"").replace(/[^\d.]/g,""));
                const newSect = Number(String(newSectAmount).replace(/[,\s]/g,"").replace(/[^\d.]/g,""));
                const supp = (isOtherPct ? newSect : newEst) ? calcSupplement(newEst) : 0;
                const showSect = isOtherPct && otherCalc && !otherCalc.noProfPct;
                const profPct = otherCalc?.profPct || 0;
                const handleContractorChange = e => {
                  const raw = e.target.value;
                  setNewEstAmount(raw);
                  if (showSect && profPct > 0) {
                    const num = Number(raw.replace(/[,\s]/g,"").replace(/[^\d.]/g,""));
                    setNewSectAmount(num > 0 ? Math.round(num * profPct / 100).toString() : "");
                  }
                };
                const handleSectChange = e => {
                  const raw = e.target.value;
                  setNewSectAmount(raw);
                  if (profPct > 0) {
                    const num = Number(raw.replace(/[,\s]/g,"").replace(/[^\d.]/g,""));
                    setNewEstAmount(num > 0 ? Math.round(num * 100 / profPct).toString() : "");
                  }
                };
                const cols = showSect ? "1fr 1fr 1fr" : "1fr 1fr";
                return (
                  <div style={{ background:"#eff6ff", borderRadius:8, padding:"10px 12px", border:"1.5px dashed #93c5fd" }}>
                    <div style={{ display:"grid", gridTemplateColumns:cols, gap:8, marginBottom:8, alignItems:"end" }}>
                      <div>
                        <label style={{ fontSize:11, fontWeight:700, color:"#64748b", display:"block", marginBottom:1 }}>
                          {isArchitect && archCalc?.manualBase ? "ערך מבנה חדש לאדריכל (₪) *" : "אומדן קבלני חדש (₪) *"}
                        </label>
                        {isArchitect && (
                          <div style={{ fontSize:10, color:"#64748b", marginBottom:3 }}>הערך לא יכלול פרקי פיתוח</div>
                        )}
                        <input value={newEstAmount} onChange={handleContractorChange}
                          placeholder="0" autoFocus={!showSect}
                          style={{ width:"100%", padding:"5px 8px", border:"1px solid #cbd5e1", borderRadius:6, fontSize:12, fontFamily:"'Heebo',sans-serif", outline:"none", boxSizing:"border-box" }} />
                      </div>
                      {showSect && (
                        <div>
                          <label style={{ fontSize:11, fontWeight:700, color:"#2563eb", display:"block", marginBottom:3 }}>
                            {'אומדן פרק חדש (ש"ח)'}
                          </label>
                          <input value={newSectAmount} onChange={handleSectChange}
                            placeholder={otherCalc?.profBase ? Math.round(otherCalc.profBase).toLocaleString("he-IL") : "0"}
                            autoFocus
                            style={{ width:"100%", padding:"5px 8px", border:"1.5px solid #93c5fd", borderRadius:6, fontSize:12, fontFamily:"'Heebo',sans-serif", outline:"none", boxSizing:"border-box", background:"#f0f9ff" }} />
                        </div>
                      )}
                      <div>
                        <label style={{ fontSize:11, fontWeight:700, color:"#64748b", display:"block", marginBottom:3 }}>תאריך תחולה *</label>
                        <FlatpickrDate value={estDate} onChange={v=>setEstDate(v)}
                          style={{ width:"100%", padding:"5px 8px", border:"1px solid #cbd5e1", borderRadius:6, fontSize:12, fontFamily:"'Heebo',sans-serif", outline:"none" }} />
                      </div>
                    </div>
                    {newEst > 0 && supp !== 0 && (
                      <div style={{ fontSize:12, marginBottom:8, padding:"6px 10px", borderRadius:6, background: supp>0?"#f0fdf4":"#fef2f2" }}>
                        הגדלה שתיווצר אוטומטית: <strong style={{ color: supp>0?"#16a34a":"#dc2626" }}>{supp>0?"+":""}{Math.round(supp).toLocaleString("he-IL")} ₪</strong>
                      </div>
                    )}
                    <div style={{ display:"flex", gap:8 }}>
                      <button onClick={saveNewEst}
                        style={{ background:"#2563eb", color:"#fff", border:"none", borderRadius:7, padding:"6px 14px", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>
                        שמור{supp!==0?" + צור הגדלה":""}
                      </button>
                      <button onClick={()=>{ setShowEstForm(false); setNewSectAmount(""); }}
                        style={{ background:"#f1f5f9", color:"#64748b", border:"none", borderRadius:7, padding:"6px 10px", fontSize:12, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>
                        ביטול
                      </button>
                    </div>
                  </div>
                );
              })()}
            </div>
          )}

          {/* Increases list */}
          {increases.length > 0 && (
            <div>
              <div style={{ fontSize:12, fontWeight:700, color:"#94a3b8", letterSpacing:1, marginBottom:8 }}>פירוט הגדלות</div>
              <div style={{ border:"1px solid #e2e8f0", borderRadius:10, overflow:"hidden", direction:"rtl" }}>
                {/* כותרות */}
                <div style={{ display:"grid", gridTemplateColumns:"1fr 160px 160px 80px", borderBottom:"2px solid #e2e8f0", background:"#f8fafc" }}>
                  {["סיבת ההגדלה","סכום","תאריך","תכנון בלבד"].map((h,i) => (
                    <div key={i} style={{ padding:"8px 12px", fontSize:11, fontWeight:700, color:"#64748b", textAlign:"right" }}>{h}</div>
                  ))}
                </div>
                {increases.map((x, ri) => (
                  <div key={x.id} id={"inc-" + x.id} style={{ display:"grid", gridTemplateColumns:"1fr 160px 160px 80px", borderBottom:ri<increases.length-1?"1px solid #e2e8f0":"none", background:"#fff" }}>
                    {/* עמודה 1: סיבה + הועבר לאישור מנהל */}
                    <div style={{ padding:"10px 12px", borderLeft:"1px solid #f1f5f9" }}>
                      <div style={{ display:"flex", alignItems:"center", direction:"rtl", gap:8, marginBottom:6 }}>
                        {!x.approvedIncrease && <DeleteButton onClick={() => delIncrease(x.id)} />}
                        <span style={{ fontWeight:600, fontSize:13, color:"#1e293b" }}>{x.reason}</span>
                      </div>
                      <label style={{ display:"flex", alignItems:"center", gap:5, fontSize:12, fontWeight:400, color: x.sentToManager ? "#374151" : "#94a3b8", cursor:"pointer", display:"flex", alignItems:"center", gap:5, direction:"rtl" }}>
                        <input type="checkbox" checked={!!x.sentToManager} onChange={e => updateIncrease(x.id,"sentToManager",e.target.checked)}
                          style={{ width:13, height:13, accentColor:"#64748b", cursor:"pointer", flexShrink:0 }} />
                        הועבר לאישור מנהל
                      </label>
                    </div>
                    {/* עמודה 2: סכום + הועבר לחברה העירונית */}
                    <div style={{ padding:"10px 12px", borderLeft:"1px solid #f1f5f9" }}>
                      <div style={{ fontWeight:700, fontSize:13, color:"#1e293b", textAlign:"right", marginBottom:6 }}>{fmt(x.amount)}</div>
                      <label style={{ display:"flex", alignItems:"center", gap:5, fontSize:12, fontWeight:400, color: x.sentToMunicipality ? "#374151" : "#94a3b8", cursor:"pointer", display:"flex", alignItems:"center", gap:5, direction:"rtl" }}>
                        <input type="checkbox" checked={!!x.sentToMunicipality} onChange={e => updateIncrease(x.id,"sentToMunicipality",e.target.checked)}
                          style={{ width:13, height:13, accentColor:"#64748b", cursor:"pointer", flexShrink:0 }} />
                        הועבר לחברה העירונית
                      </label>
                    </div>
                    {/* עמודה 3: תאריך + ההגדלה אושרה */}
                    <div style={{ padding:"10px 12px", borderLeft:"1px solid #f1f5f9" }}>
                      <div style={{ fontSize:12, color:"#64748b", textAlign:"right", marginBottom:6 }}>{x.date ? fmtDate(x.date) : "—"}</div>
                      <label style={{ display:"flex", alignItems:"center", gap:5, fontSize:12, fontWeight:400, color: x.approvedIncrease ? "#16a34a" : "#94a3b8", cursor:"pointer", display:"flex", alignItems:"center", gap:5, direction:"rtl" }}>
                        <input type="checkbox" checked={!!x.approvedIncrease} onChange={e => updateIncrease(x.id,"approvedIncrease",e.target.checked)}
                          style={{ width:13, height:13, accentColor:"#16a34a", cursor:"pointer", flexShrink:0 }} />
                        ההגדלה אושרה
                      </label>
                    </div>
                    {/* עמודה 4: תכנון בלבד */}
                    <div style={{ padding:"10px 12px", borderLeft:"1px solid #f1f5f9", display:"flex", justifyContent:"flex-start", alignItems:"flex-start", direction:"rtl" }}>
                      <input type="checkbox" checked={!!x.planOnly} onChange={e => updateIncrease(x.id,"planOnly",e.target.checked)}
                        style={{ width:14, height:14, cursor:"pointer", marginTop:2 }} />
                    </div>

                  </div>
                ))}
              </div>
            </div>
          )}

          {/* סה"כ הגדלות */}
          {totalInc !== 0 && (
            <div style={{ padding:"11px 16px", background:"#f8fafc", borderRadius:10, border:"1px solid #e2e8f0", display:"grid", gridTemplateColumns:"230px 1fr", alignItems:"center" }}>
              <span style={{ fontWeight:700, fontSize:13, color: totalInc < 0 ? "#dc2626" : "#374151", flex:1, textAlign:"right" }}>סה״כ הגדלות {totalInc < 0 ? "(הפחתה)" : ""}</span>
              <span style={{ fontWeight:800, fontSize:16, color: totalInc < 0 ? "#dc2626" : "#1e293b", minWidth:120, flexShrink:0, textAlign:"right" }}>{fmt(totalInc)}</span>
            </div>
          )}

          {/* סה"כ שכר טרחה כולל הגדלות */}
          {totalInc !== 0 && (
            <div style={{ padding:"11px 16px", background:"#f8fafc", borderRadius:10, border:"1px solid #e2e8f0", display:"grid", gridTemplateColumns:"230px 1fr", alignItems:"center" }}>
              <span style={{ fontWeight:700, fontSize:13, color:"#374151", flex:1, textAlign:"right" }}>סה״כ שכר טרחה כולל הגדלות</span>
              <span style={{ fontWeight:800, fontSize:16, color:"#374151", minWidth:120, flexShrink:0, textAlign:"right" }}>
                {isArchitect && archCalc ? fmt(archCalc.archFee + totalInc)
                  : isPM && pmCalc ? fmt(pmCalc.pmFee + totalInc)
                  : isOtherPct && otherCalc ? fmt(otherCalc.conFee + totalInc)
                  : fmt(baseVal + totalInc)}
              </span>
            </div>
          )}

          {/* הוסף הגדלה */}
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#94a3b8", letterSpacing:1, marginBottom:8 }}>הוסף הגדלה</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 120px 150px 80px auto", gap:10 }}>
              {/* כותרות */}
              <div style={{ fontSize:12, color:"#64748b", fontWeight:600, textAlign:"right" }}>סיבת ההגדלה</div>
              <div style={{ fontSize:12, color:"#64748b", fontWeight:600, textAlign:"right" }}>סכום (₪)</div>
              <div style={{ fontSize:12, color:"#64748b", fontWeight:600, textAlign:"right" }}>תאריך</div>
              <div style={{ fontSize:12, color:"#64748b", fontWeight:600, textAlign:"right" }}>תכנון בלבד</div>
              <div />
              {/* שדות */}
              <input value={inc.reason} onChange={e=>setInc({...inc,reason:e.target.value})}
                placeholder="לדוגמה: תוספת תכנון"
                style={{ background:"#f8fafc", border:"1.5px solid #e2e8f0", borderRadius:8, padding:"8px 11px", fontSize:14, color:"#1e293b", fontFamily:"'Heebo',sans-serif", outline:"none", direction:"rtl" }}
                onFocus={e=>e.target.style.borderColor="#475569"} onBlur={e=>e.target.style.borderColor="#e2e8f0"} />
              <input type="number" value={inc.amount} onChange={e=>setInc({...inc,amount:e.target.value})}
                style={{ background:"#f8fafc", border:"1.5px solid #e2e8f0", borderRadius:8, padding:"8px 11px", fontSize:14, color:"#1e293b", fontFamily:"'Heebo',sans-serif", outline:"none", textAlign:"right" }}
                onFocus={e=>e.target.style.borderColor="#475569"} onBlur={e=>e.target.style.borderColor="#e2e8f0"} />
              <FlatpickrDate value={inc.date} onChange={v=>setInc({...inc,date:v})}
                style={{ background:"#f8fafc", border:"1.5px solid #e2e8f0", borderRadius:8, padding:"8px 11px", fontSize:14, color:"#1e293b", fontFamily:"'Heebo',sans-serif", outline:"none" }} />
              <div style={{ display:"flex", justifyContent:"center", alignItems:"center" }}>
                <input type="checkbox" checked={!!inc.planOnly} onChange={e=>setInc({...inc,planOnly:e.target.checked})}
                  style={{ width:16, height:16, cursor:"pointer" }} />
              </div>
              <PrimaryButton onClick={addIncrease}>+ הוסף</PrimaryButton>
            </div>
          </div>
        </div>
      </div>
    </div>
    </>
  );
}

function ConsultantsTab({ rows, setRows, quotesRows, budgetState, statsRows, openConsultantId, scrollToIncreaseId, suppliers, projectName, openingData, setOpeningData, projectMeta }) {
  const [openId, setOpenId] = useState(openConsultantId || null);
  const [search, setSearch] = useState("");

  React.useEffect(() => {
    if (openConsultantId) setOpenId(openConsultantId);
  }, [openConsultantId]);

  // Always enrich consultant with live value/payType from quotes
  const enrich = (consultant) => {
    if (!quotesRows) return consultant;
    for (const fg of quotesRows) {
      for (const c of (fg.consultants || [])) {
        if ("q-"+c.id === consultant.id) {
          return { ...consultant, value: c.value, payType: c.payType || "אחוזים" };
        }
      }
    }
    return consultant;
  };

  const open = (() => { const r = rows.find(r => r.id === openId); return r ? enrich(r) : null; })();

  const saveConsultant = updated => {
    setRows(prev => prev.map(r => r.id === updated.id ? updated : r));
  };

  const exportToExcel = () => {
    const dataRows = [];
    rows.forEach(r => {
      const sm = (suppliers||[]).find(s => s.name === r.name);
      const cts = r.contacts?.length > 0
        ? r.contacts.map(c => ({ name: c.name||c.contact||"", phone: c.phone||"", phone2: c.phone2||"", email: c.email||"" }))
        : sm?.contacts?.length > 0

// ── DatePickerCell: DD/MM/YYYY date input independent of browser locale ────────
function DatePickerCell({ value, onChange, style }) {
  // value stored as YYYY-MM-DD internally
  const toISO  = (d,m,y) => y && m && d ? `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}` : "";
  const fromISO = iso => { if (!iso) return {d:"",m:"",y:""}; const [y,m,d]=iso.split("-"); return {d:String(Number(d)),m:String(Number(m)),y}; };

  const parts = fromISO(value);
  const [d, setD] = React.useState(parts.d);
  const [m, setM] = React.useState(parts.m);
  const [y, setY] = React.useState(parts.y);

  React.useEffect(() => {
    const p = fromISO(value);
    setD(p.d); setM(p.m); setY(p.y);
  }, [value]);

  const commit = (nd,nm,ny) => {
    const iso = toISO(nd,nm,ny);
    if (iso) onChange(iso);
  };

  const inp = (val, setter, max, next) => ({
    value: val,
    onChange: e => {
      const v = e.target.value.replace(/\D/g,"").slice(0,next==="y"?2:2);
      setter(v);
      if (v.length === 2 && next) document.getElementById(next)?.focus();
    },
    onBlur: e => {
      const v = e.target.value;
      commit(setter===setD?v:d, setter===setM?v:m, setter===setY?v:y);
    }
  });

  const base = { width:28, border:"none", borderBottom:"1.5px solid #cbd5e1", padding:"2px 2px",
    fontSize:11, fontFamily:"'Heebo',sans-serif", outline:"none", textAlign:"right",
    background:"transparent", ...style };

  return (
    <div style={{ display:"flex", alignItems:"center", gap:1, background:"#f8fafc",
      border:"1px solid #e2e8f0", borderRadius:5, padding:"3px 6px", width:"fit-content" }}>
      <input id={"dp-d"} placeholder="DD" maxLength={2} {...inp(d,setD,31,"dp-m")} style={{...base}} />
      <span style={{ color:"#94a3b8", fontSize:11 }}>/</span>
      <input id={"dp-m"} placeholder="MM" maxLength={2} {...inp(m,setM,12,"dp-y")} style={{...base}} />
      <span style={{ color:"#94a3b8", fontSize:11 }}>/</span>
      <input id={"dp-y"} placeholder="YYYY" maxLength={4} value={y}
        onChange={e=>{ const v=e.target.value.replace(/\D/g,"").slice(0,4); setY(v); }}
        onBlur={e=>commit(d,m,e.target.value)}
        style={{...base, width:38, borderBottom:"1.5px solid #cbd5e1"}} />
    </div>
  );
}

// ── FlatpickrDate: date picker with DD/MM/YYYY format ──────────────────────
function FlatpickrDate({ value, onChange, style }) {
  const ref = useRef(null);
  const fpRef = useRef(null);
  const onChangeRef = useRef(onChange);
  onChangeRef.current = onChange; // always keep latest, no stale closure

  useEffect(() => {
    // Load flatpickr CSS + JS dynamically
    const loadFlatpickr = () => {
      if (window.flatpickr) { initFp(); return; }
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = "https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css";
      document.head.appendChild(link);
      const script = document.createElement("script");
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js";
      script.onload = initFp;
      document.head.appendChild(script);
    };
    const initFp = () => {
      if (fpRef.current) fpRef.current.destroy();
      fpRef.current = window.flatpickr(ref.current, {
        dateFormat: "d/m/Y",
        allowInput: true,
        locale: { firstDayOfWeek: 0 },
        onChange: ([date]) => {
          if (!date) return;
          // store as YYYY-MM-DD internally
          const y = date.getFullYear();
          const m = String(date.getMonth()+1).padStart(2,"0");
          const d = String(date.getDate()).padStart(2,"0");
          onChangeRef.current(`${y}-${m}-${d}`); // always calls latest onChange
        }
      });
      // set initial value
      if (value) {
        const [y,m,d] = value.split("-");
        if (y&&m&&d) fpRef.current.setDate(`${d}/${m}/${y}`, false);
      }
    };
    loadFlatpickr();
    return () => { if (fpRef.current) fpRef.current.destroy(); };
  }, []);

  // sync external value changes
  useEffect(() => {
    if (fpRef.current && value) {
      const [y,m,d] = value.split("-");
      if (y&&m&&d) fpRef.current.setDate(`${d}/${m}/${y}`, false);
    } else if (fpRef.current && !value) {
      fpRef.current.clear();
    }
  }, [value]);

  return (
    <input ref={ref} type="text" placeholder="DD/MM/YYYY" readOnly
      style={{ padding:"3px 5px", border:"1px solid #e2e8f0", borderRadius:5,
        fontSize:11, fontFamily:"'Heebo',sans-serif", outline:"none",
        background:"#fff", cursor:"pointer", width:105, ...style }} />
  );
}

// ── NumericCell: uncontrolled input that allows free typing ─────────────────
function NumericCell({ value, baseAmt, mode, onCommit, style, placeholder }) {
  const [focused, setFocused] = React.useState(false);
  // raw = plain number string for editing; displayed = formatted with commas
  const rawRef = React.useRef(String(value||""));
  const [display, setDisplay] = React.useState(String(value||""));

  // format a number string with commas
  const fmtNum = v => {
    const n = parseFloat(v);
    if (isNaN(n)) return v;
    const hasDecimal = n !== Math.floor(n);
    return n.toLocaleString("he-IL", { minimumFractionDigits: hasDecimal ? 2 : 0, maximumFractionDigits: 2 });
  };

  // sync external value changes
  React.useEffect(() => {
    if (!focused) {
      rawRef.current = String(value||"");
      setDisplay(value ? fmtNum(String(value)) : "");
    }
  }, [value, focused]);

  const handleFocus = () => {
    setFocused(true);
    // show raw number without commas for editing
    setDisplay(rawRef.current);
  };

  const handleChange = e => {
    setDisplay(e.target.value);
    rawRef.current = e.target.value;
  };

  const handleBlur = () => {
    setFocused(false);
    const num = parseFloat(rawRef.current);
    if (isNaN(num)) { setDisplay(""); onCommit("", ""); return; }
    const fixed = num.toFixed(2);
    rawRef.current = fixed;
    setDisplay(fmtNum(fixed));
    if (mode === "amount") {
      const pct = baseAmt ? (num / baseAmt * 100).toFixed(2) : "";
      onCommit(fixed, pct);
    } else {
      const amt = baseAmt ? (num / 100 * baseAmt).toFixed(2) : "";
      onCommit(fixed, amt);
    }
  };

  return (
    <input
      type="text"
      inputMode="decimal"
      value={display}
      onChange={handleChange}
      onFocus={handleFocus}
      onBlur={handleBlur}
      placeholder={placeholder||""}
      style={{ padding:"3px 5px", border:"1px solid #e2e8f0", borderRadius:5, fontSize:11,
        fontFamily:"'Heebo',sans-serif", outline:"none", textAlign:"right", ...style }}
    />
  );
}

// ── Tab: ריכוז חשבונות ────────────────────────────────────────────────────────
// Local-state textarea to avoid stale-closure single-char bug
function ReasonCell({ value, onCommit }) {
  const [local, setLocal] = React.useState(value);
  React.useEffect(() => { setLocal(value); }, [value]);
  return (
    <textarea value={local} onChange={e => setLocal(e.target.value)} onBlur={() => onCommit(local)}
      placeholder="סיבה" rows={2}
      style={{ width:140, minWidth:100, maxWidth:300, padding:"3px 5px", border:"1px solid #e2e8f0",
        borderRadius:5, fontSize:11, fontFamily:"'Heebo',sans-serif", outline:"none",
        resize:"vertical", direction:"rtl", overflow:"auto", boxSizing:"border-box" }} />
  );
}

function AccountsTab({ rows, setRows, quotesRows, consultantsRows, setConsultantsRows, budgetState, statsRows, companyId, milestones, openInvoiceId, onNavigate, openingData, localMilestones, setLocalMilestones, projectMeta }) {

  const [selConsultant, setSelConsultant] = useState(null);
  const [expanded, setExpanded]           = useState({});
  const [editingMs, setEditingMs]         = useState(false);
  const [draftMs, setDraftMs]             = useState([]);
  const [approvalModal, setApprovalModal] = useState(null);

  // Map: consultantName → first field they appear in (for backward-compat with old invoices without fieldName)
  const firstFieldByName = {};
  (quotesRows||[]).forEach(fg => {
    (fg.consultants||[]).forEach(c => {
      if (!c.approved || !c.name?.trim()) return;
      if (!firstFieldByName[c.name.trim()]) firstFieldByName[c.name.trim()] = fg.fieldName||"";
    });
  });
  const invMatchesField = (r, field, name) =>
    r.consultantName === name &&
    (r.fieldName ? r.fieldName === field : (firstFieldByName[name]||"") === field);

  // ── Compute fees ──────────────────────────────────────────────────────────
  const contractorEst = Number(String((openingData||{}).contractorEst||"").replace(/,/g,"").replace(/[^\d.]/g,"")) || Number((budgetState||{}).contractorEst || 0);
  const devPct        = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);
  const archBaseManual = Number(String((openingData||{}).archBase||"").replace(/[,\s]/g,"").replace(/[^\d.]/g,""));
  const archBase      = archBaseManual > 0 ? archBaseManual : contractorEst - contractorEst * devPct / 100;

  const consultantFees = [];
  (quotesRows||[]).forEach(fg => {
    (fg.consultants||[]).forEach(c => {
      if (!c.approved || !c.name?.trim()) return;
      const isPct    = (c.payType||"אחוזים") === "אחוזים";
      const isArch   = isPct && ["אדריכל","אדריכלות","אדריכלים"].includes((fg.fieldName||"").trim());
      const isPMRole = isPct && (fg.fieldName||"").includes("מנהל פרויקט");
      const pct      = Number(c.value||0) / 100;
      let fee = 0;
      if (c.subItems && c.subItems.length > 0) {
        fee = c.subItems.reduce((s,it)=>s+Number(it.amount||0),0);
      } else if (!isPct)                          fee = Number(c.value||0);
      else if (isArch   && contractorEst)  fee = archBase * pct;
      else if (isPMRole && contractorEst)  fee = contractorEst * pct;
      else if (contractorEst) {
        const profPct = Number((statsRows||[]).find(r=>r.field===fg.fieldName)?.pct||0) / 100;
        fee = contractorEst * profPct * pct;
      }
      const consultantRow = (consultantsRows||[]).find(r => r.id === "q-"+c.id);
      const increases = consultantRow?.increases || c.increases || [];
      const noClaims  = !!consultantRow?.noClaims;
      const contractFee = consultantRow?.contractFee ?? fee; // קפוא — לא משתנה לעולם
      const approvedIncreases = increases.filter(x => x.approvedIncrease);
      const totalInc  = approvedIncreases.reduce((s,x)=>s+Number(x.amount||0),0);
      consultantFees.push({
        field: fg.fieldName||"", name: c.name.trim(),
        fee, contractFee, increases: approvedIncreases, totalInc, totalFee: contractFee + totalInc, noClaims,
        contact: c.contact||"", phone: c.phone||"", phone2: c.phone2||"", email: c.email||"",
        _consultantRowId: "q-"+c.id, subItems: c.subItems||[],
      });    });
  });
  consultantFees.sort((a,b) => (a.field||"").localeCompare(b.field||"", 'he'));

  const sel = selConsultant
    ? consultantFees.find(c=>c.name===selConsultant.name && c.field===selConsultant.field)
    : null;

  // Navigate to invoice from dashboard - runs after consultantFees is ready
  React.useEffect(() => {
    if (!openInvoiceId || consultantFees.length === 0) return;
    const inv = rows.find(r => r.id === openInvoiceId);
    if (!inv) return;
    const consultant = consultantFees.find(c => c.name === inv.consultantName);
    if (consultant) setSelConsultant(consultant);
    setExpanded(prev => ({ ...prev, [inv.rowKey]: true }));
    setTimeout(() => {
      const el = document.getElementById("inv-row-" + openInvoiceId);
      if (el) {
        el.scrollIntoView({ behavior:"smooth", block:"center" });
        el.classList.add("row-highlight");
        setTimeout(() => el.classList.remove("row-highlight"), 2000);
      }
    }, 600);
  }, [openInvoiceId, consultantFees.length]);

  const selField = (sel?.field||"").trim();
  const templateMilestones = (sel && companyId) ? (milestones?.[companyId]?.[selField] || []) : [];
  const hasLocalMs = sel ? (((localMilestones||{})[selField]?.length || 0) > 0) : false;
  const fieldMilestones = hasLocalMs ? (localMilestones[selField]||[]) : templateMilestones;
  const selSubItems = sel?.subItems||[];
  const useSubItems = selSubItems.length > 0;

  const openMsEditor = () => {
    setDraftMs(fieldMilestones.map(m => ({ ...m })));
    setEditingMs(true);
  };
  const saveMsLocal = () => {
    if (draftMs.length === 0) {
      const updated = { ...(localMilestones||{}) };
      delete updated[selField];
      setLocalMilestones(updated);
    } else {
      setLocalMilestones({ ...(localMilestones||{}), [selField]: draftMs });
    }
    setEditingMs(false);
  };
  const resetToTemplate = () => {
    const updated = { ...(localMilestones||{}) };
    delete updated[selField];
    setLocalMilestones(updated);
    setEditingMs(false);
  };

  const getInvoices   = key => rows.filter(r => invMatchesField(r, sel?.field||"", sel?.name||"") && r.rowKey===key);
  const addInvoice = (milestoneKey) => {
    if (!sel?.name) return;
    if (sel?.noClaims) return;
    const newRow = {
      id:Date.now(), createdAt: Date.now(), pmPendingSince: Date.now(),
      consultantName:sel.name, fieldName:sel.field||"", rowKey:milestoneKey,
      invoiceNum:"", receiptDate:"", amount:"", pct:"",
      toMunicipality:false, toConsultant:false, rejected:false,
      reason:"", pmApproved:false, unitManagerApproved:false, pmEmailShown:false,
    };
    setRows(prev => [...prev, newRow]);
  };
  const updateInvoice = (id, patch) => {
    const inv = rows.find(r => r.id===id);
    const extra = {};
    if (patch.pmApproved === true) extra.umPendingSince = Date.now();
    // When amount is set for the first time → show PM email modal
    const amountNowSet = patch.amount && Number(patch.amount) > 0;
    const pmEmailNeeded = amountNowSet && inv && !inv.pmEmailShown && !inv.pmApproved;
    if (pmEmailNeeded) extra.pmEmailShown = true;
    setRows(prev => prev.map(r => r.id===id ? {...r,...patch,...extra} : r));
    if (pmEmailNeeded && projectMeta) {
      const pmEmail = projectMeta.status === "ביצוע" ? projectMeta.executionManagerEmail : projectMeta.planningManagerEmail;
      const pmName  = projectMeta.status === "ביצוע" ? projectMeta.executionManager  : projectMeta.planningManager;
      if (pmEmail) {
        const mergedInv = { ...inv, ...patch };
        const invMs = fieldMilestones.find(m => "m-"+m.id === mergedInv.rowKey);
        const subject = `CostPilot — חשבונית ממתינה לאישורך — ${projectMeta.name}`;
        const invoiceDetails = `פרויקט: ${projectMeta.name}\nיועץ: ${mergedInv.consultantName || sel?.name || ""}${invMs ? `\nאבן דרך: ${invMs.name} (${invMs.pct}%)` : ""}\nמספר חשבון: ${mergedInv.invoiceNum || "—"}\nסכום: ${mergedInv.amount ? fmt(Number(mergedInv.amount)) : "—"}`;
        const body = `שלום ${pmName || ""},\n\nחשבונית חדשה ממתינה לאישורך כמנהל הפרויקט.\n\n${invoiceDetails}\n\nאנא היכנסו למערכת ואשרו.\n\nבברכה`;
        const msRows = sel ? fieldMilestones.map(m => {
          const k = "m-" + m.id;
          const required = (sel.fee || 0) * Number(m.pct||0) / 100;
          const paid = rowTotal(k);
          return [m.name || "—", fmt(required), fmt(paid), fmt(required - paid)];
        }) : [];
        const htmlBody = buildEmailHtml(
          `שלום ${pmName || ""},\n\nחשבונית חדשה ממתינה לאישורך כמנהל הפרויקט.\n\n${invoiceDetails}`,
          ["אבן דרך", "נדרש (₪)", "שולם (₪)", "יתרה (₪)"],
          msRows.length > 0 ? msRows : [["(אין אבני דרך מוגדרות)", "", "", ""]],
          "אנא היכנסו למערכת ואשרו את החשבונית.\n\nבברכה,\nמערכת CostPilot"
        );
        setApprovalModal({ toEmail: pmEmail, toName: pmName, subject, body, htmlBody });
      }
    }
    if (patch.pmApproved === true && projectMeta?.unitManagerEmail) {
      if (inv) {
        const umMs = fieldMilestones.find(m => "m-"+m.id === inv.rowKey);
        const subject = `CostPilot — חשבונית ממתינה לאישורך — ${projectMeta.name}`;
        const invoiceDetails = `פרויקט: ${projectMeta.name}\nיועץ: ${inv.consultantName || ""}${umMs ? `\nאבן דרך: ${umMs.name} (${umMs.pct}%)` : ""}\nמספר חשבון: ${inv.invoiceNum || "—"}\nסכום: ${inv.amount ? fmt(Number(inv.amount)) : "—"}`;
        const body = `שלום ${projectMeta.unitManager || ""},\n\nחשבונית אושרה על ידי מנהל הפרויקט וממתינה לאישורך כמנהל יחידה.\n\n${invoiceDetails}\n\nאנא היכנסו למערכת ואשרו.\n\nבברכה`;
        const msRows = sel ? fieldMilestones.map(m => {
          const key = "m-" + m.id;
          const required = (sel.fee || 0) * Number(m.pct||0) / 100;
          const paid = rowTotal(key);
          return [m.name || "—", fmt(required), fmt(paid), fmt(required - paid)];
        }) : [];
        const htmlBody = buildEmailHtml(
          `שלום ${projectMeta.unitManager || ""},\n\nחשבונית אושרה על ידי מנהל הפרויקט וממתינה לאישורך כמנהל יחידה.\n\n${invoiceDetails}`,
          ["אבן דרך", "נדרש (₪)", "שולם (₪)", "יתרה (₪)"],
          msRows.length > 0 ? msRows : [["(אין אבני דרך מוגדרות)", "", "", ""]],
          "אנא היכנסו למערכת ואשרו את החשבונית.\n\nבברכה,\nמערכת CostPilot"
        );
        setApprovalModal({ toEmail: projectMeta.unitManagerEmail, toName: projectMeta.unitManager, subject, body, htmlBody });
      }
    }
  };
  const removeInvoice = id => setRows(rows.filter(r=>r.id!==id));

  const setNoClaims = (val) => {
    if (!sel?._consultantRowId) return;
    const id = sel._consultantRowId;
    setConsultantsRows(prev => prev.map(r => r.id === id ? { ...r, noClaims: val } : r));
  };


  const rowTotal = key => getInvoices(key).filter(r => r.unitManagerApproved && !r.rejected).reduce((s,r)=>s+Number(r.amount||0),0);

  // ── Negative increases: recalculate unpaid milestones based on new total fee ─
  // negativeDeductions: { milestoneKey → amount to deduct from original baseAmt }
  const negativeDeductions = React.useMemo(() => {
    if (!sel || fieldMilestones.length === 0) return {};
    const negTotal = (sel.increases||[])
      .filter(x => x.approvedIncrease && Number(x.amount||0) < 0)
      .reduce((s,x) => s + Math.abs(Number(x.amount)), 0);
    if (negTotal === 0) return {};

    // New total fee after deduction
    const newFee = sel.contractFee - negTotal;
    // Already paid (milestones only)
    const alreadyPaid = fieldMilestones.reduce((s,m) => s + rowTotal("m-"+m.id), 0);
    // Remaining to pay from new fee
    const remainingToPay = newFee - alreadyPaid;

    const deductions = {};
    fieldMilestones.forEach(m => {
      const key = "m-" + m.id;
      const origAmt = sel.contractFee * Number(m.pct||0) / 100;
      const paid = rowTotal(key);
      if (paid >= origAmt) return; // already fully paid - no change
      // New amount for this milestone = remainingToPay × (m.pct / 100)
      const newAmt = remainingToPay * Number(m.pct||0) / 100;
      deductions[key] = origAmt - newAmt; // how much to subtract from display
    });
    return deductions;
  }, [sel, fieldMilestones, rows]);

  const paidMilestoneTotal = sel ? fieldMilestones.reduce((s,m)=>s+rowTotal("m-"+m.id),0) : 0;
  const paidSubTotal       = sel ? selSubItems.reduce((s,it)=>s+rowTotal("s-"+it.id),0) : 0;
  const paidIncTotal       = sel ? ((sel.increases||[])||[]).reduce((s,inc)=>s+rowTotal("i-"+inc.id),0) : 0;
  const paidTotal  = (useSubItems ? paidSubTotal : paidMilestoneTotal) + paidIncTotal;
  const remaining  = sel ? sel.totalFee - paidTotal : 0;

  // ── Shared milestone section (table of milestones + expandable invoices) ──
  const renderMilestonesSection = (items, isIncrease, baseFeeForItem, keyPrefix=null) => {
    const totalPaid = items.reduce((s,m)=>s+rowTotal(keyPrefix?keyPrefix+m.id:(isIncrease?"i-":"m-")+m.id),0);
    const totalBase = items.reduce((s,m)=>{
      const key = keyPrefix?keyPrefix+m.id:(isIncrease?"i-":"m-")+m.id;
      const raw = (isIncrease||keyPrefix) ? Number(m.amount||0) : sel.fee*Number(m.pct||0)/100;
      return s + raw - ((!isIncrease && negativeDeductions[key]) || 0);
    },0);
    return (
      <div style={{ overflowX:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13, direction:"rtl", tableLayout:"fixed" }}>
          <colgroup>
            <col style={{ width:"4%" }} />
            <col style={{ width:"24%" }} />
            <col style={{ width:"12%" }} />
            <col style={{ width:"16%" }} />
            <col style={{ width:"12%" }} />
            <col style={{ width:"20%" }} />
            <col style={{ width:"12%" }} />
          </colgroup>
          <thead>
            <tr style={{ background:"#f8fafc", borderBottom:"2px solid #e2e8f0" }}>
              <th style={{ padding:"8px 10px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}></th>
              <th style={{ padding:"8px 14px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>אבן דרך</th>
              <th style={{ padding:"8px 10px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>אחוז</th>
              <th style={{ padding:"8px 14px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>סכום בחוזה</th>
              <th style={{ padding:"8px 10px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>חשבון %</th>
              <th style={{ padding:"8px 14px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>חשבון מאושר (ש״ח)</th>
              <th style={{ padding:"8px 10px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>תכנון בלבד</th>
            </tr>
          </thead>
          <tbody>
            {items.map((m,i) => {
              const key     = keyPrefix?keyPrefix+m.id:(isIncrease?"i-":"m-")+m.id;
              const rawAmt  = (isIncrease||keyPrefix) ? Number(m.amount||0) : sel.contractFee * Number(m.pct||0) / 100;
              const deduct  = (!isIncrease && negativeDeductions[key]) || 0;
              const baseAmt = rawAmt - deduct;
              const paid    = rowTotal(key);
              const paidPct = baseAmt ? (paid/baseAmt*100).toFixed(1) : "0";
              const isOpen  = expanded[key];
              const invs    = getInvoices(key);
              return (
                <React.Fragment key={m.id}>
                  {/* Milestone row */}
                  <tr style={{ borderBottom: isOpen?"none":"1px solid #f1f5f9", background: isOpen?"#dbeafe": i%2===0?"#fff":"#fafbfd", cursor:"pointer" }}
                    onClick={()=>setExpanded(e=>({...e,[key]:!e[key]}))}>
                    <td style={{ padding:"10px 10px", textAlign:"right", color:"#334155", fontWeight:700, fontSize:16 }}>{isOpen?"∧":"+"}</td>
                    <td style={{ padding:"10px 14px", fontWeight:600, color:"#1e293b" }}>
                      {m.name||m.reason}
                    </td>
                    <td style={{ padding:"10px 14px", textAlign:"right", fontWeight:700, color:"#334155" }}>{isIncrease?100:m.pct}%</td>
                    <td style={{ padding:"10px 14px", textAlign:"right",   fontWeight:700 }}>{fmt(baseAmt)}</td>
                    <td style={{ padding:"10px 14px", textAlign:"right", fontWeight:600, color: Number(paidPct)>0?"#1e293b":"#94a3b8" }}>{paidPct}%</td>
                    <td style={{ padding:"10px 14px", textAlign:"right",   fontWeight:700, color: paid>0?"#1e293b":"#94a3b8" }}>{fmt(paid)}</td>
                    <td style={{ padding:"10px 14px", textAlign:"right" }}>
                      {m.planOnly ? <Badge color="#3b82f6">✓</Badge> : <span style={{color:"#e2e8f0"}}>—</span>}
                    </td>
                  </tr>

                  {/* Expanded invoices */}
                  {isOpen && (
                    <tr>
                      <td colSpan={7} style={{ padding:0, background:"#f8fafc", borderBottom:"2px solid #bfdbfe" }}>
                        <div style={{ padding:"10px 20px" }}>
                          <div style={{ fontSize:12, fontWeight:700, color:"#64748b", marginBottom:8 }}>
                            חשבונות עבור {m.name||m.reason}:
                          </div>
                          {invs.length > 0 && (
                            <div style={{ overflowX:"auto", marginBottom:10 }}>
                              <table style={{ borderCollapse:"collapse", fontSize:12, width:"100%" }}>
                                <thead>
                                  <tr style={{ background:"#e0f2fe", borderBottom:"1px solid #bae6fd" }}>
                                    {["מס׳ חשבון","ת. קבלה","סכום (ש״ח)","אחוז (%)","מנהל פרויקט","מנהל יחידה","אישור מזמין","הוחזר ליועץ","נדחה","סיבה","מחק"].map(h=>(
                                      <th key={h} style={{ padding:"5px 8px", textAlign:"right", color:"#0369a1", fontWeight:700, fontSize:10, whiteSpace:"nowrap" }}>{h}</th>
                                    ))}
                                  </tr>
                                </thead>
                                <tbody>
                                  {invs.map((inv,j)=>(
                                    <tr key={inv.id} id={"inv-row-"+inv.id} style={{ borderBottom:"1px solid #f1f5f9", background:j%2===0?"#fff":"#f0f9ff" }}>
                                      <td style={{ padding:"4px 6px" }}>
                                        <input value={inv.invoiceNum||""} onChange={e=>updateInvoice(inv.id,{invoiceNum:e.target.value})}
                                          placeholder="מספר" style={{ width:70, padding:"3px 5px", border:"1px solid #e2e8f0", borderRadius:5, fontSize:11, fontFamily:"'Heebo',sans-serif", outline:"none" }} />
                                      </td>
                                      <td style={{ padding:"4px 6px" }}>
                                        <FlatpickrDate value={inv.receiptDate||""} onChange={v=>updateInvoice(inv.id,{receiptDate:v})} />
                                      </td>
                                      <td style={{ padding:"4px 6px" }}>
                                        <NumericCell value={inv.amount||""} baseAmt={baseAmt} mode="amount"
                                          onCommit={(amt,pct) => {
                                            if (baseAmt > 0 && Number(amt) > baseAmt + 0.01 + 0.01) {
                                              alert(`הסכום ${Number(amt).toLocaleString("he-IL")} ₪ חורג מסכום האבן דרך / ההגדלה (${baseAmt.toLocaleString("he-IL")} ₪)`);
                                              return;
                                            }
                                            updateInvoice(inv.id, pct?{amount:amt,pct}:{amount:amt});
                                          }}
                                          style={{ width:85 }} />
                                      </td>
                                      <td style={{ padding:"4px 6px" }}>
                                        <NumericCell value={inv.pct||""} baseAmt={baseAmt} mode="pct"
                                          onCommit={(pct,amt) => {
                                            if (Number(pct) > 100) {
                                              alert("האחוז לא יכול לעלות על 100%");
                                              return;
                                            }
                                            if (baseAmt > 0 && Number(amt) > baseAmt + 0.01 + 0.01) {
                                              alert(`הסכום המחושב ${Number(amt).toLocaleString("he-IL")} ₪ חורג מסכום האבן דרך / ההגדלה (${baseAmt.toLocaleString("he-IL")} ₪)`);
                                              return;
                                            }
                                            updateInvoice(inv.id, amt?{pct,amount:amt}:{pct});
                                          }}
                                          style={{ width:75 }} placeholder="0.00" />
                                      </td>
                                      {["pmApproved","unitManagerApproved","toMunicipality","toConsultant","rejected"].map(k=>(
                                        <td key={k} style={{ padding:"4px 8px", textAlign:"right" }}>
                                          <input type="checkbox" checked={!!inv[k]} onChange={e=>updateInvoice(inv.id,{[k]:e.target.checked})} />
                                        </td>
                                      ))}
                                      <td style={{ padding:"4px 6px" }}>
                                        <ReasonCell value={inv.reason||""} onCommit={val=>updateInvoice(inv.id,{reason:val})} />
                                      </td>
                                      <td style={{ padding:"4px 8px", textAlign:"right" }}>
                                        <button onClick={()=>removeInvoice(inv.id)}
                                          style={{ background:"#fef2f2", color:"#ef4444", border:"none", borderRadius:4, padding:"2px 7px", fontSize:11, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>🗑</button>
                                      </td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            </div>
                          )}
                          {invs.length === 0 && <div style={{ color:"#94a3b8", fontSize:12, marginBottom:8 }}>לא הוזנו חשבונות עדיין</div>}
                          {sel.noClaims && (
                            <div style={{ color:"#b45309", fontSize:12, fontWeight:600, marginBottom:6, textAlign:"right", background:"#fffbeb", border:"1px solid #fde68a", borderRadius:6, padding:"6px 10px" }}>
                              התקבל העדר תביעות — לא ניתן להוסיף חשבונות ליועץ זה
                            </div>
                          )}
                          <button onClick={(e)=>{e.stopPropagation(); addInvoice(key);}}
                            disabled={!!sel.noClaims}
                            style={{ background: sel.noClaims?"#f1f5f9":"#f8fafc", color: sel.noClaims?"#94a3b8":"#334155", border:"1px solid #e2e8f0", borderRadius:6, padding:"4px 12px", fontSize:11, cursor: sel.noClaims?"not-allowed":"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:600, opacity: sel.noClaims?0.6:1 }}>
                            + הוסף חשבון
                          </button>
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
          <tfoot>
            <tr style={{ background:"#f8fafc", borderTop:"2px solid #e2e8f0" }}>
              <td colSpan={3} style={{ padding:"9px 14px", fontWeight:800, color:"#1e293b" }}>סה״כ</td>
              <td style={{ padding:"9px 14px", fontWeight:800, color:"#1e293b", textAlign:"right" }}>{fmt(totalBase)}</td>
              <td />
              <td style={{ padding:"9px 14px", fontWeight:800, color:"#374151", textAlign:"right" }}>{fmt(totalPaid)}</td>
              <td />
            </tr>
          </tfoot>
        </table>
      </div>
    );
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:18 }}>
      {approvalModal && (
        <ApprovalEmailModal {...approvalModal}
          onSent={() => setApprovalModal(null)}
          onCancel={() => setApprovalModal(null)} />
      )}

      {/* ── Consultant selector ── */}
      <Card>
        <div style={{ fontWeight:700, color:"#1e293b", marginBottom:10, fontSize:15 }}>בחר יועץ לריכוז חשבונות</div>
        {consultantFees.length === 0
          ? <span style={{ color:"#94a3b8", fontSize:13 }}>אין יועצים מאושרים בפרויקט</span>
          : (() => {
              const [cSearch, setCSearch] = React.useState("");
              const filtered = consultantFees.filter(c =>
                c.field.toLowerCase().includes(cSearch.toLowerCase()) ||
                c.name.toLowerCase().includes(cSearch.toLowerCase())
              );
              return (
                <div>
                  {!selConsultant ? (
                    <>
                      <input value={cSearch} onChange={e=>setCSearch(e.target.value)}
                        placeholder="חיפוש לפי שם תחום או שם יועץ..."
                        style={{ width:"100%", padding:"8px 12px", border:"1.5px solid #e2e8f0", borderRadius:9, fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none", marginBottom:10, background:"#f8fafc" }} />
                      <div style={{ display:"flex", flexDirection:"column", gap:4, maxHeight:260, overflowY:"auto" }}>
                        {filtered.map(c => (
                          <div key={c.name+c.field} onClick={()=>setSelConsultant(c)}
                            style={{ display:"flex", alignItems:"center", gap:14, padding:"9px 14px", borderRadius:9,
                              border:"1.5px solid #f1f5f9", background:"#fff", cursor:"pointer", transition:"all .12s" }}
                            onMouseOver={e=>e.currentTarget.style.background="#f0f9ff"}
                            onMouseOut={e=>e.currentTarget.style.background="#fff"}>
                            <div style={{ width:36, height:36, borderRadius:9, background:"#f1f5f9", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>👤</div>
                            <div>
                              <div style={{ fontSize:11, color:"#94a3b8", fontWeight:700, marginBottom:1 }}>{c.field}</div>
                              <div style={{ fontSize:13, fontWeight:600, color:"#1e293b" }}>{c.name}</div>
                            </div>
                          </div>
                        ))}
                        {filtered.length === 0 && <div style={{ color:"#94a3b8", fontSize:13, padding:"8px 0" }}>לא נמצאו תוצאות</div>}
                      </div>
                    </>
                  ) : (
                    <div style={{ display:"flex", alignItems:"flex-start", gap:12 }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"9px 14px", borderRadius:9, border:"1.5px solid #3b82f6", background:"#f8fafc", flex:"0 0 50%", maxWidth:"50%" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                          <div style={{ width:36, height:36, borderRadius:9, background:"#f1f5f9", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>👤</div>
                          <div>
                            <div style={{ fontSize:11, color:"#334155", fontWeight:700, marginBottom:1 }}>{sel?.field}</div>
                            <div style={{ fontSize:13, fontWeight:600, color:"#1e293b" }}>{sel?.name}</div>
                          </div>
                        </div>
                        <button onClick={()=>{ setSelConsultant(null); setCSearch(""); }}
                          style={{ fontSize:12, color:"#64748b", background:"#f1f5f9", border:"none", borderRadius:6, padding:"4px 10px", cursor:"pointer" }}>
                          החלף
                        </button>
                      </div>
                      {/* עמודה ריקה באמצע */}
                      <div style={{ flex:1 }} />
                      {/* סיכום מספרי חשבונות */}
                      {(() => {
                        const validKeys = new Set([
                          ...fieldMilestones.map(m => "m-"+m.id),
                          ...(sel.increases||[]).map(x => "i-"+x.id),
                          ...selSubItems.map(it => "s-"+it.id),
                        ]);
                        const byNum = {};
                        rows.filter(r => invMatchesField(r, sel?.field||"", sel?.name||"") && validKeys.has(r.rowKey)).forEach(inv => {
                          const num = inv.invoiceNum?.trim();
                          if (!num) return;
                          byNum[num] = (byNum[num]||0) + Number(inv.amount||0);
                        });
                        const entries = Object.entries(byNum).sort((a,b) => {
                          const na=Number(a[0]),nb=Number(b[0]);
                          return isNaN(na)||isNaN(nb)?a[0].localeCompare(b[0],'he'):na-nb;
                        });
                        if (!entries.length) return null;
                        return (
                          <div style={{ display:"flex", flexDirection:"column", gap:3, padding:"6px 0" }}>
                            {entries.map(([num,total]) => (
                              <div key={num} style={{ fontSize:11, color:"#475569", whiteSpace:"nowrap" }}>
                                חש׳ {num} — {fmt(total)}
                              </div>
                            ))}
                          </div>
                        );
                      })()}
                    </div>
                  )}
                </div>
              );
            })()
        }
      </Card>

      {sel && (
        <>
          {/* ── Consultant info ── */}

function NumInput({ value, onChange }) {
  const [focus, setFocus] = useState(false);
  const [raw, setRaw] = useState(String(value||""));
  React.useEffect(() => { if (!focus) setRaw(String(value||"")); }, [value, focus]);
  const display = focus ? raw : (Number(raw) ? Number(raw).toLocaleString("he-IL") : raw);
  return (
    <input
      type="text" value={display}
      onChange={e => { const v = e.target.value.replace(/,/g,""); setRaw(v); onChange(v); }}
      onFocus={() => { setFocus(true); setRaw(String(value||"")); }}
      onBlur={() => setFocus(false)}
      style={{ width:160, textAlign:"right", background: focus?"#fff":"#f8fafc", border:`1.5px solid ${focus?"#3b82f6":"#e2e8f0"}`, borderRadius:8, padding:"6px 10px", fontSize:14, fontFamily:"'Heebo',sans-serif", outline:"none", color:"#1e293b" }}
    />
  );
}

// ── Shared helper: build the exact rows shown in BudgetTab ───────────────────
// Used by BOTH BudgetTab (display) and exportProjectToExcel (export).
// Export reads these rows directly - NO re-computation.
function buildBudgetAllRows({ quotesRows, consultantsRows, budgetState, statsRows, accountsRows, planOnlyMap, openingData }) {
  const contractorEst = Number((budgetState||{}).contractorEst || 0);
  const devPct        = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);
  const archBaseManualB = Number(String((openingData||{}).archBase||"").replace(/[,\s]/g,"").replace(/[^\d.]/g,""));
  const archBase      = archBaseManualB > 0 ? archBaseManualB : contractorEst - contractorEst * devPct / 100;
  const computeFee = (field, payType, value) => {
    if (payType !== "אחוזים") return Number(value || 0);
    const pct = Number(value || 0) / 100;
    if (["אדריכל","אדריכלות","אדריכלים"].includes((field||"").trim()))      return archBase      * pct;
    if ((field||"").includes("מנהל פרויקט")) return contractorEst * pct;
    if (contractorEst) {
      const profPct = Number((statsRows||[]).find(r => r.field === field)?.pct || 0) / 100;
      return contractorEst * profPct * pct;
    }
    return 0;
  };
  // For old invoices without fieldName: attribute only to the first field this consultant appears in
  const firstFieldMap = {};
  (quotesRows || []).forEach(fg => {
    (fg.consultants || []).forEach(c => {
      if (!c.approved || !c.name?.trim()) return;
      const n = c.name.trim();
      if (!firstFieldMap[n]) firstFieldMap[n] = fg.fieldName || "";
    });
  });
  // Compute paid exactly as AccountsTab does: only invoices for approved increases (i-*), any milestone (m-*)
  const paidByConsultant = (name, field, approvedIncIds) =>
    (accountsRows || []).filter(r => {
      if (r.consultantName !== name || !r.unitManagerApproved || r.rejected) return false;
      if (r.fieldName ? r.fieldName !== field : (firstFieldMap[name] || "") !== field) return false;
      // Invoices for increases are only counted when that increase is approved
      if (r.rowKey && r.rowKey.startsWith("i-") && !approvedIncIds.has(r.rowKey)) return false;
      return true;
    }).reduce((s,r) => s + Number(r.amount||0), 0);
  const rows = [];
  (quotesRows || []).forEach(fg => {
    (fg.consultants || []).forEach(c => {
      if (!c.approved || !c.name?.trim()) return;
      const consultantEntry = (consultantsRows || []).find(r => r.id === "q-"+c.id);
      const approvedIncs = (consultantEntry?.increases || []).filter(x => x.approvedIncrease);
      const totalInc    = approvedIncs.reduce((s,x) => s + Number(x.amount||0), 0);
      const approvedIncIds = new Set(approvedIncs.map(x => "i-"+x.id));
      const computedFee = (c.subItems && c.subItems.length > 0)
        ? c.subItems.reduce((s,it)=>s+Number(it.amount||0),0)
        : computeFee(fg.fieldName, c.payType || "אחוזים", c.value);
      const paid        = paidByConsultant(c.name.trim(), fg.fieldName||"", approvedIncIds);
      const planOnly    = (planOnlyMap||{})[(fg.fieldName||"") + "::" + c.name.trim()] || 0;
      const noClaims    = !!(consultantEntry?.noClaims);
      const notes       = consultantEntry?.notes || "";
      rows.push({
        field: fg.fieldName || "", name: c.name.trim(),
        payType: c.payType || "אחוזים", value: Number(c.value||0),
        increases: totalInc, computedFee, paid, planOnly, noClaims, notes,
        _consultantRowId: "q-"+c.id,
      });
    });
  });
  rows.sort((a,b) => (a.field||"").localeCompare(b.field||"", 'he'));
  // Manual rows always appear at the end of the consultants section
  (budgetState?.extraConsultantRows || []).forEach(r => {
    rows.push({
      field: r.field||"", name: r.name||"",
      payType: "סכום קבוע", value: Number(r.contract||0),
      increases: 0, computedFee: Number(r.contract||0),
      paid: Number(r.paid||0), planOnly: Number(r.planOnly||0),
      noClaims: !!r.noClaims, notes: r.notes||"",
      _manualRow: true, _manualId: r.id,
    });
  });
  return rows;
}

function NegInput({ value, onCommit, placeholder, style }) {
  const isFocused = React.useRef(false);
  const [local, setLocal] = React.useState("");
  const [showRaw, setShowRaw] = React.useState(false);
  const numVal = v => {
    if (v===null||v===undefined||v==="") return null;
    const n = Number(String(v).replace(/,/g,""));
    return isNaN(n)?null:n;
  };
  const fmtNum = v => { const n=numVal(v); return n!==null?n.toLocaleString("en-US"):""; };
  React.useEffect(() => {
    if (!isFocused.current) { const n=numVal(value); setLocal(n!==null?String(n):""); }
  }, [value]);
  return (
    <input
      type="text"
      value={showRaw ? local : fmtNum(value)}
      onChange={e => setLocal(e.target.value.replace(/,/g,""))}
      onFocus={() => {
        isFocused.current = true;
        const n = numVal(value);
        setLocal(n!==null?String(n):"");
        setShowRaw(true);
      }}
      onBlur={() => {
        isFocused.current = false;
        setShowRaw(false);
        const clean = local.replace(/,/g,"");
        const n = Number(clean);
        onCommit(clean!==""&&!isNaN(n)?n:"");
      }}
      placeholder={placeholder||"0"}
      style={{ ...style, direction:"ltr" }}
    />
  );
}

const _fmtInput  = (val) => val ? Number(String(val).replace(/,/g,"")).toLocaleString("he-IL") : "";
const _parseInput = (val) => String(val).replace(/,/g,"");
function BudgetNumInput({ value, onChange, placeholder="0", style={} }) {
  const [focused, setFocused] = React.useState(false);
  const [raw, setRaw] = React.useState(value||"");
  React.useEffect(() => { if (!focused) setRaw(value||""); }, [value, focused]);
  return <input
    type="text"
    value={focused ? raw : _fmtInput(value)}
    onFocus={() => { setFocused(true); setRaw(value||""); }}

function BudgetTab({ quotesRows, consultantsRows, setConsultantsRows, budgetState, setBudgetState, statsRows, accountsTotalPaid, accountsRows, planOnlyMap, onNavigate, openingData, setOpeningData, tenderRows, contractorRows }) {

    if (!entry) return null;
    for (const fg of (quotesRows||[])) {
      for (const c of (fg.consultants||[])) {
        if ("q-"+c.id === budgetOpenConsultantId) return { ...entry, value: c.value, payType: c.payType||"אחוזים" };
      }
    }
    return entry;
  }, [budgetOpenConsultantId, consultantsRows, quotesRows]);

  // ── Consultants table - use shared helper (same data as export) ───────────
  const _contractorEst = Number((budgetState||{}).contractorEst || 0);
  const _devPct = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);
  const allRows = buildBudgetAllRows({ quotesRows, consultantsRows, budgetState, statsRows, accountsRows, planOnlyMap, openingData });
  const consultantsTotal = allRows.reduce((s,r) => {
    return s + (r.payType==="אחוזים" ? r.computedFee : r.value) + r.increases;
  }, 0);

  // ── Budget estimation table state ─────────────────────────────────────────
  const bs = budgetState || {};
  const upd = (key, val) => setBudgetState({ ...(budgetState||{}), [key]: val });
  const updateNote = (consultantRowId, val) =>
    setConsultantsRows(prev => prev.map(r => r.id === consultantRowId ? { ...r, notes: val } : r));
  const updExtraConsultant = (id, key, val) =>
    upd("extraConsultantRows", (bs.extraConsultantRows||[]).map(r => r.id===id ? {...r,[key]:val} : r));
  const delExtraConsultant = id =>
    upd("extraConsultantRows", (bs.extraConsultantRows||[]).filter(r => r.id!==id));
  const addExtraConsultant = () =>
    upd("extraConsultantRows", [...(bs.extraConsultantRows||[]), {id:Date.now(), field:"", name:"", contract:"", paid:"", planOnly:"", noClaims:false, notes:""}]);

  const municipalEst  = Number(String((openingData||{}).municipalEst||"").replace(/,/g,"").replace(/[^\d.]/g,""))  || Number(bs.municipalEst  || 0);
  const contractorEst = Number(String((openingData||{}).contractorEst||"").replace(/,/g,"").replace(/[^\d.]/g,"")) || Number(bs.contractorEst || 0);
  const tenderDocs    = Number(bs.tenderDocs    || 0);

  const approvalActual= Number(bs.approvalActual|| 0);
  const setupOffset   = Number(bs.setupOffset   || 0);
  const extraItems    = bs.extraItems || [];

  const approvalTotal = approvalActual + setupOffset;
  const _feePaidCalc  = [...(bs.feeRows||[]),...(bs.extraFeeRows||[])].reduce((s,r)=>s+Number(r.paid||0),0);
  const _conPaidCalc  = [{ paid:bs.contractorPaid||"" },...(bs.extraContractorRows||[])].reduce((s,r)=>s+Number(r.paid||0),0);
  const _basePaidCalc = allRows.reduce((s,r)=>s+(r.paid||0),0) + _feePaidCalc + _conPaidCalc;
  const _ohPaidCalc   = Math.round(_basePaidCalc * Number(bs.overheadPct||4) / 100);
  const _bcmPaidCalc  = Math.round((_basePaidCalc+_ohPaidCalc) * Number(bs.bcmPct||0) / 100);
  const _vatPaidCalc  = Math.round((_basePaidCalc+_ohPaidCalc+_bcmPaidCalc) * Number(bs.vatPct||18) / 100);
  const grandTotalPaidCalc = _basePaidCalc + _ohPaidCalc + _bcmPaidCalc + _vatPaidCalc;
  const extraTotal    = extraItems.reduce((s,x) => s + Number(x.amount||0), 0);
  const receivedTotal = extraTotal;
  const needed        = approvalTotal - extraTotal;

  const fmtN = n => { const v = Number(String(n||0).replace(/,/g,"")); return v.toLocaleString("en-US"); };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
