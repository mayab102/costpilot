  const [expanded, setExpanded]           = useState({});
  const [editingMs, setEditingMs]         = useState(false);
  const [draftMs, setDraftMs]             = useState([]);

  // Map: consultantName → first field they appear in (for backward-compat with old invoices without fieldName)
  const firstFieldByName = {};
  (quotesRows||[]).forEach(fg => {
    (fg.consultants||[]).forEach(c => {
      if (!c.approved || !c.name?.trim()) return;
      if (!firstFieldByName[c.name.trim()]) firstFieldByName[c.name.trim()] = fg.fieldName||"";
    });
  });
  const invMatchesField = (r, field, name) =>
    r.consultantName === name &&
    (r.fieldName ? r.fieldName === field : (firstFieldByName[name]||"") === field);

  // ── Compute fees ──────────────────────────────────────────────────────────
  const contractorEst = Number(String((openingData||{}).contractorEst||"").replace(/,/g,"").replace(/[^\d.]/g,"")) || Number((budgetState||{}).contractorEst || 0);
  const devPct        = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);
  const archBase      = resolveArchBase(openingData, contractorEst, devPct);

  const consultantFees = [];
  (quotesRows||[]).forEach(fg => {
    (fg.consultants||[]).forEach(c => {
      if (!c.approved || !c.name?.trim()) return;
      const isPct    = (c.payType||"אחוזים") === "אחוזים";
      const isArch   = isPct && ["אדריכל","אדריכלות","אדריכלים"].includes((fg.fieldName||"").trim());
      const isPMRole = isPct && (fg.fieldName||"").includes("מנהל פרויקט");
      const pct      = Number(c.value||0) / 100;
      let fee = 0;
      if (!isPct)                          fee = Number(c.value||0);
      else if (isArch   && contractorEst)  fee = archBase * pct;
      else if (isPMRole && contractorEst)  fee = contractorEst * pct;
      else if (contractorEst) {
        const profPct = Number((statsRows||[]).find(r=>r.field===fg.fieldName)?.pct||0) / 100;
        fee = contractorEst * profPct * pct;
      }
      const increases = (consultantsRows||[]).find(r => r.id === "q-"+c.id)?.increases || c.increases || [];
      const noClaims  = !!(consultantsRows||[]).find(r => r.id === "q-"+c.id)?.noClaims;
      const approvedIncreases = increases.filter(x => x.approvedIncrease);
      const totalInc  = approvedIncreases.reduce((s,x)=>s+Number(x.amount||0),0);
      consultantFees.push({
        field: fg.fieldName||"", name: c.name.trim(),
        fee, increases: approvedIncreases, totalInc, totalFee: fee + totalInc, noClaims,
        contact: c.contact||"", phone: c.phone||"", phone2: c.phone2||"", email: c.email||"",
        _consultantRowId: "q-"+c.id,
      });    });
  });
  consultantFees.sort((a,b) => (a.field||"").localeCompare(b.field||"", 'he'));

  const sel = selConsultant
    ? consultantFees.find(c=>c.name===selConsultant.name && c.field===selConsultant.field)
    : null;

  // Navigate to invoice from dashboard - runs after consultantFees is ready
  React.useEffect(() => {
    if (!openInvoiceId || consultantFees.length === 0) return;
    const inv = rows.find(r => r.id === openInvoiceId);
    if (!inv) return;
    const consultant = consultantFees.find(c => c.name === inv.consultantName);
    if (consultant) setSelConsultant(consultant);
    setExpanded(prev => ({ ...prev, [inv.rowKey]: true }));
    setTimeout(() => {
      const el = document.getElementById("inv-row-" + openInvoiceId);
      if (el) {
        el.scrollIntoView({ behavior:"smooth", block:"center" });
        el.classList.add("row-highlight");
        setTimeout(() => el.classList.remove("row-highlight"), 2000);
      }
    }, 600);
  }, [openInvoiceId, consultantFees.length]);

  const selField = (sel?.field||"").trim();
  const templateMilestones = (sel && companyId) ? (milestones?.[companyId]?.[selField] || []) : [];
  const hasLocalMs = sel ? !!(localMilestones||{})[selField] : false;
  const fieldMilestones = hasLocalMs ? (localMilestones[selField]||[]) : templateMilestones;

  const openMsEditor = () => {
    setDraftMs(fieldMilestones.map(m => ({ ...m })));
    setEditingMs(true);
  };
  const saveMsLocal = () => {
    setLocalMilestones({ ...(localMilestones||{}), [selField]: draftMs });
    setEditingMs(false);
  };
  const resetToTemplate = () => {
    const updated = { ...(localMilestones||{}) };
    delete updated[selField];
    setLocalMilestones(updated);
    setEditingMs(false);
  };

  const getInvoices   = key => rows.filter(r => invMatchesField(r, sel?.field||"", sel?.name||"") && r.rowKey===key);
  const addInvoice = (key) => {
    if (!sel?.name) return;
    if (sel?.noClaims) return;
    setRows(prev => {
      const newRow = {
        id:Date.now(), createdAt: Date.now(), consultantName:sel.name, fieldName:sel.field||"", rowKey:key,
        invoiceNum:"", receiptDate:"", amount:"", pct:"",
        toMunicipality:false, toConsultant:false, rejected:false,
        reason:"", pmApproved:false, unitManagerApproved:false,
      };
      return [...prev, newRow];
    });
  };
  const updateInvoice = (id, patch) => setRows(prev => prev.map(r=>r.id===id?{...r,...patch}:r));
  const removeInvoice = id => setRows(rows.filter(r=>r.id!==id));

  const setNoClaims = (val) => {
    if (!sel?._consultantRowId) return;
    const id = sel._consultantRowId;
    setConsultantsRows(prev => prev.map(r => r.id === id ? { ...r, noClaims: val } : r));
  };

  const rowTotal = key => getInvoices(key).filter(r => r.unitManagerApproved && !r.rejected).reduce((s,r)=>s+Number(r.amount||0),0);

  // ── Negative increases: recalculate unpaid milestones based on new total fee ─
  // negativeDeductions: { milestoneKey → amount to deduct from original baseAmt }
  const negativeDeductions = React.useMemo(() => {
    if (!sel || fieldMilestones.length === 0) return {};
    const negTotal = (sel.increases||[])
      .filter(x => x.approvedIncrease && Number(x.amount||0) < 0)
      .reduce((s,x) => s + Math.abs(Number(x.amount)), 0);
    if (negTotal === 0) return {};

    // New total fee after deduction
    const newFee = sel.fee - negTotal;
    // Already paid (milestones only)
    const alreadyPaid = fieldMilestones.reduce((s,m) => s + rowTotal("m-"+m.id), 0);
    // Remaining to pay from new fee
    const remainingToPay = newFee - alreadyPaid;

    const deductions = {};
    fieldMilestones.forEach(m => {
      const key = "m-" + m.id;
      const origAmt = sel.fee * Number(m.pct||0) / 100;
      const paid = rowTotal(key);
      if (paid >= origAmt) return; // already fully paid - no change
      // New amount for this milestone = remainingToPay × (m.pct / 100)
      const newAmt = remainingToPay * Number(m.pct||0) / 100;
      deductions[key] = origAmt - newAmt; // how much to subtract from display
    });
    return deductions;
  }, [sel, fieldMilestones, rows]);

  const paidMilestoneTotal = sel ? fieldMilestones.reduce((s,m)=>s+rowTotal("m-"+m.id),0) : 0;
  const paidIncTotal       = sel ? ((sel.increases||[])||[]).reduce((s,inc)=>s+rowTotal("i-"+inc.id),0) : 0;
  const paidTotal  = paidMilestoneTotal + paidIncTotal;
  const remaining  = sel ? sel.totalFee - paidTotal : 0;

  // ── Shared milestone section (table of milestones + expandable invoices) ──
  const renderMilestonesSection = (items, isIncrease, baseFeeForItem) => {
    const totalPaid = items.reduce((s,m)=>s+rowTotal((isIncrease?"i-":"m-")+m.id),0);
    const totalBase = items.reduce((s,m)=>{
      const key = (isIncrease?"i-":"m-")+m.id;
      const raw = isIncrease ? Number(m.amount||0) : sel.fee*Number(m.pct||0)/100;
      return s + raw - ((!isIncrease && negativeDeductions[key]) || 0);
    },0);
    return (
      <div style={{ overflowX:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13, direction:"rtl", tableLayout:"fixed" }}>
          <colgroup>
            <col style={{ width:"4%" }} />
            <col style={{ width:"24%" }} />
            <col style={{ width:"12%" }} />
            <col style={{ width:"16%" }} />
            <col style={{ width:"12%" }} />
            <col style={{ width:"20%" }} />
            <col style={{ width:"12%" }} />
          </colgroup>
          <thead>
            <tr style={{ background:"#f8fafc", borderBottom:"2px solid #e2e8f0" }}>
              <th style={{ padding:"8px 10px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}></th>
              <th style={{ padding:"8px 14px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>אבן דרך</th>
              <th style={{ padding:"8px 10px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>אחוז</th>
              <th style={{ padding:"8px 14px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>סכום בחוזה</th>
              <th style={{ padding:"8px 10px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>חשבון %</th>
              <th style={{ padding:"8px 14px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>חשבון מאושר (ש״ח)</th>
              <th style={{ padding:"8px 10px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>תכנון בלבד</th>
            </tr>
          </thead>
          <tbody>
            {items.map((m,i) => {
              const key     = (isIncrease?"i-":"m-")+m.id;
              const rawAmt  = isIncrease ? Number(m.amount||0) : sel.fee * Number(m.pct||0) / 100;
              const deduct  = (!isIncrease && negativeDeductions[key]) || 0;
              const baseAmt = rawAmt - deduct;
              const paid    = rowTotal(key);
              const paidPct = baseAmt ? (paid/baseAmt*100).toFixed(1) : "0";
              const isOpen  = expanded[key];
              const invs    = getInvoices(key);
              return (
                <React.Fragment key={m.id}>
                  {/* Milestone row */}
                  <tr style={{ borderBottom: isOpen?"none":"1px solid #f1f5f9", background: isOpen?"#dbeafe": i%2===0?"#fff":"#fafbfd", cursor:"pointer" }}
                    onClick={()=>setExpanded(e=>({...e,[key]:!e[key]}))}>
                    <td style={{ padding:"10px 10px", textAlign:"right", color:"#334155", fontWeight:700, fontSize:16 }}>{isOpen?"∧":"+"}</td>
                    <td style={{ padding:"10px 14px", fontWeight:600, color:"#1e293b" }}>
                      {m.name||m.reason}
                    </td>
                    <td style={{ padding:"10px 14px", textAlign:"right", fontWeight:700, color:"#334155" }}>{isIncrease?100:m.pct}%</td>
                    <td style={{ padding:"10px 14px", textAlign:"right",   fontWeight:700 }}>{fmt(baseAmt)}</td>
                    <td style={{ padding:"10px 14px", textAlign:"right", fontWeight:600, color: Number(paidPct)>0?"#1e293b":"#94a3b8" }}>{paidPct}%</td>
                    <td style={{ padding:"10px 14px", textAlign:"right",   fontWeight:700, color: paid>0?"#1e293b":"#94a3b8" }}>{fmt(paid)}</td>
                    <td style={{ padding:"10px 14px", textAlign:"right" }}>
                      {m.planOnly ? <Badge color="#3b82f6">✓</Badge> : <span style={{color:"#e2e8f0"}}>—</span>}
                    </td>
                  </tr>

                  {/* Expanded invoices */}
                  {isOpen && (
                    <tr>
                      <td colSpan={7} style={{ padding:0, background:"#f8fafc", borderBottom:"2px solid #bfdbfe" }}>
                        <div style={{ padding:"10px 20px" }}>
                          <div style={{ fontSize:12, fontWeight:700, color:"#64748b", marginBottom:8 }}>
                            חשבונות עבור {m.name||m.reason}:
                          </div>
                          {invs.length > 0 && (
                            <div style={{ overflowX:"auto", marginBottom:10 }}>
                              <table style={{ borderCollapse:"collapse", fontSize:12, width:"100%" }}>
                                <thead>
                                  <tr style={{ background:"#e0f2fe", borderBottom:"1px solid #bae6fd" }}>
                                    {["מס׳ חשבון","ת. קבלה","סכום (ש״ח)","אחוז (%)","מנהל פרויקט","מנהל יחידה","אישור מזמין","הוחזר ליועץ","נדחה","סיבה","מחק"].map(h=>(
                                      <th key={h} style={{ padding:"5px 8px", textAlign:"right", color:"#0369a1", fontWeight:700, fontSize:10, whiteSpace:"nowrap" }}>{h}</th>
                                    ))}
                                  </tr>
                                </thead>
                                <tbody>
                                  {invs.map((inv,j)=>(
                                    <tr key={inv.id} id={"inv-row-"+inv.id} style={{ borderBottom:"1px solid #f1f5f9", background:j%2===0?"#fff":"#f0f9ff" }}>
                                      <td style={{ padding:"4px 6px" }}>
                                        <input value={inv.invoiceNum||""} onChange={e=>updateInvoice(inv.id,{invoiceNum:e.target.value})}
                                          placeholder="מספר" style={{ width:70, padding:"3px 5px", border:"1px solid #e2e8f0", borderRadius:5, fontSize:11, fontFamily:"'Heebo',sans-serif", outline:"none" }} />
                                      </td>
                                      <td style={{ padding:"4px 6px" }}>
                                        <FlatpickrDate value={inv.receiptDate||""} onChange={v=>updateInvoice(inv.id,{receiptDate:v})} />
                                      </td>
                                      <td style={{ padding:"4px 6px" }}>
                                        <NumericCell value={inv.amount||""} baseAmt={baseAmt} mode="amount"
                                          onCommit={(amt,pct) => {
                                            if (baseAmt > 0 && Number(amt) > baseAmt) {
                                              alert(`הסכום ${Number(amt).toLocaleString("he-IL")} ₪ חורג מסכום האבן דרך / ההגדלה (${baseAmt.toLocaleString("he-IL")} ₪)`);
                                              return;
                                            }
                                            updateInvoice(inv.id, pct?{amount:amt,pct}:{amount:amt});
                                          }}
                                          style={{ width:85 }} />
                                      </td>
                                      <td style={{ padding:"4px 6px" }}>
                                        <NumericCell value={inv.pct||""} baseAmt={baseAmt} mode="pct"
                                          onCommit={(pct,amt) => {
                                            if (Number(pct) > 100) {
                                              alert("האחוז לא יכול לעלות על 100%");
                                              return;
                                            }
                                            if (baseAmt > 0 && Number(amt) > baseAmt) {
                                              alert(`הסכום המחושב ${Number(amt).toLocaleString("he-IL")} ₪ חורג מסכום האבן דרך / ההגדלה (${baseAmt.toLocaleString("he-IL")} ₪)`);
                                              return;
                                            }
                                            updateInvoice(inv.id, amt?{pct,amount:amt}:{pct});
                                          }}
                                          style={{ width:75 }} placeholder="0.00" />
                                      </td>
                                      {["pmApproved","unitManagerApproved","toMunicipality","toConsultant","rejected"].map(k=>(
                                        <td key={k} style={{ padding:"4px 8px", textAlign:"right" }}>
                                          <input type="checkbox" checked={!!inv[k]} onChange={e=>updateInvoice(inv.id,{[k]:e.target.checked})} />
                                        </td>
                                      ))}
                                      <td style={{ padding:"4px 6px" }}>
                                        <ReasonCell value={inv.reason||""} onCommit={val=>updateInvoice(inv.id,{reason:val})} />
                                      </td>
                                      <td style={{ padding:"4px 8px", textAlign:"right" }}>
                                        <button onClick={()=>removeInvoice(inv.id)}
                                          style={{ background:"#fef2f2", color:"#ef4444", border:"none", borderRadius:4, padding:"2px 7px", fontSize:11, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>🗑</button>
                                      </td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            </div>
                          )}
                          {invs.length === 0 && <div style={{ color:"#94a3b8", fontSize:12, marginBottom:8 }}>לא הוזנו חשבונות עדיין</div>}
                          {sel.noClaims && (
                            <div style={{ color:"#b45309", fontSize:12, fontWeight:600, marginBottom:6, textAlign:"right", background:"#fffbeb", border:"1px solid #fde68a", borderRadius:6, padding:"6px 10px" }}>
                              התקבל העדר תביעות — לא ניתן להוסיף חשבונות ליועץ זה
                            </div>
                          )}
                          <button onClick={(e)=>{e.stopPropagation(); addInvoice(key);}}
                            disabled={!!sel.noClaims}
                            style={{ background: sel.noClaims?"#f1f5f9":"#f8fafc", color: sel.noClaims?"#94a3b8":"#334155", border:"1px solid #e2e8f0", borderRadius:6, padding:"4px 12px", fontSize:11, cursor: sel.noClaims?"not-allowed":"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:600, opacity: sel.noClaims?0.6:1 }}>
                            + הוסף חשבון
                          </button>
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
          <tfoot>
            <tr style={{ background:"#f8fafc", borderTop:"2px solid #e2e8f0" }}>
              <td colSpan={3} style={{ padding:"9px 14px", fontWeight:800, color:"#1e293b" }}>סה״כ</td>
              <td style={{ padding:"9px 14px", fontWeight:800, color:"#1e293b", textAlign:"right" }}>{fmt(totalBase)}</td>
              <td />
              <td style={{ padding:"9px 14px", fontWeight:800, color:"#374151", textAlign:"right" }}>{fmt(totalPaid)}</td>
              <td />
            </tr>
          </tfoot>
        </table>
      </div>
    );
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:18 }}>

      {/* ── Consultant selector ── */}
      <Card>
        <div style={{ fontWeight:700, color:"#1e293b", marginBottom:10, fontSize:15 }}>בחר יועץ לריכוז חשבונות</div>
        {consultantFees.length === 0
          ? <span style={{ color:"#94a3b8", fontSize:13 }}>אין יועצים מאושרים בפרויקט</span>
          : (() => {
              const [cSearch, setCSearch] = React.useState("");
              const filtered = consultantFees.filter(c =>
                c.field.toLowerCase().includes(cSearch.toLowerCase()) ||
                c.name.toLowerCase().includes(cSearch.toLowerCase())
              );
              return (
                <div>
                  {!selConsultant ? (
                    <>
                      <input value={cSearch} onChange={e=>setCSearch(e.target.value)}
                        placeholder="חיפוש לפי שם תחום או שם יועץ..."
                        style={{ width:"100%", padding:"8px 12px", border:"1.5px solid #e2e8f0", borderRadius:9, fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none", marginBottom:10, background:"#f8fafc" }} />
                      <div style={{ display:"flex", flexDirection:"column", gap:4, maxHeight:260, overflowY:"auto" }}>
                        {filtered.map(c => (
                          <div key={c.name+c.field} onClick={()=>setSelConsultant(c)}
                            style={{ display:"flex", alignItems:"center", gap:14, padding:"9px 14px", borderRadius:9,
                              border:"1.5px solid #f1f5f9", background:"#fff", cursor:"pointer", transition:"all .12s" }}
                            onMouseOver={e=>e.currentTarget.style.background="#f0f9ff"}
                            onMouseOut={e=>e.currentTarget.style.background="#fff"}>
                            <div style={{ width:36, height:36, borderRadius:9, background:"#f1f5f9", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>👤</div>
                            <div>
                              <div style={{ fontSize:11, color:"#94a3b8", fontWeight:700, marginBottom:1 }}>{c.field}</div>
                              <div style={{ fontSize:13, fontWeight:600, color:"#1e293b" }}>{c.name}</div>
                            </div>
                          </div>
                        ))}
                        {filtered.length === 0 && <div style={{ color:"#94a3b8", fontSize:13, padding:"8px 0" }}>לא נמצאו תוצאות</div>}
                      </div>
                    </>
                  ) : (
                    <div style={{ display:"flex", alignItems:"flex-start", gap:12 }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"9px 14px", borderRadius:9, border:"1.5px solid #3b82f6", background:"#f8fafc", flex:"0 0 50%", maxWidth:"50%" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                          <div style={{ width:36, height:36, borderRadius:9, background:"#f1f5f9", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>👤</div>
                          <div>
                            <div style={{ fontSize:11, color:"#334155", fontWeight:700, marginBottom:1 }}>{sel?.field}</div>
                            <div style={{ fontSize:13, fontWeight:600, color:"#1e293b" }}>{sel?.name}</div>
                          </div>
                        </div>
                        <button onClick={()=>{ setSelConsultant(null); setCSearch(""); }}
                          style={{ fontSize:12, color:"#64748b", background:"#f1f5f9", border:"none", borderRadius:6, padding:"4px 10px", cursor:"pointer" }}>
                          החלף
                        </button>
                      </div>
                      {/* עמודה ריקה באמצע */}
                      <div style={{ flex:1 }} />
                      {/* סיכום מספרי חשבונות */}
                      {(() => {
                        const byNum = {};
                        rows.filter(r => invMatchesField(r, sel?.field||"", sel?.name||"")).forEach(inv => {
                          const num = inv.invoiceNum?.trim();
                          if (!num) return;
                          byNum[num] = (byNum[num]||0) + Number(inv.amount||0);
                        });
                        const entries = Object.entries(byNum).sort((a,b) => {
                          const na=Number(a[0]),nb=Number(b[0]);
                          return isNaN(na)||isNaN(nb)?a[0].localeCompare(b[0],'he'):na-nb;
                        });
                        if (!entries.length) return null;
                        return (
                          <div style={{ display:"flex", flexDirection:"column", gap:3, padding:"6px 0" }}>
                            {entries.map(([num,total]) => (
                              <div key={num} style={{ fontSize:11, color:"#475569", whiteSpace:"nowrap" }}>
                                חש׳ {num} — {fmt(total)}
                              </div>
                            ))}
                          </div>
                        );
                      })()}
                    </div>
                  )}
                </div>
              );
            })()
        }
      </Card>

      {sel && (
        <>
          {/* ── Consultant info ── */}
          <Card style={{ transition:"box-shadow .15s" }}>
            <div style={{ fontSize:11, color:"#94a3b8", fontWeight:600, marginBottom:6, textAlign:"right" }}>
              {sel?._consultantRowId && <span style={{ fontSize:11, color:"#475569", cursor:"pointer", textDecoration:"underline", textDecorationStyle:"dotted" }}
                onClick={() => onNavigate && onNavigate("consultants", sel._consultantRowId)}>← לחץ לפתיחת כרטיס יועץ</span>}
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:16, direction:"rtl" }}>
              <div style={{ display:"flex", flexDirection:"column", gap:3, textAlign:"right" }}>
                <div style={{ fontSize:11, color:"#94a3b8", fontWeight:700, marginBottom:2 }}>חשבונות בפרויקט</div>
                <div style={{ fontSize:13, color:"#374151" }}>מקצוע: <strong>{sel.field}</strong></div>
                {sel.contact && <div style={{ fontSize:13 }}>איש קשר: <a href={"mailto:"+sel.email} style={{color:"#334155"}}>{sel.contact}</a></div>}
                {sel.email   && <div style={{ fontSize:13, color:"#374151" }}>אימייל: {sel.email}</div>}
                {sel.phone   && <div style={{ fontSize:13, color:"#374151" }}>טלפון: {sel.phone}</div>}

function NumInput({ value, onChange }) {
  const [focus, setFocus] = useState(false);
  const [raw, setRaw] = useState(String(value||""));
  React.useEffect(() => { if (!focus) setRaw(String(value||"")); }, [value, focus]);
  const display = focus ? raw : (Number(raw) ? Number(raw).toLocaleString("he-IL") : raw);
  return (
    <input
      type="text" value={display}
      onChange={e => { const v = e.target.value.replace(/,/g,""); setRaw(v); onChange(v); }}
      onFocus={() => { setFocus(true); setRaw(String(value||"")); }}
      onBlur={() => setFocus(false)}
      style={{ width:160, textAlign:"right", background: focus?"#fff":"#f8fafc", border:`1.5px solid ${focus?"#3b82f6":"#e2e8f0"}`, borderRadius:8, padding:"6px 10px", fontSize:14, fontFamily:"'Heebo',sans-serif", outline:"none", color:"#1e293b" }}
    />
  );
}

// ── Shared helper: build the exact rows shown in BudgetTab ───────────────────
// Used by BOTH BudgetTab (display) and exportProjectToExcel (export).
// Export reads these rows directly - NO re-computation.
function buildBudgetAllRows({ quotesRows, consultantsRows, budgetState, statsRows, accountsRows, planOnlyMap, archBaseOverride }) {
  const contractorEst = Number((budgetState||{}).contractorEst || 0);
  const devPct        = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);
  const archBase      = (archBaseOverride > 0) ? archBaseOverride : contractorEst - contractorEst * devPct / 100;
  const computeFee = (field, payType, value) => {
    if (payType !== "אחוזים") return Number(value || 0);
    const pct = Number(value || 0) / 100;
    if (["אדריכל","אדריכלות","אדריכלים"].includes((field||"").trim()))      return archBase      * pct;
    if ((field||"").includes("מנהל פרויקט")) return contractorEst * pct;
    if (contractorEst) {
      const profPct = Number((statsRows||[]).find(r => r.field === field)?.pct || 0) / 100;
      return contractorEst * profPct * pct;
    }
    return 0;
  };
  // For old invoices without fieldName: attribute only to the first field this consultant appears in
  const firstFieldMap = {};
  (quotesRows || []).forEach(fg => {
    (fg.consultants || []).forEach(c => {
      if (!c.approved || !c.name?.trim()) return;
      const n = c.name.trim();
      if (!firstFieldMap[n]) firstFieldMap[n] = fg.fieldName || "";
    });
  });
  const paidByConsultant = (name, field) =>
    (accountsRows || []).filter(r => {
      if (r.consultantName !== name || !r.unitManagerApproved || r.rejected) return false;
      if (r.fieldName) return r.fieldName === field;
      return (firstFieldMap[name] || "") === field;
    }).reduce((s,r) => s + Number(r.amount||0), 0);
  const rows = [];
  (quotesRows || []).forEach(fg => {
    (fg.consultants || []).forEach(c => {
      if (!c.approved || !c.name?.trim()) return;
      const consultantEntry = (consultantsRows || []).find(r => r.id === "q-"+c.id);
      const totalInc    = (consultantEntry?.increases || []).filter(x => x.approvedIncrease).reduce((s,x) => s + Number(x.amount||0), 0);
      const computedFee = computeFee(fg.fieldName, c.payType || "אחוזים", c.value);
      const paid        = paidByConsultant(c.name.trim(), fg.fieldName||"");
      const planOnly    = (planOnlyMap||{})[(fg.fieldName||"") + "::" + c.name.trim()] || 0;
      const noClaims    = !!(consultantEntry?.noClaims);
      const notes       = consultantEntry?.notes || "";
      rows.push({
        field: fg.fieldName || "", name: c.name.trim(),
        payType: c.payType || "אחוזים", value: Number(c.value||0),
        increases: totalInc, computedFee, paid, planOnly, noClaims, notes,
        _consultantRowId: "q-"+c.id,
      });
    });
  });
  rows.sort((a,b) => (a.field||"").localeCompare(b.field||"", 'he'));
  // Manual rows always appear at the end of the consultants section
  (budgetState?.extraConsultantRows || []).forEach(r => {
    rows.push({
      field: r.field||"", name: r.name||"",
      payType: "סכום קבוע", value: Number(r.contract||0),
      increases: 0, computedFee: Number(r.contract||0),
      paid: Number(r.paid||0), planOnly: Number(r.planOnly||0),
      noClaims: !!r.noClaims, notes: r.notes||"",
      _manualRow: true, _manualId: r.id,
    });
  });
  return rows;
}

function NegInput({ value, onCommit, placeholder, style }) {
  const isFocused = React.useRef(false);
  const [local, setLocal] = React.useState("");
  const [showRaw, setShowRaw] = React.useState(false);
  const numVal = v => {
    if (v===null||v===undefined||v==="") return null;
    const n = Number(String(v).replace(/,/g,""));
    return isNaN(n)?null:n;
  };
  const fmtNum = v => { const n=numVal(v); return n!==null?n.toLocaleString("en-US"):""; };
  React.useEffect(() => {
    if (!isFocused.current) { const n=numVal(value); setLocal(n!==null?String(n):""); }
  }, [value]);
  return (
    <input
      type="text"
      value={showRaw ? local : fmtNum(value)}
      onChange={e => setLocal(e.target.value.replace(/,/g,""))}
      onFocus={() => {
        isFocused.current = true;
        const n = numVal(value);
        setLocal(n!==null?String(n):"");
        setShowRaw(true);
      }}
      onBlur={() => {
        isFocused.current = false;
        setShowRaw(false);
        const clean = local.replace(/,/g,"");
        const n = Number(clean);
        onCommit(clean!==""&&!isNaN(n)?n:"");
      }}
      placeholder={placeholder||"0"}
      style={{ ...style, direction:"ltr" }}
    />
  );
}

const _fmtInput  = (val) => val ? Number(String(val).replace(/,/g,"")).toLocaleString("he-IL") : "";
const _parseInput = (val) => String(val).replace(/,/g,"");
function BudgetNumInput({ value, onChange, placeholder="0", style={} }) {
  const [focused, setFocused] = React.useState(false);
  const [raw, setRaw] = React.useState(value||"");
  React.useEffect(() => { if (!focused) setRaw(value||""); }, [value, focused]);

}

                    <tr>
                      <td colSpan={9} style={{ padding:"5px 14px" }}>

                          const bcmAmt = bcmBase * bcmPct / 100;

                                </div>
                              </td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#1e293b", fontWeight:600 }}>{fmt(overheadAmt)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#1e293b" }}>{fmt(overheadPaid)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:overheadRem<0?"#dc2626":"#1e293b" }}>{fmt(overheadRem)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#1e293b" }}>{overheadPlanOnlyCalc > 0 ? fmt(Math.round(overheadPlanOnlyCalc)) : "—"}</td>
                              <td />
                              <td style={{ padding:"7px 10px" }}><input value={bs.overheadNotes||""} onChange={e=>upd("overheadNotes",e.target.value)} style={inputStyle} placeholder="הערות..." /></td>

                              <td style={{ padding:"7px 10px" }}>
                                <div style={{ display:"flex", alignItems:"center", gap:4, justifyContent:"flex-start" }}>
                                  <span style={{ fontSize:11, color:"#64748b" }}>%</span>
                                  <input type="number" value={bs.bcmPct||""} onChange={e=>upd("bcmPct",e.target.value)} style={{...inputStyle, width:50, textAlign:"right"}} placeholder="" />
                                </div>
                              </td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#1e293b", fontWeight:600 }}>{fmt(bcmAmt)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#1e293b" }}>{fmt(bcmPaid)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:bcmRem<0?"#dc2626":"#1e293b" }}>{fmt(bcmRem)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#1e293b" }}>{bcmPlanOnlyCalc > 0 ? fmt(Math.round(bcmPlanOnlyCalc)) : "—"}</td>
                              <td />
                              <td style={{ padding:"7px 10px" }}><input value={bs.bcmNotes||""} onChange={e=>upd("bcmNotes",e.target.value)} style={inputStyle} placeholder="הערות..." /></td>
                            </tr>
                            {/* מעמ */}
                            <tr style={{ borderBottom:"1px solid #f1f5f9" }}>
                              <td style={{ padding:"7px 10px", fontSize:13, color:"#1e293b" }}>מע״מ</td>
                              <td style={{ padding:"7px 10px" }}>
                                <div style={{ display:"flex", alignItems:"center", gap:4, justifyContent:"flex-start" }}>
                                  <span style={{ fontSize:11, color:"#64748b" }}>%</span>
                                  <input type="number" value={bs.vatPct||18} onChange={e=>upd("vatPct",e.target.value)} style={{...inputStyle, width:50, textAlign:"right"}} />
                                </div>
                              </td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#1e293b", fontWeight:600 }}>{fmt(vatAmt)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#1e293b" }}>{fmt(vatPaid)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:vatRem<0?"#dc2626":"#1e293b" }}>{fmt(vatRem)}</td>
                              <td style={{ padding:"7px 10px", textAlign:"right", fontSize:13, color:"#1e293b" }}>{vatPlanOnlyCalc > 0 ? fmt(Math.round(vatPlanOnlyCalc)) : "—"}</td>
                              <td />
                              <td style={{ padding:"7px 10px" }}><input value={bs.vatNotes||""} onChange={e=>upd("vatNotes",e.target.value)} style={inputStyle} placeholder="הערות..." /></td>
                            </tr>
                            {/* סהכ תקורות */}
                            <tr style={{ borderTop:"2px solid #e9d5ff" }}>
                              <td colSpan={2} style={{ padding:"8px 10px", fontWeight:800, color:"#7e22ce", fontSize:12 }}>סה״כ תקורות</td>
                              <td style={{ padding:"8px 10px", fontWeight:800, color:"#1e293b", textAlign:"right" }}>{fmt(overheadTotalAmt)}</td>
                              <td style={{ padding:"8px 10px", fontWeight:800, color:"#1e293b", textAlign:"right" }}>{fmt(overheadPaid+bcmPaid+vatPaid)}</td>
                              <td style={{ padding:"8px 10px", fontWeight:800, color:"#1e293b", textAlign:"right" }}>{fmt(overheadRem+bcmRem+vatRem)}</td>
                              <td style={{ padding:"8px 10px", fontWeight:800, color:"#1e293b", textAlign:"right" }}>{fmt(Math.round(overheadPlanOnlyCalc+bcmPlanOnlyCalc+vatPlanOnlyCalc))}</td>
                              <td colSpan={2} />
                            </tr>
                            {/* סה"כ כללי */}
                            <tr style={{ background:"#fefce8", borderTop:"3px solid #fbbf24" }}>
                              <td colSpan={2} style={{ padding:"11px 10px", fontWeight:900, color:"#92400e", fontSize:14 }}>סה״כ כללי</td>
                              <td style={{ padding:"11px 10px", fontWeight:900, color:"#92400e", fontSize:14, textAlign:"right" }}>{fmt(grandTotalContract)}</td>
                              <td style={{ padding:"11px 10px", fontWeight:900, color:"#92400e", fontSize:14, textAlign:"right" }}>{fmt(grandTotalPaid)}</td>
                              <td style={{ padding:"11px 10px", fontWeight:900, color:"#92400e", fontSize:14, textAlign:"right" }}>{fmt(grandTotalRem)}</td>
                              <td style={{ padding:"11px 10px", fontWeight:900, color:"#92400e", fontSize:14, textAlign:"right" }}>{fmt(Math.round(basePlanOnly + overheadPlanOnlyCalc + bcmPlanOnlyCalc + vatPlanOnlyCalc))}</td>
                              <td colSpan={2} />
                            </tr>
                          </>);
                        })()}
                      </>);
                    })()}
                  </>);
                })()}
              </tbody>
            )}
          </table>
        </div>
      </Card>
    </div>
  );
}

// ── Tab: פתיחת פרויקט ────────────────────────────────────────────────────────
// ── Helper: date picker showing DD/MM/YYYY ────────────────────────────────────
function DatePickerDMY({ value, onChange, style }) {
  const ref = React.useRef();
  const toISO  = v => v ? v.split('/').reverse().join('-') : "";
  const toDMY  = v => { if (!v) return ""; const [y,m,d] = v.split('-'); return `${d}/${m}/${y}`; };
  return (
    <div style={{ position:"relative", width:"100%" }}>
      <input type="text" readOnly value={value||""} placeholder="DD/MM/YYYY"
        onClick={()=>{ try{ ref.current.showPicker(); }catch(e){ ref.current.focus(); } }}
        style={{ ...style, cursor:"pointer", width:"100%", boxSizing:"border-box" }} />
      <input ref={ref} type="date" value={toISO(value)}
        onChange={e=>onChange(toDMY(e.target.value))}
        style={{ position:"absolute", top:0, left:0, width:"100%", height:"100%", opacity:0, pointerEvents:"none" }} />
    </div>
  );
}

// ── Tab: תוצאות מכרז ─────────────────────────────────────────────────────────
function TenderTab({ rows, setRows, quotesRows, budgetState, statsRows, openingData, milestones, localMilestones, companyId }) {
  const [showDoc2, setShowDoc2] = useState(false);

  // Use ONLY opening data for initial/contract estimates (no increases)
  const contractorEst = Number(String((openingData||{}).contractorEst||"").replace(/,/g,""));
  const devPct  = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);
  const archBase = resolveArchBase(openingData, contractorEst, devPct);
  const fmt = n => { const v=Number(n); return (!n&&n!==0)||isNaN(v)?"—":v.toLocaleString("he-IL"); };
  const fmtDiff = n => { const v=Number(n); if(isNaN(v)||v===0) return "—"; return (v>0?"+":"")+v.toLocaleString("he-IL"); };

  // Build rows from approved consultants (percentage-based only, contract fee without increases)
  const consultants = [];
  (quotesRows||[]).forEach(field => {
    (field.consultants||[]).filter(c=>c.approved&&c.name?.trim()&&(c.payType||"אחוזים")==="אחוזים").forEach(c => {
      const feePct  = Number(c.value||0);
      const isArch  = ["אדריכל","אדריכלות","אדריכלים"].includes((field.fieldName||"").trim());
      const isPM    = (field.fieldName||"").includes("מנהל פרויקט");
      let sectionEst = 0;
      if (isArch && contractorEst)      sectionEst = archBase;
      else if (isPM && contractorEst)   sectionEst = contractorEst;
      else if (contractorEst) { const pp=Number((statsRows||[]).find(r=>r.field===field.fieldName)?.pct||0)/100; sectionEst=contractorEst*pp; }
      // Contract base fee only — no consultant increases
      const initialFee = sectionEst * feePct / 100;
      // BIM = 15% of planning-phase portion (milestones with planOnly=true), only for non-arch/non-PM
      const isArchOrPM = isArch || isPM;
      let bim = null;
      let planningPct = 0;
      if (!isArchOrPM) {
        const effectiveMilestones = companyId
          ? ((localMilestones||{})[field.fieldName] || (milestones||{})[companyId]?.[field.fieldName] || [])
          : [];
        planningPct = effectiveMilestones.filter(m=>m.planOnly).reduce((s,m)=>s+Number(m.pct||0),0);
        const planningFee = initialFee * planningPct / 100;
        bim = planningFee * 0.15;
      }
      const key = (field.fieldName||"")+"__"+(c.name.trim());
      const saved = rows.find(r=>r.key===key)||{};
      consultants.push({ key, field:field.fieldName||"", name:c.name.trim(), feePct, sectionEst, initialFee, bim, planningPct,
        doc1:saved.doc1??"", doc2:saved.doc2??"", date:saved.date??"" });
    });
  });

  const updRow = (key, patch) => {
    const exists = rows.find(r=>r.key===key);
    setRows(exists ? rows.map(r=>r.key===key?{...r,...patch}:r) : [...rows,{id:Date.now(),key,...patch}]);
  };

  const inpStyle = { width:"100%", padding:"3px 6px", border:"1px solid #e2e8f0", borderRadius:5, fontSize:12, fontFamily:"'Heebo',sans-serif", outline:"none", background:"transparent", textAlign:"right" };
  const thBase   = { padding:"6px 8px", textAlign:"right", fontSize:11, fontWeight:700, whiteSpace:"normal", wordBreak:"break-word", lineHeight:1.3, verticalAlign:"bottom", overflow:"hidden", borderLeft:"1px solid #e2e8f0" };
  const tdBase   = { padding:"7px 8px", fontSize:12, borderLeft:"1px solid #e2e8f0", borderBottom:"1px solid #f1f5f9", textAlign:"right" };

  const existingCols = 6;
  const updatedCols  = showDoc2 ? 7 : 6;

  return (
    <div style={{ display:"flex", flexDirection:"column" }}>
        <div style={{ padding:"14px 20px 0" }}>
          <span style={{ fontWeight:700, fontSize:15, color:"#1e293b" }}>תוצאות מכרז</span>
        </div>
        {consultants.length === 0
          ? <div style={{ padding:32, color:"#94a3b8", fontSize:13, textAlign:"right" }}>אין יועצים מאושרים בפרויקט</div>
          : (() => {
              const W0=80, W1=130, WC=108;
              const t1W = W0+W1+WC*4;
              const t2W = W0+W1+WC*(showDoc2?8:7);
              const thN = (bg,color,w=WC) => ({ ...thBase, background:bg, color, width:w });
              const thS = (color,w=WC) => ({ ...thBase, background:"#f8fafc", color:"#374151", width:w });
              return (
              <div style={{ background:"#f1f5f9", padding:"10px 20px 20px", display:"flex", flexDirection:"column", gap:24, alignItems:"flex-start" }}>
                {/* Card 1: מצב קיים */}
                <div style={{ background:"#fff", borderRadius:10, border:"1px solid #bfdbfe", overflow:"hidden", boxShadow:"0 1px 4px #0001", display:"inline-block" }}>
                  <div style={{ padding:"9px 14px", background:"#dbeafe", color:"#1e40af", fontWeight:700, fontSize:13, borderBottom:"1px solid #bfdbfe" }}>מצב קיים</div>
                  <table style={{ width:t1W, borderCollapse:"collapse", direction:"rtl", fontSize:12, tableLayout:"fixed" }}>
                    <thead>
                      <tr>
                        <th style={{ ...thBase, background:"#f8fafc", color:"#374151", width:W0 }}>תחום</th>
                        <th style={{ ...thBase, background:"#f8fafc", color:"#374151", width:W1 }}>יועץ</th>
                        <th style={{ ...thBase, background:"#f8fafc", color:"#374151", width:WC }}>שכר טרחה %</th>
                        {["אומדן פרק ראשוני","שכר טרחה ראשוני","שכ\"ט BIM"].map(h=>(
                          <th key={h} style={{ ...thBase, background:"#eff6ff", color:"#1e40af", width:WC }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {consultants.map((c,i)=>(
                        <tr key={c.key} style={{ background:i%2===0?"#fff":"#fafbfd" }}>
                          <td style={{ ...tdBase, fontWeight:600, color:"#374151" }}>{c.field}</td>
                          <td style={{ ...tdBase, fontWeight:600, color:"#1e293b" }}>{c.name}</td>
                          <td style={{ ...tdBase, color:"#475569" }}>{c.feePct!==null ? c.feePct+"%" : "סכום קבוע"}</td>

                        <th style={{ ...thBase, background:"#f8fafc", color:"#374151", width:WC }}>שכר טרחה %</th>
                        <th style={{ ...thBase, background:"#f0fdf4", color:"#166534", width:WC }}>תאריך</th>
                        <th style={{ ...thBase, background:"#f0fdf4", color:"#166534", width:WC }}>כתב כמויות</th>
                        {showDoc2 && <th style={{ ...thBase, background:"#f0fdf4", color:"#166534", width:WC }}>כתב כמויות 2</th>}
                        {["שכר טרחה מעודכן","הגדלה נדרשת","שכ\"ט BIM מעודכן","הגדלה נדרשת BIM"].map(h=>(

                        const doc2 = showDoc2 ? Number(c.doc2||0) : 0;
                        const tenderBase = (showDoc2 && doc2) ? doc2 : doc1;
                        const updatedFee  = tenderBase ? tenderBase * (c.feePct||0)/100 : null;
                        const increase    = updatedFee !== null ? updatedFee - c.initialFee : null;
                        const bimUpdated  = (updatedFee !== null && c.bim !== null) ? updatedFee * c.planningPct / 100 * 0.15 : null;
                        const bimIncrease = (bimUpdated !== null && c.bim !== null) ? bimUpdated - c.bim : null;
                        return (
                          <tr key={c.key} style={{ background:i%2===0?"#fff":"#fafbfd" }}>
                            <td style={{ ...tdBase, fontWeight:600, color:"#374151" }}>{c.field}</td>

                            <td style={{ ...tdBase }}><NegInput value={c.doc1} onCommit={v=>updRow(c.key,{doc1:v})} style={{ ...inpStyle }} placeholder="0" /></td>
                            {showDoc2 && <td style={{ ...tdBase }}><NegInput value={c.doc2} onCommit={v=>updRow(c.key,{doc2:v})} style={{ ...inpStyle }} placeholder="0" /></td>}
                            <td style={{ ...tdBase, fontWeight:700 }}>{updatedFee!==null ? fmt(Math.round(updatedFee)) : "—"}</td>
                            <td style={{ ...tdBase, fontWeight:700, color:increase===null?"#94a3b8":increase>0?"#16a34a":increase<0?"#dc2626":"#1e293b" }}>
                              <span style={{ direction:"ltr", display:"block" }}>{increase!==null ? fmtDiff(increase) : "—"}</span>
                            </td>
                            <td style={{ ...tdBase, color:"#475569" }}>{bimUpdated !== null ? fmt(Math.round(bimUpdated)) : "—"}</td>
                            <td style={{ ...tdBase, fontWeight:700, color:bimIncrease===null?"#94a3b8":bimIncrease>0?"#16a34a":bimIncrease<0?"#dc2626":"#1e293b" }}>
                              <span style={{ direction:"ltr", display:"block" }}>{bimIncrease!==null ? fmtDiff(bimIncrease) : "—"}</span>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
              );
            })()
        }
    </div>
  );
}

// ── Tab: חשבון קבלן סופי ─────────────────────────────────────────────────────
function ContractorTab({ rows, setRows, quotesRows, tenderRows, budgetState, statsRows, openingData, milestones, localMilestones, companyId }) {
  const contractorEst = Number(String((openingData||{}).contractorEst||"").replace(/,/g,""));
  const devPct   = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);
  const archBase = resolveArchBase(openingData, contractorEst, devPct);
  const fmt      = n => { const v=Number(n); return (!n&&n!==0)||isNaN(v)?"—":v.toLocaleString("he-IL"); };
  const fmtDiff  = n => { const v=Number(n); if(isNaN(v)||v===0) return "—"; return (v>0?"+":"")+v.toLocaleString("he-IL"); };

  const consultants = [];
  (quotesRows||[]).forEach(field => {
    (field.consultants||[]).filter(c=>c.approved&&c.name?.trim()&&(c.payType||"אחוזים")==="אחוזים").forEach(c => {
      const feePct  = Number(c.value||0);
      const isArch  = ["אדריכל","אדריכלות","אדריכלים"].includes((field.fieldName||"").trim());
      const isPM    = (field.fieldName||"").includes("מנהל פרויקט");
      let sectionEst = 0;
      if (isArch && contractorEst)      sectionEst = archBase;
      else if (isPM && contractorEst)   sectionEst = contractorEst;
      else if (contractorEst) { const pp=Number((statsRows||[]).find(r=>r.field===field.fieldName)?.pct||0)/100; sectionEst=contractorEst*pp; }
      const initialFee = sectionEst * feePct / 100;
      const isArchOrPM = isArch || isPM;
      let bim = null; let planningPct = 0;
      if (!isArchOrPM) {
        const ems = companyId ? ((localMilestones||{})[field.fieldName] || (milestones||{})[companyId]?.[field.fieldName] || []) : [];
        planningPct = ems.filter(m=>m.planOnly).reduce((s,m)=>s+Number(m.pct||0),0);
        bim = initialFee * planningPct / 100 * 0.15;
      }
      const key = (field.fieldName||"")+"__"+(c.name.trim());
      const tSaved = (tenderRows||[]).find(r=>r.key===key)||{};
      const tDoc1 = Number(tSaved.doc1||0);
      const tDoc2 = Number(tSaved.doc2||0);
      const tBase = (tDoc2) ? tDoc2 : tDoc1;
      const tenderFee = tBase ? tBase * feePct/100 : null;
      const tenderBim = (tenderFee !== null && bim !== null) ? tenderFee * planningPct/100 * 0.15 : null;
      const cSaved = rows.find(r=>r.key===key)||{};
      consultants.push({ key, field:field.fieldName||"", name:c.name.trim(), feePct, bim, planningPct,
        tDate:tSaved.date||"", tBase, tenderFee, tenderBim,
        finalAmt:cSaved.finalAmt??"", date:cSaved.date??"" });
    });
  });

  const updRow = (key, patch) => {
    const exists = rows.find(r=>r.key===key);
    setRows(exists ? rows.map(r=>r.key===key?{...r,...patch}:r) : [...rows,{id:Date.now(),key,...patch}]);
  };

  const inpStyle = { width:"100%", padding:"3px 6px", border:"1px solid #e2e8f0", borderRadius:5, fontSize:12, fontFamily:"'Heebo',sans-serif", outline:"none", background:"transparent", textAlign:"right" };
  const thBase   = { padding:"6px 8px", textAlign:"right", fontSize:11, fontWeight:700, whiteSpace:"normal", wordBreak:"break-word", lineHeight:1.3, verticalAlign:"bottom", overflow:"hidden", borderLeft:"1px solid #e2e8f0" };
  const tdBase   = { padding:"7px 8px", fontSize:12, borderLeft:"1px solid #f1f5f9", borderBottom:"1px solid #f1f5f9", textAlign:"right" };

  return (
    <div style={{ display:"flex", flexDirection:"column" }}>
        <div style={{ padding:"14px 20px 0" }}>
          <span style={{ fontWeight:700, fontSize:15, color:"#1e293b" }}>חשבון קבלן סופי</span>
        </div>
        {consultants.length === 0
          ? <div style={{ padding:32, color:"#94a3b8", fontSize:13, textAlign:"right" }}>אין יועצים מאושרים בפרויקט</div>
          : (() => {
              const W0=80, W1=130, WC=108;
              const t1W = W0+W1+WC*5;
              const t2W = W0+W1+WC*7;
              return (
              <div style={{ background:"#f1f5f9", padding:"10px 20px 20px", display:"flex", flexDirection:"column", gap:24, alignItems:"flex-start" }}>
              {/* Card 1: אומדן מעודכן לפי מכרז */}
              <div style={{ background:"#fff", borderRadius:10, border:"1px solid #bbf7d0", overflow:"hidden", boxShadow:"0 1px 4px #0001", display:"inline-block" }}>
                <div style={{ padding:"9px 14px", background:"#dcfce7", color:"#166534", fontWeight:700, fontSize:13, borderBottom:"1px solid #bbf7d0" }}>אומדן מעודכן לפי מכרז</div>
                <table style={{ width:t1W, borderCollapse:"collapse", direction:"rtl", fontSize:12, tableLayout:"fixed" }}>
                  <colgroup>
                    <col style={{ width:W0 }} /><col style={{ width:W1 }} /><col style={{ width:WC }} />
                    <col style={{ width:WC }} /><col style={{ width:WC }} /><col style={{ width:WC }} /><col style={{ width:WC }} />
                  </colgroup>
                  <thead>
                    <tr>
                      <th style={{ ...thBase, background:"#f8fafc", color:"#374151" }}>תחום</th>
                      <th style={{ ...thBase, background:"#f8fafc", color:"#374151" }}>יועץ</th>
                      <th style={{ ...thBase, background:"#f8fafc", color:"#374151" }}>שכר טרחה %</th>
                      {["תאריך","כתב כמויות","שכר טרחה מעודכן","שכ\"ט BIM מעודכן"].map(h=>(
                        <th key={h} style={{ ...thBase, background:"#f0fdf4", color:"#166534" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {consultants.map((c,i)=>(
                      <tr key={c.key} style={{ background:i%2===0?"#fff":"#fafbfd" }}>
                        <td style={{ ...tdBase, fontWeight:600, color:"#374151" }}>{c.field}</td>
                        <td style={{ ...tdBase, fontWeight:600, color:"#1e293b" }}>{c.name}</td>
                        <td style={{ ...tdBase, color:"#475569" }}>{c.feePct}%</td>
                        <td style={{ ...tdBase, color:"#475569" }}>{c.tDate||"—"}</td>
                        <td style={{ ...tdBase, color:"#475569" }}>{c.tBase ? fmt(c.tBase) : "—"}</td>
                        <td style={{ ...tdBase, fontWeight:700 }}>{c.tenderFee !== null ? fmt(Math.round(c.tenderFee)) : "—"}</td>
                        <td style={{ ...tdBase, color:"#475569" }}>{c.tenderBim !== null ? fmt(Math.round(c.tenderBim)) : "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {/* Card 2: חשבון סופי */}
              <div style={{ background:"#fff", borderRadius:10, border:"1px solid #cbd5e1", overflow:"hidden", boxShadow:"0 1px 4px #0001", display:"inline-block" }}>
                <div style={{ padding:"9px 14px", background:"#f1f5f9", color:"#475569", fontWeight:700, fontSize:13, borderBottom:"1px solid #fef08a" }}>חשבון סופי</div>
                <table style={{ width:t2W, borderCollapse:"collapse", direction:"rtl", fontSize:12, tableLayout:"fixed" }}>
                  <colgroup>
                    <col style={{ width:W0 }} /><col style={{ width:W1 }} /><col style={{ width:WC }} />
                    <col style={{ width:WC }} /><col style={{ width:WC }} /><col style={{ width:WC }} /><col style={{ width:WC }} /><col style={{ width:WC }} /><col style={{ width:WC }} />
                  </colgroup>
                  <thead>
                    <tr>
                      <th style={{ ...thBase, background:"#f8fafc", color:"#374151" }}>תחום</th>
                      <th style={{ ...thBase, background:"#f8fafc", color:"#374151" }}>יועץ</th>
                      <th style={{ ...thBase, background:"#f8fafc", color:"#374151" }}>שכר טרחה %</th>
                      {["תאריך","חשבון סופי","שכר טרחה סופי","הגדלה נדרשת","שכ\"ט BIM סופי","הגדלה נדרשת BIM"].map(h=>(
                        <th key={h} style={{ ...thBase, background:"#fefce8", color:"#475569" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {consultants.map((c,i)=>{
                      const finalAmt      = Number(c.finalAmt||0);
                      const finalFee      = finalAmt ? finalAmt * (c.feePct||0)/100 : null;
                      const finalIncrease = (finalFee !== null && c.tenderFee !== null) ? finalFee - c.tenderFee : null;
                      const bimFinal      = (finalFee !== null && c.bim !== null) ? finalFee * c.planningPct/100 * 0.15 : null;
                      const bimIncrease   = (bimFinal !== null && c.tenderBim !== null) ? bimFinal - c.tenderBim : null;
                      return (
                        <tr key={c.key} style={{ background:i%2===0?"#fff":"#fafbfd" }}>

// ── Global page: רשימת ספקים ─────────────────────────────────────────────────
function SuppliersPage({ suppliers, setSuppliers, professions }) {
  const EMPTY = { name:"", field:"", contact:"", phone:"", phone2:"", email:"", notes:"" };
  const [form,    setForm]    = useState(EMPTY);
  const [editId,  setEditId]  = useState(null);
  const [editForm,setEditForm]= useState({});
  const [search, setSearch] = useState("");
  const [formError, setFormError] = useState("");

  const allFields = [...new Set(suppliers.map(s => s.field).filter(Boolean))].sort();

  const add = () => {
    if (!form.name.trim()) return;
    if (!form.phone.trim() && !form.phone2.trim() && !form.email.trim()) {
      setFormError("יש להזין לפחות אמצעי התקשרות אחד: טלפון, נייד או מייל");
      return;
    }
    setFormError("");
    setSuppliers([...suppliers, { ...form, id: Date.now() }]);
    setForm(EMPTY);
    setEditId(null);
  };
  const del = id => setSuppliers(suppliers.filter(s => s.id !== id));
  const saveEdit = () => {
    setSuppliers(suppliers.map(s => s.id === editId ? { ...s, ...editForm } : s));
    setEditId(null);
  };

  const q = search.trim().toLowerCase();
  const filtered = [...(q === "" ? suppliers : suppliers.filter(s =>
    [s.name, s.field, s.contact, s.email, s.phone, s.phone2, s.notes]
      .some(v => String(v||"").toLowerCase().includes(q))
  ))].sort((a,b) => (a.field||"").localeCompare(b.field||"", 'he') || (a.name||"").localeCompare(b.name||"", 'he'));


  const inp = (label, key, obj, setObj, placeholder="") => (
    <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
      <label style={{ fontSize:11, fontWeight:700, color:"#64748b" }}>{label}</label>
      <input value={obj[key]||""} onChange={e => setObj({...obj,[key]:e.target.value})}
        placeholder={placeholder}
        style={{ padding:"7px 10px", border:"1.5px solid #e2e8f0", borderRadius:8, fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none" }}
        onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="#e2e8f0"} />
    </div>
  );

  return (
    <div className="fade" style={{ padding:"30px 36px", display:"flex", flexDirection:"column", gap:20 }}>
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", flexWrap:"wrap", gap:12 }}>
        <div>
          <div style={{ fontSize:11, color:"#475569", fontWeight:700, letterSpacing:3, marginBottom:4 }}>גיליון גלובלי</div>
          <h1 style={{ fontSize:24, fontWeight:900, color:"#1e293b" }}>רשימת ספקים</h1>
          <div style={{ fontSize:13, color:"#64748b", marginTop:2 }}>ניהול כללי של כל הספקים במערכת</div>
        </div>
        <div style={{ display:"flex", gap:10 }}>
          <label style={{ display:"flex", alignItems:"center", gap:7, padding:"9px 16px", background:"#f8fafc", color:"#374151", border:"1.5px solid #bbf7d0", borderRadius:9, fontSize:13, fontWeight:700, fontFamily:"'Heebo',sans-serif", cursor:"pointer" }}>
            ייבוא מאקסל ↑
            <input type="file" accept=".csv,.xlsx,.xls" style={{ display:"none" }} onChange={e => {
              const file = e.target.files?.[0]; if (!file) return;
              const reader = new FileReader();
              reader.onload = ev => {
                try {
                  const XLSX = window.XLSX;
                  if (!XLSX) { alert("ספריית Excel לא נטענה, נסה שוב"); return; }
                  const wb = XLSX.read(ev.target.result, { type:"array" });
                  const ws = wb.Sheets[wb.SheetNames[0]];
                  const data = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });
                  if (data.length < 2) return;
                  const newSuppliers = data.slice(1).map(cols => ({
                    id: Date.now() + Math.random(),
                    field:   String(cols[0]||"").trim(),
                    name:    String(cols[1]||"").trim(),
                    contact: String(cols[2]||"").trim(),
                    phone:   String(cols[3]||"").trim(),
                    phone2:  String(cols[4]||"").trim(),
                    email:   String(cols[5]||"").trim(),
                    notes:   String(cols[6]||"").trim(),
                  })).filter(s => s.name);
                  setSuppliers(prev => [...prev, ...newSuppliers]);
                } catch(err) { alert("שגיאה בייבוא הקובץ: " + err.message); }
              };
              reader.readAsArrayBuffer(file);
              e.target.value = "";
            }} />
          </label>
          <button onClick={() => setEditId("new")}
            style={{ display:"flex", alignItems:"center", gap:7, padding:"9px 18px", background:"#2563eb", color:"#fff", border:"none", borderRadius:9, fontSize:13, fontWeight:700, fontFamily:"'Heebo',sans-serif", cursor:"pointer" }}>
            + הוסף ספק חדש
          </button>
        </div>
      </div>

      {/* Filters */}
      <Card style={{ padding:"14px 18px" }}>
        <div style={{ position:"relative" }}>
          <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", color:"#94a3b8", fontSize:16 }}>🔍</span>
          <input
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder="חיפוש חופשי — שם, מקצוע, איש קשר, טלפון, מייל..."
            style={{ width:"100%", padding:"10px 40px 10px 12px", border:"1.5px solid #3b82f6", borderRadius:10, fontSize:14, fontFamily:"'Heebo',sans-serif", outline:"none", boxSizing:"border-box" }}
          />
        </div>
      </Card>

      {/* Table */}
      <Card style={{ padding:0, overflow:"hidden" }}>
        <table key={"t-"+search} style={{ width:"100%", borderCollapse:"collapse", fontSize:13, direction:"rtl" }}>
          <thead>
            <tr style={{ background:"#f8fafc", borderBottom:"2px solid #e2e8f0" }}>
              {["מקצוע / תחום","שם ספק / חברה","איש קשר","טלפון","נייד","מייל","הערות","פעולות"].map(h => (
                <th key={h} style={{ padding:"11px 16px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11, whiteSpace:"nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 && (
              <tr><td colSpan={7} style={{ padding:"32px", textAlign:"right", color:"#94a3b8", fontSize:13 }}>אין ספקים עדיין — לחץ "הוסף ספק חדש"</td></tr>
            )}
            {filtered.map((s, i) => (
              <React.Fragment key={s.id}>
              <tr className="hov-row" style={{ borderBottom: editId===s.id ? "none" : "1px solid #f1f5f9", background: editId===s.id ? "#eff6ff" : i%2===0?"#fff":"#fafbfd" }}>

                    <td style={{ padding:"11px 16px", color:"#374151", textAlign:"right", direction:"ltr", cursor:"pointer" }} onDoubleClick={()=>{ setEditId(s.id); setEditForm({...s}); }}>{s.phone2||"—"}</td>
                    <td style={{ padding:"11px 16px", color:"#334155", textAlign:"right", cursor:"pointer" }} onDoubleClick={()=>{ setEditId(s.id); setEditForm({...s}); }}>{s.email ? <a href={"mailto:"+s.email} style={{color:"#334155"}}>{s.email}</a> : "—"}</td>
                    <td style={{ padding:"11px 16px", color:"#374151", textAlign:"right", maxWidth:180, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", cursor:"pointer" }} onDoubleClick={()=>{ setEditId(s.id); setEditForm({...s}); }}>{s.notes||"—"}</td>
                    <td style={{ padding:"11px 16px", textAlign:"right", whiteSpace:"nowrap" }}>
                      <button onClick={()=>{ setEditId(s.id); setEditForm({...s}); }} style={{ background:"#f8fafc", color:"#334155", border:"none", borderRadius:6, padding:"4px 10px", fontSize:12, cursor:"pointer", fontFamily:"'Heebo',sans-serif", marginLeft:4 }}>✏️</button>
                      <button onClick={()=>del(s.id)} style={{ background:"#fef2f2", color:"#ef4444", border:"none", borderRadius:6, padding:"4px 10px", fontSize:12, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>🗑</button>
                    </td>
                  </>
                )}
              </tr>
              {editId === s.id && (
                <tr style={{ background:"#f1f5f9", borderBottom:"2px solid #93c5fd" }}>
                  <td colSpan={8} style={{ padding:"6px 16px", textAlign:"right" }}>
                    <button onClick={saveEdit} style={{ background:"#2563eb", color:"#fff", border:"none", borderRadius:7, padding:"6px 20px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"'Heebo',sans-serif", marginLeft:8 }}>✓ שמור</button>
                    <button onClick={()=>setEditId(null)} style={{ background:"#f1f5f9", color:"#64748b", border:"none", borderRadius:7, padding:"6px 16px", fontSize:13, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>✕ ביטול</button>
