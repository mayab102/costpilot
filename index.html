          </tbody>
          <tfoot>
            <tr style={{ background:"#f8fafc", borderTop:"2px solid #e2e8f0" }}>
              <td colSpan={8} style={{ padding:"8px 16px", color:"#94a3b8", fontSize:12 }}>סה״כ {filtered.length} ספקים{search ? " (מסונן)" : ""}</td>
            </tr>
          </tfoot>
        </table>
      </Card>

      {/* Add / Edit modal */}
      {editId === "new" && (
        <div style={{ position:"fixed", inset:0, background:"#00000060", display:"flex", alignItems:"center", justifyContent:"center", zIndex:2000 }}
          onClick={()=>setEditId(null)}>
          <div className="fade" onClick={e=>e.stopPropagation()}
            style={{ background:"#fff", borderRadius:18, padding:28, width:480, boxShadow:"0 24px 64px #0004", display:"flex", flexDirection:"column", gap:14 }}>
            <div style={{ fontSize:17, fontWeight:800, color:"#1e293b", marginBottom:4 }}>➕ ספק חדש</div>
            {inp("שם ספק / חברה","name",form,setForm,"לדוגמה: משרד עמית נמליך")}
            <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
              <label style={{ fontSize:11, fontWeight:700, color:"#64748b" }}>מקצוע / תחום</label>
              <input value={form.field} onChange={e=>setForm({...form,field:e.target.value})}
                list="field-opts-new" placeholder="בחר או הקלד מקצוע..."
                style={{ padding:"7px 10px", border:"1.5px solid #e2e8f0", borderRadius:8, fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none" }}
                onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="#e2e8f0"} />
              <datalist id="field-opts-new">
                {[...new Set([...allFields,...(professions||[])])].map(f=><option key={f} value={f}/>)}
              </datalist>
            </div>
            {inp("איש קשר","contact",form,setForm,"שם מלא")}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              {inp("טלפון","phone",form,setForm,"03-xxxxxxx")}
              {inp("טלפון סלולרי","phone2",form,setForm,"05x-xxxxxxx")}
            </div>
            {inp("מייל","email",form,setForm,"example@mail.com")}
            {inp("הערות","notes",form,setForm,"הערות נוספות...")}
            {formError && (
              <div style={{ background:"#fef2f2", border:"1px solid #fca5a5", borderRadius:8, padding:"8px 12px", fontSize:12, color:"#dc2626", fontWeight:600 }}>
                ⚠️ {formError}
              </div>
            )}
            <div style={{ display:"flex", gap:10, justifyContent:"flex-start", marginTop:4 }}>
              <button onClick={add}
                style={{ padding:"9px 24px", background:"#2563eb", color:"#fff", border:"none", borderRadius:9, fontSize:14, fontWeight:700, fontFamily:"'Heebo',sans-serif", cursor:"pointer" }}>הוסף</button>
              <button onClick={()=>{ setEditId(null); setFormError(""); }}
                style={{ padding:"9px 18px", background:"#f1f5f9", color:"#64748b", border:"none", borderRadius:9, fontSize:14, fontFamily:"'Heebo',sans-serif", cursor:"pointer" }}>ביטול</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Global page: חברות עירוניות ─────────────────────────────────────────────
function CompaniesPage({ companies, setCompanies }) {
  const [form, setForm] = useState({ name:"", contact:"", phone:"", email:"" });
  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState({});
  const [showAdd, setShowAdd] = useState(false);

  const add = () => {
    if (!form.name.trim()) return;
    setCompanies([...companies, { ...form, id: Date.now() }]);
    setForm({ name:"", contact:"", phone:"", email:"" });
    setShowAdd(false);
  };
  const del = id => setCompanies(companies.filter(c => c.id !== id));
  const saveEdit = () => {
    setCompanies(companies.map(c => c.id === editId ? { ...c, ...editForm } : c));
    setEditId(null);
  };

  return (
    <div className="fade" style={{ padding:"34px 38px", display:"flex", flexDirection:"column", gap:22 }}>
      <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>
        <div>
          <div style={{ fontSize:11, color:"#64748b", fontWeight:700, letterSpacing:3, marginBottom:4 }}>גיליון גלובלי</div>
          <h1 style={{ fontSize:24, fontWeight:900, color:"#1e293b", margin:0 }}>🏛️ חברות עירוניות</h1>
          <div style={{ fontSize:13, color:"#94a3b8", marginTop:4 }}>ניהול רשימת הלקוחות — חברות עירוניות לפרויקטים</div>
        </div>
        <PrimaryButton onClick={() => setShowAdd(v => !v)}>{showAdd ? "✕ סגור" : "+ הוסף חברה עירונית"}</PrimaryButton>
      </div>

      {/* Add form - collapsible */}
      {showAdd && (
        <Card className="fade">
          <div style={{ fontWeight:700, color:"#1e293b", marginBottom:14, fontSize:15 }}>הוסף חברה עירונית</div>
          <Grid>
            <TextInput label="שם החברה" value={form.name}    onChange={e=>setForm({...form,name:e.target.value})} />
            <TextInput label="איש קשר"  value={form.contact} onChange={e=>setForm({...form,contact:e.target.value})} />
            <TextInput label="טלפון"    value={form.phone}   onChange={e=>setForm({...form,phone:e.target.value})} />
            <TextInput label="אימייל"   value={form.email}   onChange={e=>setForm({...form,email:e.target.value})} />

          </Grid>
          <div style={{ marginTop:14, display:"flex", gap:10 }}>
            <PrimaryButton onClick={add}>+ הוסף חברה</PrimaryButton>
            <button onClick={() => setShowAdd(false)} style={{ background:"#f1f5f9", border:"none", borderRadius:9, padding:"9px 16px", fontSize:13, color:"#64748b", cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>ביטול</button>
          </div>
        </Card>
      )}

      {/* List */}
      <Card style={{ padding:0, overflow:"hidden" }}>
        <div style={{ padding:"14px 20px", borderBottom:"1px solid #e8edf4", fontWeight:700, color:"#1e293b" }}>
          רשימת חברות ({companies.length})
        </div>
        {companies.length === 0 && (
          <div style={{ padding:32, textAlign:"right", color:"#94a3b8" }}>אין חברות עירוניות עדיין</div>
        )}
        {companies.map((c, i) => (
          <div key={c.id} style={{ borderBottom: i<companies.length-1?"1px solid #f1f5f9":"none" }}>
            {editId === c.id ? (
              <div style={{ padding:"14px 20px", background:"#f8fafc", display:"flex", gap:10, alignItems:"flex-end", flexWrap:"wrap" }}>
                <TextInput label="שם החברה" value={editForm.name||""}    onChange={e=>setEditForm({...editForm,name:e.target.value})} />
                <TextInput label="איש קשר"  value={editForm.contact||""} onChange={e=>setEditForm({...editForm,contact:e.target.value})} />
                <TextInput label="טלפון"    value={editForm.phone||""}   onChange={e=>setEditForm({...editForm,phone:e.target.value})} />
                <TextInput label="אימייל"   value={editForm.email||""}   onChange={e=>setEditForm({...editForm,email:e.target.value})} />

                <div style={{ display:"flex", gap:8 }}>
                  <PrimaryButton onClick={saveEdit}>שמור</PrimaryButton>
                  <button onClick={()=>setEditId(null)} style={{ background:"#f1f5f9", border:"none", borderRadius:8, padding:"8px 14px", cursor:"pointer", fontFamily:"'Heebo',sans-serif", fontSize:13 }}>ביטול</button>
                </div>
              </div>
            ) : (
              <div className="hov-row" style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"13px 20px" }}>
                <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                  <div style={{ width:40, height:40, borderRadius:10, background:"linear-gradient(135deg,#dbeafe,#bfdbfe)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>🏛️</div>
                  <div>
                    <div style={{ fontWeight:700, fontSize:14, color:"#1e293b" }}>{c.name}</div>
                    <div style={{ fontSize:12, color:"#94a3b8", marginTop:2 }}>
                      {[c.contact, c.phone, c.email].filter(Boolean).join(" · ")}

                    </div>
                  </div>
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={()=>{ setEditId(c.id); setEditForm({...c}); }}
                    style={{ background:"#f0f9ff", color:"#0369a1", border:"1px solid #bae6fd", borderRadius:6, padding:"4px 12px", fontSize:12, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>עריכה</button>
                  <DeleteButton onClick={()=>del(c.id)} />
                </div>
              </div>
            )}
          </div>
        ))}
      </Card>
    </div>
  );
}

// ── Global page: תבניות אבני דרך ─────────────────────────────────────────────
function MilestonesPage({ companies, milestones, setMilestones, professions }) {
  const [selCompany,  setSelCompany]  = useState("");
  const [selProf,     setSelProf]     = useState("");
  const [customProf,  setCustomProf]  = useState("");
  const [addingProf,  setAddingProf]  = useState(false);
  const [newName,     setNewName]     = useState("");
  const [newPct,      setNewPct]      = useState("");
  const [newPlanOnly, setNewPlanOnly] = useState(false);
  const [editId,      setEditId]      = useState(null);
  const [editData,    setEditData]    = useState({});
  const [copyFromCompany, setCopyFromCompany] = useState("");
  const [copyFromProf,    setCopyFromProf]    = useState("");
  const [showCopy,        setShowCopy]        = useState(false);

  // All professions = stats professions + any custom ones already used in this company
  const existingCompanyProfs = selCompany
    ? Object.keys(milestones[selCompany] || {})
    : [];
  const allProfs = [...new Set([...professions, ...existingCompanyProfs])];

  const companyMilestones = selCompany && selProf
    ? (milestones[selCompany]?.[selProf] || [])
    : [];

  const upd = (list) => {
    setMilestones({
      ...milestones,
      [selCompany]: { ...(milestones[selCompany]||{}), [selProf]: list }
    });
  };

  const addCustomProf = () => {
    if (!customProf.trim()) return;
    setSelProf(customProf.trim());
    setCustomProf("");
    setAddingProf(false);
  };

  const add = () => {
    if (!newName.trim() || !newPct) return;
    upd([...companyMilestones, { id:Date.now(), name:newName, pct:newPct, planOnly:newPlanOnly }]);
    setNewName(""); setNewPct(""); setNewPlanOnly(false);
  };

  const del = id => upd(companyMilestones.filter(m => m.id !== id));

  const saveEdit = () => {
    upd(companyMilestones.map(m => m.id === editId ? { ...m, ...editData } : m));
    setEditId(null);
  };

  const totalPct = companyMilestones.reduce((s,m) => s + Number(m.pct||0), 0);

  return (
    <div className="fade" style={{ padding:"34px 38px", display:"flex", flexDirection:"column", gap:22 }}>
      <div>
        <div style={{ fontSize:11, color:"#475569", fontWeight:700, letterSpacing:3, marginBottom:4 }}>גיליון גלובלי</div>
        <h1 style={{ fontSize:24, fontWeight:900, color:"#1e293b", margin:0 }}>🚩 תבניות אבני דרך</h1>
        <div style={{ fontSize:13, color:"#94a3b8", marginTop:4 }}>ניהול אבני דרך סטנדרטיות לפי חברה עירונית ומקצוע</div>
      </div>

      {/* Selectors */}
      <Card>
        <div style={{ display:"flex", gap:20, flexWrap:"wrap", alignItems:"flex-end" }}>
          <div style={{ flex:1, minWidth:200 }}>
            <div style={{ fontSize:12, fontWeight:600, color:"#64748b", marginBottom:6 }}>בחר חברה עירונית *</div>
            <select value={selCompany} onChange={e=>{ setSelCompany(e.target.value); setSelProf(""); }}
              style={{ width:"100%", padding:"9px 12px", border:"1.5px solid #e2e8f0", borderRadius:9, fontSize:14, fontFamily:"'Heebo',sans-serif", background:"#f8fafc", outline:"none" }}>
              <option value="">-- בחר --</option>
              {companies.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          {selCompany && (
            <div style={{ flex:1, minWidth:200 }}>
              <div style={{ fontSize:12, fontWeight:600, color:"#64748b", marginBottom:6 }}>בחר מקצוע *</div>
              {addingProf ? (
                <div style={{ display:"flex", gap:8 }}>
                  <input autoFocus value={customProf} onChange={e=>setCustomProf(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&addCustomProf()}
                    placeholder="שם התחום החדש..."
                    style={{ flex:1, padding:"9px 12px", border:"1.5px solid #3b82f6", borderRadius:9, fontSize:14, fontFamily:"'Heebo',sans-serif", outline:"none" }} />
                  <button onClick={addCustomProf}
                    style={{ background:"#2563eb", color:"#fff", border:"none", borderRadius:8, padding:"0 14px", fontSize:13, cursor:"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:600 }}>הוסף</button>
                  <button onClick={()=>{ setAddingProf(false); setCustomProf(""); }}
                    style={{ background:"#f1f5f9", color:"#64748b", border:"none", borderRadius:8, padding:"0 10px", fontSize:13, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>ביטול</button>
                </div>
              ) : (
                <div style={{ display:"flex", gap:8 }}>
                  <select value={selProf} onChange={e=>setSelProf(e.target.value)}
                    style={{ flex:1, padding:"9px 12px", border:"1.5px solid #e2e8f0", borderRadius:9, fontSize:14, fontFamily:"'Heebo',sans-serif", background:"#f8fafc", outline:"none" }}>
                    <option value="">-- בחר --</option>
                    {allProfs.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                  <button onClick={()=>setAddingProf(true)}
                    style={{ background:"#f8fafc", color:"#334155", border:"1px solid #e2e8f0", borderRadius:8, padding:"0 12px", fontSize:12, cursor:"pointer", fontFamily:"'Heebo',sans-serif", whiteSpace:"nowrap", fontWeight:600 }}>+ תחום חדש</button>
                </div>
              )}
            </div>
          )}
        </div>
      </Card>

      {/* Milestones table */}
      {selCompany && selProf && (
        <>
          <Card style={{ padding:0, overflow:"hidden" }}>
            <div style={{ padding:"12px 20px", borderBottom:"1px solid #e8edf4", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
              <span style={{ fontWeight:700, color:"#1e293b" }}>
                {companies.find(c=>c.id==selCompany)?.name} — {selProf}
              </span>
              <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                <Badge color="#2563eb">{companyMilestones.length} אבני דרך</Badge>
                <button onClick={()=>setShowCopy(!showCopy)}
                  style={{ background:"#f0f9ff", color:"#0369a1", border:"1px solid #7dd3fc", borderRadius:7, padding:"4px 12px", fontSize:12, cursor:"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:600 }}>
                  📋 העתק מחברה אחרת
                </button>
              </div>
            </div>
            {showCopy && (
              <div style={{ padding:"12px 20px", background:"#f0f9ff", borderBottom:"1px solid #bae6fd", display:"flex", gap:12, alignItems:"flex-end", flexWrap:"wrap" }}>
                <div>
                  <div style={{ fontSize:11, fontWeight:600, color:"#0369a1", marginBottom:4 }}>חברה עירונית</div>
                  <select value={copyFromCompany} onChange={e=>{ setCopyFromCompany(e.target.value); setCopyFromProf(""); }}
                    style={{ padding:"7px 10px", border:"1px solid #7dd3fc", borderRadius:7, fontSize:13, fontFamily:"'Heebo',sans-serif", background:"#fff", outline:"none" }}>
                    <option value="">-- בחר --</option>
                    {companies.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
                {copyFromCompany && (
                  <div>
                    <div style={{ fontSize:11, fontWeight:600, color:"#0369a1", marginBottom:4 }}>מקצוע</div>
                    <select value={copyFromProf} onChange={e=>setCopyFromProf(e.target.value)}
                      style={{ padding:"7px 10px", border:"1px solid #7dd3fc", borderRadius:7, fontSize:13, fontFamily:"'Heebo',sans-serif", background:"#fff", outline:"none" }}>
                      <option value="">-- בחר --</option>
                      {Object.keys(milestones[copyFromCompany]||{}).map(p => <option key={p} value={p}>{p}</option>)}
                    </select>
                  </div>
                )}
                {copyFromCompany && copyFromProf && (
                  <button onClick={() => {

                    upd([...companyMilestones, ...copied]);
                    setShowCopy(false); setCopyFromCompany(""); setCopyFromProf("");

                    style={{ background:"#0369a1", color:"#fff", border:"none", borderRadius:7, padding:"7px 16px", fontSize:13, cursor:"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:600 }}>
                    העתק ({(milestones[copyFromCompany]?.[copyFromProf]||[]).length} אבני דרך)

                <button onClick={()=>{ setShowCopy(false); setCopyFromCompany(""); setCopyFromProf(""); }}
                  style={{ background:"#f1f5f9", color:"#64748b", border:"none", borderRadius:7, padding:"7px 12px", fontSize:12, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>ביטול</button>
              </div>

                  <th style={{ padding:"8px 16px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>שם אבן הדרך</th>

// ── Minimal ZIP builder (stored, no compression) ─────────────────────────────
function buildZip(files) {
  const u32le = (n) => { const b=new Uint8Array(4); new DataView(b.buffer).setUint32(0,n,true); return b; };
  const u16le = (n) => { const b=new Uint8Array(2); new DataView(b.buffer).setUint16(0,n,true); return b; };
  const concat = (...arrays) => { const len=arrays.reduce((s,a)=>s+a.length,0); const r=new Uint8Array(len); let off=0; arrays.forEach(a=>{r.set(a,off);off+=a.length;}); return r; };
  const crc32 = (data) => {
    let c=0xFFFFFFFF;
    const t=new Uint32Array(256);
    for(let i=0;i<256;i++){let x=i;for(let j=0;j<8;j++)x=x&1?(x>>>1)^0xEDB88320:(x>>>1);t[i]=x;}
    for(let i=0;i<data.length;i++)c=t[(c^data[i])&0xFF]^(c>>>8);
    return (c^0xFFFFFFFF)>>>0;
  };
  const enc = new TextEncoder();
  const localHeaders = [];
  const centralDirs = [];
  let offset = 0;
  for (const [name, data] of Object.entries(files)) {
    const nameBytes = enc.encode(name);
    const crc = crc32(data);
    const local = concat(
      new Uint8Array([0x50,0x4B,0x03,0x04]), // sig
      u16le(20), u16le(0), u16le(0),          // version, flags, compression (stored)
      u16le(0), u16le(0),                      // mod time, mod date
      u32le(crc), u32le(data.length), u32le(data.length),
      u16le(nameBytes.length), u16le(0),       // name len, extra len
      nameBytes, data
    );
    const central = concat(
      new Uint8Array([0x50,0x4B,0x01,0x02]), // sig
      u16le(20), u16le(20), u16le(0), u16le(0),
      u16le(0), u16le(0),                      // compression stored
      u32le(crc), u32le(data.length), u32le(data.length),
      u16le(nameBytes.length), u16le(0), u16le(0), u16le(0), u16le(0),
      u32le(0), u32le(offset),
      nameBytes
    );
    localHeaders.push(local);
    centralDirs.push(central);
    offset += local.length;
  }
  const centralStart = offset;
  const centralData = concat(...centralDirs);
  const eocd = concat(
    new Uint8Array([0x50,0x4B,0x05,0x06]),
    u16le(0), u16le(0),
    u16le(centralDirs.length), u16le(centralDirs.length),
    u32le(centralData.length), u32le(centralStart),
    u16le(0)
  );
  return concat(...localHeaders, centralData, eocd);
}

// ── Persistence helpers ──────────────────────────────────────────────────────
const LS_PROJECTS = "proj_mgr_projects";
const LS_DATA     = "proj_mgr_data";

function loadProjects() {
  try {
    const raw = localStorage.getItem(LS_PROJECTS);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return SEED_PROJECTS;
}

function loadAllData(projects) {
  try {
    const raw = localStorage.getItem(LS_DATA);
    if (raw) {
      const saved = JSON.parse(raw);
      // ensure every project has an entry
      const d = {};
      projects.forEach(p => { d[p.id] = saved[p.id] || makeProjectData(); });
      return d;
    }
  } catch(e) {}
  const d = {};
  projects.forEach(p => { d[p.id] = makeProjectData(); });
  return d;
}

function saveProjects(projects) {
  try { localStorage.setItem(LS_PROJECTS, JSON.stringify(projects)); } catch(e) {}
}

function saveAllData(data) {
  try { localStorage.setItem(LS_DATA, JSON.stringify(data)); } catch(e) {}
}

const PROJ_STATUSES_MAIN = ["תכנון","ביצוע","נמסר","הוקפא","בוטל"];

function MainInfoPage({ allData, projects, companies, setAllData, setProjects, onNavigate, statsRows }) {
  const upd = (projId, key, val) => {
    if (key === "name" || key === "status") {
      setProjects(projects.map(p => p.id===projId ? {...p,[key]:val} : p));
    } else if (key === "projectNumber" || key === "planningManager" || key === "executionManager") {
      setAllData(prev => ({ ...prev, [projId]: { ...(prev[projId]||makeProjectData()), [key]: val } }));
    } else {
      setAllData(prev => ({ ...prev, [projId]: { ...(prev[projId]||makeProjectData()), openingData: { ...(prev[projId]?.openingData||{}), [key]: val } } }));
    }
  };

  // colFilters: { [fkey]: Set<string> } — undefined/null = no filter (all shown)
  const [colFilters, setColFilters] = React.useState({});
  const [openFilter, setOpenFilter]   = React.useState(null);
  const [filterSearch, setFilterSearch] = React.useState("");
  const [dropPos, setDropPos]         = React.useState({ top:0, left:0 });

  const inp = (projId, key, val) => (
    <input value={val||""} onChange={e=>upd(projId,key,e.target.value)}

      onFocus={e=>e.target.style.background="#f0f9ff"} onBlur={e=>e.target.style.background="transparent"} />
  );

  const cols = [
    { label:"מס׳ פרויקט",    w:90,  fkey:"projectNumber" },
    { label:"שם פרויקט",     w:160, fkey:"name" },
    { label:"חברה עירונית",  w:120, fkey:"company" },
    { label:"כתובת",         w:130, fkey:"address" },
    { label:"מהות הפרויקט", w:150, fkey:"workDescription" },
    { label:"מנהל תכנון",   w:100, fkey:"planningManager" },
    { label:"מנהל ביצוע",   w:100, fkey:"executionManager" },
    { label:"ניצול תקציבי", w:90,  fkey:null },
    { label:"% יועצים",     w:80,  fkey:null },
    { label:"סטטוס",         w:90,  fkey:"status" },
    { label:"תאריך התחלה",  w:110, fkey:"startDate" },
    { label:"תאריך סיום",   w:110, fkey:"endDate" },
    { label:"שטח (מ״ר)",    w:80,  fkey:"buildingArea" },
    { label:"עלות קבלנית",  w:110, fkey:"contractorEst" },
    { label:"עלות עירונית", w:110, fkey:"municipalEst" },
  ];

  const getVal = (p, fkey) => {
    const d = allData[p.id] || {};
    const o = d.openingData || {};
    const company = companies.find(c => String(c.id) === String(d.companyId));
    switch(fkey) {
      case "projectNumber":    return d.projectNumber||"";
      case "name":             return p.name||"";
      case "company":          return company?.name||"";
      case "address":          return o.address||"";
      case "workDescription":  return o.workDescription||"";
      case "planningManager":  return d.planningManager||"";
      case "executionManager": return d.executionManager||"";
      case "status":           return p.status||"";
      case "startDate":        return o.startDate||"";
      case "endDate":          return o.endDate||"";
      case "buildingArea":     return String(o.buildingArea||"");
      case "contractorEst":    return String(o.contractorEst||"");
      case "municipalEst":     return String(o.municipalEst||"");
      default: return "";
    }
  };

  // Projects filtered by all columns EXCEPT targetFkey (for dropdown options)
  const getFilteredExcept = (targetFkey) =>
    projects.filter(p => cols.every(({fkey}) => {
      if (!fkey || fkey === targetFkey) return true;
      const sel = colFilters[fkey];
      if (!sel || sel.size === 0) return true;
      return sel.has(getVal(p, fkey));
    }));

  const filteredProjects = projects.filter(p =>
    cols.every(({fkey}) => {
      if (!fkey) return true;
      const sel = colFilters[fkey];
      if (!sel || sel.size === 0) return true;
      return sel.has(getVal(p, fkey));
    })
  );

  const isFiltered = (fkey) => colFilters[fkey] && colFilters[fkey].size > 0;
  const hasAnyFilter = cols.some(({fkey}) => fkey && isFiltered(fkey));

  const openDropdown = (fkey, e) => {
    e.stopPropagation();
    if (openFilter === fkey) { setOpenFilter(null); return; }
    const rect = e.currentTarget.getBoundingClientRect();
    setDropPos({ top: rect.bottom + 2, left: rect.left });
    setOpenFilter(fkey);
    setFilterSearch("");
  };

  const closeDropdown = () => setOpenFilter(null);

  const renderDropdown = () => {
    if (!openFilter) return null;
    const fkey = openFilter;
    const partial = getFilteredExcept(fkey);
    const allVals = [...new Set(partial.map(p => getVal(p, fkey)))].sort((a,b)=>a.localeCompare(b,"he"));
    const sel = colFilters[fkey] || new Set();
    const isAllSelected = sel.size === 0; // size=0 means "all selected" (no filter)
    const visibleVals = allVals.filter(v => !filterSearch || v.toLowerCase().includes(filterSearch.toLowerCase()));

    const toggle = (val) => {
      setColFilters(prev => {
        const cur = prev[fkey] ? new Set(prev[fkey]) : new Set();
        if (cur.has(val)) cur.delete(val); else cur.add(val);
        // if all vals selected, clear filter (size=0 = all)
        if (cur.size === allVals.length) return { ...prev, [fkey]: new Set() };
        return { ...prev, [fkey]: cur };
      });
    };

    const selectAll  = () => setColFilters(prev => ({ ...prev, [fkey]: new Set() }));
    const clearAll   = () => setColFilters(prev => ({ ...prev, [fkey]: new Set(allVals) }));
    const isChecked  = (v) => isAllSelected ? true : sel.has(v);

    return ReactDOM.createPortal(
      <>
        <div onClick={closeDropdown} style={{ position:"fixed", inset:0, zIndex:1999 }} />
        <div onClick={e=>e.stopPropagation()}
          style={{ position:"fixed", top:dropPos.top, left:dropPos.left, zIndex:2000,
            background:"#fff", border:"1px solid #cbd5e1", borderRadius:8,
            boxShadow:"0 6px 24px #0003", minWidth:200, maxWidth:280,
            display:"flex", flexDirection:"column", padding:10, gap:6, direction:"rtl",
            fontFamily:"'Heebo',sans-serif" }}>
          <input autoFocus value={filterSearch} onChange={e=>setFilterSearch(e.target.value)}
            placeholder="חיפוש..."
            style={{ border:"1px solid #e2e8f0", borderRadius:5, padding:"5px 8px", fontSize:12,
              outline:"none", textAlign:"right", fontFamily:"'Heebo',sans-serif", background:"#f8fafc" }} />
          <div style={{ display:"flex", gap:6 }}>
            <button onClick={selectAll} style={{ flex:1, background:"#eff6ff", color:"#2563eb", border:"none", borderRadius:5, padding:"4px 0", fontSize:11, cursor:"pointer", fontWeight:600 }}>בחר הכל</button>
            <button onClick={clearAll}  style={{ flex:1, background:"#f1f5f9", color:"#64748b", border:"none", borderRadius:5, padding:"4px 0", fontSize:11, cursor:"pointer", fontWeight:600 }}>נקה הכל</button>
          </div>
          <div style={{ maxHeight:220, overflowY:"auto", display:"flex", flexDirection:"column", gap:1 }}>
            {visibleVals.length === 0 && <div style={{ color:"#94a3b8", fontSize:11, padding:"6px 4px" }}>אין תוצאות</div>}
            {visibleVals.map(val => (
              <label key={val} style={{ display:"flex", alignItems:"center", gap:8, padding:"4px 6px", borderRadius:4,
                cursor:"pointer", fontSize:12, background: isChecked(val) ? "#f0f9ff" : "#fff",
                border: isChecked(val) ? "1px solid #bfdbfe" : "1px solid transparent" }}>
                <input type="checkbox" checked={isChecked(val)} onChange={()=>toggle(val)}
                  style={{ cursor:"pointer", width:14, height:14 }} />
                <span style={{ flex:1 }}>{val || "(ריק)"}</span>
              </label>
            ))}
          </div>
          <div style={{ borderTop:"1px solid #f1f5f9", paddingTop:6, display:"flex", justifyContent:"flex-end" }}>
            <button onClick={closeDropdown}
              style={{ background:"#2563eb", color:"#fff", border:"none", borderRadius:5, padding:"5px 14px", fontSize:12, cursor:"pointer", fontWeight:600 }}>אישור</button>
          </div>
        </div>
      </>,
      document.body
    );
  };

  const exportToExcel = () => {
    const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const headers = ["מס׳ פרויקט","שם פרויקט","חברה עירונית","כתובת","מהות הפרויקט","מנהל תכנון","מנהל ביצוע","ניצול תקציבי","% יועצים","סטטוס","תאריך התחלה","תאריך סיום","שטח (מ״ר)","עלות קבלנית","עלות עירונית"];
    const rows = filteredProjects.map(p => {
      const d = allData[p.id] || {};
      const o = d.openingData || {};
      const company = companies.find(c => String(c.id) === String(d.companyId));
      const cEst = Number(String(o.contractorEst||"").replace(/,/g,"")) || Number(d.budgetState?.contractorEst||0);
      const _dvPctX = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);
      const _allRowsX = buildBudgetAllRows({ quotesRows: d.quotes||[], consultantsRows: d.consultants||[], budgetState: { ...(d.budgetState||{}), contractorEst: cEst }, statsRows, accountsRows: d.accounts||[], planOnlyMap:{}, archBaseOverride: resolveArchBase(o, cEst, _dvPctX) });
      const consultantsTotal = cEst > 0 ? _allRowsX.reduce((s,r) => s + (r.payType==="אחוזים" ? r.computedFee : r.value) + r.increases, 0) : 0;
      const utilPct = cEst > 0 ? consultantsTotal / cEst * 100 : null;
      const _bs = d.budgetState || {};
      const _feePaid  = [...(_bs.feeRows||[]),...(_bs.extraFeeRows||[])].reduce((s,r)=>s+Number(r.paid||0),0);
      const _conPaid  = [{ paid:_bs.contractorPaid||"" },...(_bs.extraContractorRows||[])].reduce((s,r)=>s+Number(r.paid||0),0);
      const _basePaid = _allRowsX.reduce((s,r)=>s+(r.paid||0),0) + _feePaid + _conPaid;
      const _ohPaid   = Math.round(_basePaid * Number(_bs.overheadPct||4) / 100);
      const _bcmPaid  = Math.round((_basePaid+_ohPaid) * Number(_bs.bcmPct||0) / 100);
      const _vatPaid  = Math.round((_basePaid+_ohPaid+_bcmPaid) * Number(_bs.vatPct||18) / 100);
      const _grandPaid = _basePaid + _ohPaid + _bcmPaid + _vatPaid;
      const _received  = (_bs.extraItems||[]).reduce((s,x)=>s+Number(x.amount||0),0);
      const budgetUtilPct = _received > 0 ? _grandPaid / _received * 100 : null;

          utilPct===null?"—":utilPct.toFixed(2)+"%",
          p.status||"", o.startDate||"", o.endDate||"",

        ],
        utilBg, utilBg2,
      };

<head><meta charset="UTF-8"/>

<tr>${headers.map(h=>`<th style="background:#1e40af;color:#fff;font-weight:bold;padding:7px 10px;border:1px solid #1e3a8a;white-space:nowrap;">${esc(h)}</th>`).join("")}</tr>
${rows.map((row,i)=>`<tr style="background:${i%2===0?"#fff":"#f8fafc"}">${row.cells.map((v,ci)=>{
  const bg = ci===7 ? row.utilBg : ci===8 ? row.utilBg2 : "";
  const style = `border:1px solid #e2e8f0;padding:6px 10px;${bg?"background:"+bg+";":""}`;
  return `<td style="${style}">${esc(v)}</td>`;
}).join("")}</tr>`).join("")}
</table></body></html>`;
    const b64 = btoa(unescape(encodeURIComponent(html)));

                const _allRowsG = buildBudgetAllRows({ quotesRows: d.quotes||[], consultantsRows: d.consultants||[], budgetState: { ...(d.budgetState||{}), contractorEst: cEst }, statsRows, accountsRows: d.accounts||[], planOnlyMap:{}, archBaseOverride: resolveArchBase(o, cEst, _dvPctG) });

                        style={{ width:"100%", border:"none", background:"transparent", fontSize:12, fontFamily:"'Heebo',sans-serif", outline:"none", color:"#1e293b", textAlign:"right", cursor:"pointer" }}>

// ── Global page: השוואת עלויות ───────────────────────────────────────────────
function CostsPage({ allData, projects, statsRows }) {
  const [filterField, setFilterField] = React.useState("");
  const [myArea, setMyArea] = React.useState("");

  // Collect all approved consultants from all projects
  const rows = [];
  projects.forEach(proj => {
    const openingData = allData[proj.id]?.openingData || {};
    const area = Number(String(openingData.buildingArea||"").replace(/,/g,"")) || 0;
    const quotes = allData[proj.id]?.quotes || [];
    const budgetState = allData[proj.id]?.budgetState || {};
    const devPct = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);
    const cEst = Number(String(openingData.contractorEst||"").replace(/,/g,"")) || Number(budgetState.contractorEst||0);
    const archBase = cEst - cEst * devPct / 100;

    quotes.forEach(field => {
      field.consultants.filter(c => c.approved && c.name?.trim()).forEach(c => {
        const isPct = (c.payType||"אחוזים") === "אחוזים";
        const pct = Number(c.value||0) / 100;
        let fee = 0;
        if (!isPct) fee = Number(c.value||0);
        else if (["אדריכל","אדריכלות","אדריכלים"].includes((field.fieldName||"").trim()) && cEst) fee = archBase * pct;
        else if ((field.fieldName||"").includes("מנהל פרויקט") && cEst) fee = cEst * pct;
        else if (cEst) { const pp = Number((statsRows||[]).find(r=>r.field===field.fieldName)?.pct||0)/100; fee = cEst * pp * pct; }
        rows.push({
          projName: proj.name,
          field: field.fieldName || "",
          consultant: c.name,
          payType: c.payType || "אחוזים",
          value: c.value || "",
          fee,
          area,
        });
      });
    });
  });

  // All unique fields
  const allFields = [...new Set(rows.map(r => r.field))].filter(Boolean).sort((a,b) => a.localeCompare(b,"he"));

  // Filter
  const myAreaNum = Number(String(myArea).replace(/,/g,"")) || 0;
  const filtered = rows.filter(r => {
    if (filterField && r.field !== filterField) return false;
    if (myAreaNum && r.area) {
      if (Math.abs(r.area - myAreaNum) > 4000) return false;
    }
    return true;
  }).sort((a,b) => (b.area||0) - (a.area||0));

  const fmt = n => n ? "₪" + Number(n).toLocaleString("en-US", {maximumFractionDigits:0}) : "—";

  return (
    <div className="fade" style={{ padding:"34px 38px", display:"flex", flexDirection:"column", gap:22 }}>
      <div>
        <div style={{ fontSize:11, color:"#64748b", fontWeight:700, letterSpacing:3, marginBottom:4 }}>גיליון גלובלי</div>
        <h1 style={{ fontSize:24, fontWeight:900, color:"#1e293b", margin:0 }}>📊 השוואת עלויות</h1>
        <div style={{ fontSize:13, color:"#94a3b8", marginTop:4 }}>השוואת עלויות יועצים בין פרויקטים</div>
      </div>

      {/* Filters */}
      <Card>
        <div style={{ display:"flex", gap:20, alignItems:"flex-end", direction:"rtl", flexWrap:"wrap" }}>
          <div>
            <div style={{ fontSize:12, fontWeight:600, color:"#64748b", marginBottom:5 }}>סינון לפי תחום</div>
            <select value={filterField} onChange={e=>setFilterField(e.target.value)}
              style={{ padding:"7px 12px", border:"1.5px solid #e2e8f0", borderRadius:8, fontSize:13, fontFamily:"'Heebo',sans-serif", background:"#f8fafc", color:"#1e293b", outline:"none", minWidth:180, direction:"rtl" }}>
              <option value="">כל התחומים</option>
              {allFields.map(f => <option key={f} value={f}>{f}</option>)}
            </select>
          </div>
          <div>
            <div style={{ fontSize:12, fontWeight:600, color:"#64748b", marginBottom:5 }}>שטח הפרויקט שלי (מ״ר)</div>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <input type="text" inputMode="numeric" value={myArea} onChange={e=>setMyArea(e.target.value)}
                placeholder="לדוגמה: 2500"
                style={{ padding:"7px 12px", border:"1.5px solid #e2e8f0", borderRadius:8, fontSize:13, fontFamily:"'Heebo',sans-serif", background:"#f8fafc", outline:"none", width:140, textAlign:"right" }} />
              {myArea && <span style={{ fontSize:12, color:"#64748b" }}>מציג ±4000 מ״ר</span>}
            </div>
          </div>
          {(filterField || myArea) && (
            <button onClick={()=>{setFilterField("");setMyArea("");}}
              style={{ padding:"7px 14px", border:"1px solid #e2e8f0", borderRadius:8, fontSize:12, color:"#64748b", background:"#f8fafc", cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>
              נקה סינון
            </button>
          )}
        </div>
      </Card>

      {/* Table */}
      <Card style={{ padding:0, overflow:"hidden" }}>
        <div style={{ padding:"12px 20px", borderBottom:"1px solid #e8edf4", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <span style={{ fontWeight:700, color:"#1e293b" }}>{filtered.length} רשומות</span>
        </div>
        {filtered.length === 0 ? (
          <div style={{ padding:32, textAlign:"right", color:"#94a3b8", fontSize:13 }}>
            {rows.length === 0 ? "אין יועצים מאושרים במערכת עדיין" : "אין תוצאות לסינון הנבחר"}
          </div>
        ) : (
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13, direction:"rtl" }}>
            <thead>
              <tr style={{ background:"#f8fafc", borderBottom:"2px solid #e2e8f0" }}>
                {["פרויקט","שטח (מ״ר)","תחום","שם יועץ","אחוז","סכום (ש״ח)"].map(h => (
                  <th key={h} style={{ padding:"9px 14px", textAlign:"right", color:"#64748b", fontWeight:700, fontSize:11 }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((r, i) => (
                <tr key={i} style={{ borderBottom:"1px solid #f1f5f9", background:i%2===0?"#fff":"#fafbfd" }}>
                  <td style={{ padding:"10px 14px", fontWeight:600, color:"#1e293b" }}>{r.projName}</td>
                  <td style={{ padding:"10px 14px", color:"#374151" }}>{r.area ? r.area.toLocaleString("en-US") : "—"}</td>
                  <td style={{ padding:"10px 14px", color:"#374151" }}>{r.field}</td>
                  <td style={{ padding:"10px 14px", color:"#374151" }}>{r.consultant}</td>
                  <td style={{ padding:"10px 14px", color:"#374151" }}>
                    {r.payType === "אחוזים" ? `${r.value}%` : "—"}
                  </td>
                  <td style={{ padding:"10px 14px", color:"#1e293b" }}>{fmt(r.fee)}</td>
                </tr>
              ))}
            </tbody>
            {filtered.filter(r => r.fee > 0).length > 0 && (
              <tfoot>
                <tr style={{ background:"#f8fafc", borderTop:"2px solid #e2e8f0" }}>
                  <td colSpan={5} style={{ padding:"10px 14px", textAlign:"right", fontWeight:700, color:"#374151", fontSize:13 }}>
                    ממוצע ({filtered.filter(r=>r.fee>0).length} יועצים)
                  </td>
                  <td style={{ padding:"10px 14px", fontWeight:700, color:"#1e293b", fontSize:13 }}>
                    {fmt(filtered.filter(r=>r.fee>0).reduce((s,r)=>s+r.fee,0) / filtered.filter(r=>r.fee>0).length)}
                  </td>
                </tr>
              </tfoot>
            )}
          </table>
        )}
      </Card>
    </div>
  );
}

// ── Global page: לוח בקרה ──────────────────────────────────────────────────
function DashboardPage({ allData, projects, onNavigate, milestones }) {
  const fmt = n => n ? Number(n).toLocaleString("he-IL",{style:"currency",currency:"ILS",maximumFractionDigits:0}) : "—";
  const [highlightKey, setHighlightKey] = React.useState(null);

  // Zone A: ממתין להמלצה על יועצים (מנהל מחלקה)
  // Zone B: ממתין לאישור מנהל פרויקט (חשבונות)
  // Zone C: הוחזר ליועץ לתיקון
  // Zone 2: ממתין להעברה לחברה העירונית
  // Zone 3: ממתין לאישור החברה העירונית
  const zoneA = [], zoneB = [], zoneC = [], zoneUM = [], zoneSend = [], zone2 = [], zone3 = [], zoneIncSend = [];

  projects.forEach(proj => {
    // ── Consultant quotes ──
    const quotes = (allData[proj.id]?.quotes) || [];
    quotes.forEach(field => {
      if (field.readyToRecommend) {
        const alreadyApproved = field.consultants.some(c => c.name?.trim() && c.approved);
        const namedConsultants = field.consultants.filter(c => c.name?.trim());
        const anyRecommended = namedConsultants.some(c => c.recommended);
        if (!anyRecommended && !alreadyApproved && namedConsultants.length > 0)
          zoneA.push({ projId: proj.id, projName: proj.name, fieldId: field.id, fieldName: field.fieldName,
            label: "—", value: null, type:"consultant", key: `z1-${proj.id}-${field.id}`, tab:"quotes",
            createdAt: Math.min(...namedConsultants.map(c => c.createdAt || c.id)) });
      }
      field.consultants.filter(c => c.name?.trim() && c.recommended && !c.sentToMunicipality && !c.approved).forEach(c =>
        zoneSend.push({ projId: proj.id, projName: proj.name, fieldId: field.id, fieldName: field.fieldName,
          label: c.name, value: c.value, payType: c.payType, type:"consultant", key: `z2-${proj.id}-${field.id}-${c.id}`, tab:"quotes",
          createdAt: c.createdAt || c.id })
      );
      field.consultants.filter(c => c.name?.trim() && c.sentToMunicipality && !c.approved).forEach(c =>
        zone3.push({ projId: proj.id, projName: proj.name, fieldId: field.id, fieldName: field.fieldName,
          label: c.name, value: c.value, payType: c.payType, type:"consultant", key: `z3-${proj.id}-${field.id}-${c.id}`, tab:"quotes",
          createdAt: c.createdAt || c.id })
      );
    });

    // ── Increases ──
    const consultants = (allData[proj.id]?.consultants) || [];
    consultants.forEach(con => {
      (con.increases || []).forEach(x => {
        if (x.approvedIncrease) return;
        const base = { projId: proj.id, projName: proj.name, fieldName: con.role || con.name,
          label: con.name, value: x.amount, payType:"סכום קבוע", type:"increase", tab:"consultants",
          consultantId: con.id, increaseId: x.id, fieldId: null, tooltip: x.reason,
          createdAt: x.createdAt || x.id };
        if (!x.sentToManager)
          zoneIncSend.push({ ...base, key:`inca-${proj.id}-${con.id}-${x.id}` });
        else if (!x.sentToMunicipality)
          zoneUM.push({ ...base, key:`inc2-${proj.id}-${con.id}-${x.id}` });
        else
          zone3.push({ ...base, key:`inc3-${proj.id}-${con.id}-${x.id}` });
      });
    });

    // ── Invoices ──
    const accounts = (allData[proj.id]?.accounts) || [];
    // Build consultant→field map from quotes
    const consultantFieldMap = {};
    (allData[proj.id]?.quotes || []).forEach(field => {
      (field.consultants || []).forEach(c => {
        if (c.name?.trim()) consultantFieldMap[c.name.trim()] = field.fieldName || "";
      });
    });
    // Build rowKey→milestone name map
    const milestoneNameMap = {};
    const companyId = allData[proj.id]?.companyId || "";
    if (companyId && milestones?.[companyId]) {
      Object.values(milestones[companyId]).forEach(mList => {
        (mList || []).forEach(m => { milestoneNameMap["m-"+m.id] = m.name || ""; });
      });
    }
    // Increases as milestone-like rows
    (allData[proj.id]?.consultants || []).forEach(con => {
      (con.increases || []).forEach(x => { milestoneNameMap["i-"+x.id] = x.reason || "הגדלה"; });
    });
    accounts.forEach(inv => {
      // Skip if no meaningful amount (must be positive number)
      if (!inv.amount || Number(inv.amount) <= 0) return;
      // Off dashboard if approved by municipality or rejected
      if (inv.toMunicipality || inv.rejected) return;
      const base = { projId: proj.id, projName: proj.name,
        fieldName: consultantFieldMap[inv.consultantName?.trim()] || "",
        label: inv.consultantName || "",
        detail: inv.invoiceNum ? `חשבון ${inv.invoiceNum}` : "חשבון ללא מספר",
        milestoneName: milestoneNameMap[inv.rowKey] || "",
        value: inv.amount, payType:"סכום קבוע", type:"invoice", tab:"accounts",
        fieldId: null, tooltip: inv.reason || "", invoiceId: inv.id,
        createdAt: inv.createdAt || inv.id };
      if (inv.toConsultant)
        zoneC.push({ ...base, key:`invc-${proj.id}-${inv.id}` });
      else if (!inv.pmApproved) {
        const d = allData[proj.id] || {};
        const managerName = proj.status === "תכנון" ? (d.planningManager || "")
                          : proj.status === "ביצוע" ? (d.executionManager || "")
                          : "";
        zoneB.push({ ...base, key:`inv1-${proj.id}-${inv.id}`, managerName });
      }
      else {
        if (!inv.unitManagerApproved)
          zoneUM.push({ ...base, key:`inv2-${proj.id}-${inv.id}` });
        else if (!inv.toMunicipality)
          zone2.push({ ...base, key:`inv3-${proj.id}-${inv.id}` });
      }
    });
  });

  const handleClick = (item) => {
    setHighlightKey(item.key);
    setTimeout(() => setHighlightKey(null), 1200);
    onNavigate(item.projId, item.tab, item.fieldId, item.consultantId || null, item.increaseId || null, item.invoiceId || null);
  };

  const fmtVal = (item) => {
    if (!item.value) return "—";
    return item.payType === "אחוזים" ? item.value + "%" : fmt(item.value);

  const TypeBadge = ({ type }) => (

          </thead>
          <tbody>
            {items.map((item, i) => {
              const isHighlighted = highlightKey === item.key;

  const zones = [
    { title:"ממתין להמלצה על יועצים", items:zoneA,  color:"#374151", bg:"#fffbeb", border:"#fde68a", icon:"⏳", emptyText:"אין פריטים ממתינים" },
    { title:"ממתין להעברה לאישור מנהל", items:zoneIncSend, color:"#b45309", bg:"#fff7ed", border:"#fcd34d", icon:"📨", emptyText:"אין הגדלות הממתינות להעברה למנהל" },
    { title:"ממתין לאישור מנהל פרויקט",                    items:zoneB,  color:"#0891b2", bg:"#ecfeff", border:"#a5f3fc", icon:"👤", emptyText:"אין חשבונות הממתינים לאישור מנהל פרויקט", groupByManager:true },

    { title:"הוחזר ליועץ לתיקון",                           items:zoneC,  color:"#dc2626", bg:"#fef2f2", border:"#fecaca", icon:"↩️", emptyText:"אין חשבונות שהוחזרו ליועץ" },
    { title:"ממתין להעברה לחברה העירונית",                  items:zoneSend, color:"#0369a1", bg:"#f0f9ff", border:"#7dd3fc", icon:"📋", emptyText:"אין יועצים הממתינים להעברה" },
    { title:"ממתין לאישור מזמין",                           items:[...zone2, ...zone3], color:"#334155", bg:"#eff6ff", border:"#bfdbfe", icon:"📤", emptyText:"אין פריטים הממתינים לאישור מזמין" },

          {visibleZones.map(zone => (
            <Card key={zone.title} style={{ padding:0, overflow:"hidden" }}>
              <div style={{ padding:"14px 20px", background:zone.bg, borderBottom:"2px solid "+zone.border, display:"flex", alignItems:"center", gap:10 }}>
                <span style={{ fontSize:20 }}>{zone.icon}</span>

                    ))}
                  </tr>
                </thead>
                <tbody>
                  {(() => {
                    if (!zone.groupByManager) {
                      return zone.items.map((item, i) => {
                        const isHighlighted = highlightKey === item.key;
                        return (
                          <tr key={item.key} onClick={() => handleClick(item)}

                            <td style={{ padding:"11px 18px" }}><TypeBadge type={item.type} /></td>

                            <td style={{ padding:"11px 18px", fontSize:13, fontWeight:700, color:zone.color, whiteSpace:"nowrap" }}>{fmtVal(item)}</td>
                            <td style={{ padding:"11px 18px", fontSize:12, color:"#94a3b8", whiteSpace:"nowrap" }}>{new Date(item.createdAt || Date.now()).toLocaleDateString("en-GB")}</td>

                    // Group by managerName

                    const seen = {};
                    zone.items.forEach(item => {
                      const key = item.managerName || "ללא מנהל משויך";

                      groups.find(g => g.mgr === key).items.push(item);

                    return groups.map(group => (
                      <React.Fragment key={group.mgr}>

                            👤 {group.mgr}
                          </td>
                        </tr>
                        {group.items.map((item, i) => {
                          const isHighlighted = highlightKey === item.key;
                          return (
                            <tr key={item.key} onClick={() => handleClick(item)}

                                background: isHighlighted ? "#dbeafe" : i%2===0?"#fff":"#fafbfd", transition:"background .15s" }}
                              onMouseOver={e => { if(!isHighlighted) e.currentTarget.style.background="#f0f9ff"; }}
                              onMouseOut={e  => { if(!isHighlighted) e.currentTarget.style.background=i%2===0?"#fff":"#fafbfd"; }}>
                              <td style={{ padding:"11px 18px" }}><TypeBadge type={item.type} /></td>
                              <td style={{ padding:"11px 18px", fontSize:13, fontWeight:600, color:"#1e293b", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.projName}</td>

                              <td style={{ padding:"11px 18px", fontSize:13, color:"#374151", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.label !== "—" ? item.label : "—"}</td>
                              <td style={{ padding:"11px 18px", fontSize:13, color:"#374151", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.detail || item.tooltip || "—"}</td>
                              <td style={{ padding:"11px 18px", fontSize:13, fontWeight:700, color:zone.color, whiteSpace:"nowrap" }}>{fmtVal(item)}</td>
                              <td style={{ padding:"11px 18px", fontSize:12, color:"#94a3b8", whiteSpace:"nowrap" }}>{new Date(item.createdAt || Date.now()).toLocaleDateString("en-GB")}</td>
                            </tr>
                          );
                        })}
                      </React.Fragment>
                    ));
                  })()}
                </tbody>
              </table>
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}

function ProjectNumber({ value, onChange }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value);
  React.useEffect(() => { setVal(value); }, [value]);
  const save = () => { onChange(val); setEditing(false); };
  if (editing) return (
    <input autoFocus value={val} onChange={e=>setVal(e.target.value)}
      onBlur={save} onKeyDown={e=>{if(e.key==="Enter")save();if(e.key==="Escape")setEditing(false);}}
      placeholder="מס׳ פרויקט"
      style={{ fontSize:14, color:"#475569", background:"#f8fafc", border:"1.5px solid #3b82f6", borderRadius:6, padding:"3px 8px", fontFamily:"'Heebo',sans-serif", outline:"none", width:120, textAlign:"right" }} />
  );
  return (
    <span onClick={()=>{setVal(value);setEditing(true);}}
      style={{ fontSize:14, color: value?"#475569":"#cbd5e1", cursor:"pointer", paddingBottom:1 }}>
      {value || "מס׳ פרויקט"}
    </span>
  );
}

function EditableYear({ year, onChange }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(year);
  if (editing) return (
    <input autoFocus type="number" value={val}
      onChange={e => setVal(e.target.value)}
      onBlur={() => { if(val && String(val).length===4) onChange(Number(val)); setEditing(false); }}
      onKeyDown={e => { if(e.key==="Enter"){ if(val && String(val).length===4) onChange(Number(val)); setEditing(false); } if(e.key==="Escape") setEditing(false); }}
      style={{ width:70, fontSize:13, color:"#64748b", background:"#f1f5f9", border:"1px solid #cbd5e1", borderRadius:6, padding:"2px 7px", fontFamily:"'Heebo',sans-serif", outline:"none", textAlign:"center" }} />
  );
  return (
    <span onClick={() => { setVal(year); setEditing(true); }}
      style={{ fontSize:13, color:"#94a3b8", cursor:"pointer" }}
      title="לחץ לעריכת שנה">
      {year} ✎
    </span>
  );
}

// ── Tab: פתיחת פרויקט ────────────────────────────────────────────────────────
function OpeningTab({ data, setData, budgetState, setBudgetState, statsRows, projectName, onRenameProject }) {
  const upd = (k, v) => setData(prev => ({ ...(prev||{}), [k]: v }));
  const updBudget = (k, v) => setBudgetState(prev => ({ ...(prev||{}), [k]: v }));

  const contractorEst = Number(String(data?.contractorEst||"").replace(/,/g,""));
  const devPct = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);
  const archBase = contractorEst ? contractorEst - contractorEst * devPct / 100 : 0;

  const rows = [
    { key:"address",         label:"כתובת",                              type:"text" },
    { key:"workDescription", label:"מהות העבודה",                        type:"text" },
    { key:"startDate",       label:"תאריך התחלה מתוכנן",                 type:"date" },
    { key:"endDate",         label:"תאריך סיום מתוכנן",                  type:"date" },
    { key:"buildingArea",    label:"שטח מבנה",                            type:"text" },
    { key:"municipalEst",    label:"אומדן עירוני לפרויקט (הערכה ראשונית)", type:"text" },
    { key:"contractorEst",   label:"עלות קבלנית (הערכה ראשונית)",         type:"text", linked:true },
    { key:"archBase",        label:"ערך מבנה לאדריכל",                   type:"calc" },
    { key:"elevators",       label:"כמות מעליות (הערכה)",                 type:"text" },
    { key:"trees",           label:"כמות עצים",                           type:"text" },
  ];

  return (
    <div style={{ maxWidth:700 }}>
      <table style={{ width:"100%", borderCollapse:"collapse", border:"1px solid #e2e8f0", borderRadius:8, overflow:"hidden" }}>
        <tbody>
          {/* שם הפרויקט — שורה עליונה מלאה */}
          <tr style={{ background:"#eff6ff", borderBottom:"2px solid #bfdbfe" }}>
            <td colSpan={2} style={{ padding:"12px 16px", borderBottom:"2px solid #bfdbfe" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <label style={{ fontSize:12, fontWeight:700, color:"#2563eb", whiteSpace:"nowrap" }}>שם הפרויקט</label>
                <input
                  type="text"
                  value={projectName||""}
                  onChange={e => onRenameProject && onRenameProject(e.target.value)}
                  placeholder="הזן שם פרויקט..."
                  style={{ flex:1, border:"1.5px solid #bfdbfe", background:"#fff", textAlign:"right", direction:"rtl", fontSize:14, fontWeight:700, fontFamily:"'Heebo',sans-serif", outline:"none", color:"#1e293b", borderRadius:7, padding:"6px 10px", boxSizing:"border-box" }}
                  onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="#bfdbfe"} />
              </div>
            </td>
          </tr>
          {rows.map((r, i) => (
            <tr key={r.key} style={{ background: i%2===0?"#fff":"#f8fafc" }}>
              <td style={{ padding:"10px 16px", textAlign:"right", color:"#374151", fontSize:13, width:"50%", borderBottom:"1px solid #e2e8f0", borderLeft:"1px solid #e2e8f0", verticalAlign:"middle", fontWeight: r.key==="archBase"?400:400 }}>
                {r.label}
              </td>
              <td style={{ padding:"10px 16px", textAlign:"right", fontSize:13, width:"50%", borderBottom:"1px solid #e2e8f0", verticalAlign:"middle" }}>
                  {r.type === "date" ? (
                    <FlatpickrDate value={data?.[r.key]||""} onChange={v => upd(r.key, v)}
                      style={{ width:"100%", border:"1px solid #e2e8f0", background:"#fff", textAlign:"right", fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none", color:"#1e293b", borderRadius:6, padding:"5px 8px", boxSizing:"border-box" }} />
                  ) : r.type === "calc" ? (
                    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                      <input type="text" value={data?.[r.key]||""}
                        onChange={e => upd(r.key, e.target.value)}
                        placeholder={archBase ? archBase.toLocaleString("he-IL", {minimumFractionDigits:0, maximumFractionDigits:0}) : ""}
                        style={{ flex:1, border:`1px solid ${data?.[r.key] ? "#fde68a" : "#e2e8f0"}`, background: data?.[r.key] ? "#fffbeb" : "#fff", textAlign:"right", direction:"rtl", fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none", color:"#1e293b", borderRadius:6, padding:"5px 8px", boxSizing:"border-box" }}
                        onFocus={e=>e.target.style.borderColor="#475569"} onBlur={e=>e.target.style.borderColor= data?.[r.key] ? "#fde68a" : "#e2e8f0"} />
                      {data?.[r.key] ? (
                        <>
                          <span style={{ fontSize:11, fontWeight:700, color:"#92400e", background:"#fef3c7", border:"1px solid #fde68a", borderRadius:10, padding:"2px 8px", whiteSpace:"nowrap" }}>ידני</span>
                          <button onClick={() => upd(r.key, "")} title="אפס לחישוב אוטומטי"
                            style={{ background:"none", border:"none", color:"#ef4444", cursor:"pointer", fontSize:16, padding:"0 2px", lineHeight:1 }}>×</button>
                        </>
                      ) : archBase > 0 && (
                        <span style={{ fontSize:11, color:"#94a3b8", whiteSpace:"nowrap" }}>אוטומטי</span>
                      )}
                    </div>
                  ) : (
                    <input type="text" value={data?.[r.key]||""}
                      onChange={e => { upd(r.key, e.target.value); if(r.linked) updBudget("contractorEst", e.target.value.replace(/,/g,"")); }}
                      onBlur={e => {
                        const raw = e.target.value.replace(/,/g,"");
                        const num = Number(raw);
                        if (!isNaN(num) && raw !== "") upd(r.key, num.toLocaleString("en-US"));
                      }}
                      onFocus={e => {
                        const raw = (data?.[r.key]||"").replace(/,/g,"");
                        upd(r.key, raw);
                      }}
                      placeholder=""
                      style={{ width:"100%", border:"1px solid #e2e8f0", background:"#fff", textAlign:"right", direction:"rtl", fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none", color:"#1e293b", borderRadius:6, padding:"5px 8px", boxSizing:"border-box" }}
                      onFocus2={e=>e.target.style.borderColor="#475569"} onBlur2={e=>e.target.style.borderColor="#e2e8f0"} />
                  )}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function AppInner({ currentUser, userRole, setUserRole }) {
  const uid = currentUser.uid;
  const isAdmin = (userRole?.role === "admin") || false;

  const [projects, setProjects] = useState([]);

  // Load SheetJS
  useEffect(() => {
    if (window.XLSX) return;
    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js";
    document.head.appendChild(script);
  }, []);

  const [allData, setAllData] = useState({});
  const [dataLoaded, setDataLoaded] = useState(false);

  // סינון פרויקטים לפי הרשאה - אחרי שה-state מוגדר
  const visibleProjects = isAdmin
    ? projects
    : projects.filter(p => ((userRole?.projects) || []).includes(String(p.id)));

  // מעקב גישה אחרונה לפרויקט (לצורך מיון)
  const [lastAccessed, setLastAccessed] = useState(() => {
    try { return JSON.parse(localStorage.getItem("cp_last_accessed")||"{}"); } catch(e) { return {}; }
  });
  const touchProject = (p) => {
    setLastAccessed(prev => {
      const updated = { ...prev, [p.id]: Date.now() };
      try { localStorage.setItem("cp_last_accessed", JSON.stringify(updated)); } catch(e) {}
      return updated;
    });
  };
  const ACTIVE_STATUSES = ["תכנון","ביצוע"];

  const [selectedProj, setSelectedProj] = useState(null);

  // ── Suppliers (global) ──────────────────────────────────────────────────────

  // Auto-save to Firestore - must be before any early return

  if (!dataLoaded) return (

  // ── project CRUD ─────────────────────────────────────────────────────────
  const addProject = () => {

  // ── Export project to Excel ──────────────────────────────────────────────
  const exportProjectToExcel = (proj, { returnBlob=false }={}) => {
    const XLSX = window.XLSX;
    if (!XLSX) { alert("ספריית Excel לא נטענה, נסה שוב"); return; }
    const d = allData[proj.id] || {};
    const o = d.openingData || {};
    const bs = d.budgetState || {};
    const company = companies.find(c => String(c.id) === String(d.companyId));
    const wb = XLSX.utils.book_new();
    wb.Workbook = { Views: [{ RTL: true }] };

    // Style palette
    const ST = {
      H:  { font:{bold:true,sz:11,color:{rgb:"FFFFFF"}},   fill:{fgColor:{rgb:"1E40AF"},patternType:"solid"}, alignment:{horizontal:"right",vertical:"center"} },
      S:  { font:{bold:true,sz:11,color:{rgb:"1E293B"}},   fill:{fgColor:{rgb:"BFDBFE"},patternType:"solid"}, alignment:{horizontal:"right"} },
      T:  { font:{bold:true,sz:11,color:{rgb:"78350F"}},   fill:{fgColor:{rgb:"FEF9C3"},patternType:"solid"}, alignment:{horizontal:"right"} },
      G:  { font:{bold:true,sz:12,color:{rgb:"7C2D12"}},   fill:{fgColor:{rgb:"FDE68A"},patternType:"solid"}, alignment:{horizontal:"right"} },
      I:  { font:{sz:10,color:{rgb:"334155"}},             fill:{fgColor:{rgb:"EFF6FF"},patternType:"solid"}, alignment:{horizontal:"right"} },
      D0: { font:{sz:10}, fill:{fgColor:{rgb:"FFFFFF"},patternType:"solid"}, alignment:{horizontal:"right"} },
      D1: { font:{sz:10}, fill:{fgColor:{rgb:"F0F9FF"},patternType:"solid"}, alignment:{horizontal:"right"} },
      E:  { fill:{fgColor:{rgb:"FFFFFF"},patternType:"solid"} },
    };
    const styleRow = (ws, r, style, maxC) => {
      for (let c=0; c<=maxC; c++) {
        const a = XLSX.utils.encode_cell({r,c});
        if (!ws[a]) ws[a] = {v:"",t:"s"};
        ws[a].s = style;
      }
    };
    const finalize = (ws, colW) => {
      ws['!views'] = [{rightToLeft:true}];
      if (colW) ws['!cols'] = colW.map(w=>({wch:w}));
    };
    const makeSimple = (rows, colW) => {
      const ws = XLSX.utils.aoa_to_sheet(rows);
      finalize(ws, colW);
      const rng = XLSX.utils.decode_range(ws['!ref']||"A1:A1");
      styleRow(ws, 0, ST.H, rng.e.c);
      for (let r=1; r<=rng.e.r; r++) styleRow(ws, r, r%2===1?ST.D0:ST.D1, rng.e.c);
      return ws;
    };

    // Pre-calculate exportAllRows (used in both sheet 3 and sheet 5)
    const cId = d.companyId || "";
    const exportBState = {
      ...bs,
      contractorEst: String(o.contractorEst||"").replace(/,/g,"") || bs.contractorEst || "",
      municipalEst:  String(o.municipalEst||"").replace(/,/g,"")  || bs.municipalEst  || "",
    };
    const exportPlanOnlyMap = {};
    (() => {
      const _cEst  = Number(exportBState.contractorEst||0);
      const _dPct  = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);
      const _aBase = resolveArchBase(d.openingData||{}, _cEst, _dPct);
      (d.quotes||[]).forEach(fg => {
        (fg.consultants||[]).forEach(c => {
          if (!c.approved||!c.name?.trim()) return;
          const isPct = (c.payType||"אחוזים")==="אחוזים";
          const pct   = Number(c.value||0)/100;
          let fee = 0;
          if (!isPct)                                                          fee = Number(c.value||0);
          else if (["אדריכל","אדריכלות","אדריכלים"].includes((fg.fieldName||"").trim()) && _cEst)       fee = _aBase * pct;
          else if ((fg.fieldName||"").includes("מנהל פרויקט") && _cEst)       fee = _cEst * pct;
          else if (_cEst) { const pp = Number((statsRows||[]).find(r=>r.field===fg.fieldName)?.pct||0)/100; fee = _cEst*pp*pct; }
          const ms = (cId && milestones?.[cId]) ? (milestones[cId]?.[fg.fieldName||""]||[]) : [];
          exportPlanOnlyMap[c.name.trim()] = (exportPlanOnlyMap[c.name.trim()]||0) +
            ms.filter(m=>m.planOnly).reduce((s,m)=>s+fee*Number(m.pct||0)/100, 0);
        });
      });
      (d.consultants||[]).forEach(con => {
        (con.increases||[]).filter(x=>x.approvedIncrease&&x.planOnly).forEach(x=>{
          exportPlanOnlyMap[con.name?.trim()||""] = (exportPlanOnlyMap[con.name?.trim()||""]||0)+Number(x.amount||0);
        });
      });
    })();
    const exportAllRows = buildBudgetAllRows({
      quotesRows: d.quotes||[], consultantsRows: d.consultants||[],
      budgetState: exportBState, statsRows,
      accountsRows: d.accounts||[], planOnlyMap: exportPlanOnlyMap,
      archBaseOverride: resolveArchBase(d.openingData||{}, Number(exportBState.contractorEst||0), (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0)),
    });
    const toNum = (v) => { const n = Number(String(v||"").replace(/,/g,"").replace(/[^\d.\-]/g,"")); return isNaN(n) ? "" : n; };

    // 1. פתיחת פרויקט
    const openingRows = [
      ["שדה","ערך"],
      ["שם פרויקט", proj.name],
      ["מספר פרויקט", d.projectNumber||""],
      ["כתובת", o.address||""],
      ["מהות העבודה", o.workDescription||""],
      ["תאריך התחלה", o.startDate||""],
      ["תאריך סיום", o.endDate||""],
      ["שטח מבנה (מ.ר)", o.buildingArea||""],
      ["אומדן עירוני", o.municipalEst||""],
      ["אומדן קבלני", o.contractorEst||""],
      ["כמות מעליות", o.elevators||""],
      ["כמות עצים", o.trees||""],
      ["חברה עירונית", company?.name||""],
      ["מנהל תכנון", d.planningManager||""],
      ["מנהל ביצוע", d.executionManager||""],
    ];
    XLSX.utils.book_append_sheet(wb, makeSimple(openingRows, [24,40]), "פתיחת פרויקט");

    // 2. הצעות מחיר יועצים
    const quotesRows = [["תחום","שם יועץ","סוג תשלום","ערך","המלצה","הועבר לחברה","אושר","הערות"]];
    (d.quotes||[]).forEach(field => {
      (field.consultants||[]).forEach(c => {
        quotesRows.push([field.fieldName||"", c.name||"", c.payType||"", c.value||"",
          c.recommended?"כן":"לא", c.sentToMunicipality?"כן":"לא", c.approved?"כן":"לא", c.notes||""]);
      });
    });
    XLSX.utils.book_append_sheet(wb, makeSimple(quotesRows, [16,22,14,10,10,14,10,28]), "הצעות מחיר יועצים");

    // 3. רשימת יועצים - פירוט פיננסי לפי יועץ
    const consRows = [["תחום","שם יועץ","סוג תשלום","ערך/אחוז","סכום התקשרות","הגדלות מאושרות","סה כ חוזה","ששולם","יתרה לתשלום","שלב תכנון","העדר תביעות","הערות"]];
    exportAllRows.forEach(r => {
      const isPct = r.payType === "אחוזים";
      const baseFee = isPct ? (r.computedFee||0) : (r.value||0);
      const totalFee = baseFee + (r.increases||0);
      const remaining = totalFee - (r.paid||0);
      const hasCEst = !!Number(exportBState.contractorEst||0);
      const showFee = hasCEst || !isPct;
      consRows.push([
        r.field||"", r.name||"", r.payType||"",
        isPct ? ((r.value||0)+"%") : (r.value||""),
        showFee ? baseFee : "",
        r.increases||0,
        showFee ? totalFee : "",
        r.paid||0,
        showFee ? remaining : "",
        r.planOnly>0 ? r.planOnly : "",
        r.noClaims ? "כן" : "לא",
        r.notes||""
      ]);
    });
    XLSX.utils.book_append_sheet(wb, makeSimple(consRows, [16,22,12,12,16,16,16,16,16,14,12,24]), "רשימת יועצים");

    // 4. ריכוז חשבונות
    const milestoneNameMap = {};
    if (cId && milestones?.[cId]) {
      Object.values(milestones[cId]).forEach(mList => {
        (mList||[]).forEach(m => { milestoneNameMap["m-"+m.id] = { name: m.name||"", pct: m.pct||0, planOnly: !!m.planOnly }; });
      });
    }
    (d.consultants||[]).forEach(con => {
      (con.increases||[]).forEach(x => { milestoneNameMap["i-"+x.id] = { name: x.reason||"הגדלה", pct: 100 }; });
    });
    const accRows = [["יועץ","שם אבן הדרך","אחוז","מס חשבון","תאריך קבלה","סכום","אישור מנהל פרויקט","אישור מנהל יחידה","אישור מזמין","הוחזר ליועץ","נדחה","תכנון בלבד","הערות"]];
    (d.accounts||[]).forEach(r => {
      const ms = milestoneNameMap[r.rowKey] || { name:"", pct:"" };
      accRows.push([r.consultantName||"", ms.name, ms.pct, r.invoiceNum||"", r.receiptDate||"", r.amount||"",
        r.pmApproved?"כן":"לא", r.unitManagerApproved?"כן":"לא", r.toMunicipality?"כן":"לא",
        r.toConsultant?"כן":"לא", r.rejected?"כן":"לא", ms.planOnly?"כן":"לא", r.reason||""]);
    });
    XLSX.utils.book_append_sheet(wb, makeSimple(accRows, [18,22,8,12,14,14,14,14,14,12,10,12,22]), "ריכוז חשבונות");

    // 5. תקציב הפרויקט
    const budgetRows = [], budgetTypes = [];
    const bPush = (row, type) => { budgetRows.push(row); budgetTypes.push(type); };

    bPush(["סעיף","ערך","","","","","",""], "hdr");
    bPush(["אומדן עירוני",       toNum(o.municipalEst  || bs.municipalEst),"","","","","",""], "info");
    bPush(["אומדן קבלני",        toNum(o.contractorEst || bs.contractorEst),"","","","","",""], "info");
    bPush(["כתב כמויות / מכרז", toNum(bs.tenderDocs),"","","","","",""], "info");
    bPush(["חשבון קבלן סופי",   toNum(bs.finalAccount),"","","","","",""], "info");
    bPush(["אישור ממונה עירוני", toNum(bs.approvalActual),"","","","","",""], "info");
    bPush(["קיזוז דמי הקמה",    toNum(bs.setupOffset),"","","","","",""], "info");
    (bs.extraItems||[]).forEach(x => bPush([x.desc||"תקציב שהתקבל", toNum(x.amount),"","","","","",""], "info"));
    bPush(["","","","","","","",""], "empty");
    bPush(["פירוט תקציב הפרויקט","","","","","","",""], "section");
    bPush(["שם המקצוע","שם היועץ","סכום התקשרות","סכום ששולם","יתרה לתשלום","שלב תכנון","העדר תביעות","הערות"], "hdr");
    let dIdx = 0;
    exportAllRows.forEach(r => {
      const baseFee  = r.payType === "אחוזים" ? r.computedFee : r.value;
      const totalFee = baseFee + r.increases;
      const remaining= totalFee - r.paid;
      const hasBase  = !!Number(exportBState.contractorEst||0) || r.payType !== "אחוזים";
      bPush([r.field, r.name, !hasBase?(r.value+"%"):totalFee, r.paid, !hasBase?"":remaining, r.planOnly>0?r.planOnly:"", r.noClaims?"כן":"לא", r.notes], dIdx++%2===0?"d0":"d1");
    });
    var xConsTotal = 0, xConsPaid = 0;
    exportAllRows.forEach(r => { xConsTotal += (r.payType==="אחוזים"?r.computedFee:r.value)+r.increases; xConsPaid += (r.paid||0); });
    bPush(["","","","","","","",""], "empty");
    bPush(["סה כ יועצים","",xConsTotal,xConsPaid,xConsTotal-xConsPaid,"","",""], "total");

    var xFixedFeeNames = ["פיצויי נופי","מי אביבים - לא דמי הקמה","כיבוי אש","חח\"י","בזק","הוט","רשות העתיקות","תיק מידע"];
    var xFeeRows = bs.feeRows || xFixedFeeNames.map(function(name) { return { id:name, name:name, contract:"", paid:"", planOnly:"", noClaims:false, notes:"" }; });
    var xAllFees = xFeeRows.concat(bs.extraFeeRows||[]);
    var xFeeTot = 0, xFeePaid = 0;
    bPush(["","","","","","","",""], "empty");
    bPush(["אגרות","","","","","","",""], "section");
    xAllFees.forEach(function(r, i) {
      var c=Number(r.contract||0), p=Number(r.paid||0); xFeeTot+=c; xFeePaid+=p;
      bPush(["אגרות",r.name||"",c||"",p||"",r.noClaims?0:c-p,c||"",r.noClaims?"כן":"לא",r.notes||""], i%2===0?"d0":"d1");
    });
    bPush(["סה כ אגרות","",xFeeTot,xFeePaid,xFeeTot-xFeePaid,"","",""], "total");

    var xCC=Number(bs.contractorContract||0), xCP=Number(bs.contractorPaid||0);
    var xCNoClaims=!!bs.contractorNoClaims, xCPlanOnly=Number(bs.contractorPlanOnly||0), xCRem=xCNoClaims?0:xCC-xCP;
    bPush(["","","","","","","",""], "empty");
    bPush(["קבלן","","","","","","",""], "section");
    bPush(["קבלן","קבלן ראשי",xCC||"",xCP||"",xCRem,xCPlanOnly||"",xCNoClaims?"כן":"לא",bs.contractorNotes||""], "d0");
    bPush(["סה כ קבלן","",xCC,xCP,xCRem,"","",""], "total");

    var xBase=xConsTotal+xFeeTot+xCC;
    var xOP=Number(bs.overheadPct||4), xOA=xBase*xOP/100, xOPaid=Number(bs.overheadPaid||0), xOPlanOnly=Number(bs.overheadPlanOnly||0);
    var xBB=xBase+xOA, xBP=Number(bs.bcmPct||0), xBA=xBB*xBP/100, xBPaid=Number(bs.bcmPaid||0), xBPlanOnly=Number(bs.bcmPlanOnly||0);
    var xVP=Number(bs.vatPct||18), xVA=(xBB+xBA)*xVP/100, xVPaid=Number(bs.vatPaid||0), xVPlanOnly=Number(bs.vatPlanOnly||0);
    var xOhTot=xOA+xBA+xVA;
    bPush(["","","","","","","",""], "empty");
    bPush(["תקורות","","","","","","",""], "section");
    bPush(["תקורות חברה עירונית",xOP+"%",xOA,xOPaid,xOA-xOPaid,xOPlanOnly||"","",bs.overheadNotes||""], "d0");
    bPush(["בצמ",xBP+"%",xBA,xBPaid,xBA-xBPaid,xBPlanOnly||"","",bs.bcmNotes||""], "d1");
    bPush(["מעמ",xVP+"%",xVA,xVPaid,xVA-xVPaid,xVPlanOnly||"","",bs.vatNotes||""], "d0");
    bPush(["סה כ תקורות","",xOhTot,xOPaid+xBPaid+xVPaid,xOhTot-(xOPaid+xBPaid+xVPaid),"","",""], "total");

    var xGrand=xConsTotal+xFeeTot+xCC+xOhTot, xGrandPaid=xConsPaid+xFeePaid+xCP+xOPaid+xBPaid+xVPaid;
    bPush(["","","","","","","",""], "empty");
    bPush(["סה כ כללי","",xGrand,xGrandPaid,xGrand-xGrandPaid,"","",""], "grand");

    const budgetWs = XLSX.utils.aoa_to_sheet(budgetRows);
    finalize(budgetWs, [25,25,16,16,16,16,12,30]);
    budgetTypes.forEach((type, r) => {
      const s = type==="hdr" ? ST.H : type==="section" ? ST.S : type==="total" ? ST.T
              : type==="grand" ? ST.G : type==="info" ? ST.I : type==="d1" ? ST.D1 : type==="empty" ? ST.E : ST.D0;
      styleRow(budgetWs, r, s, 7);
    });
    XLSX.utils.book_append_sheet(wb, budgetWs, "תקציב הפרויקט");

    // 6. תוצאות מכרז
    const tenderRows = [["קבלן","הצעת מחיר","דירוג","הערות","נבחר"]];
    (d.tender||[]).forEach(r => tenderRows.push([r.contractor||"", r.bid||"", r.rank||"", r.notes||"", r.selected?"כן":"לא"]));
    XLSX.utils.book_append_sheet(wb, makeSimple(tenderRows, [25,15,10,30,10]), "תוצאות מכרז");

    const wbout = XLSX.write(wb, { bookType:"xlsx", type:"array" });
    const blob = new Blob([wbout], { type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
    if (returnBlob) return blob;
    const blobUrl = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = blobUrl;
    a.download = (proj.name || "פרויקט").replace(/[\/\\:*?"<>|]/g, "_") + ".xlsx";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
  };

  // ── Backup all data to JSON ──────────────────────────────────────────────
  const exportBackup = () => setShowBackupConfirm(true);

  const doBackup = async () => {
    const backup = { projects, allData, suppliers, companies, milestones, statsRows, exportedAt: new Date().toISOString() };
    const json = JSON.stringify(backup, null, 2);
    try { localStorage.setItem("proj_backup_latest", json); } catch(e) {}
    const handle = backupDirRef.current;
    if (handle) {
      try {
        const perm = await handle.requestPermission({ mode: "readwrite" });
        if (perm === "granted") {
          setShowBackupConfirm(false);
          const ts = new Date().toISOString().slice(0,19).replace(/:/g,"-");
          const jFh = await handle.getFileHandle(`costpilot-backup-${ts}.json`, { create: true });
          const jW = await jFh.createWritable();
          await jW.write(json); await jW.close();
          const XLSX = window.XLSX;
          if (XLSX && projects.length > 0) {
            for (const proj of projects) {
              try {
                const blob = exportProjectToExcel(proj, { returnBlob: true });
                if (!blob) continue;
                const safeName = (proj.name||"פרויקט").replace(/[\/\\:*?"<>|]/g,"_");
                const xFh = await handle.getFileHandle(`${safeName}.xlsx`, { create: true });
                const xW = await xFh.createWritable();
                await xW.write(blob); await xW.close();
              } catch(e) {}
            }
          }
          notify(`✅ גיבוי + אקסל נשמרו ב: ${handle.name}`);
          return;
        }
      } catch(e) {}
    }
    setShowBackupConfirm(false);
    setBackupText(json);
    setShowBackupModal(true);
  };

    try {

      const b = JSON.parse(json);
      if (b.projects)  { setProjects(b.projects);   saveProjects(b.projects); }
      if (b.allData)   { setAllData(b.allData);      saveAllData(b.allData); }
      if (b.suppliers) { setSuppliers(b.suppliers); }
      if (b.companies) { setCompanies(b.companies); }
      if (b.milestones){ setMilestones(b.milestones); }
      if (b.statsRows) { setStatsRows(b.statsRows); }

        if (b.statsRows){ setStatsRows(b.statsRows); }
        notify("✅ הנתונים יובאו בהצלחה!");

    reader.readAsText(file);

        updated.consultants = [...approvedFromQuotes, ...manualConsultants];

      return { ...prev, [projId]: updated };
    });
  };
