                  : isPM && pmCalc ? fmt(pmCalc.pmFee + totalInc)
                  : isOtherPct && otherCalc ? fmt(otherCalc.conFee + totalInc)
                  : fmt(baseVal + totalInc)}
              </span>
            </div>
          )}

          {/* הוסף הגדלה */}
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#9A9A9A", letterSpacing:1, marginBottom:8 }}>הוסף הגדלה</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 120px 150px 80px auto", gap:10 }}>
              {/* כותרות */}
              <div style={{ fontSize:12, color:"#767676", fontWeight:600, textAlign:"right" }}>סיבת ההגדלה</div>
              <div style={{ fontSize:12, color:"#767676", fontWeight:600, textAlign:"right" }}>סכום </div>
              <div style={{ fontSize:12, color:"#767676", fontWeight:600, textAlign:"right" }}>תאריך</div>
              <div style={{ fontSize:12, color:"#767676", fontWeight:600, textAlign:"right" }}>תכנון בלבד</div>
              <div />
              {/* שדות */}
              <input value={inc.reason} onChange={e=>setInc({...inc,reason:e.target.value})}
                placeholder="לדוגמה: תוספת תכנון"
                style={{ background:"#F7F8FA", border:"1.5px solid #E2E5EA", borderRadius:4, padding:"8px 11px", fontSize:14, color:"#0D0D0D", fontFamily:"'Heebo',sans-serif", outline:"none", direction:"rtl" }}
                onFocus={e=>e.target.style.borderColor="#444444"} onBlur={e=>e.target.style.borderColor="#E2E5EA"} />
              <input type="number" value={inc.amount} onChange={e=>setInc({...inc,amount:e.target.value})}
                style={{ background:"#F7F8FA", border:"1.5px solid #E2E5EA", borderRadius:4, padding:"8px 11px", fontSize:14, color:"#0D0D0D", fontFamily:"'Heebo',sans-serif", outline:"none", textAlign:"right" }}
                onFocus={e=>e.target.style.borderColor="#444444"} onBlur={e=>e.target.style.borderColor="#E2E5EA"} />
              <FlatpickrDate value={inc.date} onChange={v=>setInc({...inc,date:v})}
                style={{ background:"#F7F8FA", border:"1.5px solid #E2E5EA", borderRadius:4, padding:"8px 11px", fontSize:14, color:"#0D0D0D", fontFamily:"'Heebo',sans-serif", outline:"none" }} />
              <div style={{ display:"flex", justifyContent:"center", alignItems:"center" }}>
                <input type="checkbox" checked={!!inc.planOnly} onChange={e=>setInc({...inc,planOnly:e.target.checked})}
                  style={{ width:16, height:16, cursor:"pointer" }} />
              </div>
              <PrimaryButton onClick={addIncrease}>+ הוסף</PrimaryButton>
            </div>
          </div>
        </div>
      </div>
    </div>
    </>
  );
}

function ConsultantsTab({ rows, setRows, quotesRows, budgetState, statsRows, openConsultantId, scrollToIncreaseId, suppliers, projectName, openingData, setOpeningData, projectMeta }) {
  const [openId, setOpenId] = useState(openConsultantId || null);
  const [search, setSearch] = useState("");

  React.useEffect(() => {
    if (openConsultantId) setOpenId(openConsultantId);
  }, [openConsultantId]);

  // Always enrich consultant with live value/payType/fee from quotes
  const enrich = (consultant) => {
    if (!quotesRows) return consultant;
    for (const fg of quotesRows) {
      for (const c of (fg.consultants || [])) {
        if ("q-"+c.id === consultant.id) {
          // Compute live fee exactly like AccountsTab so contractFee email is always accurate
          const cEst = Number(String((openingData||{}).contractorEst||"").replace(/,/g,"").replace(/[^\d.]/g,"")) || Number((budgetState||{}).contractorEst || 0);
          const dPct = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);
          const archBaseManual = Number(String((openingData||{}).archBase||"").replace(/[,\s]/g,"").replace(/[^\d.]/g,""));
          const aBase = archBaseManual > 0 ? archBaseManual : cEst - cEst * dPct / 100;
          const isPct = (c.payType||"אחוזים") === "אחוזים";
          const isArch = isPct && ["אדריכל","אדריכלות","אדריכלים"].includes((fg.fieldName||"").trim());
          const isPMRole = isPct && (fg.fieldName||"").includes("מנהל פרויקט");
          const pct = Number(c.value||0) / 100;
          let liveFee = 0;
          if (c.subItems?.length > 0) liveFee = c.subItems.reduce((s,it)=>s+Number(it.amount||0),0);
          else if (!isPct) liveFee = Number(c.value||0);
          else if (isArch && cEst) liveFee = aBase * pct;
          else if (isPMRole && cEst) liveFee = cEst * pct;
          else if (cEst) { const pp = Number((statsRows||[]).find(r=>r.field===fg.fieldName)?.pct||0)/100; liveFee = cEst * pp * pct; }
          return { ...consultant, value: c.value, payType: c.payType || "אחוזים", _liveFee: liveFee };
        }
      }
    }
    return consultant;
  };

  const open = (() => { const r = rows.find(r => r.id === openId); return r ? enrich(r) : null; })();

  const saveConsultant = updated => {
    setRows(prev => prev.map(r => r.id === updated.id ? updated : r));
  };

  const exportToExcel = () => {
    const dataRows = [];
    rows.forEach(r => {
      const sm = (suppliers||[]).find(s => s.name === r.name);
      const cts = r.contacts?.length > 0
        ? r.contacts.map(c => ({ name: c.name||c.contact||"", phone: c.phone||"", phone2: c.phone2||"", email: c.email||"" }))
        : sm?.contacts?.length > 0
          ? sm.contacts.map(c => ({ name: c.contact||"", phone: c.phone||"", phone2: c.phone2||"", email: c.email||"" }))
          : [{ name: r.contact||"", phone: r.phone||"", phone2: r.phone2||"", email: r.email||"" }];
      cts.forEach((ct, i) => {
        dataRows.push([
          r.role||"", r.name||"", ct.name||"",
          ct.phone||"", ct.phone2||"", ct.email||"",
          i===0 ? (r.exportNotes||"") : "",
        ]);
      });
    });
    const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const headers = ["תחום","שם משרד / יועץ","שם איש קשר","טלפון","נייד","מייל","הערות"];
    const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="UTF-8"/>
<xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet>
<x:Name>יועצים</x:Name>
<x:WorksheetOptions><x:DisplayRightToLeft/></x:WorksheetOptions>
</x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml>
</head><body>
<table dir="rtl" style="border-collapse:collapse;font-family:Arial;font-size:13px;">
<tr><td colspan="7" style="font-size:15px;font-weight:bold;padding:8px 10px;background:#EAF1FA;border:1px solid #B8CEED;">${esc(projectName||"פרויקט")}</td></tr>
<tr>${headers.map(h=>`<th style="background:#163356;color:#fff;font-weight:bold;padding:7px 10px;border:1px solid #0B1F3A;">${esc(h)}</th>`).join("")}</tr>
${dataRows.map((row,i)=>`<tr style="background:${i%2===0?"#fff":"#FAFBFC"}">${row.map(v=>`<td style="border:1px solid #E2E5EA;padding:6px 10px;">${esc(v)}</td>`).join("")}</tr>`).join("")}
</table></body></html>`;
    const b64 = btoa(unescape(encodeURIComponent(html)));
    const a = document.createElement("a");
    a.href = "data:application/vnd.ms-excel;base64," + b64;
    a.download = `יועצים_${projectName||"פרויקט"}.xls`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:18 }}>
      {/* Info banner + export button */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:12, flexWrap:"wrap" }}>
        <div style={{ background:"#F7F8FA", border:"1px solid #E2E5EA", borderRadius:8, padding:"12px 18px", display:"flex", alignItems:"center", gap:10, fontSize:13, color:"#3A3A3A", flex:1 }}>
          <span style={{ fontSize:18 }}>ℹ️</span>
          <span>רשימה זו מתעדכנת אוטומטית — יועצים שאושרו בלשונית <strong>הצעות מחיר יועצים</strong> יופיעו כאן. לחץ על כרטיסייה לפרטים.</span>
        </div>
        {rows.length > 0 && (
          <button onClick={exportToExcel} className="allow-readonly"
            style={{ padding:"8px 16px", background:"#0E7C6A", color:"#fff", border:"1.5px solid transparent", borderRadius:4,
              fontFamily:"'Heebo',sans-serif", fontSize:13, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap",
              display:"flex", alignItems:"center", gap:8 }}>
            <span>📥</span> ייצוא לאקסל
          </button>
        )}
      </div>

      {rows.length > 0 && (
        <div style={{ position:"relative" }}>
          <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", color:"#9A9A9A", fontSize:15 }}>🔍</span>
          <input value={search} onChange={e => setSearch(e.target.value)}
            placeholder="חיפוש לפי שם יועץ או תחום..."
            style={{ width:"100%", padding:"8px 38px 8px 12px", border:"1.5px solid #0B1F3A", borderRadius:4, fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none", boxSizing:"border-box", direction:"rtl" }} />
        </div>
      )}
      {rows.length === 0 ? (
        <Card style={{ textAlign:"right", padding:48, color:"#9A9A9A" }}>
          <div style={{ fontSize:36, marginBottom:12 }}>👥</div>
          <div style={{ fontSize:15, fontWeight:600, color:"#767676" }}>אין יועצים מאושרים עדיין</div>
          <div style={{ fontSize:13, marginTop:6 }}>אשר יועצים בלשונית "הצעות מחיר יועצים" כדי שיופיעו כאן</div>
        </Card>
      ) : (
        <Card style={{ padding:0, overflow:"hidden" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13, direction:"rtl" }}>
            <thead>
              <tr style={{ background:"#F7F8FA", borderBottom:"2px solid #E2E5EA" }}>
                {["תחום","שם משרד / יועץ","שכ״ט","הגדלות מאושרות","הגדלות לאישור","שם איש קשר","טלפון","נייד","מייל"].map(h => (
                  <th key={h} style={{ padding:"9px 12px", textAlign:"right", fontWeight:700, fontSize:11, color:"#767676", whiteSpace:"nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {[...rows]
                .sort((a,b) => (a.role||"").localeCompare(b.role||"", 'he'))
                .filter(r => { const q = search.trim().toLowerCase(); return !q || (r.name||"").toLowerCase().includes(q) || (r.role||"").toLowerCase().includes(q); })
                .map((r, i) => {
                  const enr = enrich(r);
                  const increases = r.increases || [];
                  const totalInc  = increases.filter(x => x.approvedIncrease).reduce((s,x) => s+Number(x.amount||0), 0);
                  const pendingInc = increases.filter(x => !x.approvedIncrease).reduce((s,x) => s+Number(x.amount||0), 0);
                  const sm = (suppliers||[]).find(s => s.name === r.name);
                  const smCt = sm?.contacts?.length > 0 ? sm.contacts[0] : null;
                  const ct = r.contacts?.length > 0
                    ? r.contacts[0]
                    : smCt
                      ? { name: smCt.contact||"", phone: smCt.phone||"", phone2: smCt.phone2||"", email: smCt.email||"" }
                      : { name: r.contact||"", phone: r.phone||"", phone2: r.phone2||"", email: r.email||"" };
                  const dash = <span style={{ color:"#D0D5DD" }}>—</span>;
                  return (
                    <tr key={r.id}
                      style={{ borderBottom:"1px solid #F0F2F5", background:i%2===0?"#fff":"#FAFBFC", cursor:"pointer" }}
                      onClick={() => setOpenId(r.id)}
                      onMouseOver={e => e.currentTarget.style.background="#EFF1F5"}
                      onMouseOut={e  => e.currentTarget.style.background=i%2===0?"#fff":"#FAFBFC"}>
                      <td style={{ padding:"10px 12px", fontWeight:700, color:"#0D0D0D" }}>{r.role}</td>
                      <td style={{ padding:"10px 12px", color:"#0D0D0D" }}>{r.name}</td>
                      <td style={{ padding:"10px 12px", fontWeight:600, color:"#0D0D0D", whiteSpace:"nowrap" }}>
                        {!enr.value ? <span style={{ color:"#9A9A9A" }}>לא הוזן</span> : enr.payType==="אחוזים" ? (enr.value+"%") : fmt(enr.value)}
                      </td>
                      <td style={{ padding:"10px 12px", whiteSpace:"nowrap" }}>
                        {totalInc !== 0
                          ? totalInc < 0
                            ? <span style={{ fontWeight:600, color:"#5C2020", direction:"ltr", display:"inline-block" }}>-{fmt(Math.abs(totalInc))}</span>
                            : <span style={{ fontWeight:600, color:"#5C3D10", direction:"ltr", display:"inline-block" }}>+{fmt(totalInc)}</span>
                          : dash}
                      </td>
                      <td style={{ padding:"10px 12px", whiteSpace:"nowrap" }}>
                        {pendingInc !== 0
                          ? pendingInc < 0
                            ? <span style={{ fontWeight:600, color:"#5C2020", direction:"ltr", display:"inline-block" }}>-{fmt(Math.abs(pendingInc))}</span>
                            : <span style={{ fontWeight:600, color:"#0E7C6A", direction:"ltr", display:"inline-block" }}>+{fmt(pendingInc)}</span>
                          : dash}
                      </td>
                      <td style={{ padding:"10px 12px", color:"#3A3A3A" }}>{ct.name||dash}</td>
                      <td style={{ padding:"10px 12px", color:"#3A3A3A", direction:"ltr", textAlign:"right" }}>{ct.phone||dash}</td>
                      <td style={{ padding:"10px 12px", color:"#3A3A3A", direction:"ltr", textAlign:"right" }}>{ct.phone2||dash}</td>
                      <td style={{ padding:"10px 12px", color:"#3A3A3A" }}>{ct.email||dash}</td>
                    </tr>
                  );
                })}
            </tbody>
          </table>
        </Card>
      )}

      {open && (
        <ConsultantModal
          consultant={open}
          onClose={() => { setOpenId(null); }}
          onSave={updated => { saveConsultant(updated); }}
          budgetState={budgetState}
          statsRows={statsRows}
          scrollToIncreaseId={openId === openConsultantId ? scrollToIncreaseId : null}
          suppliers={suppliers||[]}
          openingData={openingData||{}}
          setOpeningData={setOpeningData}
          projectMeta={projectMeta}
        />
      )}
    </div>
  );
}

// ── DatePickerCell: DD/MM/YYYY date input independent of browser locale ────────
function DatePickerCell({ value, onChange, style }) {
  // value stored as YYYY-MM-DD internally
  const toISO  = (d,m,y) => y && m && d ? `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}` : "";
  const fromISO = iso => { if (!iso) return {d:"",m:"",y:""}; const [y,m,d]=iso.split("-"); return {d:String(Number(d)),m:String(Number(m)),y}; };

  const parts = fromISO(value);
  const [d, setD] = React.useState(parts.d);
  const [m, setM] = React.useState(parts.m);
  const [y, setY] = React.useState(parts.y);

  React.useEffect(() => {
    const p = fromISO(value);
    setD(p.d); setM(p.m); setY(p.y);
  }, [value]);

  const commit = (nd,nm,ny) => {
    const iso = toISO(nd,nm,ny);
    if (iso) onChange(iso);
  };

  const inp = (val, setter, max, next) => ({
    value: val,
    onChange: e => {
      const v = e.target.value.replace(/\D/g,"").slice(0,next==="y"?2:2);
      setter(v);
      if (v.length === 2 && next) document.getElementById(next)?.focus();
    },
    onBlur: e => {
      const v = e.target.value;
      commit(setter===setD?v:d, setter===setM?v:m, setter===setY?v:y);
    }
  });

  const base = { width:28, border:"none", borderBottom:"1.5px solid #D0D5DD", padding:"2px 2px",
    fontSize:11, fontFamily:"'Heebo',sans-serif", outline:"none", textAlign:"right",
    background:"transparent", ...style };

  return (
    <div style={{ display:"flex", alignItems:"center", gap:1, background:"#F7F8FA",
      border:"1px solid #E2E5EA", borderRadius:4, padding:"3px 6px", width:"fit-content" }}>
      <input id={"dp-d"} placeholder="DD" maxLength={2} {...inp(d,setD,31,"dp-m")} style={{...base}} />
      <span style={{ color:"#9A9A9A", fontSize:11 }}>/</span>
      <input id={"dp-m"} placeholder="MM" maxLength={2} {...inp(m,setM,12,"dp-y")} style={{...base}} />
      <span style={{ color:"#9A9A9A", fontSize:11 }}>/</span>
      <input id={"dp-y"} placeholder="YYYY" maxLength={4} value={y}
        onChange={e=>{ const v=e.target.value.replace(/\D/g,"").slice(0,4); setY(v); }}
        onBlur={e=>commit(d,m,e.target.value)}
        style={{...base, width:38, borderBottom:"1.5px solid #D0D5DD"}} />
    </div>
  );
}

// ── FlatpickrDate: date picker with DD/MM/YYYY format ──────────────────────
function FlatpickrDate({ value, onChange, style }) {
  const ref = useRef(null);
  const fpRef = useRef(null);
  const onChangeRef = useRef(onChange);
  onChangeRef.current = onChange; // always keep latest, no stale closure

  useEffect(() => {
    // Load flatpickr CSS + JS dynamically
    const loadFlatpickr = () => {
      if (window.flatpickr) { initFp(); return; }
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = "https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css";
      document.head.appendChild(link);
      const script = document.createElement("script");
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js";
      script.onload = initFp;
      document.head.appendChild(script);
    };
    const initFp = () => {
      if (fpRef.current) fpRef.current.destroy();
      fpRef.current = window.flatpickr(ref.current, {
        dateFormat: "d/m/Y",
        allowInput: true,
        locale: { firstDayOfWeek: 0 },
        onChange: ([date]) => {
          if (!date) return;
          // store as YYYY-MM-DD internally
          const y = date.getFullYear();
          const m = String(date.getMonth()+1).padStart(2,"0");
          const d = String(date.getDate()).padStart(2,"0");
          onChangeRef.current(`${y}-${m}-${d}`); // always calls latest onChange
        }
      });
      // set initial value
      if (value) {
        const [y,m,d] = value.split("-");
        if (y&&m&&d) fpRef.current.setDate(`${d}/${m}/${y}`, false);
      }
    };
    loadFlatpickr();
    return () => { if (fpRef.current) fpRef.current.destroy(); };
  }, []);

  // sync external value changes
  useEffect(() => {
    if (fpRef.current && value) {
      const [y,m,d] = value.split("-");
      if (y&&m&&d) fpRef.current.setDate(`${d}/${m}/${y}`, false);
    } else if (fpRef.current && !value) {
      fpRef.current.clear();
    }
  }, [value]);

  return (
    <input ref={ref} type="text" placeholder="DD/MM/YYYY" readOnly
      style={{ padding:"3px 5px", border:"1px solid #E2E5EA", borderRadius:4,
        fontSize:11, fontFamily:"'Heebo',sans-serif", outline:"none",
        background:"#fff", cursor:"pointer", width:105, ...style }} />
  );
}

// ── NumericCell: uncontrolled input that allows free typing ─────────────────
function NumericCell({ value, baseAmt, mode, onCommit, style, placeholder }) {
  const [focused, setFocused] = React.useState(false);
  // raw = plain number string for editing; displayed = formatted with commas
  const rawRef = React.useRef(String(value||""));
  const [display, setDisplay] = React.useState(String(value||""));

  // format a number string with commas
  const fmtNum = v => {
    const n = parseFloat(v);
    if (isNaN(n)) return v;
    const hasDecimal = n !== Math.floor(n);
    return n.toLocaleString("he-IL", { minimumFractionDigits: hasDecimal ? 2 : 0, maximumFractionDigits: 2 });
  };

  // sync external value changes
  React.useEffect(() => {
    if (!focused) {
      rawRef.current = String(value||"");
      setDisplay(value ? fmtNum(String(value)) : "");
    }
  }, [value, focused]);

  const handleFocus = () => {
    setFocused(true);
    // show raw number without commas for editing
    setDisplay(rawRef.current);
  };

  const handleChange = e => {
    setDisplay(e.target.value);
    rawRef.current = e.target.value;
  };

  const handleBlur = () => {
    setFocused(false);
    const num = parseFloat(rawRef.current);
    if (isNaN(num)) { setDisplay(""); onCommit("", ""); return; }
    const fixed = num.toFixed(2);
    rawRef.current = fixed;
    setDisplay(fmtNum(fixed));
    if (mode === "amount") {
      const pct = baseAmt ? (num / baseAmt * 100).toFixed(2) : "";
      onCommit(fixed, pct);
    } else {
      const amt = baseAmt ? (num / 100 * baseAmt).toFixed(2) : "";
      onCommit(fixed, amt);
    }
  };

  return (
    <input
      type="text"
      inputMode="decimal"
      value={display}
      onChange={handleChange}
      onFocus={handleFocus}
      onBlur={handleBlur}
      placeholder={placeholder||""}
      style={{ padding:"3px 5px", border:"1px solid #E2E5EA", borderRadius:4, fontSize:11,
        fontFamily:"'Heebo',sans-serif", outline:"none", textAlign:"right", ...style }}
    />
  );
}

// ── Tab: ריכוז חשבונות ────────────────────────────────────────────────────────
// Local-state textarea to avoid stale-closure single-char bug
function ReasonCell({ value, onCommit }) {
  const [local, setLocal] = React.useState(value);
  React.useEffect(() => { setLocal(value); }, [value]);
  return (
    <textarea value={local} onChange={e => setLocal(e.target.value)} onBlur={() => onCommit(local)}
      placeholder="סיבה" rows={2}
      style={{ width:140, minWidth:100, maxWidth:300, padding:"3px 5px", border:"1px solid #E2E5EA",
        borderRadius:4, fontSize:11, fontFamily:"'Heebo',sans-serif", outline:"none",
        resize:"vertical", direction:"rtl", overflow:"auto", boxSizing:"border-box" }} />
  );
}

function AccountsTab({ rows, setRows, quotesRows, consultantsRows, setConsultantsRows, budgetState, statsRows, companyId, milestones, openInvoiceId, onNavigate, openingData, localMilestones, setLocalMilestones, projectMeta }) {

  const [selConsultant, setSelConsultant] = useState(null);
  const [expanded, setExpanded]           = useState({});
  const [editingMs, setEditingMs]         = useState(false);
  const [draftMs, setDraftMs]             = useState([]);
  const [approvalModal, setApprovalModal] = useState(null);

  // Map: consultantName → first field they appear in (for backward-compat with old invoices without fieldName)
  const firstFieldByName = {};
  (quotesRows||[]).forEach(fg => {
    (fg.consultants||[]).forEach(c => {
      if (!c.approved || !c.name?.trim()) return;
      if (!firstFieldByName[c.name.trim()]) firstFieldByName[c.name.trim()] = fg.fieldName||"";
    });
  });
  const invMatchesField = (r, field, name) =>
    r.consultantName === name &&
    (r.fieldName ? r.fieldName === field : (firstFieldByName[name]||"") === field);

  // ── Compute fees ──────────────────────────────────────────────────────────
  const contractorEst = Number(String((openingData||{}).contractorEst||"").replace(/,/g,"").replace(/[^\d.]/g,"")) || Number((budgetState||{}).contractorEst || 0);
  const devPct        = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);
  const archBaseManual = Number(String((openingData||{}).archBase||"").replace(/[,\s]/g,"").replace(/[^\d.]/g,""));
  const archBase      = archBaseManual > 0 ? archBaseManual : contractorEst - contractorEst * devPct / 100;

  const consultantFees = [];
  (quotesRows||[]).forEach(fg => {
    (fg.consultants||[]).forEach(c => {
      if (!c.approved || !c.name?.trim()) return;
      const isPct    = (c.payType||"אחוזים") === "אחוזים";
      const isArch   = isPct && ["אדריכל","אדריכלות","אדריכלים"].includes((fg.fieldName||"").trim());
      const isPMRole = isPct && (fg.fieldName||"").includes("מנהל פרויקט");
      const pct      = Number(c.value||0) / 100;
      let fee = 0;
      if (c.subItems && c.subItems.length > 0) {
        fee = c.subItems.reduce((s,it)=>s+Number(it.amount||0),0);
      } else if (!isPct)                          fee = Number(c.value||0);
      else if (isArch   && contractorEst)  fee = archBase * pct;
      else if (isPMRole && contractorEst)  fee = contractorEst * pct;
      else if (contractorEst) {
        const profPct = Number((statsRows||[]).find(r=>r.field===fg.fieldName)?.pct||0) / 100;
        fee = contractorEst * profPct * pct;
      }
      const consultantRow = (consultantsRows||[]).find(r => r.id === "q-"+c.id);
      const increases = consultantRow?.increases || c.increases || [];
      const noClaims  = !!consultantRow?.noClaims;
      const contractFee = consultantRow?.contractFee ?? fee; // קפוא — לא משתנה לעולם
      const approvedIncreases = increases.filter(x => x.approvedIncrease);
      const totalInc  = approvedIncreases.reduce((s,x)=>s+Number(x.amount||0),0);
      consultantFees.push({
        field: fg.fieldName||"", name: c.name.trim(),
        fee, contractFee, increases: approvedIncreases, totalInc, totalFee: contractFee + totalInc, noClaims,
        contact: c.contact||"", phone: c.phone||"", phone2: c.phone2||"", email: c.email||"",
        _consultantRowId: "q-"+c.id, subItems: c.subItems||[],
      });    });
  });
  consultantFees.sort((a,b) => (a.field||"").localeCompare(b.field||"", 'he'));

  const sel = selConsultant
    ? consultantFees.find(c=>c.name===selConsultant.name && c.field===selConsultant.field)
    : null;

  // Navigate to invoice from dashboard - runs after consultantFees is ready
  React.useEffect(() => {
    if (!openInvoiceId || consultantFees.length === 0) return;
    const inv = rows.find(r => r.id === openInvoiceId);
    if (!inv) return;
    const consultant = consultantFees.find(c => c.name === inv.consultantName);
    if (consultant) setSelConsultant(consultant);
    setExpanded(prev => ({ ...prev, [inv.rowKey]: true }));
    setTimeout(() => {
      const el = document.getElementById("inv-row-" + openInvoiceId);
      if (el) {
        el.scrollIntoView({ behavior:"smooth", block:"center" });
        el.classList.add("row-highlight");
        setTimeout(() => el.classList.remove("row-highlight"), 2000);
      }
    }, 600);
  }, [openInvoiceId, consultantFees.length]);

  const selField = (sel?.field||"").trim();
  const templateMilestones = (sel && companyId) ? (milestones?.[companyId]?.[selField] || []) : [];
  const hasLocalMs = sel ? (((localMilestones||{})[selField]?.length || 0) > 0) : false;
  const fieldMilestones = hasLocalMs ? (localMilestones[selField]||[]) : templateMilestones;
  const selSubItems = sel?.subItems||[];
  const useSubItems = selSubItems.length > 0;

  const openMsEditor = () => {
    setDraftMs(fieldMilestones.map(m => ({ ...m })));
    setEditingMs(true);
  };
  const saveMsLocal = () => {
    if (draftMs.length === 0) {
      const updated = { ...(localMilestones||{}) };
      delete updated[selField];
      setLocalMilestones(updated);
    } else {
      setLocalMilestones({ ...(localMilestones||{}), [selField]: draftMs });
    }
    setEditingMs(false);
  };
  const resetToTemplate = () => {
    const updated = { ...(localMilestones||{}) };
    delete updated[selField];
    setLocalMilestones(updated);
    setEditingMs(false);
  };

  const getInvoices   = key => rows.filter(r => invMatchesField(r, sel?.field||"", sel?.name||"") && r.rowKey===key);
  const addInvoice = (milestoneKey) => {
    if (!sel?.name) return;
    if (sel?.noClaims) return;
    const newRow = {
      id:Date.now(), createdAt: Date.now(), pmPendingSince: Date.now(),
      consultantName:sel.name, fieldName:sel.field||"", rowKey:milestoneKey,
      invoiceNum:"", receiptDate:"", amount:"", pct:"",
      toMunicipality:false, toConsultant:false, rejected:false,
      reason:"", pmApproved:false, unitManagerApproved:false, pmEmailShown:false,
    };
    setRows(prev => [...prev, newRow]);
  };
  const updateInvoice = (id, patch) => {
    const extra = {};
    if (patch.pmApproved === true) extra.umPendingSince = Date.now();
    setRows(prev => prev.map(r => r.id===id ? {...r,...patch,...extra} : r));
  };

  const sendForApproval = (invNum, stage) => {
    if (!projectMeta || !sel) return;
    const validKeys = new Set([
      ...fieldMilestones.map(m => "m-"+m.id),
      ...(sel.increases||[]).map(x => "i-"+x.id),
    ]);
    const invRows = rows.filter(r =>
      invMatchesField(r, sel.field||"", sel.name||"") &&
      validKeys.has(r.rowKey) &&
      String(r.invoiceNum||"").trim() === String(invNum).trim()
    );
    if (invRows.length === 0) return;
    const totalAmt = invRows.reduce((s,r) => s + Number(r.amount||0), 0);
    const rowKeySet = new Set(invRows.map(r => r.rowKey));
    const subject = `CostPilot — חשבון מס׳ ${invNum} ממתין לאישורך — ${projectMeta.name}`;
    const headers = ["אבן דרך", "% מחוזה", "% מצטבר שולם", "% מבוקש בחשבון", "נדרש ", "שולם ", "יתרה ", "סכום חשבון "];
    const outro = "אנא היכנסו למערכת ואשרו את החשבונית.\n\nבברכה,\nמערכת CostPilot";
    const msRows = fieldMilestones.map(m => {
      const key = "m-"+m.id;
      const baseFromAlloc = milestoneAllocation[key]?.baseAmt;
      const required = baseFromAlloc ?? (sel.contractFee || sel.fee || 0) * Number(m.pct||0) / 100;
      const paid = rowTotal(key);
      const isCurrent = rowKeySet.has(key);
      const paidPct = required > 0 ? (paid/required*100).toFixed(1) : "0";
      const thisRow = invRows.find(r => r.rowKey === key);
      return [
        m.name || "—",
        `${m.pct}%`,
        `${paidPct}%`,
        isCurrent && thisRow?.pct ? `${thisRow.pct}%` : "—",
        fmt(required),
        fmt(paid),
        fmt(Math.max(0, required - paid)),
        isCurrent ? fmt(Number(thisRow?.amount||0)) : "—",
      ];
    });
    // שורות הגדלות (חיוביות בלבד — שליליות מחושבות באבני הדרך)
    const incRows = (sel.increases||[]).filter(x => Number(x.amount||0) > 0).map(x => {
      const key = "i-"+x.id;
      const required = Number(x.amount||0);
      const paid = rowTotal(key);
      const isCurrent = rowKeySet.has(key);
      const paidPct = required > 0 ? (paid/required*100).toFixed(1) : "0";
      const thisRow = invRows.find(r => r.rowKey === key);
      return [
        (x.reason||"הגדלה"),
        "הגדלה",
        `${paidPct}%`,
        isCurrent && thisRow?.pct ? `${thisRow.pct}%` : "—",
        fmt(required),
        fmt(paid),
        fmt(Math.max(0, required - paid)),
        isCurrent ? fmt(Number(thisRow?.amount||0)) : "—",
      ];
    });
    const rowHighlights = [
      ...fieldMilestones.map(m => rowKeySet.has("m-"+m.id)),
      ...(sel.increases||[]).filter(x => Number(x.amount||0) > 0).map(x => rowKeySet.has("i-"+x.id)),
    ];
    // שורת סיכום (אבני דרך + הגדלות)
    const sumRequired = [
      ...fieldMilestones.map(m => milestoneAllocation["m-"+m.id]?.baseAmt ?? (sel.contractFee||sel.fee||0)*Number(m.pct||0)/100),
      ...(sel.increases||[]).filter(x => Number(x.amount||0) > 0).map(x => Number(x.amount||0)),
    ].reduce((s,v) => s+v, 0);
    const sumPaid = [
      ...fieldMilestones.map(m => rowTotal("m-"+m.id)),
      ...(sel.increases||[]).filter(x => Number(x.amount||0) > 0).map(x => rowTotal("i-"+x.id)),
    ].reduce((s,v) => s+v, 0);
    const summaryRow = ["סה״כ", "", "", "", fmt(sumRequired), fmt(sumPaid), fmt(Math.max(0, sumRequired-sumPaid)), fmt(totalAmt)];
    const allRows = [...msRows, ...incRows];
    const tableRows = allRows.length > 0 ? [...allRows, summaryRow] : [summaryRow];
    const tableHighlights = [...rowHighlights, false]; // שורת סיכום לא מסומנת
    const emptyRow = [["(אין אבני דרך מוגדרות)", "", "", "", "", "", "", ""]];
    if (stage === "pm") {
      const pmEmail = projectMeta.status === "ביצוע" ? projectMeta.executionManagerEmail : projectMeta.planningManagerEmail;
      const pmName  = projectMeta.status === "ביצוע" ? projectMeta.executionManager  : projectMeta.planningManager;
      if (!pmEmail) return;
      const intro = `פרויקט: ${projectMeta.name}\nיועץ: ${sel.name}\nחשבון מס׳: ${invNum}\nסה״כ סכום: ${fmt(totalAmt)}`;
      const body = `שלום ${pmName || ""},\n\nחשבונית ממתינה לאישורך כמנהל הפרויקט.\n\n${intro}\n\nאנא היכנסו למערכת ואשרו.\n\nבברכה`;
      const htmlBody = buildEmailHtml(`שלום ${pmName || ""},\n\nחשבונית ממתינה לאישורך כמנהל הפרויקט.\n\n${intro}`, headers, tableRows, outro, tableHighlights, "#EAF1FA");
      setApprovalModal({ toEmail: pmEmail, toName: pmName, subject, body, htmlBody });
    } else if (stage === "um") {
      if (!projectMeta.unitManagerEmail) return;
      const intro = `פרויקט: ${projectMeta.name}\nיועץ: ${sel.name}\nחשבון מס׳: ${invNum}\nסה״כ סכום: ${fmt(totalAmt)}`;
      const body = `שלום ${projectMeta.unitManager || ""},\n\nחשבונית אושרה על ידי מנהל הפרויקט וממתינה לאישורך כמנהל יחידה.\n\n${intro}\n\nאנא היכנסו למערכת ואשרו.\n\nבברכה`;
      const htmlBody = buildEmailHtml(`שלום ${projectMeta.unitManager || ""},\n\nחשבונית אושרה על ידי מנהל הפרויקט וממתינה לאישורך כמנהל יחידה.\n\n${intro}`, headers, tableRows, outro, tableHighlights, "#EAF1FA");
      setApprovalModal({ toEmail: projectMeta.unitManagerEmail, toName: projectMeta.unitManager, subject, body, htmlBody });
    }
  };
  const removeInvoice = id => setRows(rows.filter(r=>r.id!==id));

  const setNoClaims = (val) => {
    if (!sel?._consultantRowId) return;
    const id = sel._consultantRowId;
    setConsultantsRows(prev => prev.map(r => r.id === id ? { ...r, noClaims: val } : r));
  };


  const rowTotal = key => getInvoices(key).filter(r => r.unitManagerApproved && !r.rejected).reduce((s,r)=>s+Number(r.amount||0),0);

  // ── milestoneAllocation: הקצאה כרונולוגית של יתרת האומדן לאבני דרך ─────────
  // פעיל רק כשיש הקטנת אומדן (totalFee < contractFee)
  // מחזיר { milestoneKey → { baseAmt, isOverpaid, isComplete } }
  const milestoneAllocation = React.useMemo(() => {
    if (!sel || fieldMilestones.length === 0) return {};
    // רק הקטנות מאושרות (מינוס) משפיעות על אבני הדרך — הגדלות חיוביות בשורתן בלבד
    const negInc = (sel.increases||[])
      .filter(x => Number(x.amount||0) < 0)
      .reduce((s,x) => s + Number(x.amount||0), 0);
    if (negInc === 0) return {}; // אין הקטנות — אין שינוי לאבני הדרך

    const newFee = sel.contractFee + negInc; // contractFee פחות ההקטנות בלבד
    const totalPaid = fieldMilestones.reduce((s,m) => s + rowTotal("m-"+m.id), 0);
    let remaining = Math.max(0, newFee - totalPaid);

    const result = {};
    fieldMilestones.forEach(m => {
      const key = "m-" + m.id;
      const paid = rowTotal(key);
      const maxAmt = Math.max(0, newFee * Number(m.pct||0) / 100);

      if (paid > maxAmt) {
        // יתר תשלום — נעול + אזהרה; העודף נספג ב-remaining דרך totalPaid
        result[key] = { baseAmt: maxAmt, isOverpaid: true, isComplete: false };
      } else if (paid === maxAmt) {
        // שולם במדויק — נעול ומושלם
        result[key] = { baseAmt: maxAmt, isOverpaid: false, isComplete: true };
      } else {
        // פתוח — הקצה לפי הסדר מהיתרה
        const additionalNeeded = maxAmt - paid;
        const actualAdditional = Math.min(remaining, additionalNeeded);
        result[key] = { baseAmt: paid + actualAdditional, isOverpaid: false, isComplete: false };
        remaining = Math.max(0, remaining - actualAdditional);
      }
    });
    return result;
  }, [sel, fieldMilestones, rows]);

  const paidMilestoneTotal = sel ? fieldMilestones.reduce((s,m)=>s+rowTotal("m-"+m.id),0) : 0;
  const paidSubTotal       = sel ? selSubItems.reduce((s,it)=>s+rowTotal("s-"+it.id),0) : 0;
  const paidIncTotal       = sel ? ((sel.increases||[])||[]).reduce((s,inc)=>s+rowTotal("i-"+inc.id),0) : 0;
  const paidTotal  = (useSubItems ? paidSubTotal : paidMilestoneTotal) + paidIncTotal;
  const remaining  = sel ? sel.totalFee - paidTotal : 0;

  // ── Shared milestone section (table of milestones + expandable invoices) ──
  const renderMilestonesSection = (items, isIncrease, baseFeeForItem, keyPrefix=null) => {
    const totalPaid = items.reduce((s,m)=>s+rowTotal(keyPrefix?keyPrefix+m.id:(isIncrease?"i-":"m-")+m.id),0);
    const totalBase = items.reduce((s,m)=>{
      const key = keyPrefix?keyPrefix+m.id:(isIncrease?"i-":"m-")+m.id;
      const raw = (isIncrease||keyPrefix) ? Number(m.amount||0) : sel.contractFee*Number(m.pct||0)/100;
      const alloc = (!isIncrease && milestoneAllocation[key]);
      return s + (alloc ? alloc.baseAmt : raw);
    },0);
    return (
      <div style={{ overflowX:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13, direction:"rtl", tableLayout:"fixed" }}>
          <colgroup>
            <col style={{ width:"4%" }} />
            <col style={{ width:"24%" }} />
            <col style={{ width:"12%" }} />
            <col style={{ width:"16%" }} />
            <col style={{ width:"12%" }} />
            <col style={{ width:"20%" }} />
            <col style={{ width:"12%" }} />
          </colgroup>
          <thead>
            <tr style={{ background:"#F7F8FA", borderBottom:"2px solid #E2E5EA" }}>
              <th style={{ padding:"8px 10px", textAlign:"right", color:"#767676", fontWeight:700, fontSize:11 }}></th>
              <th style={{ padding:"8px 14px", textAlign:"right", color:"#767676", fontWeight:700, fontSize:11 }}>אבן דרך</th>
              <th style={{ padding:"8px 10px", textAlign:"right", color:"#767676", fontWeight:700, fontSize:11 }}>אחוז</th>
              <th style={{ padding:"8px 14px", textAlign:"right", color:"#767676", fontWeight:700, fontSize:11 }}>סכום בחוזה</th>
              <th style={{ padding:"8px 10px", textAlign:"right", color:"#767676", fontWeight:700, fontSize:11 }}>חשבון %</th>
              <th style={{ padding:"8px 14px", textAlign:"right", color:"#767676", fontWeight:700, fontSize:11 }}>חשבון מאושר</th>
              <th style={{ padding:"8px 10px", textAlign:"right", color:"#767676", fontWeight:700, fontSize:11 }}>תכנון בלבד</th>
            </tr>
          </thead>
          <tbody>
            {items.map((m,i) => {
              const key     = keyPrefix?keyPrefix+m.id:(isIncrease?"i-":"m-")+m.id;
              const rawAmt  = (isIncrease||keyPrefix) ? Number(m.amount||0) : sel.contractFee * Number(m.pct||0) / 100;
              const alloc   = !isIncrease && milestoneAllocation[key];
              const baseAmt = alloc ? alloc.baseAmt : rawAmt;
              const isOverpaid = !!(alloc?.isOverpaid);
              const isMilestoneLocked = !!(alloc?.isComplete || alloc?.isOverpaid);
              const paid    = rowTotal(key);
              const paidPct = baseAmt ? (paid/baseAmt*100).toFixed(1) : "0";
              const isOpen  = expanded[key];
              const invs    = getInvoices(key);
              const isNegIncrease = isIncrease && rawAmt < 0;
              return (
                <React.Fragment key={m.id}>
                  {/* Milestone row */}
                  <tr style={{ borderBottom: isOpen?"none":"1px solid #F0F2F5", background: isNegIncrease?"#F0F2F5": isOpen?"#EAF1FA": i%2===0?"#fff":"#FAFBFC", cursor:"pointer", opacity: isNegIncrease?0.7:1 }}
                    onClick={()=>setExpanded(e=>({...e,[key]:!e[key]}))}>
                    <td style={{ padding:"10px 10px", textAlign:"right", color:"#3A3A3A", fontWeight:700, fontSize:16 }}>{isOpen?"∧":"+"}</td>
                    <td style={{ padding:"10px 14px", fontWeight:600, color:"#0D0D0D" }}>
                      {m.name||m.reason}
                    </td>
                    <td style={{ padding:"10px 14px", textAlign:"right", fontWeight:700, color:"#3A3A3A" }}>{isIncrease?100:m.pct}%</td>
                    <td style={{ padding:"10px 14px", textAlign:"right",   fontWeight:700 }}>{fmt(baseAmt)}</td>
                    <td style={{ padding:"10px 14px", textAlign:"right", fontWeight:600, color: Number(paidPct)>0?"#0D0D0D":"#9A9A9A" }}>{paidPct}%</td>
                    <td style={{ padding:"10px 14px", textAlign:"right",   fontWeight:700, color: paid>0?"#0D0D0D":"#9A9A9A" }}>
                      {fmt(paid)}
                      {isOverpaid && <span title={`שולם יתר — ${(paid - baseAmt).toLocaleString("he-IL")}  עודף`} style={{ marginRight:4, color:"#5C2020", fontSize:10, fontWeight:700 }}>⛔</span>}
                    </td>
                    <td style={{ padding:"10px 14px", textAlign:"right" }}>
                      {m.planOnly ? <Badge color="#163356">✓</Badge> : <span style={{color:"#E2E5EA"}}>—</span>}
                    </td>
                  </tr>

                  {/* Expanded invoices */}
                  {isOpen && (
                    <tr>
                      <td colSpan={7} style={{ padding:0, background:"#F7F8FA", borderBottom:"2px solid #B8CEED" }}>
                        <div style={{ padding:"10px 20px" }}>
                          <div style={{ fontSize:12, fontWeight:700, color:"#767676", marginBottom:8 }}>
                            חשבונות עבור {m.name||m.reason}:
                          </div>
                          {invs.length > 0 && (
                            <div style={{ overflowX:"auto", marginBottom:10 }}>
                              <table style={{ borderCollapse:"collapse", fontSize:12, width:"100%" }}>
                                <thead>
                                  <tr style={{ background:"#F0F2F5", borderBottom:"1px solid #E2E5EA" }}>
                                    {["מס׳ חשבון","ת. קבלה","סכום","אחוז (%)","מנהל פרויקט","מנהל יחידה","אישור מזמין","הוחזר ליועץ","נדחה","סיבה","מחק","שלח לאישור"].map(h=>(
                                      <th key={h} style={{ padding:"5px 8px", textAlign:"right", color:"#163356", fontWeight:700, fontSize:10, whiteSpace:"nowrap" }}>{h}</th>
                                    ))}
                                  </tr>
                                </thead>
                                <tbody>
                                  {invs.map((inv,j)=>(
                                    <tr key={inv.id} id={"inv-row-"+inv.id} style={{ borderBottom:"1px solid #F0F2F5", background:j%2===0?"#fff":"#FAFBFC" }}>
                                      <td style={{ padding:"4px 6px" }}>
                                        <input value={inv.invoiceNum||""} onChange={e=>updateInvoice(inv.id,{invoiceNum:e.target.value})}
                                          placeholder="מספר" style={{ width:70, padding:"3px 5px", border:"1px solid #E2E5EA", borderRadius:4, fontSize:11, fontFamily:"'Heebo',sans-serif", outline:"none" }} />
                                      </td>
                                      <td style={{ padding:"4px 6px" }}>
                                        <FlatpickrDate value={inv.receiptDate||""} onChange={v=>updateInvoice(inv.id,{receiptDate:v})} />
                                      </td>
                                      <td style={{ padding:"4px 6px" }}>
                                        <NumericCell value={inv.amount||""} baseAmt={baseAmt} mode="amount"
                                          onCommit={(amt,pct) => {
                                            if (baseAmt > 0 && Number(amt) > baseAmt + 0.01 + 0.01) {
                                              alert(`הסכום ${Number(amt).toLocaleString("he-IL")}  חורג מסכום האבן דרך / ההגדלה (${baseAmt.toLocaleString("he-IL")} )`);
                                              return;
                                            }
                                            updateInvoice(inv.id, pct?{amount:amt,pct}:{amount:amt});
                                          }}
                                          style={{ width:85 }} />
                                      </td>
                                      <td style={{ padding:"4px 6px" }}>
                                        <NumericCell value={inv.pct||""} baseAmt={baseAmt} mode="pct"
                                          onCommit={(pct,amt) => {
                                            if (Number(pct) > 100) {
                                              alert("האחוז לא יכול לעלות על 100%");
                                              return;
                                            }
                                            if (baseAmt > 0 && Number(amt) > baseAmt + 0.01 + 0.01) {
                                              alert(`הסכום המחושב ${Number(amt).toLocaleString("he-IL")}  חורג מסכום האבן דרך / ההגדלה (${baseAmt.toLocaleString("he-IL")} )`);
                                              return;
                                            }
                                            updateInvoice(inv.id, amt?{pct,amount:amt}:{pct});
                                          }}
                                          style={{ width:75 }} placeholder="0.00" />
                                      </td>
                                      {["pmApproved","unitManagerApproved","toMunicipality","toConsultant","rejected"].map(k=>(
                                        <td key={k} style={{ padding:"4px 8px", textAlign:"right" }}>
                                          <input type="checkbox" checked={!!inv[k]} onChange={e=>updateInvoice(inv.id,{[k]:e.target.checked})} />
                                        </td>
                                      ))}
                                      <td style={{ padding:"4px 6px" }}>
                                        <ReasonCell value={inv.reason||""} onCommit={val=>updateInvoice(inv.id,{reason:val})} />
                                      </td>
                                      <td style={{ padding:"4px 8px", textAlign:"right" }}>
                                        <button onClick={()=>removeInvoice(inv.id)}
                                          style={{ background:"#F8EDED", color:"#5C2020", border:"none", borderRadius:4, padding:"2px 7px", fontSize:11, cursor:"pointer", fontFamily:"'Heebo',sans-serif" }}>🗑</button>
                                      </td>
                                      <td style={{ padding:"4px 6px", whiteSpace:"nowrap" }}>
                                        {inv.invoiceNum && Number(inv.amount||0) > 0 && !inv.pmApproved && !inv.rejected && (
                                          <button onClick={e=>{e.stopPropagation(); sendForApproval(inv.invoiceNum,"pm");}}
                                            title={`שלח חשבון ${inv.invoiceNum} לאישור מנהל הפרויקט`}
                                            style={{ background:"#EAF1FA", color:"#163356", border:"1px solid #B8CEED", borderRadius:4, padding:"2px 7px", fontSize:10, cursor:"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:700 }}>
                                            ✉ מנ"פ
                                          </button>
                                        )}
                                        {inv.invoiceNum && inv.pmApproved && !inv.unitManagerApproved && !inv.rejected && projectMeta?.unitManagerEmail && (
                                          <button onClick={e=>{e.stopPropagation(); sendForApproval(inv.invoiceNum,"um");}}
                                            title={`שלח חשבון ${inv.invoiceNum} לאישור מנהל יחידה`}
                                            style={{ background:"#FAF2E6", color:"#5C2020", border:"1px solid #F0D4B0", borderRadius:4, padding:"2px 7px", fontSize:10, cursor:"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:700 }}>
                                            ✉ מנ"י
                                          </button>
                                        )}
                                      </td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            </div>
                          )}
                          {invs.length === 0 && !isNegIncrease && <div style={{ color:"#9A9A9A", fontSize:12, marginBottom:8 }}>לא הוזנו חשבונות עדיין</div>}
                          {isNegIncrease && (
                            <div style={{ color:"#767676", fontSize:12, fontWeight:600, marginBottom:6, textAlign:"right", background:"#F0F2F5", border:"1px solid #D0D5DD", borderRadius:4, padding:"6px 10px" }}>
                              ↩ ההקטנה כלולה בחישוב אבני הדרך — לא ניתן לחייב ישירות
                            </div>
                          )}
                          {sel.noClaims && (
                            <div style={{ color:"#5C3D10", fontSize:12, fontWeight:600, marginBottom:6, textAlign:"right", background:"#FAF2E6", border:"1px solid #F0D4B0", borderRadius:4, padding:"6px 10px" }}>
                              התקבל העדר תביעות — לא ניתן להוסיף חשבונות ליועץ זה
                            </div>
                          )}
                          {isMilestoneLocked && !sel.noClaims && (
                            <div style={{ color: isOverpaid?"#5C2020":"#059669", fontSize:12, fontWeight:600, marginBottom:6, textAlign:"right", background: isOverpaid?"#F8EDED":"#EFF7F3", border:`1px solid ${isOverpaid?"#F0B8B8":"#C6E8D4"}`, borderRadius:4, padding:"6px 10px" }}>
                              {isOverpaid ? `⛔ שולם יתר — ${(paid - baseAmt).toLocaleString("he-IL")}  מעבר לאומדן החדש` : "✓ אבן דרך הושלמה — לא ניתן להוסיף חשבונות"}
                            </div>
                          )}
                          {baseAmt === 0 && paid === 0 && !isIncrease && Object.keys(milestoneAllocation).length > 0 && (
                            <div style={{ color:"#5C3D10", fontSize:12, fontWeight:600, marginBottom:6, textAlign:"right", background:"#FAF2E6", border:"1px solid #F0D4B0", borderRadius:4, padding:"6px 10px" }}>
                              האומדן החדש כוסה במלואו — אין יתרה לאבן דרך זו
                            </div>
                          )}
                          {!isNegIncrease && (
                          <button onClick={(e)=>{e.stopPropagation(); addInvoice(key);}}
                            disabled={!!sel.noClaims || isMilestoneLocked}
                            style={{ background: (sel.noClaims||isMilestoneLocked)?"#F0F2F5":"#F7F8FA", color: (sel.noClaims||isMilestoneLocked)?"#9A9A9A":"#3A3A3A", border:"1px solid #E2E5EA", borderRadius:4, padding:"4px 12px", fontSize:11, cursor: (sel.noClaims||isMilestoneLocked)?"not-allowed":"pointer", fontFamily:"'Heebo',sans-serif", fontWeight:600, opacity: (sel.noClaims||isMilestoneLocked)?0.6:1 }}>
                            + הוסף חשבון
                          </button>
                          )}
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
          <tfoot>
            <tr style={{ background:"#F7F8FA", borderTop:"2px solid #E2E5EA" }}>
              <td colSpan={3} style={{ padding:"9px 14px", fontWeight:800, color:"#0D0D0D" }}>סה״כ</td>
              <td style={{ padding:"9px 14px", fontWeight:800, color:"#0D0D0D", textAlign:"right" }}>{fmt(totalBase)}</td>
              <td />
              <td style={{ padding:"9px 14px", fontWeight:800, color:"#3A3A3A", textAlign:"right" }}>{fmt(totalPaid)}</td>
              <td />
            </tr>
          </tfoot>
        </table>
      </div>
    );
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:18 }}>
      {approvalModal && (
        <ApprovalEmailModal {...approvalModal}
          onSent={() => setApprovalModal(null)}
          onCancel={() => setApprovalModal(null)} />
      )}

      {/* ── Consultant selector ── */}
      <Card>
        <div style={{ fontWeight:700, color:"#0D0D0D", marginBottom:10, fontSize:15 }}>בחר יועץ לריכוז חשבונות</div>
        {consultantFees.length === 0
          ? <span style={{ color:"#9A9A9A", fontSize:13 }}>אין יועצים מאושרים בפרויקט</span>
          : (() => {
              const [cSearch, setCSearch] = React.useState("");
              const filtered = consultantFees.filter(c =>
                c.field.toLowerCase().includes(cSearch.toLowerCase()) ||
                c.name.toLowerCase().includes(cSearch.toLowerCase())
              );
              return (
                <div>
                  {!selConsultant ? (
                    <>
                      <input value={cSearch} onChange={e=>setCSearch(e.target.value)}
                        placeholder="חיפוש לפי שם תחום או שם יועץ..."
                        style={{ width:"100%", padding:"8px 12px", border:"1.5px solid #0B1F3A", borderRadius:4, fontSize:13, fontFamily:"'Heebo',sans-serif", outline:"none", marginBottom:10, background:"#F7F8FA" }} />
                      <div style={{ display:"flex", flexDirection:"column", gap:4, maxHeight:260, overflowY:"auto" }}>
                        {filtered.map(c => (
                          <div key={c.name+c.field} onClick={()=>setSelConsultant(c)}
                            style={{ display:"flex", alignItems:"center", gap:14, padding:"9px 14px", borderRadius:4,
                              border:"1.5px solid #F0F2F5", background:"#fff", cursor:"pointer", transition:"all .12s" }}
                            onMouseOver={e=>e.currentTarget.style.background="#EFF1F5"}
                            onMouseOut={e=>e.currentTarget.style.background="#fff"}>
                            <div style={{ width:36, height:36, borderRadius:4, background:"#F0F2F5", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>👤</div>
                            <div>
                              <div style={{ fontSize:11, color:"#9A9A9A", fontWeight:700, marginBottom:1 }}>{c.field}</div>
                              <div style={{ fontSize:13, fontWeight:600, color:"#0D0D0D" }}>{c.name}</div>
                            </div>
                          </div>
                        ))}
                        {filtered.length === 0 && <div style={{ color:"#9A9A9A", fontSize:13, padding:"8px 0" }}>לא נמצאו תוצאות</div>}
                      </div>
                    </>
                  ) : (
                    <div style={{ display:"flex", alignItems:"flex-start", gap:12 }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"9px 14px", borderRadius:4, border:"1.5px solid #163356", background:"#F7F8FA", flex:"0 0 50%", maxWidth:"50%" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                          <div style={{ width:36, height:36, borderRadius:4, background:"#F0F2F5", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>👤</div>
                          <div>
                            <div style={{ fontSize:11, color:"#3A3A3A", fontWeight:700, marginBottom:1 }}>{sel?.field}</div>
                            <div style={{ fontSize:13, fontWeight:600, color:"#0D0D0D" }}>{sel?.name}</div>
                          </div>
                        </div>
                        <button onClick={()=>{ setSelConsultant(null); setCSearch(""); }}
                          style={{ fontSize:12, color:"#767676", background:"#F0F2F5", border:"none", borderRadius:4, padding:"4px 10px", cursor:"pointer" }}>
                          החלף
                        </button>
                      </div>
                      {/* עמודה ריקה באמצע */}
                      <div style={{ flex:1 }} />
                      {/* סיכום מספרי חשבונות */}
                      {(() => {
                        const validKeys = new Set([
                          ...fieldMilestones.map(m => "m-"+m.id),
                          ...(sel.increases||[]).map(x => "i-"+x.id),
                          ...selSubItems.map(it => "s-"+it.id),
                        ]);
                        const byNum = {};
                        rows.filter(r => invMatchesField(r, sel?.field||"", sel?.name||"") && validKeys.has(r.rowKey)).forEach(inv => {
                          const num = inv.invoiceNum?.trim();
                          if (!num) return;
                          byNum[num] = (byNum[num]||0) + Number(inv.amount||0);
                        });
                        const entries = Object.entries(byNum).sort((a,b) => {
                          const na=Number(a[0]),nb=Number(b[0]);
                          return isNaN(na)||isNaN(nb)?a[0].localeCompare(b[0],'he'):na-nb;
                        });
                        if (!entries.length) return null;
                        return (
                          <div style={{ display:"flex", flexDirection:"column", gap:3, padding:"6px 0" }}>
                            {entries.map(([num,total]) => (
                              <div key={num} style={{ fontSize:11, color:"#444444", whiteSpace:"nowrap" }}>
                                חש׳ {num} — {fmt(total)}
                              </div>
                            ))}
                          </div>

function NumInput({ value, onChange }) {
  const [focus, setFocus] = useState(false);
  const [raw, setRaw] = useState(String(value||""));
  React.useEffect(() => { if (!focus) setRaw(String(value||"")); }, [value, focus]);
  const display = focus ? raw : (Number(raw) ? Number(raw).toLocaleString("he-IL") : raw);
  return (
    <input
      type="text" value={display}
      onChange={e => { const v = e.target.value.replace(/,/g,""); setRaw(v); onChange(v); }}
      onFocus={() => { setFocus(true); setRaw(String(value||"")); }}
      onBlur={() => setFocus(false)}
      style={{ width:160, textAlign:"right", background: focus?"#fff":"#F7F8FA", border:`1.5px solid ${focus?"#0B1F3A":"#E2E5EA"}`, borderRadius:4, padding:"6px 10px", fontSize:14, fontFamily:"'Heebo',sans-serif", outline:"none", color:"#0D0D0D" }}
    />
  );
}

// ── Shared helper: build the exact rows shown in BudgetTab ───────────────────
// Used by BOTH BudgetTab (display) and exportProjectToExcel (export).
// Export reads these rows directly - NO re-computation.
function buildBudgetAllRows({ quotesRows, consultantsRows, budgetState, statsRows, accountsRows, planOnlyMap, openingData }) {
  const contractorEst = Number((budgetState||{}).contractorEst || 0);
  const devPct        = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);
  const archBaseManualB = Number(String((openingData||{}).archBase||"").replace(/[,\s]/g,"").replace(/[^\d.]/g,""));
  const archBase      = archBaseManualB > 0 ? archBaseManualB : contractorEst - contractorEst * devPct / 100;
  const computeFee = (field, payType, value) => {
    if (payType !== "אחוזים") return Number(value || 0);
    const pct = Number(value || 0) / 100;
    if (["אדריכל","אדריכלות","אדריכלים"].includes((field||"").trim()))      return archBase      * pct;
    if ((field||"").includes("מנהל פרויקט")) return contractorEst * pct;
    if (contractorEst) {
      const profPct = Number((statsRows||[]).find(r => r.field === field)?.pct || 0) / 100;
      return contractorEst * profPct * pct;
    }
    return 0;
  };
  // For old invoices without fieldName: attribute only to the first field this consultant appears in
  const firstFieldMap = {};
  (quotesRows || []).forEach(fg => {
    (fg.consultants || []).forEach(c => {
      if (!c.approved || !c.name?.trim()) return;
      const n = c.name.trim();
      if (!firstFieldMap[n]) firstFieldMap[n] = fg.fieldName || "";
    });
  });
  // Compute paid exactly as AccountsTab does: only invoices for approved increases (i-*), any milestone (m-*)
  const paidByConsultant = (name, field, approvedIncIds) =>
    (accountsRows || []).filter(r => {
      if (r.consultantName !== name || !r.unitManagerApproved || r.rejected) return false;
      if (r.fieldName ? r.fieldName !== field : (firstFieldMap[name] || "") !== field) return false;
      // Invoices for increases are only counted when that increase is approved
      if (r.rowKey && r.rowKey.startsWith("i-") && !approvedIncIds.has(r.rowKey)) return false;
      return true;
    }).reduce((s,r) => s + Number(r.amount||0), 0);
  const rows = [];
  (quotesRows || []).forEach(fg => {
    (fg.consultants || []).forEach(c => {
      if (!c.approved || !c.name?.trim()) return;
      const consultantEntry = (consultantsRows || []).find(r => r.id === "q-"+c.id);
      const approvedIncs = (consultantEntry?.increases || []).filter(x => x.approvedIncrease);
      const totalInc    = approvedIncs.reduce((s,x) => s + Number(x.amount||0), 0);
      const approvedIncIds = new Set(approvedIncs.map(x => "i-"+x.id));
      const computedFee = (c.subItems && c.subItems.length > 0)
        ? c.subItems.reduce((s,it)=>s+Number(it.amount||0),0)
        : computeFee(fg.fieldName, c.payType || "אחוזים", c.value);
      const paid        = paidByConsultant(c.name.trim(), fg.fieldName||"", approvedIncIds);
      const planOnly    = (planOnlyMap||{})[(fg.fieldName||"") + "::" + c.name.trim()] || 0;
      const noClaims    = !!(consultantEntry?.noClaims);
      const notes       = consultantEntry?.notes || "";
      rows.push({
        field: fg.fieldName || "", name: c.name.trim(),
        payType: c.payType || "אחוזים", value: Number(c.value||0),
        increases: totalInc, computedFee, paid, planOnly, noClaims, notes,
        _consultantRowId: "q-"+c.id,
      });
    });
  });
  rows.sort((a,b) => (a.field||"").localeCompare(b.field||"", 'he'));
  // Manual rows always appear at the end of the consultants section
  (budgetState?.extraConsultantRows || []).forEach(r => {
    rows.push({
      field: r.field||"", name: r.name||"",
      payType: "סכום קבוע", value: Number(r.contract||0),
      increases: 0, computedFee: Number(r.contract||0),
      paid: Number(r.paid||0), planOnly: Number(r.planOnly||0),
      noClaims: !!r.noClaims, notes: r.notes||"",
      _manualRow: true, _manualId: r.id,
    });
  });
  return rows;
}

function NegInput({ value, onCommit, placeholder, style }) {
  const isFocused = React.useRef(false);
  const [local, setLocal] = React.useState("");
  const [showRaw, setShowRaw] = React.useState(false);
  const numVal = v => {
    if (v===null||v===undefined||v==="") return null;
    const n = Number(String(v).replace(/,/g,""));
    return isNaN(n)?null:n;
  };
  const fmtNum = v => { const n=numVal(v); return n!==null?n.toLocaleString("en-US"):""; };
  React.useEffect(() => {
    if (!isFocused.current) { const n=numVal(value); setLocal(n!==null?String(n):""); }
  }, [value]);
  return (
    <input
      type="text"
      value={showRaw ? local : fmtNum(value)}
      onChange={e => setLocal(e.target.value.replace(/,/g,""))}
      onFocus={() => {
        isFocused.current = true;
        const n = numVal(value);
        setLocal(n!==null?String(n):"");
        setShowRaw(true);
      }}
      onBlur={() => {
        isFocused.current = false;
        setShowRaw(false);
        const clean = local.replace(/,/g,"");
        const n = Number(clean);
        onCommit(clean!==""&&!isNaN(n)?n:"");
      }}
      placeholder={placeholder||"0"}
      style={{ ...style, direction:"ltr" }}
    />
  );
}

const _fmtInput  = (val) => val ? Number(String(val).replace(/,/g,"")).toLocaleString("he-IL") : "";
const _parseInput = (val) => String(val).replace(/,/g,"");
function BudgetNumInput({ value, onChange, placeholder="0", style={} }) {
  const [focused, setFocused] = React.useState(false);
  const [raw, setRaw] = React.useState(value||"");
  React.useEffect(() => { if (!focused) setRaw(value||""); }, [value, focused]);

    type="text"

        if ("q-"+c.id === budgetOpenConsultantId) return { ...entry, value: c.value, payType: c.payType||"אחוזים" };

    }
    return entry;
  }, [budgetOpenConsultantId, consultantsRows, quotesRows]);

  // ── Consultants table - use shared helper (same data as export) ───────────
  const _contractorEst = Number((budgetState||{}).contractorEst || 0);
  const _devPct = (statsRows||[]).filter(r=>(r.field||"").includes("פיתוח")||(r.field||"").includes("נוף")).reduce((s,r)=>s+Number(r.pct||0),0);

  const consultantsTotal = allRows.reduce((s,r) => {
    return s + (r.payType==="אחוזים" ? r.computedFee : r.value) + r.increases;
  }, 0);

  // ── Budget estimation table state ─────────────────────────────────────────
  const bs = budgetState || {};
  const upd = (key, val) => setBudgetState({ ...(budgetState||{}), [key]: val });
  const updateNote = (consultantRowId, val) =>
    setConsultantsRows(prev => prev.map(r => r.id === consultantRowId ? { ...r, notes: val } : r));

    upd("extraConsultantRows", (bs.extraConsultantRows||[]).map(r => r.id===id ? {...r,[key]:val} : r));
  const delExtraConsultant = id =>
    upd("extraConsultantRows", (bs.extraConsultantRows||[]).filter(r => r.id!==id));
  const addExtraConsultant = () =>
    upd("extraConsultantRows", [...(bs.extraConsultantRows||[]), {id:Date.now(), field:"", name:"", contract:"", paid:"", planOnly:"", noClaims:false, notes:""}]);

  const municipalEst  = Number(String((openingData||{}).municipalEst||"").replace(/,/g,"").replace(/[^\d.]/g,""))  || Number(bs.municipalEst  || 0);

  const approvalTotal = approvalActual + setupOffset;
  const _feePaidCalc  = [...(bs.feeRows||[]),...(bs.extraFeeRows||[])].reduce((s,r)=>s+Number(r.paid||0),0);
  const _conPaidCalc  = [{ paid:bs.contractorPaid||"" },...(bs.extraContractorRows||[])].reduce((s,r)=>s+Number(r.paid||0),0);
  const _basePaidCalc = allRows.reduce((s,r)=>s+(r.paid||0),0) + _feePaidCalc + _conPaidCalc;
  const _ohPaidCalc   = Math.round(_basePaidCalc * Number(bs.overheadPct||0) / 100);

  const _vatPaidCalc  = Math.round((_basePaidCalc+_ohPaidCalc+_bcmPaidCalc) * Number(bs.vatPct||18) / 100);
  const grandTotalPaidCalc = _basePaidCalc + _ohPaidCalc + _bcmPaidCalc + _vatPaidCalc;
  const extraTotal    = extraItems.reduce((s,x) => s + Number(x.amount||0), 0);
  const receivedTotal = extraTotal;
